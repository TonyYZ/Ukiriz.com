      function boxesOverlap(a, b, padding = 12) {
        return !(
          a.right + padding <= b.left ||
          a.left >= b.right + padding ||
          a.bottom + padding <= b.top ||
          a.top >= b.bottom + padding
        );
      }

      function clampLabelPosition(x, y, label, canvas) {
        const maxX = Math.max(0, canvas.clientWidth - label.offsetWidth);
        const maxY = Math.max(0, canvas.clientHeight - label.offsetHeight);

        return {
          x: Math.min(Math.max(0, x), maxX),
          y: Math.min(Math.max(0, y), maxY),
        };
      }

      function getLabelBox(x, y, label) {
        return {
          left: x,
          top: y,
          right: x + label.offsetWidth,
          bottom: y + label.offsetHeight,
        };
      }

      function collectOccupiedLabelBoxes(canvas, pendingBoxes = []) {
        const occupied = [];
        canvas.querySelectorAll('.symbol-label').forEach((existingLabel) => {
          const left = parseFloat(existingLabel.style.left);
          const top = parseFloat(existingLabel.style.top);
          if (!Number.isFinite(left) || !Number.isFinite(top)) return;

          occupied.push(getLabelBox(left, top, existingLabel));
        });

        pendingBoxes.forEach((box) => occupied.push(box));
        return occupied;
      }

      function findScatteredLabelPosition(label, anchorX, anchorY, canvas, pendingBoxes = []) {
        const occupiedBoxes = collectOccupiedLabelBoxes(canvas, pendingBoxes);
        const candidates = [];
        const baseAngle = getRandomFloat(0, Math.PI * 2);
        const angleStep = Math.PI / 6;
        const radii = [30, 44, 58, 74, 92, 112, 136];

        for (const radius of radii) {
          for (let i = 0; i < 12; i++) {
            const angle = baseAngle + i * angleStep + getRandomFloat(-0.12, 0.12);
            const radialJitter = getRandomFloat(-6, 6);
            const tangentJitter = getRandomFloat(-10, 10);
            const distance = radius + radialJitter;
            const x =
              anchorX +
              Math.cos(angle) * distance -
              label.offsetWidth / 2 +
              Math.cos(angle + Math.PI / 2) * tangentJitter;
            const y =
              anchorY +
              Math.sin(angle) * distance -
              label.offsetHeight / 2 +
              Math.sin(angle + Math.PI / 2) * tangentJitter;

            candidates.push({ x, y });
          }
        }

        let bestCandidate = null;
        let bestOverlapCount = Infinity;
        let bestDistance = Infinity;

        for (const candidate of candidates) {
          const clamped = clampLabelPosition(candidate.x, candidate.y, label, canvas);
          const box = getLabelBox(clamped.x, clamped.y, label);
          const overlapCount = occupiedBoxes.filter((occupied) =>
            boxesOverlap(box, occupied),
          ).length;
          const distance = Math.hypot(clamped.x - anchorX, clamped.y - anchorY);

          if (overlapCount === 0) return clamped;

          if (
            overlapCount < bestOverlapCount ||
            (overlapCount === bestOverlapCount && distance < bestDistance)
          ) {
            bestCandidate = clamped;
            bestOverlapCount = overlapCount;
            bestDistance = distance;
          }
        }

        return bestCandidate || clampLabelPosition(anchorX, anchorY, label, canvas);
      }

      function buildDragGroupSet(draggedEl) {
        const isSelected = selectedSymbols.has(draggedEl) || selectedEmojis.has(draggedEl);

        if (!isSelected) return new Set([draggedEl]);

        // ✅ 并集：所有被选中的符号 + emoji
        const group = new Set();
        selectedSymbols.forEach((s) => group.add(s));
        selectedEmojis.forEach((em) => group.add(em));

        // 如果你不想把“空集合”拖成空，兜底：
        if (group.size === 0) group.add(draggedEl);
        return group;
      }

      function addAnnotationSubtreesForDraggedSymbols(group) {
        const rootIds = new Set();
        for (const el of group) {
          if (el?.classList?.contains('symbol') && el.dataset?.id) rootIds.add(el.dataset.id);
        }
        if (rootIds.size === 0) return false;

        const added = new Set();
        const queue = [];
        document.querySelectorAll('.annotation-bubble').forEach((bubble) => {
          const symbolIds = String(bubble.dataset?.annoSymbolIds || '')
            .split(',')
            .map((id) => id.trim())
            .filter(Boolean);
          const matchesSavedGroup = symbolIds.some((id) => rootIds.has(id));
          const matchesLegacyRoot = rootIds.has(bubble.dataset?.annoRootSymbolId);
          if (!matchesSavedGroup && !matchesLegacyRoot) return;
          if (!canEditElement(bubble)) return;
          queue.push(bubble);
        });

        while (queue.length) {
          const bubble = queue.shift();
          if (!bubble || added.has(bubble)) continue;
          added.add(bubble);
          group.add(bubble);

          const bubbleId = bubble.dataset?.id;
          if (!bubbleId) continue;
          for (const [childId, parentId] of annoChildToParent.entries()) {
            if (parentId !== bubbleId) continue;
            const child = emojiById.get(childId);
            if (child?.dataset?.isAnnotation === 'true' && canEditElement(child)) {
              queue.push(child);
            }
          }
        }

        return added.size > 0;
      }

      async function createEmoji(
        emojiResponse,
        emojiX = null,
        emojiY = null,
        emojiId = null,
        extraSaveData = {},
        uiOptions = {},
      ) {
        const emoji = document.createElement('div');
        emoji.classList.add('symbol-label');
        const isAnnotation = !!extraSaveData?.isAnnotation;
        if (isAnnotation) {
          emoji.classList.add('annotation-bubble');
          emoji.dataset.isAnnotation = 'true';
          if (extraSaveData?.annoRootSymbolId) {
            emoji.dataset.annoRootSymbolId = String(extraSaveData.annoRootSymbolId);
          }
          if (extraSaveData?.annoSymbolIds) {
            emoji.dataset.annoSymbolIds = Array.isArray(extraSaveData.annoSymbolIds)
              ? extraSaveData.annoSymbolIds.join(',')
              : String(extraSaveData.annoSymbolIds);
          }
          // Visible state is controlled by inspection-mode filtering.
          emoji.classList.remove('annotation-visible');
        }
        // Position the label near the symbol
        if (Number.isFinite(emojiX) && Number.isFinite(emojiY)) {
          emoji.x = emojiX;
          emoji.y = emojiY;
        } else {
          const canvas = chatCanvas();
          const container = tab4 || canvas;
          const zoom = getCanvasZoom(canvas) || 1;
          const viewLeft = (container?.scrollLeft || 0) / zoom;
          const viewTop = (container?.scrollTop || 0) / zoom;
          const viewWidth = (container?.clientWidth || window.innerWidth) / zoom;
          const viewHeight = (container?.clientHeight || window.innerHeight) / zoom;
          emoji.x = viewLeft + getRandomFloat(viewWidth * 0.2, viewWidth * 0.8);
          emoji.y = viewTop + getRandomFloat(viewHeight * 0.2, viewHeight * 0.8);
        }

        emoji.style.left = `${emoji.x}px`;
        emoji.style.top = `${emoji.y}px`;
        emoji.selected = false;

        // Add pressing event listener to the emoji
        emoji.addEventListener('mousedown', (e) => {
          const totalSelected = selectedSymbols.size + selectedEmojis.size;
          const inSelection = selectedEmojis.has(emoji);
          const isAnnoNow = emoji.dataset?.isAnnotation === 'true';
          const wantsGroupDrag = !isAnnoNow && inSelection && totalSelected > 1; // annotations drag their own subtree instead

          // record click-vs-drag
          emoji._downClientX = e.clientX;
          emoji._downClientY = e.clientY;
          emoji._dragged = false;
          emoji._downWasSelected = selectedEmojis.has(emoji);
          emoji._downWasInMulti = wantsGroupDrag;
          emoji._downTotalSelected = selectedSymbols.size + selectedEmojis.size;

          // UI off (craft only). In chat inspection mode, keep the eye active.
          const surface = getCanvasForElem(emoji);
          if (surface === craftCanvas()) {
            if (eyeButton.isActivated) {
              eyeButton.isActivated = false;
              eyeButton.style.backgroundImage = "url('./icons/eye_black.png')";
              removeLabelInputs();
            }
          }

          // Selection on mousedown:
          // If not selected, make it the only selection.
          // Exception: in inspection mode, clicking an annotation keeps symbol selection.
          if (!inSelection) {
            const isInspecting = eyeButton.isActivated || eyeButton2.isActivated;
            const isAnnotation = emoji.dataset?.isAnnotation === 'true';
            if (!(isInspecting && isAnnotation)) {
              clearAllSymbolSelection();
            }
            clearAllEmojiSelection();
            emoji.selected = true;
            emoji.classList.add('active');
            selectedEmojis.add(emoji);
          }

          // dragging is owner-only (selection still allowed)
          if (!canEditElement(emoji)) {
            emoji.style.cursor = 'not-allowed';
            clickOnlyEmoji = emoji;
            return;
          }

          emoji.style.cursor = 'grabbing';

          const canvas = getCanvasForElem(emoji);
          const { x: localX, y: localY } = clientToLocal(canvas, e.clientX, e.clientY);

          if (wantsGroupDrag) {
            dragLeader = emoji;
            dragGroup = new Map();

            dragSnapLock = null;
            pendingSnapDelta = null;
            resetPendingSnapState();
            dragGroupStarted = false;
            dragGroupSet = null;
            dragGroupIncludesUnselected = false;

            const groupSet = buildDragGroupSet(dragLeader);
            if (canvas === chatCanvas()) {
              dragGroupIncludesUnselected =
                addAnnotationSubtreesForDraggedSymbols(groupSet) || dragGroupIncludesUnselected;
            }
            for (const el of groupSet) {
              if (!canEditElement(el)) continue; // can't drag others' items

              const l = parseFloat(el.style.left) || 0;
              const t = parseFloat(el.style.top) || 0;
              const dx = l - localX;
              const dy = t - localY;
              dragGroup.set(el, { dx, dy, dx0: dx, dy0: dy });
            }

            activeEmoji = emoji; // leader remains active
          } else {
            dragLeader = null;
            dragGroup = null;

            activeEmoji = emoji;

            const left = parseFloat(emoji.style.left) || 0;
            const top = parseFloat(emoji.style.top) || 0;
            emoji.offsetX = localX - left;
            emoji.offsetY = localY - top;

            // If this is an annotation bubble, dragging it should also move its descendant chain
            // (bubbles that are anchored to it), while never moving its parent anchor.
            emoji._annoFollowers = null;
            if (emoji.dataset?.isAnnotation === 'true') {
              const parentId = emoji.dataset?.id;
              if (parentId) {
                const parentLeft = left;
                const parentTop = top;

                // Build descendant set using annoChildToParent (child -> parent)
                const followers = new Map(); // DOM -> {dx,dy}
                const queue = [parentId];
                const seen = new Set(queue);
                while (queue.length) {
                  const cur = queue.shift();
                  for (const [childId, pId] of annoChildToParent.entries()) {
                    if (pId !== cur) continue;
                    if (seen.has(childId)) continue;
                    seen.add(childId);
                    queue.push(childId);

                    const childEl = emojiById.get(childId);
                    if (!childEl || childEl.dataset?.isAnnotation !== 'true') continue;
                    const cl = parseFloat(childEl.style.left) || 0;
                    const ct = parseFloat(childEl.style.top) || 0;
                    followers.set(childEl, { dx: cl - parentLeft, dy: ct - parentTop });
                  }
                }

                if (followers.size) emoji._annoFollowers = followers;
              }
            }
          }
        });

        appendToChatCanvas(emoji);
        emoji.textContent = emojiResponse; // Default text
        emoji.dataset.rawContent = emojiResponse || '';
        // Annotations should be stable (no floating) so tether offsets remain predictable.
        if (emoji.dataset?.isAnnotation !== 'true') {
          floatLabel(emoji);
        }

        // Auto-highlight newly created local emoji so users can spot the latest bubble.
        if (emojiId === null && uiOptions?.autoSelect !== false) {
          if (isAnnotation) {
            if (!uiOptions?.preserveSymbolSelection) {
              clearAllSymbolSelection();
            }
            if (!uiOptions?.preserveEmojiSelection) {
              clearAllEmojiSelection();
            }
          } else {
            clearAllSymbolSelection();
            clearAllEmojiSelection();
          }

          emoji.selected = true;
          emoji.classList.add('active');
          selectedEmojis.add(emoji);
        }

        if (emojiId !== null) {
          emoji.dataset.id = emojiId;
          emojiById.set(emojiId, emoji);
        } else {
          const clientNonce = tabHeadersActivated[4] ? makeClientNonce('emoji') : null;
          if (clientNonce) {
            emoji.dataset.clientNonce = clientNonce;
            pendingLocalChatEmojisByNonce.set(clientNonce, emoji);
          }
          // after you created the DOM element `symbol`
          emoji.dataset.id = ''; // not ready yet
          emoji._pendingIdPromise = (async () => {
            const docId = await saveObj(
              'emoji',
              emojiResponse,
              emoji.x,
              emoji.y,
              clientNonce ? { clientNonce, ...extraSaveData } : { ...extraSaveData },
            );
            const existing = emojiById.get(docId);
            if (existing && existing !== emoji) {
              adoptExistingChatEmoji(existing, emoji);
            }
            emoji.dataset.id = docId;
            emojiById.set(docId, emoji);
            if (clientNonce) pendingLocalChatEmojisByNonce.delete(clientNonce);
            return docId;
          })();
        }

        if (tabHeadersActivated[4]) {
          scheduleChatMiniMapUpdate?.();
        }

        return emoji;
      }

      function clientToLocal(container, clientX, clientY) {
        const r = container.getBoundingClientRect();
        const zoom = getCanvasZoom(container);
        return { x: (clientX - r.left) / zoom, y: (clientY - r.top) / zoom };
      }

      function getRenderedSymbolScale(symbol) {
        const rect = symbol.getBoundingClientRect();
        const angle = Number(symbol.angle || 0);
        if (angle === 90 || angle === 270) {
          return (
            rect.height / symbolWidth ||
            symbolScale * (getCanvasZoom(getCanvasForElem(symbol)) || 1)
          );
        }
        return (
          rect.width / symbolWidth || symbolScale * (getCanvasZoom(getCanvasForElem(symbol)) || 1)
        );
      }

      function getCanvasForElem(el) {
        // 如果符号/emoji 被 append 到哪个 canvas，就用哪个 canvas
        return el.closest('#craftCanvas, #chatCanvas');
      }

      let dragGroupStarted = false; // 本次群拖是否已执行过“外部断链”
      let dragGroupSet = null; // 方便判断组内成员（Set）
      let dragGroupIncludesUnselected = false;

      function cutConnectionsOutside(sym, groupSet) {
        const conns = currentGraph.getSymbolConnections(sym);
        if (!conns) return;

        const aId = sym.dataset?.id; // sym id once

        for (let side = 0; side < conns.length; side++) {
          const entryLst = conns[side] || [];
          if (!entryLst.length) continue;

          const remain = [];
          for (const [nbr, nbrSide] of entryLst) {
            if (groupSet.has(nbr)) {
              // ✅ Keep internal connection
              remain.push([nbr, nbrSide]);
            } else {
              // ✅ Cut external connection (memory)
              const back = currentGraph.getSymbolConnections(nbr)?.[nbrSide] || [];
              if (currentGraph.getSymbolConnections(nbr)) {
                currentGraph.getSymbolConnections(nbr)[nbrSide] = back.filter(([x]) => x !== sym);
              }

              // ✅ Cut external connection (Firestore) — IMPORTANT
              const bId = nbr?.dataset?.id;
              if (aId && bId) {
                removeLink(aId, side, bId, nbrSide).catch(console.error);
              }
            }
          }
          conns[side] = remain; // keep only internal links
        }
      }

      function detachSymbolLocal(symbol) {
        const conns = currentGraph.getSymbolConnections(symbol);
        if (!conns) return;

        for (let side = 0; side < conns.length; side++) {
          const lst = conns[side] || [];
          for (const [nbr, nbrSide] of lst) {
            // remove back-edge on neighbor
            const back = currentGraph.getSymbolConnections(nbr)?.[nbrSide] || [];
            currentGraph.getSymbolConnections(nbr)[nbrSide] = back.filter(([x]) => x !== symbol);
          }
          conns[side] = [];
        }
      }

      // Firestore removal (optional but recommended)
      async function detachSymbolRemote(symbol) {
        const aId = symbol.dataset?.id;
        if (!aId) return;

        const conns = currentGraph.getSymbolConnections(symbol);
        if (!conns) return;

        // removeLink(aId, side, bId, nbrSide) 你之前已经有
        for (let side = 0; side < conns.length; side++) {
          const lst = conns[side] || [];
          for (const [nbr, nbrSide] of lst) {
            const bId = nbr.dataset?.id;
            if (bId) removeLink(aId, side, bId, nbrSide).catch(console.error);
          }
        }
      }

      /** Detach immediately in memory, then best-effort in Firestore */
      function detachSymbol(symbol) {
        // remember old connections first (because local detach will clear the list)
        const snapshot = (currentGraph.getSymbolConnections(symbol) || []).map((arr) =>
          arr.slice(),
        );

        // local detach
        detachSymbolLocal(symbol);

        // remote detach (best-effort, no await to avoid UI stutter)
        const aId = symbol.dataset?.id;
        if (!aId) return;

        for (let side = 0; side < snapshot.length; side++) {
          for (const [nbr, nbrSide] of snapshot[side] || []) {
            const bId = nbr.dataset?.id;
            if (bId) removeLink(aId, side, bId, nbrSide).catch(console.error);
          }
        }

        resetPendingSnapState();
      }

      function cancelDraggingState() {
        activeSymbol = null;
        activeEmoji = null;

        dragGroup = null;
        dragLeader = null;

        dragGroupStarted = false;
        dragGroupSet = null;
        dragGroupIncludesUnselected = false;

        // ✅ also reset group-drag runtime flags to avoid lingering behavior
        groupDragActive = false;
        pendingSnapDelta = null;
        dragSnapLock = null;

        // optional but usually correct: clear snap candidate
        resetPendingSnapState();
        document.body.classList.remove('symbol-drag-ui-pass-through');

      function setSymbolDragUiPassThrough(on) {
        document.body.classList.toggle('symbol-drag-ui-pass-through', !!on);

      function isCanvasUiTarget(target) {
        return !!target?.closest?.(
          '.button, #palette, .color, #top-right-ui, #lang-toggle, .lang-menu, .lang-circle, .lang-item, .vertical-bar, .tab, .submit-button, .cancel-button, input, textarea',
        );
      }

      document.addEventListener(
        'pointerdown',
        (e) => {
          if (!isCanvasUiTarget(e.target)) return;
          if (!activeSymbol && !activeEmoji && !dragGroup && !clickOnlySymbol && !clickOnlyEmoji)
            return;
          endLongPress(true);
          cancelDraggingState();
        },
        true,
      );

      function applyDeltaToGroup(dx, dy) {
        if (!dragGroup) return;

        for (const [el, off] of dragGroup.entries()) {
          if (!canEditElement(el)) continue;

          // ✅ Persist the delta into the stored offsets
          off.dx += dx;
          off.dy += dy;

          // Optional: update style immediately (not strictly necessary because render uses off.* next)
          const left = (parseFloat(el.style.left) || 0) + dx;
          const top = (parseFloat(el.style.top) || 0) + dy;
          el.style.left = `${left}px`;
          el.style.top = `${top}px`;
        }
      }

      document.addEventListener('mousemove', async (e) => {
        latestPointerClientX = e.clientX;
        latestPointerClientY = e.clientY;

        if (clickOnlySymbol && !clickOnlySymbol._dragged) {
          const dx = e.clientX - (clickOnlySymbol._downClientX ?? e.clientX);
          const dy = e.clientY - (clickOnlySymbol._downClientY ?? e.clientY);
          if (dx * dx + dy * dy > 16) clickOnlySymbol._dragged = true;
        }
        if (clickOnlyEmoji && !clickOnlyEmoji._dragged) {
          const dx = e.clientX - (clickOnlyEmoji._downClientX ?? e.clientX);
          const dy = e.clientY - (clickOnlyEmoji._downClientY ?? e.clientY);
          if (dx * dx + dy * dy > 16) clickOnlyEmoji._dragged = true;
        }

        // mark as dragged (for click-vs-drag toggle)
        if (activeSymbol && !activeSymbol._dragged) {
          const dx = e.clientX - (activeSymbol._downClientX ?? e.clientX);
          const dy = e.clientY - (activeSymbol._downClientY ?? e.clientY);
          if (dx * dx + dy * dy > 16) activeSymbol._dragged = true; // 4px
        }

        if (activeEmoji && !activeEmoji._dragged) {
          const dx = e.clientX - (activeEmoji._downClientX ?? e.clientX);
          const dy = e.clientY - (activeEmoji._downClientY ?? e.clientY);
          if (dx * dx + dy * dy > 16) activeEmoji._dragged = true; // 4px
        }

        if (dragGroup && dragLeader) {
          if (!canEditElement(dragLeader)) {
            cancelDraggingState();
            return;
          }

          // --- DEBUG throttle (log at most every 120ms) ---
          if (!window.__dbg) window.__dbg = {};
          const now = performance.now();
          if (!window.__dbg.t) window.__dbg.t = 0;
          const DBG = now - window.__dbg.t > 120;
          if (DBG) window.__dbg.t = now;

          groupDragActive = true;
          pendingSnapDelta = null;

          const canvas = getCanvasForElem(dragLeader);

          const pt = clientToLocal(canvas, e.clientX, e.clientY);
          if (!pt) {
            cancelDraggingState();
            return;
          }

          let localX = pt.x;
          let localY = pt.y;

          if (dragSnapLock) {
            localX = dragSnapLock.localX0;
            localY = dragSnapLock.localY0;
          }

          // ✅ 第一次进入群拖：把组内所有 symbol 与“组外”断开（保留组内）
          if (!dragGroupStarted) {
            dragGroupStarted = true;
            dragGroupSet = new Set(dragGroup.keys()); // 当前被拖动的所有元素（symbol+emoji）

            for (const el of dragGroupSet) {
              if (el.classList?.contains('symbol')) {
                cutConnectionsOutside(el, dragGroupSet);
                el.moving = true; // 表示这次拖拽已经处理过断链（避免你其它逻辑重复 cut）
              }
            }
          }

          // Unlock by mouse travel (client distance)
          if (dragSnapLock) {
            const mdx = e.clientX - dragSnapLock.clientX0;
            const mdy = e.clientY - dragSnapLock.clientY0;
            const mouseDist = Math.hypot(mdx, mdy);

            if (mouseDist > UNSNAP_DISTANCE) {
              // Jump the whole group under the current cursor BEFORE unlocking.
              // This prevents the "cursor far away from objects after unlock" problem.
              const jumpDx = pt.x - dragSnapLock.localX0;
              const jumpDy = pt.y - dragSnapLock.localY0;
              applyDeltaToGroup(jumpDx, jumpDy);

              dragSnapLock = null;

              for (const [el, off] of dragGroup.entries()) {
                off.dx = off.dx0;
                off.dy = off.dy0;
              }

              snapCooldownUntil = performance.now() + 150;
            }
          }

          for (const [el, off] of dragGroup.entries()) {
            const stillSelected = selectedSymbols.has(el) || selectedEmojis.has(el);
            if (!stillSelected && !dragGroupIncludesUnselected) continue;

            if (!canEditElement(el)) continue;

            el.style.left = `${localX + off.dx}px`;
            el.style.top = `${localY + off.dy}px`;
            if (getCanvasForElem(el) === chatCanvas()) {
              markLocalSymbolMutation(el, 900);
            }
          }

          if (
            dragLeader &&
            dragLeader.classList?.contains('symbol') &&
            !dragSnapLock &&
            performance.now() > snapCooldownUntil
          ) {
            pendingSnapDelta = null;
            resetPendingSnapState();

            checkConnections(dragLeader);
          }

          if (pendingSnapDelta) {
            applyDeltaToGroup(pendingSnapDelta.dx, pendingSnapDelta.dy);
            pendingSnapDelta = null;

            if (!dragSnapLock) {
              dragSnapLock = {
                clientX0: e.clientX,
                clientY0: e.clientY,
                localX0: pt.x,
                localY0: pt.y,
                activeSide: readyActiveSide,
                targetSide: readyTargetSide,
                targetEl: readyTarget,
              };
            }
          }

          for (const [el] of dragGroup.entries()) {
            if (el.classList?.contains('symbol') && el.isDynamic && el.dot) {
              updateDotPositionLocal(el.dot);
            }
          }

          // During group drag, keep all symbol-attached UI (meaning bubbles, label inputs, etc.)
          // in sync for every moved symbol (not just the leader).
          for (const [el] of dragGroup.entries()) {
            if (!el?.classList?.contains('symbol')) continue;
            const x = parseFloat(el.style.left) || 0;
            const y = parseFloat(el.style.top) || 0;

            if (el.labels) {
              el.labels.forEach((label) => {
                label.style.left = `${x + label.offsetX}px`;
                label.style.top = `${y + label.offsetY}px`;
              });
            }
            if (el.input) {
              el.input.style.left = `${x + el.input.offsetX}px`;
              el.input.style.top = `${y + el.input.offsetY}px`;
            }
            if (el.textarea) {
              el.textarea.style.left = `${x + el.textarea.offsetX}px`;
              el.textarea.style.top = `${y + el.textarea.offsetY}px`;
            }
            if (el.submitButton) {
              const tTop = parseFloat(el.textarea?.style?.top || '0') || 0;
              const tScroll = el.textarea?.scrollHeight || 0;
              el.submitButton.style.left = `${x + el.submitButton.offsetX}px`;
              el.submitButton.style.top = `${tTop + 8 + tScroll}px`;
            }
            if (el.cancelButton) {
              const tTop = parseFloat(el.textarea?.style?.top || '0') || 0;
              const tScroll = el.textarea?.scrollHeight || 0;
              el.cancelButton.style.left = `${x + el.cancelButton.offsetX}px`;
              el.cancelButton.style.top = `${tTop + 8 + tScroll}px`;
            }
            if (el.pElement) {
              const tTop = parseFloat(el.textarea?.style?.top || '0') || 0;
              const tScroll = el.textarea?.scrollHeight || 0;
              el.pElement.style.left = `${x + el.pElement.offsetX}px`;
              el.pElement.style.top = `${tTop - 10 + tScroll}px`;
            }
            if (el.doneButton) {
              el.doneButton.style.left = `${x + el.doneButton.offsetX}px`;
              el.doneButton.style.top = `${y + el.doneButton.offsetY}px`;
            }
          }

          // Keep spawned-expression bounding frame(s) in sync during group drag.
          if (canvas === chatCanvas() && selectedSymbols.size > 1) {
            updateExpressionGroupFramesFromSelection(canvas);
            updateSpawnedExpressionMetaCardsPosition();
          }

          // ✅ 只对 leader（若是 symbol）执行你原来的“断链/检查连接”逻辑
          if (activeSymbol) {
            const x = parseFloat(activeSymbol.style.left) || 0;
            const y = parseFloat(activeSymbol.style.top) || 0;

            if (activeSymbol.labels) {
              activeSymbol.labels.forEach((label) => {
                label.style.left = `${x + label.offsetX}px`;
                label.style.top = `${y + label.offsetY}px`;
              });
            }
            if (activeSymbol.input) {
              activeSymbol.input.style.left = `${x + activeSymbol.input.offsetX}px`;
              activeSymbol.input.style.top = `${y + activeSymbol.input.offsetY}px`;
            }
            if (activeSymbol.textarea) {
              activeSymbol.textarea.style.left = `${x + activeSymbol.textarea.offsetX}px`;
              activeSymbol.textarea.style.top = `${y + activeSymbol.textarea.offsetY}px`;
            }
            if (activeSymbol.submitButton) {
              const tTop = parseFloat(activeSymbol.textarea.style.top) || 0;
              activeSymbol.submitButton.style.left = `${x + activeSymbol.submitButton.offsetX}px`;
              activeSymbol.submitButton.style.top = `${tTop + 8 + activeSymbol.textarea.scrollHeight}px`;
            }
            if (activeSymbol.cancelButton) {
              const tTop = parseFloat(activeSymbol.textarea.style.top) || 0;
              activeSymbol.cancelButton.style.left = `${x + activeSymbol.cancelButton.offsetX}px`;
              activeSymbol.cancelButton.style.top = `${tTop + 8 + activeSymbol.textarea.scrollHeight}px`;
            }
            if (activeSymbol.pElement) {
              const tTop = parseFloat(activeSymbol.textarea.style.top) || 0;
              activeSymbol.pElement.style.left = `${x + activeSymbol.pElement.offsetX}px`;
              activeSymbol.pElement.style.top = `${tTop - 10 + activeSymbol.textarea.scrollHeight}px`;
            }
            if (activeSymbol.doneButton) {
              activeSymbol.doneButton.style.left = `${x + activeSymbol.doneButton.offsetX}px`;
              activeSymbol.doneButton.style.top = `${y + activeSymbol.doneButton.offsetY}px`;
            }

            if (activeSymbol?._dragged) {
              endLongPress();
            }
            activeSymbol.classList.add('framed');
          }

          if (canvas === chatCanvas()) {
            scheduleChatMiniMapUpdate();
          }

          return;
        }

        if (activeEmoji) {
          // 🚫 not mine → do nothing (still selected)
          if (!canEditElement(activeEmoji)) {
            cancelDraggingState();
            return;
          }
          const canvas = getCanvasForElem(activeEmoji);
          const { x: localX, y: localY } = clientToLocal(canvas, e.clientX, e.clientY);

          const dragOffsetX =
            activeEmoji.dataset?.inspectionLabel === 'true'
              ? activeEmoji._dragOffsetX || 0
              : activeEmoji.offsetX;
          const dragOffsetY =
            activeEmoji.dataset?.inspectionLabel === 'true'
              ? activeEmoji._dragOffsetY || 0
              : activeEmoji.offsetY;

          let x = localX - dragOffsetX;
          let y = localY - dragOffsetY;

          activeEmoji.style.left = `${x}px`;
          activeEmoji.style.top = `${y}px`;
          activeEmoji.selected = true;

          if (activeEmoji.dataset?.inspectionLabel === 'true' && activeEmoji.anchorSymbol) {
            const anchorLeft = parseFloat(activeEmoji.anchorSymbol.style.left) || 0;
            const anchorTop = parseFloat(activeEmoji.anchorSymbol.style.top) || 0;
            activeEmoji.offsetX = x - anchorLeft;
            activeEmoji.offsetY = y - anchorTop;
          }

          // Annotation dragging: also move descendant annotation bubbles (anchored to this bubble)
          // while never moving the parent anchor (bubble or symbol).
          if (canvas === chatCanvas() && activeEmoji.dataset?.isAnnotation === 'true') {
            const followers = activeEmoji._annoFollowers;
            if (followers && followers.size) {
              for (const [childEl, off] of followers.entries()) {
                if (!childEl?.isConnected) continue;
                if (!canEditElement(childEl)) continue;
                childEl.style.left = `${x + off.dx}px`;
                childEl.style.top = `${y + off.dy}px`;
              }
            }
          }
          if (canvas === chatCanvas()) {
            scheduleChatMiniMapUpdate();
          }
        }

        if (activeSymbol) {
          if (activeSymbol._dragged) {
            endLongPress();
          }

          // 🚫 not mine → do nothing (still selected)
          if (!canEditElement(activeSymbol)) {
            cancelDraggingState();
            return;
          }

          const canvas = getCanvasForElem(activeSymbol);
          const { x: localX, y: localY } = clientToLocal(canvas, e.clientX, e.clientY);

          let x = localX - activeSymbol.offsetX;
          let y = localY - activeSymbol.offsetY;
          if (dragSnapLock?.activeEl === activeSymbol && !groupDragActive) {
            const mdx = e.clientX - dragSnapLock.clientX0;
            const mdy = e.clientY - dragSnapLock.clientY0;
            if (Math.hypot(mdx, mdy) <= UNSNAP_DISTANCE) {
              x = dragSnapLock.left;
              y = dragSnapLock.top;
            } else {
              dragSnapLock = null;
              snapCooldownUntil = performance.now() + 150;
            }
          }
          activeSymbol.style.left = `${x}px`;
          activeSymbol.style.top = `${y}px`;
          activeSymbol.selected = true;

          // hideLabelInputs();
          if (activeSymbol.labels) {
            activeSymbol.labels.forEach((label) => {
              label.style.left = `${x + label.offsetX}px`;
              label.style.top = `${y + label.offsetY}px`;
            });
          }
          if (activeSymbol.input) {
            activeSymbol.input.style.left = `${x + activeSymbol.input.offsetX}px`;
            activeSymbol.input.style.top = `${y + activeSymbol.input.offsetY}px`;
          }
          if (activeSymbol.textarea) {
            activeSymbol.textarea.style.left = `${x + activeSymbol.textarea.offsetX}px`;
            activeSymbol.textarea.style.top = `${y + activeSymbol.textarea.offsetY}px`;
          }
          if (activeSymbol.submitButton) {
            activeSymbol.submitButton.style.left = `${x + activeSymbol.submitButton.offsetX}px`;
            activeSymbol.submitButton.style.top = `${parseFloat(activeSymbol.textarea.style.top) + 8 + activeSymbol.textarea.scrollHeight}px`;
          }
          if (activeSymbol.cancelButton) {
            activeSymbol.cancelButton.style.left = `${x + activeSymbol.cancelButton.offsetX}px`;
            activeSymbol.cancelButton.style.top = `${parseFloat(activeSymbol.textarea.style.top) + 8 + activeSymbol.textarea.scrollHeight}px`;
          }
          if (activeSymbol.pElement) {
            activeSymbol.pElement.style.left = `${x + activeSymbol.pElement.offsetX}px`;
            activeSymbol.pElement.style.top = `${parseFloat(activeSymbol.textarea.style.top) - 10 + activeSymbol.textarea.scrollHeight}px`;
          }
          if (activeSymbol.doneButton) {
            activeSymbol.doneButton.style.left = `${x + activeSymbol.doneButton.offsetX}px`;
            activeSymbol.doneButton.style.top = `${y + activeSymbol.doneButton.offsetY}px`;
          }

          const snapped =
            !dragSnapLock && performance.now() > snapCooldownUntil
              ? checkConnections(activeSymbol)
              : false;
          if (snapped) {
            const snappedLeft = parseFloat(activeSymbol.style.left) || x;
            const snappedTop = parseFloat(activeSymbol.style.top) || y;
            dragSnapLock = {
              activeEl: activeSymbol,
              clientX0: e.clientX,
              clientY0: e.clientY,
              left: snappedLeft,
              top: snappedTop,
            };
            x = snappedLeft;
            y = snappedTop;
          }

          const snappedCandidate =
            pendingSnapLinks.some((link) => link.active === activeSymbol) ||
            (readyActive === activeSymbol && readyTarget != null);
          if (!activeSymbol.moving && !snappedCandidate) {
            // Cut connections
            const conns = currentGraph.getSymbolConnections(activeSymbol) || [];
            for (let i = 0; i < conns.length; i++) {
              const entryLst = conns[i] || [];
              if (entryLst.length) {
                for (let j = 0; j < entryLst.length; j++) {
                  const [nbr, nbrSide] = entryLst[j];
                  const targetEntry = currentGraph.getSymbolConnections(nbr)?.[nbrSide] || [];
                  currentGraph.getSymbolConnections(nbr)[nbrSide] = targetEntry.filter(
                    (sub) => sub[0] !== activeSymbol,
                  );

                  const aId = activeSymbol.dataset.id;
                  const bId = nbr.dataset.id;
                  if (aId && bId) removeLink(aId, i, bId, nbrSide).catch(console.error);
                }
                conns[i] = [];
              }
            }
            activeSymbol.moving = true;
          }

          if (!activeSymbol.classList.contains('framed')) {
            activeSymbol.classList.add('framed');
          }

          if (activeSymbol?.isDynamic && activeSymbol.dot) {
            updateDotPositionLocal(activeSymbol.dot);
          }

          if (canvas === chatCanvas()) {
            scheduleChatMiniMapUpdate();
          }
        }
      });

      function cleanupDetachedLinksFor(symbol, breakDist = 10) {
        const conns = currentGraph.getSymbolConnections(symbol);
        if (!conns) return;

        for (let side = 0; side < conns.length; side++) {
          const lst = conns[side] || [];
          // iterate backwards because we may splice
          for (let i = lst.length - 1; i >= 0; i--) {
            const [nbr, nbrSide] = lst[i];
            if (!nbr) continue;

            const aJ = getAbsJunctions(symbol)?.[side];
            const bJ = getAbsJunctions(nbr)?.[nbrSide];
            if (!aJ || !bJ) continue;

            const d = getDist(aJ.x, aJ.y, bJ.x, bJ.y);
            if (d <= breakDist) continue;

            // remove from symbol side
            lst.splice(i, 1);

            // remove reverse edge
            const back = currentGraph.getSymbolConnections(nbr)?.[nbrSide] || [];
            currentGraph.getSymbolConnections(nbr)[nbrSide] = back.filter(
              ([x, s]) => !(x === symbol && s === side),
            );

            // optional: removeLink(...) if you persist links
            const aId = symbol.dataset?.id;
            const bId = nbr.dataset?.id;
            if (aId && bId) removeLink(aId, side, bId, nbrSide).catch(console.error);
          }
        }
      }

      let lastPointerDownTarget = null;

      document.addEventListener(
        'pointerdown',
        (e) => {
          lastPointerDownTarget = e.target;
        },
        true,
      );

      function isBlankCanvasClick(e) {
        const content = document.querySelector('.content');
        if (!content) {
          return false;
        }

        // 1) Must click inside the content viewport (where you scroll)
        const cr = content.getBoundingClientRect();
        const inContent =
          e.clientX >= cr.left &&
          e.clientX <= cr.right &&
          e.clientY >= cr.top &&
          e.clientY <= cr.bottom;

        if (!inContent) {
          return false;
        }

        // 2) Only handle when Craft or Chat tab is active (otherwise don't clear)
        // Adjust these indices if yours differ
        const inCraft = !!document.querySelector('#tab1.active');
        const inChat = !!document.querySelector('#tab4.active');
        if (!inCraft && !inChat) {
          return false;
        }

        // 3) Find the real element under pointer (often .content in your scrolled-empty area)
        const el = document.elementFromPoint(e.clientX, e.clientY) || e.target;

        // 4) Clicked an item? then NOT blank
        const hitItem = !!el?.closest?.('.symbol, .symbol-label');

        // 5) Clicked UI? then NOT blank
        const hitUI = !!el?.closest?.(
          '#palette, .wheel, #chatControls, #top-right-ui, #lang-toggle, .lang-menu, .lang-circle, .lang-item, .vertical-bar, .tab, .button, .label-input, .label-textarea, .submit-button, .symbol-label, #chatAnchorLayer, #tutorialOverlay, #tutorialBubble',
        );

        return !hitItem && !hitUI;
      }

      function commitLink(a, aSide, b, bSide) {
        const aConns = currentGraph.getSymbolConnections(a);
        const bConns = currentGraph.getSymbolConnections(b);
        if (!aConns || !bConns) return;

        if (!aConns[aSide].some(([nbr, s]) => nbr === b && s === bSide))
          aConns[aSide].push([b, bSide]);
        if (!bConns[bSide].some(([nbr, s]) => nbr === a && s === aSide))
          bConns[bSide].push([a, aSide]);

        if (getCanvasForElem(a) === craftCanvas() || getCanvasForElem(b) === craftCanvas()) {
          registerTutorialCraftConnection?.(aSide, bSide);
          requestAnimationFrame(() => tutorialMaybeAdvance?.());
        }
      }

      function resetPendingSnapState() {
        readyActive = null;
        readyTarget = null;
        readyActiveSide = null;
        readyTargetSide = null;
        pendingSnapCandidates = [];
        pendingSnapLinks = [];
      }

      function registerPendingSnapCandidate(candidate) {
        const existingIndex = pendingSnapCandidates.findIndex(
          (c) =>
            c.active === candidate.active &&
            c.target === candidate.target &&
            c.activeSide === candidate.activeSide &&
            c.targetSide === candidate.targetSide,
        );

        if (existingIndex >= 0) {
          if (candidate.dist < pendingSnapCandidates[existingIndex].dist) {
            pendingSnapCandidates[existingIndex] = candidate;
          }
          return;
        }

        pendingSnapCandidates.push(candidate);
      }

      function applyPendingSnapCandidates(active) {
        const candidates = pendingSnapCandidates
          .filter((c) => c.active === active)
          .sort((a, b) => a.dist - b.dist);

        if (candidates.length === 0) {
          pendingSnapLinks = [];
          return false;
        }

        const selected = [];
        const usedActiveSides = new Set();
        const tolerance = 8;

        for (const candidate of candidates) {
          if (usedActiveSides.has(candidate.activeSide)) continue;

          if (
            selected.length > 0 &&
            (Math.abs(candidate.dx - selected[0].dx) > tolerance ||
              Math.abs(candidate.dy - selected[0].dy) > tolerance)
          ) {
            continue;
          }

          selected.push(candidate);
          usedActiveSides.add(candidate.activeSide);
        }

        if (selected.length === 0) {
          pendingSnapLinks = [];
          return false;
        }

        const dx = selected.reduce((sum, candidate) => sum + candidate.dx, 0) / selected.length;
        const dy = selected.reduce((sum, candidate) => sum + candidate.dy, 0) / selected.length;
        const oldX = parseFloat(active.style.left) || 0;
        const oldY = parseFloat(active.style.top) || 0;

        active.style.left = `${oldX + dx}px`;
        active.style.top = `${oldY + dy}px`;

        pendingSnapLinks = selected;
        const first = selected[0];
        readyActive = first.active;
        readyTarget = first.target;
        readyActiveSide = first.activeSide;
        readyTargetSide = first.targetSide;
        return true;
      }

      function violatesConflicts(target, targetSide) {
        const conns = currentGraph.getSymbolConnections(target) || [];
        const conflicts = SIDE_CONFLICTS.get(targetSide) || [];
        for (const s of conflicts) {
          if ((conns[s]?.length || 0) > 0) return true;
        }
        return false;
      }

      function collectLeaderSnapLinkPayloads(leader) {
        if (!leader?.classList?.contains('symbol')) return [];

        const candidates = pendingSnapLinks.filter((link) => link.active === leader);
        if (candidates.length > 0) {
          const payloads = [];
          for (const link of candidates) {
            if (violatesConflicts(link.target, link.targetSide)) {
              console.warn('[COMMIT BLOCKED] conflict', {
                targetElem: link.target.elemIdTrue,
                targetSide: link.targetSide,
              });
              continue;
            }

            commitLink(link.active, link.activeSide, link.target, link.targetSide);
            const aId = link.active.dataset?.id;
            const bId = link.target.dataset?.id;
            if (aId && bId) {
              payloads.push({ aId, aSide: link.activeSide, bId, bSide: link.targetSide });
            }
          }
          return payloads;
        }

        if (!readyActive || !readyTarget || readyActive !== leader) return [];
        if (violatesConflicts(readyTarget, readyTargetSide)) {
          console.warn('[COMMIT BLOCKED] conflict', {
            targetElem: readyTarget.elemIdTrue,
            targetSide: readyTargetSide,
          });
          return [];
        }

        commitLink(readyActive, readyActiveSide, readyTarget, readyTargetSide);
        const aId = readyActive.dataset?.id;
        const bId = readyTarget.dataset?.id;
        return aId && bId ? [{ aId, aSide: readyActiveSide, bId, bSide: readyTargetSide }] : [];
      }

      async function persistGroupDragResult(positionPayloads, linkPayloads) {
        const positionTasks = [];

          box.style.position = 'fixed';

          box.style.zIndex = '99990';

          return box;

        function showBox(clientX1, clientY1, clientX2, clientY2) {
          const x1 = Math.min(clientX1, clientX2);
          const y1 = Math.min(clientY1, clientY2);
          const x2 = Math.max(clientX1, clientX2);
          const y2 = Math.max(clientY1, clientY2);

          const b = ensureBox();
          b.style.left = `${x1}px`;
          b.style.top = `${y1}px`;
          b.style.width = `${x2 - x1}px`;
          b.style.height = `${y2 - y1}px`;
          b.style.display = 'block';

          if (!box) return;

          const selTop = Math.min(clientY1, clientY2);
          const selRight = Math.max(clientX1, clientX2);
          const selBottom = Math.max(clientY1, clientY2);

          const hitEls = [];

              rect.bottom >= selTop &&

          isDragging = false;
          downOnItem = false;
          marqueeActive = false;

            isDynamic: !!symbol.isDynamic,
            left: parseFloat(symbol.style.left) || 0,
            top: parseFloat(symbol.style.top) || 0,
            exprWord: symbol.dataset?.exprWord || '',
            exprWhy: symbol.dataset?.exprWhy || '',
            exprLang: symbol.dataset?.exprLang || '',
            exprNodeId: symbol.dataset?.exprNodeId || '',
            exprAuthorUid: symbol.dataset?.exprAuthorUid || '',
          })),
          links,
          groups: Array.from(grouped.values()).filter((members) => members.length > 1),
        };
      }

      function getActiveSymbolPasteCanvas() {
        if (tabHeadersActivated[4]) return chatCanvas();
        if (tabHeadersActivated[1]) return craftCanvas();
        return null;
      }

      function copyCurrentSelectedSymbolsToClipboard(clipboard = null) {
        clipboard = clipboard || getSelectedSymbolClipboard();
        if (clipboard.symbols.length === 0) return false;
        copiedSymbolSnapshots = clipboard.symbols;
        copiedSymbolLinks = clipboard.links;
        copiedSymbolGroups = clipboard.groups || [];
        symbolPasteCount = 0;
        return true;
      }

      function isEditableTextTarget(target) {
        if (!target) return false;
        return (
          target.closest('input, textarea, [contenteditable="true"]') !== null ||
          target.isContentEditable
        );
      }

      async function pasteCopiedSymbols(options = {}) {
        if (copiedSymbolSnapshots.length === 0) return;

        const canvas = options.canvas || getActiveSymbolPasteCanvas();
        if (!canvas) return;

        const usingChatCanvas = canvas === chatCanvas();
        const canvasRect = canvas.getBoundingClientRect();
        const offsetStep = 30;
        const pasteOffset = offsetStep * (symbolPasteCount + 1);
        const anchorClientX = Number.isFinite(options.clientX) ? options.clientX : null;
        const anchorClientY = Number.isFinite(options.clientY) ? options.clientY : null;
        const hasAnchor = anchorClientX != null && anchorClientY != null;
        let anchorDeltaX = pasteOffset;
        let anchorDeltaY = pasteOffset;
        if (hasAnchor) {
          const anchor = clientToLocal(canvas, anchorClientX, anchorClientY);
          const minLeft = Math.min(...copiedSymbolSnapshots.map((snapshot) => snapshot.left));
          const maxRight = Math.max(
            ...copiedSymbolSnapshots.map((snapshot) => snapshot.left + symbolWidth * symbolScale),
          );
          const minTop = Math.min(...copiedSymbolSnapshots.map((snapshot) => snapshot.top));
          const maxBottom = Math.max(
            ...copiedSymbolSnapshots.map((snapshot) => snapshot.top + symbolHeight * symbolScale),
          );
          const centerX = (minLeft + maxRight) / 2;
          const centerY = (minTop + maxBottom) / 2;
          anchorDeltaX = anchor.x - centerX;
          anchorDeltaY = anchor.y - centerY;
        }
        const newlyPasted = [];

        clearAllSymbolSelection();
        clearAllEmojiSelection();

        const pendingDotPersists = [];

        for (const snapshot of copiedSymbolSnapshots) {
          const targetLeft = snapshot.left + anchorDeltaX;
          const targetTop = snapshot.top + anchorDeltaY;

          let pastedSymbol;

          if (usingChatCanvas) {
            pastedSymbol = await createSymbolCopy(
              null,
              null,
              snapshot.elemId,
              snapshot.elemIdTrue,
              targetLeft,
              targetTop,
              snapshot.color,
              snapshot.angle,
            );
          } else {
            const clientX = canvasRect.left + targetLeft + (symbolWidth * symbolScale) / 2;
            const clientY = canvasRect.top + targetTop + (symbolHeight * symbolScale) / 2;
            pastedSymbol = await createSymbolCopy(
              clientX,
              clientY,
              snapshot.elemId,
              snapshot.elemIdTrue,
              null,
              null,
              snapshot.color,
              snapshot.angle,
            );
          }

          if (snapshot.isDynamic) {
            pastedSymbol.isDynamic = true;
            const dot = document.createElement('div');
            dot.innerHTML = dotData;
            dot.classList.add('dot');
            dot.parent = pastedSymbol;
            pastedSymbol.dot = dot;

            updateDotPositionLocal(dot);
            if (usingChatCanvas) appendToChatCanvas(dot);
            if (!usingChatCanvas) appendToCraftCanvas(dot);

            if (usingChatCanvas) {
              pendingDotPersists.push(
                (async () => {
                  if (pastedSymbol._pendingIdPromise) await pastedSymbol._pendingIdPromise;
                  await persistDotPosition(dot);
                })(),
              );
            }
          }

          if (snapshot.exprWord) pastedSymbol.dataset.exprWord = String(snapshot.exprWord);
          if (snapshot.exprWhy) pastedSymbol.dataset.exprWhy = String(snapshot.exprWhy);
          if (snapshot.exprLang) pastedSymbol.dataset.exprLang = String(snapshot.exprLang);
          if (snapshot.exprNodeId) pastedSymbol.dataset.exprNodeId = String(snapshot.exprNodeId);
          if (snapshot.exprAuthorUid) {
            pastedSymbol.dataset.exprAuthorUid = String(snapshot.exprAuthorUid);
          }

          newlyPasted.push(pastedSymbol);
        }

        const pendingLinkPersists = [];

        for (const link of copiedSymbolLinks) {
          const fromSymbol = newlyPasted[link.fromIndex];
          const toSymbol = newlyPasted[link.toIndex];
          if (!fromSymbol || !toSymbol) continue;

          commitLink(fromSymbol, link.fromSide, toSymbol, link.toSide);

          if (usingChatCanvas) {
            pendingLinkPersists.push(
              (async () => {
                if (fromSymbol._pendingIdPromise) await fromSymbol._pendingIdPromise;
                if (toSymbol._pendingIdPromise) await toSymbol._pendingIdPromise;

                const fromId = fromSymbol.dataset?.id;
                const toId = toSymbol.dataset?.id;
                if (fromId && toId) {
                  await persistLink(fromId, link.fromSide, toId, link.toSide);
                }
              })(),
            );
          }
        }

        for (const members of copiedSymbolGroups || []) {
          const groupSymbols = members.map((index) => newlyPasted[index]).filter(Boolean);
          if (groupSymbols.length < 2) continue;
          const groupId = `expr_copy_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
          const groupSet = new Set(groupSymbols);
          expressionGroups.set(groupId, groupSet);
          for (const sym of groupSet) {
            sym._expressionGroupId = groupId;
          }

          if (usingChatCanvas) {
            const first = groupSymbols[0];
            const exprWord = String(first?.dataset?.exprWord || '');
            const exprWhy = String(first?.dataset?.exprWhy || '');
            const payload = {
              exprGroupId: groupId,
              exprWord,
              exprWhy,
              exprLang: getExpressionSourceLang(
                String(first?.dataset?.exprLang || ''),
                exprWord,
                exprWhy,
              ),
              exprNodeId: String(first?.dataset?.exprNodeId || ''),
              exprAuthorUid: String(first?.dataset?.exprAuthorUid || currentUser?.uid || ''),
            };
            Promise.allSettled(
              groupSymbols.map(async (sym) => {
                const id = sym.dataset?.id || (await sym._pendingIdPromise?.catch(() => null));
                if (!id) return;
                await updateDoc(objDocRef(id), payload);
              }),
            ).catch(() => {});
          }
        }

        symbolPasteCount += 1;
        newlyPasted.forEach((symbol) => {
          symbol.selected = true;
          symbol.classList.add('framed');
          selectedSymbols.add(symbol);
        });

        activeSymbol = null;
        dragLeader = null;
        dragGroup = null;
        updateExpressionGroupFramesFromSelection(canvas);

        if (usingChatCanvas && (pendingDotPersists.length || pendingLinkPersists.length)) {
          Promise.allSettled([...pendingDotPersists, ...pendingLinkPersists]).catch(() => {});
        }
      }

      function getRandomSubset(words, count) {
        return words.sort(() => Math.random() - 0.5).slice(0, count);
      }
      function getRandomFloat(min, max) {
        return Math.random() * (max - min) + min;
      }

      function areSetsEqual(set1, set2) {
        if (!set1 || !set2) return false; // guard against null values
        if (set1.size !== set2.size) return false; // Different sizes → not equal
        for (let elem of set1) {
          if (!set2.has(elem)) return false; // If set2 is missing an element → not equal
        }
        return true;
      }

      function buildSubgraphFromSelection(fullGraph, selectedSymbols) {
        const subGraph = new SymbolGraph();

        // add every selected symbol to the subgraph
        for (const symbol of selectedSymbols) {
          const connections = fullGraph.getSymbolConnections(symbol);
          if (!connections) continue;

          // deep-copy connection structure to avoid polluting the original graph
          subGraph.addSymbol(
            symbol,
            connections.map((side) => side.filter(([neighbor]) => selectedSymbols.has(neighbor))),
          );
        }

        return subGraph;
      }

      function analyzeSelectionSet(selectionSet) {
        const foundIds = new Set();
        const elimBasic = new Set();
        const representatives = new Map();
        let hasDuplicateExpression = false;

        const selectionComponents = getConnectedSymbolComponents(selectionSet, currentGraph);

        for (const [storedWord, [storedId, storedGraph]] of library) {
          const matches = [];
          for (const component of selectionComponents) {
            if (component.size < storedGraph.nodes.length) continue;
            matches.push(...matchAllPatternsOnSelection(component, storedGraph));
          }

          if (matches.some((m) => areSetsEqual(m, selectionSet))) {
            hasDuplicateExpression = true;
          }

          for (const foundMatching of matches) {
            let lastSymbol;
            for (const symbol of foundMatching) {
              lastSymbol = symbol;
              elimBasic.add(symbol);
            }
            if (lastSymbol) {
              representatives.set(lastSymbol, storedWord);
              foundIds.add(storedId);
            }
          }
        }

        return [foundIds, elimBasic, representatives, hasDuplicateExpression];
      }

      function refreshCraftInspectionUI() {
        if (!eyeButton.isActivated) return;

        const hasSelection = refreshInspectionLabelsForSelection();
        if (!hasSelection) return;

        const components = getConnectedSymbolComponents(selectedSymbols, currentGraph);
        for (const component of components) {
          if (!component || component.size === 0) continue;
          const [foundIds, elimBasic, representatives, hasDuplicateExpression] =
            analyzeSelectionSet(component);
          showInput(foundIds, elimBasic, representatives, hasDuplicateExpression, component);
        }
        if (tutorialStepIndex >= 0) {
          const step = getTutorialStepsSafe?.()?.[tutorialStepIndex];
          setTutorialDefinitionInputsEnabled?.(!!step?.allowDefinitionInputs);
        }
      }

      function refreshInspectionLabelsForSelection() {
        const preservedLabelMap = new Map();
        if (!forceFreshInspectionLabels) {
          for (const symbol of selectedSymbols) {
            const labels = Array.from(symbol?.labels || []).filter((label) => label?.isConnected);
            if (!labels.length) continue;
            preservedLabelMap.set(symbol, {
              signature: getSymbolInspectionLabelSignature(symbol),
              labels: labels.map((label) => ({
                text: label.textContent || '',
                userCreated: label.classList.contains('user-created-label'),
                x: parseFloat(label.style.left) || label.x || 0,
                y: parseFloat(label.style.top) || label.y || 0,
              })),
            });
          }
        }
        removeLabelInputs();
        forceFreshInspectionLabels = false;
        if (selectedSymbols.size === 0) return false;

        showSimpleLabel(preservedLabelMap);
        return true;
      }

      function refreshInspectionModeForCanvas(canvas) {
        if (canvas === craftCanvas()) {
          if (eyeButton?.isActivated) refreshCraftInspectionUI();
          return;
        }
        if (canvas === chatCanvas()) {
          if (eyeButton2?.isActivated) refreshChatInspectionOverlays();

      function getSymbolInspectionLabelSignature(symbol) {
        if (!symbol) return '';
        return `${symbol.elemIdTrue}|${symbol.isDynamic ? 1 : 0}|${getDir(symbol)}`;
      }

      // Function to create labels for selected symbols
      function showSimpleLabel(preservedLabelMap = new Map()) {
        let labelData = [];

        selectedSymbols.forEach((selectedSymbol) => {
          // Check if label already exists
          if (!selectedSymbol.querySelector('.symbol-label')) {
            const words = tSymbolLabels(selectedSymbol.elemIdTrue, selectedSymbol.isDynamic);

            if (getDir(selectedSymbol) === 1) {
              if (selectedSymbol.elemIdTrue === 1) {
                if (selectedSymbol.isDynamic) {
                  words.push(...extra('gravity'));
                } else {
                  words.push(...extra('roof'));
                }
              }
              if (selectedSymbol.elemIdTrue === 3) {
                if (!selectedSymbol.isDynamic) {
                  words.push(...extra('aerial'));
                }
              }
              if (selectedSymbol.elemIdTrue === 4) {
                if (selectedSymbol.isDynamic) {
                  // console.log('fly highhhhh');
                  words.push(...extra('ascend'));
                } else {
                  words.push(...extra('ground'));
                }
              }
            }

            let subset = getRandomSubset(words, 2);
            const preservedEntry = preservedLabelMap.get(selectedSymbol) || null;
            const canReuseBaseTexts =
              preservedEntry?.signature === getSymbolInspectionLabelSignature(selectedSymbol);
            const preservedBase = canReuseBaseTexts
              ? (preservedEntry?.labels || [])
                  .filter((item) => !item.userCreated)
                  .map((item) => item.text)
                  .filter(Boolean)
              : [];
            if (preservedBase.length > 0) {
              subset = preservedBase;
            }

            // ✅ 视口坐标 -> canvas 局部坐标
            const rect = selectedSymbol.getBoundingClientRect();
            const canvas = getCanvasForElem(selectedSymbol);
            const canvasRect = canvas ? canvas.getBoundingClientRect() : { left: 0, top: 0 };
            const zoom = canvas ? getCanvasZoom(canvas) || 1 : 1;

            const cx = (rect.left - canvasRect.left) / zoom + rect.width / (2 * zoom);
            const cy = (rect.top - canvasRect.top) / zoom + rect.height / (2 * zoom);

            for (const word of subset) {
              labelData.push([word, cx, cy, selectedSymbol, false]);
            }
          }
        });

        const [foundIds, elimBasic, representatives, hasDuplicateExpression] =
          analyzeSelectionSet(selectedSymbols);

        for (const [storedWord, [storedId, storedGraph]] of library) {
          const matches = [];
          for (const component of getConnectedSymbolComponents(selectedSymbols, currentGraph)) {
            if (component.size < storedGraph.nodes.length) continue;
            matches.push(...matchAllPatternsOnSelection(component, storedGraph));
          }

          for (const foundMatching of matches) {
            let avgX = 0,
              avgY = 0;
            let lastSymbol;

            // pick any symbol in this match to find its canvas
            const first = foundMatching.values().next().value;
            const canvas = getCanvasForElem(first);
            if (!canvas) continue;

            const canvasRect = canvas.getBoundingClientRect();
            const zoom = getCanvasZoom(canvas) || 1;

            for (const symbol of foundMatching) {
              const rect = symbol.getBoundingClientRect();

              // viewport -> canvas-local
              const cx = (rect.left - canvasRect.left) / zoom + rect.width / (2 * zoom);
              const cy = (rect.top - canvasRect.top) / zoom + rect.height / (2 * zoom);

              avgX += cx;
              avgY += cy;
              lastSymbol = symbol;
            }
            avgX /= foundMatching.size;
            avgY /= foundMatching.size;

            labelData.push([storedWord, avgX, avgY, lastSymbol, true]);
          }
        }

        const pendingBoxesByCanvas = new Map();

        labelData.forEach((labelDataSub) => {
          const label = document.createElement('div');
          label.classList.add('symbol-label', 'removable');
          if (labelDataSub[4]) {
            label.classList.add('user-created-label');
          }
          label.textContent = labelDataSub[0];

          const anchorSymbol = labelDataSub[3];
          const canvas = getCanvasForElem(anchorSymbol);
          if (!canvas) return;

          label.style.visibility = 'hidden';
          canvas.appendChild(label);

          const pendingBoxes = pendingBoxesByCanvas.get(canvas) || [];
          const preserved = ((preservedLabelMap.get(anchorSymbol) || {}).labels || []).find(
            (item) => item.text === labelDataSub[0] && !!item.userCreated === !!labelDataSub[4],
          );
          const position = preserved
            ? { x: preserved.x, y: preserved.y }
            : findScatteredLabelPosition(
                label,
                labelDataSub[1],
                labelDataSub[2],
                canvas,
                pendingBoxes,
              );

          label.x = position.x;
          label.y = position.y;
          label.style.left = `${label.x}px`;
          label.style.top = `${label.y}px`;
          label.style.visibility = '';

          pendingBoxes.push(getLabelBox(label.x, label.y, label));
          pendingBoxesByCanvas.set(canvas, pendingBoxes);

          if (anchorSymbol.labels === undefined) {
            anchorSymbol.labels = new Set([label]);
          } else {
            anchorSymbol.labels.add(label);
          }
          label.offsetX = label.x - parseFloat(anchorSymbol.style.left);
          label.offsetY = label.y - parseFloat(anchorSymbol.style.top);

          label.addEventListener(
            'pointerdown',
            (e) => {
              e.stopPropagation();
            },
            true,
          );

          label.addEventListener('pointerup', (e) => {
            e.stopPropagation();
          });

          attachInspectionLabelDrag(label, anchorSymbol);
          floatLabel(label);
        });
        return [foundIds, elimBasic, representatives, hasDuplicateExpression];
      }

      let rightMost;
      let topMost;

      // Function to create a text input near the symbol
      function showInput(
        foundIds,
        elimBasic,
        representatives,
        hasDuplicateExpression,
        componentSymbols = selectedSymbols,
      ) {
        function computeSelectionBoundsLocal() {
          const first = componentSymbols.values().next().value;
          if (!first) return null;

          const canvas = first.closest('#craftCanvas, #chatCanvas');
          if (!canvas) return null;

          const canvasRect = canvas.getBoundingClientRect();
          const zoom = getCanvasZoom(canvas) || 1;

          let rightMost = -Infinity;
          let topMost = Infinity;

          for (const s of componentSymbols) {
            const r = s.getBoundingClientRect();
            const right = (r.right - canvasRect.left) / zoom; // canvas-local
            const top = (r.top - canvasRect.top) / zoom; // canvas-local
            if (right > rightMost) rightMost = right;
            if (top < topMost) topMost = top;
          }

          return { canvas, rightMost, topMost };
        }

        function clampDefinitionControlsToViewport() {
          if (!isCoarseMobile) return;
          const canvasRect = canvas.getBoundingClientRect();
          const zoom = getCanvasZoom(canvas) || 1;
          const viewportLeft = Math.max(0, -canvasRect.left / zoom);
          const viewportTop = Math.max(0, -canvasRect.top / zoom);
          const viewportRight = viewportLeft + window.innerWidth / zoom;
          const viewportBottom = viewportTop + (window.innerHeight - 76) / zoom;
          const gap = 8;
          const panelWidth = Math.max(input.offsetWidth || 0, textarea.offsetWidth || 0, 180);
          const nextX = clamp(
            input.x,
            viewportLeft + gap,
            Math.max(viewportLeft + gap, viewportRight - panelWidth - gap),
          );
          const nextInputY = clamp(
            input.y,
            viewportTop + gap,
            Math.max(viewportTop + gap, viewportBottom - 124),
          );
          const dx = nextX - input.x;
          const dy = nextInputY - input.y;
          const controls = [input, textarea, submitButton, cancelButton].filter(Boolean);
          controls.forEach((el) => {
            el.x = (el.x || 0) + dx;
            el.y = (el.y || 0) + dy;
            el.offsetX = el.x - parentLeft;
            el.offsetY = el.y - parentTop;

        function showFeedback(feedback, manualFailed = false) {
          console.log(`foundIds init ${foundIds}`);
          // Create the div element
          const outputBox = document.createElement('div');
          outputBox.classList.add('typing-effect', 'removable');

          // Create the p element

          pElement.y = parseFloat(textarea.style.top) - 10 + textarea.scrollHeight;

          pElement.style.top = `${pElement.y}px`;
          const approxCharPx = currentLang === 'zh' ? 18 : 9.2;
          const desiredWidth = (currentLang === 'zh' ? 16 : 100) * approxCharPx;
          const availableWidth = Math.max(180, (canvas?.clientWidth || 0) - pElement.x - 24);
          pElement.style.width = `${Math.max(180, Math.min(desiredWidth, availableWidth))}px`;
          pElement.style.whiteSpace = 'pre-wrap';
          pElement.style.wordBreak = 'normal';
          pElement.style.overflowWrap = 'normal';

          inputParent.pElement = pElement;

          // Create a span element to hold the text (so the cursor stays at the end)

          textSpan.id = 'typingText';

          // Create a cursor span element

          const text = formatSymbolOrientationTerms(feedback);
          let index = 0;
          const speed = 10; // Speed of typing in milliseconds

          const maxLineLen = currentLang === 'zh' ? 14 : 24;
          let lineIndex = 0;
          let passed;
          function type(onComplete) {
            const span = document.getElementById('typingText');
            if (!span) return;

            if (index < text.length) {
              const currentText = span.textContent;
              const lastLine = currentText.split('\n').pop() || '';
              const nextChar = text.charAt(index);

              if (currentLang === 'zh') {
                if (lastLine.length >= maxLineLen) {
                  span.textContent += '\n';
                  lineIndex++;
                }
              } else {
                const trimmedLine = lastLine.replace(/\s+$/, '');
                const lineLen = trimmedLine.length;
                const atWordStart = index === 0 || /\s/.test(text.charAt(index - 1));

                // For English, look ahead to the whole next word and wrap BEFORE it starts
                // if adding it would overflow the target line length.
                if (atWordStart && /\S/.test(nextChar)) {
                  const wordMatch = text.slice(index).match(/^\S+/);
                  const nextWord = wordMatch ? wordMatch[0] : nextChar;
                  const projectedLen = lineLen + (lineLen > 0 ? 1 : 0) + nextWord.length;

                  if (lineLen > 0 && projectedLen > maxLineLen) {
                    span.textContent = currentText.replace(/\s+$/, '') + '\n';
                    lineIndex++;
                  }
                }

                // Never let a new line begin with a space.
                if ((lastLine === '' || /\n$/.test(span.textContent)) && nextChar === ' ') {
                  index++;
                  setTimeout(() => type(onComplete), speed);
                  return;
                }
              }

              // append next char
              span.textContent += text.charAt(index);
              index++;

              setTimeout(() => type(onComplete), speed);
            } else {
              const firstToken = (text || '')
                .trim()
                .split(/\s+/)[0]
                .replace(/[^A-Za-z]/g, '');

              passed = firstToken === 'Yes';
              if (onComplete) onComplete(passed);

            if (tabHeadersActivated[1]) appendToCraftCanvas(doneButton);
            if (tabHeadersActivated[4]) appendToChatCanvas(doneButton);

            tutorialHandleDefinitionFeedback?.(passed && !manualFailed, doneButton);

            doneButton.onclick = async function () {
              if (
