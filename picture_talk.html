<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Picture Talk — Ukiriz</title>
    <style>
      @font-face {
        font-family: UkirizSarasa;
        src: url('./fonts/SarasaUiSC-Regular.woff2') format('woff2');
        font-display: swap;
      }
      @font-face {
        font-family: UkirizWenKai;
        src: url('./fonts/LXGWWenKai-Regular.woff2') format('woff2');
        font-display: swap;
      }
      @font-face {
        font-family: UkirizSourceHanSerif;
        src: url('./fonts/SourceHanSerifSC-VF.woff2') format('woff2');
        font-display: swap;
      }
      :root {
        --pink: #f18fba;
        --pink-dark: #b83f77;
        --coral: #ff806d;
        --yellow: #ffd85c;
        --lilac: #b9a1ff;
        --paper: #fff4f8;
        --grid: rgba(112, 34, 72, 0.055);
        --grid-major: rgba(112, 34, 72, 0.1);
        --mono: Consolas, 'Courier New', UkirizSarasa, ui-monospace, monospace;
        --hand: UkirizWenKai, 'Comic Sans MS', cursive;
      }
      * {
        box-sizing: border-box;
      }
      [hidden] {
        display: none !important;
      }
      body {
        margin: 0;
        min-height: 100vh;
        color: #24101a;
        background-color: var(--paper);
        background-image:
          radial-gradient(circle at 12% 18%, rgba(255, 216, 92, 0.34) 0 70px, transparent 72px),
          radial-gradient(circle at 88% 78%, rgba(185, 161, 255, 0.25) 0 105px, transparent 108px),
          linear-gradient(to right, var(--grid) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
          linear-gradient(to right, var(--grid-major) 1px, transparent 1px),
          linear-gradient(to bottom, var(--grid-major) 1px, transparent 1px);
        background-size:
          auto,
          auto,
          40px 40px,
          40px 40px,
          200px 200px,
          200px 200px;
        font: 16px/1.35 var(--mono);
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: '';
        position: fixed;
        z-index: -1;
        pointer-events: none;
        border: 3px solid #24101a;
      }
      body::before {
        width: 90px;
        height: 46px;
        left: -22px;
        top: 34%;
        border-radius: 55% 45% 62% 38%;
        border-color: var(--coral);
        transform: rotate(24deg);
      }
      body::after {
        width: 62px;
        height: 62px;
        right: 4%;
        top: 16%;
        border-radius: 48% 52% 43% 57%;
        border-color: var(--lilac);
        transform: rotate(-17deg);
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }
      button,
      select,
      input[type='text'] {
        border: 1px solid #24101a;
        border-radius: 9px 5px 10px 6px;
        background: rgba(255, 255, 255, 0.92);
        padding: 6px 10px;
      }
      button {
        cursor: pointer;
      }
      button:hover {
        opacity: 0.55;
      }
      button[aria-pressed='true'],
      button.primary {
        background: var(--pink);
        transform: rotate(-1deg);
      }
      button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      header {
        min-height: 82px;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 0 22px;
        border-bottom: 2px solid #24101a;
        background: rgba(255, 244, 248, 0.91);
        position: sticky;
        top: 0;
        z-index: 5;
        backdrop-filter: blur(7px);
      }
      h1 {
        margin: 0;
        font: 400 31px/1 var(--hand);
        transform: rotate(-2deg);
      }
      h1::after {
        content: '✦';
        color: var(--coral);
        font-size: 18px;
        margin-left: 8px;
      }
      .subtitle {
        color: #6d4355;
        font-size: 13px;
      }
      header a {
        color: #000;
        text-decoration: none;
      }
      .home-link {
        margin-left: auto;
        border-bottom: 1px solid #000;
      }
      .account-tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .lang-menu {
        display: inline-flex;
        gap: 3px;
        padding: 3px;
        border: 1px solid #24101a;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.78);
      }
      .lang-item {
        padding: 3px 7px;
        border: 0;
        border-radius: 999px;
        background: transparent;
        font-size: 11px;
      }
      .lang-item.active {
        background: var(--pink);
      }
      #quota-badge {
        padding: 7px 11px;
        border: 1px solid #24101a;
        border-radius: 48% 52% 45% 55% / 58% 42% 58% 42%;
        background: var(--yellow);
        font-size: 13px;
        white-space: nowrap;
        transform: rotate(1.5deg);
      }
      #copy-uid {
        padding: 3px 2px;
        border: 0;
        border-bottom: 1px dashed #6d4355;
        border-radius: 0;
        background: transparent;
        color: #6d4355;
        font-size: 11px;
      }
      .support-link {
        padding: 5px 8px;
        border: 1px solid #24101a;
        border-radius: 45% 55% 52% 48% / 56% 44% 54% 46%;
        background: rgba(241, 143, 186, 0.24);
        font-size: 11px;
        white-space: nowrap;
        transform: rotate(-1deg);
      }
      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        padding: 28px 22px 44px;
        display: grid;
        grid-template-columns: minmax(320px, 620px) minmax(280px, 1fr);
        gap: 28px;
        align-items: start;
      }
      .stage-window,
      .panel {
        position: relative;
        border: 2px solid #24101a;
        background: rgba(255, 255, 255, 0.91);
        box-shadow: 7px 8px 0 rgba(184, 63, 119, 0.2);
      }
      .stage-window {
        border-radius: 12px 18px 9px 16px;
      }
      aside .panel:first-child {
        transform: rotate(0.55deg);
        border-radius: 15px 8px 18px 10px;
      }
      aside .panel:last-child {
        transform: rotate(-0.4deg);
        border-radius: 8px 17px 11px 19px;
      }
      .window-title {
        height: 34px;
        padding: 6px 10px;
        border-bottom: 2px solid #24101a;
        background: var(--pink);
        display: flex;
        align-items: center;
        justify-content: space-between;
        font: 15px/1 var(--hand);
        border-radius: inherit;
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
      .sketch-name {
        width: min(78%, 320px);
        padding: 1px 3px !important;
        border: 1px solid transparent !important;
        border-radius: 3px !important;
        outline: none;
        background: transparent !important;
        font: 15px/1 var(--hand) !important;
      }
      .sketch-name:hover,
      .sketch-name:focus {
        border-color: #24101a !important;
        background: rgba(255, 255, 255, 0.38) !important;
      }
      .edit-name {
        padding: 0 3px;
        border: 0;
        background: transparent;
        font: 18px/1 var(--hand);
        box-shadow: none;
      }
      aside .panel:last-child .window-title {
        background: var(--lilac);
      }
      .stage {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        overflow: hidden;
        background: #fff;
        touch-action: none;
        border-radius: 0 0 9px 13px;
      }
      canvas {
        display: block;
        width: 100%;
        height: 100%;
        cursor: crosshair;
      }
      .busy {
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        background: #fff9;
        backdrop-filter: blur(2px);
        text-align: center;
      }
      .busy.show {
        display: grid;
      }
      .panel + .panel {
        margin-top: 18px;
      }
      .panel-body {
        padding: 15px;
      }
      .panel-body > strong {
        font: 400 20px/1.2 var(--hand);
        color: var(--pink-dark);
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin: 10px 0;
      }
      label {
        font-size: 13px;
      }
      input[type='range'] {
        width: 130px;
        accent-color: var(--pink-dark);
      }
      input[type='color'] {
        width: 34px;
        height: 30px;
        border: 1px solid #000;
        padding: 2px;
        background: #fff;
      }
      input[type='text'] {
        width: 100%;
      }
      .submit {
        width: calc(100% - 12px);
        margin: 9px 6px 7px;
        padding: 10px 14px;
        background: var(--coral) !important;
        font: 700 17px var(--hand);
        border: 2px solid #24101a;
        border-radius: 48% 52% 45% 55% / 58% 42% 58% 42%;
        transform: rotate(0.6deg);
      }
      .status {
        min-height: 2.8em;
        margin: 10px 0 0;
        font-size: 13px;
        color: #5e3447;
      }
      .history {
        display: flex;
        gap: 7px;
        overflow: auto;
        padding: 5px 0 9px;
      }
      .history button {
        flex: 0 0 auto;
        width: 68px;
        height: 68px;
        padding: 0;
        overflow: hidden;
        border-radius: 8px 13px 7px 11px;
      }
      .history button:nth-child(even) {
        transform: rotate(2deg);
      }
      .history button:nth-child(odd) {
        transform: rotate(-2deg);
      }
      .history img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      details {
        margin-top: 10px;
        font-size: 13px;
      }
      textarea {
        width: 100%;
        height: 150px;
        margin-top: 7px;
        resize: vertical;
        border: 1px solid #000;
        border-radius: 5px;
        padding: 7px;
        font-size: 12px;
      }
      @media (max-width: 820px) {
        header {
          height: auto;
          min-height: 76px;
          flex-wrap: wrap;
          padding: 10px 14px;
          gap: 9px;
        }
        .subtitle {
          display: none;
        }
        .home-link {
          margin-left: auto;
        }
        .account-tools {
          order: 4;
          width: 100%;
          flex-wrap: wrap;
        }
        #quota-badge {
          flex: 1;
          text-align: center;
          border-radius: 9px;
        }
        main {
          grid-template-columns: 1fr;
          padding: 16px 12px 32px;
          gap: 22px;
        }
        .stage-window,
        aside .panel:first-child,
        aside .panel:last-child {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="page-title">Picture Talk</h1>
      <span class="subtitle" id="subtitle">draw something · see what answers</span>
      <div class="lang-menu" aria-label="Language">
        <button id="lang-en" class="lang-item" type="button">EN</button
        ><button id="lang-zh" class="lang-item" type="button">中文</button>
      </div>
      <div class="account-tools">
        <div id="quota-badge">Turns: --/--</div>
        <button id="copy-uid" type="button" title="Copy your full Firebase UID">copy UID</button>
        <a
          id="kofi-link"
          class="support-link"
          href="https://ko-fi.com/ukiriz"
          target="_blank"
          rel="noopener noreferrer"
          title="As a thank-you, every $5 adds 150 permanent turns"
          >🍹 Ko-fi</a
        ><a
          id="afdian-link"
          class="support-link"
          href="https://afdian.com/a/ukiriz"
          target="_blank"
          rel="noopener noreferrer"
          title="As a thank-you, every ¥35 adds 150 permanent turns"
          >⚡ 爱发电</a
        >
      </div>
      <a class="home-link" id="home-link" href="index.html">← Ukiriz</a>
    </header>
    <main>
      <section class="stage-window" id="stage-window">
        <div class="window-title">
          <input
            id="sketch-name"
            class="sketch-name"
            value="your shared sketch-space"
            maxlength="48"
            aria-label="Sketch-space name"
          /><button
            id="edit-name"
            class="edit-name"
            type="button"
            aria-label="Edit sketch-space name"
          >
            ✎
          </button>
        </div>
        <div class="stage">
          <canvas id="canvas" width="512" height="512" aria-label="Drawing canvas"></canvas>
          <div class="busy" id="busy">Listening to your picture…</div>
        </div>
      </section>
      <aside>
        <div class="panel">
          <div class="window-title">
            <span id="tools-title">things to play with</span><span>○ △ ~</span>
          </div>
          <div class="panel-body">
            <strong id="draw-title">Draw your turn</strong>
            <div class="row" id="tools">
              <button data-tool="pen" aria-pressed="true">Pen</button>
              <button data-tool="circle" aria-pressed="false">Circle</button>
              <button data-tool="text" aria-pressed="false">Text</button>
            </div>
            <div class="row">
              <label
                ><span id="color-label">Color</span>
                <input id="color" type="color" value="#201c18"
              /></label>
              <label
                ><span id="width-label">Width</span>
                <input id="width" type="range" min="1" max="50" value="8"
              /></label>
              <select id="stroke" aria-label="Stroke style">
                <option value="solid">Solid</option>
                <option value="dotted">Dotted</option>
                <option value="dashed">Dashed</option>
              </select>
              <select id="font" aria-label="Text font" hidden>
                <option value="wenkai">WenKai · handwritten</option>
                <option value="sarasa">Sarasa · clean</option>
                <option value="serif">Source Han · serif</option>
                <option value="iti">Consolas · technical</option>
              </select>
            </div>
            <div class="row" id="text-row" hidden>
              <input
                id="text"
                type="text"
                maxlength="80"
                placeholder="Text to place on the canvas"
              />
            </div>
            <div class="row">
              <button id="undo">Undo</button><button id="redo">Redo</button
              ><button id="clear">Clear</button><button id="upload">Upload</button
              ><button id="save">Save</button>
              <input id="file" type="file" accept="image/*" hidden />
            </div>
          </div>
        </div>
        <div class="panel">
          <div class="window-title">
            <span id="send-title">send it into the unknown</span><span>↝</span>
          </div>
          <div class="panel-body">
            <strong id="invite-title">Invite a reply</strong>
            <div class="row">
              <label
                ><span id="opacity-label">AI opacity</span>
                <input id="opacity" type="range" min="0" max="100" value="85" /></label
              ><output id="opacityValue">85%</output>
            </div>
            <div class="row">
              <label
                ><input type="radio" name="mode" value="overlaying" checked />
                <span id="overlay-label">Overlay</span></label
              >
              <label
                ><input type="radio" name="mode" value="replacement" />
                <span id="replace-label">Replace</span></label
              >
            </div>
            <button id="submit" class="primary submit">Send picture</button>
            <p class="status" id="status" role="status">
              Draw, write, or upload an image. The reply arrives as a new visual layer.
            </p>
            <strong id="conversation-title">Conversation</strong>
            <div class="history" id="history"></div>
            <details>
              <summary id="latest-summary">Latest creation</summary>
              <img
                id="ai-layer"
                alt="Latest creation"
                style="
                  display: none;
                  width: 100%;
                  margin-top: 8px;
                  border: 1px solid #24101a;
                  background: white;
                "
              />
            </details>
          </div>
        </div>
      </aside>
    </main>

        document.body.classList.toggle('lang-zh', currentLang === 'zh');
        $('#page-title').textContent = t.pageTitle;
        $('#subtitle').textContent = t.subtitle;
        $('#tools-title').textContent = t.toolsTitle;
        $('#draw-title').textContent = t.drawTitle;
        $('#color-label').textContent = t.color;
        $('[data-tool="pen"]').textContent = t.pen;
        $('[data-tool="circle"]').textContent = t.circle;
        $('[data-tool="text"]').textContent = t.text;
        $('#stroke').options[0].textContent = t.solid;
        $('#stroke').options[1].textContent = t.dotted;
        $('#stroke').options[2].textContent = t.dashed;
        $('#font').options[0].textContent = t.fontWenkai;
        $('#font').options[1].textContent = t.fontSarasa;
        $('#font').options[2].textContent = t.fontSerif;
        $('#font').options[3].textContent = t.fontIti;
        $('#text').placeholder = t.textPlaceholder;
        $('#undo').textContent = t.undo;
        $('#redo').textContent = t.redo;
        $('#clear').textContent = t.clear;
        $('#upload').textContent = t.upload;
        $('#save').textContent = t.save;
        $('#send-title').textContent = t.sendTitle;
        $('#invite-title').textContent = t.inviteTitle;
        $('#opacity-label').textContent = t.opacity;
        $('#overlay-label').textContent = t.overlay;
        $('#replace-label').textContent = t.replace;
        $('#submit').textContent = t.submit;
        $('#conversation-title').textContent = t.conversation;
        $('#latest-summary').textContent = t.latest;
        $('#copy-uid').textContent = t.copyUid;
        $('#copy-uid').title = t.copyTitle;
        $('#kofi-link').textContent = t.supportKofi;
        $('#kofi-link').title = t.supportKofiTitle;
        $('#afdian-link').textContent = t.supportAfdian;
        $('#afdian-link').title = t.supportAfdianTitle;
        $('#home-link').textContent = t.home;
        $('#busy').textContent = t.listening;
        $('#edit-name').ariaLabel = t.editName;
        canvas.ariaLabel = t.canvasLabel;
        $('#ai-layer').alt = t.latest;
        $('#width-label').textContent = tool === 'text' ? t.size : t.width;
        const sketch = $('#sketch-name');
        sketch.ariaLabel = t.editName;
        if (
          !savedSketchName &&
          (!sketch.value ||
            Object.values(I18N).some((copy) => copy.sketchDefault === sketch.value))
        )
          sketch.value = t.sketchDefault;
        if (currentStatusKey) $('#status').textContent = t[currentStatusKey];
        $('#lang-en').classList.toggle('active', currentLang === 'en');
        $('#lang-zh').classList.toggle('active', currentLang === 'zh');
        if (lastQuotaData) updateQuotaBadge(lastQuotaData);
      }

      $('#lang-en').onclick = () => setLang('en');
      $('#lang-zh').onclick = () => setLang('zh');

      async function initializeIdentity() {
        $('#submit').disabled = true;
        $('#copy-uid').disabled = true;
        $('#quota-badge').textContent = I18N[currentLang].connecting;
        const auth = getAuth(initializeApp(firebaseConfig));
        await setPersistence(auth, browserLocalPersistence);
        const user = await new Promise((resolve, reject) => {
          let signingIn = false;
          const unsubscribe = onAuthStateChanged(
            auth,
            async (existingUser) => {
              if (existingUser) {
                unsubscribe();
                resolve(existingUser);
                return;
              }
              if (signingIn) return;
              signingIn = true;
              try {
                const credential = await signInAnonymously(auth);
                unsubscribe();
                resolve(credential.user);
              } catch (error) {
                unsubscribe();
                reject(error);
              }
            },
            reject,
          );
        });
        uid = user.uid;
        localStorage.setItem('anonymousUID', uid);
        localStorage.removeItem('ukiriz.uid');
        $('#copy-uid').disabled = false;
        $('#copy-uid').textContent = I18N[currentLang].copyUid;
        await refreshQuota();
      }

      function updateQuotaBadge(data) {
        if (!Number.isFinite(data?.remaining) || !Number.isFinite(data?.limit)) return;
        lastQuotaData = data;
        const t = I18N[currentLang];
        const paidBalance = Number.isFinite(Number(data.paidBalance))
          ? Number(data.paidBalance)
          : 0;
        remainingTurns = Number.isFinite(Number(data.available))
          ? Number(data.available)
          : data.remaining + paidBalance;
        $('#quota-badge').textContent =
          currentLang === 'zh'
            ? `今日 ${data.remaining} / ${data.limit}${paidBalance > 0 ? ` · 永久 ${paidBalance.toLocaleString()}` : ''}`
            : `${data.remaining} / ${data.limit} today${paidBalance > 0 ? ` · ${paidBalance.toLocaleString()} saved` : ''}`;
        $('#submit').disabled = remainingTurns < 1;
        $('#quota-badge').title =
          currentLang === 'zh'
            ? `今天已使用 ${data.used} 次免费对谈 · 永久余额 ${paidBalance} 次`
            : `${data.used} free turn${data.used === 1 ? '' : 's'} used today · ${paidBalance} permanent turn${paidBalance === 1 ? '' : 's'} saved`;
      }

      async function refreshQuota() {
        try {
          const response = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'quotaStatus', uid }),
          });
          const data = await response.json();
          if (response.ok && data.ok) updateQuotaBadge(data);
          else $('#quota-badge').textContent = I18N[currentLang].unavailable;
        } catch {
          $('#quota-badge').textContent = I18N[currentLang].offline;
        }
      }

      function canvasUrl() {
        return canvas.toDataURL('image/png');
      }
      function visionCanvasUrl() {
        const c = document.createElement('canvas');
        c.width = 512;
        c.height = 512;
        const x = c.getContext('2d');
        x.fillStyle = '#ffffff';
        x.fillRect(0, 0, 512, 512);
        x.drawImage(canvas, 0, 0);
        return c.toDataURL('image/png');
      }
      function restore(url) {
        return new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            ctx.clearRect(0, 0, 512, 512);
            ctx.drawImage(img, 0, 0, 512, 512);
            resolve();
          };
          img.src = url;
        });
      }
      function commit() {
        undoStack.push(canvasUrl());
        if (undoStack.length > 30) undoStack.shift();
        redoStack = [];
        syncButtons();
      }
      function syncButtons() {
        $('#undo').disabled = undoStack.length < 2;
        $('#redo').disabled = !redoStack.length;
      }
      function point(e) {
        const r = canvas.getBoundingClientRect();
        return {
          x: ((e.clientX - r.left) * 512) / r.width,
          y: ((e.clientY - r.top) * 512) / r.height,
        };
      }
      function setStyle() {
        ctx.strokeStyle = $('#color').value;
        ctx.fillStyle = $('#color').value;
        ctx.lineWidth = +$('#width').value;
        ctx.lineCap = 'round';
        const s = $('#stroke').value;
        ctx.setLineDash(
          s === 'dotted'
            ? [1, ctx.lineWidth * 2]
            : s === 'dashed'
              ? [ctx.lineWidth * 5, ctx.lineWidth * 3]
              : [],
        );
      }

      canvas.addEventListener('pointerdown', async (e) => {
        e.preventDefault();
        const p = point(e);
        setStyle();
        if (tool === 'text') {
          const t = $('#text').value.trim();
          if (t) {
            const size = Math.max(16, +$('#width').value * 3),
              family = canvasFontStacks[$('#font').value] || canvasFontStacks.wenkai;
            await document.fonts.load(`${size}px ${family}`);
            ctx.font = `${size}px ${family}`;
            ctx.fillText(t, p.x, p.y);
            commit();
          }
          return;
        }
        drawing = true;
        start = p;
        snapshot = ctx.getImageData(0, 0, 512, 512);
        canvas.setPointerCapture(e.pointerId);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      });
      canvas.addEventListener('pointermove', (e) => {
        if (!drawing) return;
        const p = point(e);
        if (tool === 'pen') {
          ctx.lineTo(p.x, p.y);
          ctx.stroke();
        } else {
          ctx.putImageData(snapshot, 0, 0);
          const radius = Math.hypot(p.x - start.x, p.y - start.y);
          ctx.beginPath();
          ctx.arc(start.x, start.y, radius, 0, Math.PI * 2);
          ctx.stroke();
        }
      });
      canvas.addEventListener('pointerup', () => {
        if (!drawing) return;
        drawing = false;
        ctx.closePath();
        commit();
      });
      canvas.addEventListener('pointercancel', () => {
        if (drawing) {
          drawing = false;
          ctx.putImageData(snapshot, 0, 0);
        }
      });
      $('#tools').addEventListener('click', (e) => {
        const b = e.target.closest('[data-tool]');
        if (!b) return;
        tool = b.dataset.tool;
        const textMode = tool === 'text',
          t = I18N[currentLang];
        document
          .querySelectorAll('[data-tool]')
          .forEach((x) => x.setAttribute('aria-pressed', String(x === b)));
        $('#text-row').hidden = !textMode;
        $('#stroke').hidden = textMode;
        $('#font').hidden = !textMode;
        $('#width-label').textContent = textMode ? t.size : t.width;
        if (textMode) $('#text').focus();
      });
      $('#undo').onclick = async () => {
        if (undoStack.length < 2) return;
        redoStack.push(undoStack.pop());
        await restore(undoStack.at(-1));
        syncButtons();
      };
      $('#redo').onclick = async () => {
        if (!redoStack.length) return;
        const u = redoStack.pop();
        undoStack.push(u);
        await restore(u);
        syncButtons();
      };
      $('#clear').onclick = () => {
        ctx.clearRect(0, 0, 512, 512);
        commit();
      };
      $('#upload').onclick = () => $('#file').click();
      $('#save').onclick = () => {
        const sketchName = $('#sketch-name').value.trim(),
          safeName =
            (sketchName || 'picture-talk')
              .replace(/[\\/:*?"<>|]+/g, '-')
              .replace(/[. ]+$/g, '')
              .slice(0, 120) || 'picture-talk',
          link = document.createElement('a');
        link.download = `${safeName}.png`;
        link.href = canvasUrl();
        link.click();
      };
      $('#file').onchange = (e) => {
        const f = e.target.files[0];
        if (!f) return;
        const img = new Image();
        img.onload = () => {
          ctx.clearRect(0, 0, 512, 512);
          const scale = Math.min(512 / img.width, 512 / img.height);
          const w = img.width * scale,
            h = img.height * scale;
          ctx.drawImage(img, (512 - w) / 2, (512 - h) / 2, w, h);
          commit();
          URL.revokeObjectURL(img.src);
        };
        img.src = URL.createObjectURL(f);
      };
      $('#opacity').oninput = (e) => ($('#opacityValue').value = `${e.target.value}%`);
      $('#copy-uid').onclick = async () => {
        if (!uid) return;
        const value = `UID:${uid}`,
          t = I18N[currentLang];
        try {
          await navigator.clipboard.writeText(value);
          $('#copy-uid').textContent = t.copied;
          setTimeout(() => ($('#copy-uid').textContent = I18N[currentLang].copyUid), 1200);
        } catch {
          window.prompt(
            currentLang === 'zh'
              ? '请复制这个 UID，并粘贴到 Ko-fi 或爱发电的赞助留言中：'
              : 'Copy this UID into your Ko-fi or Afdian support message:',
            value,
          );
        }
      };

      function addHistory(url, label) {
        const b = document.createElement('button');
        b.title = label;
        const img = new Image();
        img.src = url;
        img.alt = label;
        b.append(img);
        b.onclick = async () => {
          await restore(url);
          commit();
        };
        $('#history').prepend(b);
        while ($('#history').children.length > 8) $('#history').lastElementChild.remove();
      }
      function loadImage(url) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error(I18N[currentLang].imageError));
          img.src = url;
        });
      }
      async function makeDifferenceLayer(originalUrl, editedUrl) {
        const [original, edited] = await Promise.all([
            loadImage(originalUrl),
            loadImage(editedUrl),
          ]),
          a = document.createElement('canvas'),
          b = document.createElement('canvas');
        a.width = b.width = 512;
        a.height = b.height = 512;
        const ax = a.getContext('2d'),
          bx = b.getContext('2d');
        ax.drawImage(original, 0, 0, 512, 512);
        bx.drawImage(edited, 0, 0, 512, 512);
        const before = ax.getImageData(0, 0, 512, 512),
          after = bx.getImageData(0, 0, 512, 512),
          out = bx.createImageData(512, 512);
        for (let i = 0; i < out.data.length; i += 4) {
          const d = Math.max(
            Math.abs(after.data[i] - before.data[i]),
            Math.abs(after.data[i + 1] - before.data[i + 1]),
            Math.abs(after.data[i + 2] - before.data[i + 2]),
          );
          const alpha = Math.max(0, Math.min(255, (d - 10) * 5));
          out.data[i] = after.data[i];
          out.data[i + 1] = after.data[i + 1];
          out.data[i + 2] = after.data[i + 2];
          out.data[i + 3] = alpha;
        }
        bx.clearRect(0, 0, 512, 512);
        bx.putImageData(out, 0, 0);
        return b.toDataURL('image/png');
      }
      async function applyReply(editedUrl, mode, alpha, originalUrl) {
        const before = canvasUrl(),
          t = I18N[currentLang];
        if (mode === 'replacement') {
          const img = await loadImage(editedUrl);
          ctx.clearRect(0, 0, 512, 512);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.drawImage(img, 0, 0, 512, 512);
          ctx.restore();
        } else {
          const layerUrl = await makeDifferenceLayer(originalUrl, editedUrl),
            layer = await loadImage(layerUrl);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.drawImage(layer, 0, 0, 512, 512);
          ctx.restore();
          $('#ai-layer').src = layerUrl;
          $('#ai-layer').style.display = 'block';
        }
        addHistory(before, t.yourTurn);
        addHistory(canvasUrl(), t.aiReply);
        commit();
      }

      $('#submit').onclick = async () => {
        if (!uid) return;
        const button = $('#submit'),
          status = $('#status'),
          mode = document.querySelector('[name="mode"]:checked').value,
          inputImage = visionCanvasUrl();
        button.disabled = true;
        $('#busy').classList.add('show');
        setStatus('sending');
        try {
          const response = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type: 'pictureTalk', uid, image: inputImage, mode }),
          });
          const data = await response.json();
          updateQuotaBadge(data);
          if (!response.ok || !data.ok)
            throw new Error(data.error || data.message || I18N[currentLang].requestFailed);
          await applyReply(data.image, mode, +$('#opacity').value / 100, inputImage);
          setStatus('received');
        } catch (error) {
          currentStatusKey = null;
          status.textContent = currentLang === 'zh' ? I18N.zh.requestFailed : error.message;
        } finally {
          button.disabled = remainingTurns < 1;
          $('#busy').classList.remove('show');
        }
      };
      setLang(currentLang);
      commit();
      initializeIdentity().catch((error) => {
        $('#quota-badge').textContent = I18N[currentLang].identityUnavailable;
        currentStatusKey = null;
        $('#status').textContent = `${I18N[currentLang].identityError}: ${error.message}`;
      });
    </script>
  </body>
</html>
