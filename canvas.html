          const islandWidth =
            parseFloat(islandSVG.getAttribute('width')) || islandSVG.offsetWidth || 0;
          const islandHeight =
            parseFloat(islandSVG.getAttribute('height')) || islandSVG.offsetHeight || 0;
          minIslandLeft = Math.min(minIslandLeft, islandLeft);
          minIslandTop = Math.min(minIslandTop, islandTop);
          maxIslandRight = Math.max(maxIslandRight, islandLeft + islandWidth);
          maxIslandBottom = Math.max(maxIslandBottom, islandTop + islandHeight);
        });

        initFoam(world, content, 110);

        if (worldPanController && Number.isFinite(minIslandLeft)) {
          if (isCoarseMobile && !mobileWorldInitialZoomApplied) {
            worldContentZoom = clampWorldContentZoom(0.78);
            mobileWorldInitialZoomApplied = true;
          }
          const targetX =
            world.clientWidth / 2 - ((minIslandLeft + maxIslandRight) / 2) * worldContentZoom;
          const targetY =
            world.clientHeight / 2 - ((minIslandTop + maxIslandBottom) / 2) * worldContentZoom;
          worldPanController.setOffset(targetX, targetY);
        }

        worldRendered = true;
        renderWorldPresence(currentWorldPresenceEntries);
      }

      function createIslandSVG(islandData) {
        const blockSize = 20;
        const radius = 5; // 你要的 5px 圆角
        const strokeW = 2;
        const highlightExtra = 8;
        const highlightW = strokeW + highlightExtra;

        const maxStroke = Math.max(strokeW, highlightW);
        const pad = maxStroke / 2;

        const blocks = islandData.blocks;
        if (!blocks?.length) return null;

        // ====== 0) 平移到正区间 ======
        const minX = Math.min(...blocks.map((b) => b.x));
        const minY = Math.min(...blocks.map((b) => b.y));
        const xs = blocks.map((b) => b.x - minX);
        const ys = blocks.map((b) => b.y - minY);
        const width = Math.max(...xs) + 1;
        const height = Math.max(...ys) + 1;

        // occupancy matrix
        const matrix = Array.from({ length: height }, () => Array(width).fill(false));
        blocks.forEach((b) => (matrix[b.y - minY][b.x - minX] = true));

        // ====== 1) edge cancellation：只保留外边界边 ======
        const edgeMap = new Map();
        const eKey = (x1, y1, x2, y2) => `${x1},${y1}->${x2},${y2}`;
        const eRev = (x1, y1, x2, y2) => `${x2},${y2}->${x1},${y1}`;

        function addEdge(x1, y1, x2, y2) {
          const rk = eRev(x1, y1, x2, y2);
          if (edgeMap.has(rk)) edgeMap.delete(rk);
          else edgeMap.set(eKey(x1, y1, x2, y2), { x1, y1, x2, y2 });
        }

        for (let y = 0; y < height; y++) {
          for (let x = 0; x < width; x++) {
            if (!matrix[y][x]) continue;
            addEdge(x, y, x + 1, y); // top
            addEdge(x + 1, y, x + 1, y + 1); // right
            addEdge(x + 1, y + 1, x, y + 1); // bottom
            addEdge(x, y + 1, x, y); // left
          }
        }

        const edges = Array.from(edgeMap.values());
        if (!edges.length) return null;

        // ====== 2) Trace closed loops directly from directed boundary edges ======
        // edgeMap currently stores directed outer boundary edges with consistent orientation.
        const parsePoint = (k) => {
          const [x, y] = k.split(',').map(Number);
          return { x, y };
        };

        const startKey = (e) => `${e.x1},${e.y1}`;
        const endKey = (e) => `${e.x2},${e.y2}`;
        const edgeKey = (e) => `${e.x1},${e.y1}->${e.x2},${e.y2}`;

        // Build "outgoing directed edges" index: startPoint -> [edge, edge, ...]
        const outgoing = new Map();
        for (const e of edges) {
          const sk = startKey(e);
          if (!outgoing.has(sk)) outgoing.set(sk, []);
          outgoing.get(sk).push(e);
        }

        // Optional but helpful: stable ordering (prevents random traversal differences)
        for (const arr of outgoing.values()) {
          arr.sort((a, b) => {
            // sort by end point
            if (a.x2 !== b.x2) return a.x2 - b.x2;
            return a.y2 - b.y2;
          });
        }

        const visitedDir = new Set();
        const loops = [];

        for (const e0 of edges) {
          const k0 = edgeKey(e0);
          if (visitedDir.has(k0)) continue;

          const loop = [];
          let cur = e0;

          // start point
          loop.push({ x: cur.x1, y: cur.y1 });

          let guard = 0;
          while (cur && guard++ < 200000) {
            visitedDir.add(edgeKey(cur));

            // append current edge end point
            loop.push({ x: cur.x2, y: cur.y2 });

            const nextStart = `${cur.x2},${cur.y2}`;

            // If we returned to the first point, loop closed
            const first = loop[0];
            if (cur.x2 === first.x && cur.y2 === first.y) break;

            const candidates = outgoing.get(nextStart) || [];

            // choose the first unvisited outgoing edge from this vertex
            // (for orthogonal pixel boundary, this is usually unique)
            let next = null;
            for (const e of candidates) {
              if (!visitedDir.has(edgeKey(e))) {
                next = e;
                break;
              }
            }

            // Fallback: if all are visited but not closed, data/traversal issue
            if (!next) break;

            cur = next;
          }

          // accept only closed loops
          if (loop.length >= 4) {
            const a = loop[0];
            const b = loop[loop.length - 1];
            if (a.x === b.x && a.y === b.y) {
              loops.push(loop);
            }
          }
        }

        // ====== 3) 清理：去掉共线点（保证直线仍是直线，不“钢笔化”） ======
        function isCollinear(a, b, c) {
          // (b-a) x (c-b) == 0
          const abx = b.x - a.x,
            aby = b.y - a.y;
          const bcx = c.x - b.x,
            bcy = c.y - b.y;
          return abx * bcy - aby * bcx === 0;
        }

        function simplifyLoop(loop) {
          // loop 是闭合的：最后一个点==第一个点（我们允许不严格，先强制闭合）
          const first = loop[0];
          const last = loop[loop.length - 1];
          const closed = first.x === last.x && first.y === last.y ? loop : [...loop, { ...first }];

          // 去掉连续重复点
          const dedup = [closed[0]];
          for (let i = 1; i < closed.length; i++) {
            const p = closed[i],
              q = dedup[dedup.length - 1];
            if (p.x !== q.x || p.y !== q.y) dedup.push(p);
          }

          // 去共线点（保留拐角）
          const out = [];
          for (let i = 0; i < dedup.length; i++) {
            const prev = dedup[(i - 1 + dedup.length) % dedup.length];
            const cur = dedup[i];
            const next = dedup[(i + 1) % dedup.length];
            // 不删除闭合点本身的占位：最后一个点等于第一个点，最后再处理
            out.push(cur);
          }

          // out 仍含闭合重复点，先去掉最后一个重复点
          if (out.length >= 2) {
            const a = out[0],
              b = out[out.length - 1];
            if (a.x === b.x && a.y === b.y) out.pop();
          }

          const simplified = [];
          for (let i = 0; i < out.length; i++) {
            const prev = out[(i - 1 + out.length) % out.length];
            const cur = out[i];
            const next = out[(i + 1) % out.length];
            if (!isCollinear(prev, cur, next)) simplified.push(cur);
          }

          // 重新闭合
          if (simplified.length >= 3) simplified.push({ ...simplified[0] });
          return simplified;
        }

        const simpleLoops = loops.map(simplifyLoop).filter((l) => l.length >= 4); // 至少三角形+闭合点

        // ====== 4) 生成“只在 90° 拐角圆角”的 path（固定半径 radius px） ======
        function roundedOrthogonalPath(loop, rPx, scalePx) {
          // loop: 闭合点列，最后一个点==第一个点；点坐标单位=cell
          // 只对真正拐角（非共线）做圆角。由于我们已 simplify，所有点都应是拐角。
          if (loop.length < 4) return '';

          // 去掉最后一个重复点用于环索引
          const ring = loop.slice(0, -1);
          const n = ring.length;

          function v(a, b) {
            return { x: b.x - a.x, y: b.y - a.y };
          }
          function len(vv) {
            return Math.hypot(vv.x, vv.y);
          }
          function norm(vv) {
            const l = len(vv);
            return { x: vv.x / l, y: vv.y / l };
          }
          function cross(a, b) {
            return a.x * b.y - a.y * b.x;
          }

          let d = '';

          for (let i = 0; i < n; i++) {
            const p0 = ring[(i - 1 + n) % n];
            const p1 = ring[i];
            const p2 = ring[(i + 1) % n];

            const inVec = v(p1, p0); // p1 -> p0
            const outVec = v(p1, p2); // p1 -> p2

            const inLenPx = len(inVec) * scalePx;
            const outLenPx = len(outVec) * scalePx;

            // clamp：不能超过相邻边的一半
            const rr = Math.min(rPx, inLenPx / 2, outLenPx / 2);

            const uIn = norm(inVec);
            const uOut = norm(outVec);

            // 切点
            const pIn = { x: p1.x + (uIn.x * rr) / scalePx, y: p1.y + (uIn.y * rr) / scalePx };
            const pOut = { x: p1.x + (uOut.x * rr) / scalePx, y: p1.y + (uOut.y * rr) / scalePx };

            if (i === 0) d += `M${pIn.x * scalePx},${pIn.y * scalePx} `;
            else d += `L${pIn.x * scalePx},${pIn.y * scalePx} `;

            // 方向：用转向决定 sweep（SVG y 轴向下）
            // 若你发现圆弧“鼓错方向”，把 0/1 对调即可（sweep = crossSign < 0 ? 0 : 1）
            const turn = cross(inVec, outVec);
            const sweep = turn < 0 ? 1 : 0;

            d += `A ${rr} ${rr} 0 0 ${sweep} ${pOut.x * scalePx} ${pOut.y * scalePx} `;
          }

          d += 'Z';
          return d;
        }

        let d = '';
        for (const loop of simpleLoops) {
          d += roundedOrthogonalPath(loop, radius, blockSize) + ' ';
        }

        // ====== 5) 输出 SVG（避免 stroke 被裁切） ======
        const svgNS = 'http://www.w3.org/2000/svg';
        const svg = document.createElementNS(svgNS, 'svg');
        svg.classList.add('island');
        svg.dataset.islandId = islandData.id;
        svg.style.position = 'absolute';

        svg.setAttribute('width', width * blockSize + maxStroke);
        svg.setAttribute('height', height * blockSize + maxStroke);

        // 选中描边（更粗、不同颜色），默认隐藏
        const highlight = document.createElementNS(svgNS, 'path');
        highlight.setAttribute('d', d);
        highlight.setAttribute('fill', 'none');
        highlight.setAttribute('stroke', '#000000'); // 你想要的选中颜色
        highlight.setAttribute('stroke-width', String(highlightW)); // 比原来粗一点
        highlight.setAttribute('stroke-linejoin', 'round');
        highlight.setAttribute('stroke-linecap', 'round');
        highlight.setAttribute('opacity', '0.9');
        highlight.setAttribute('transform', `translate(${pad},${pad})`);
        highlight.classList.add('island-highlight'); // 用 class 控制显示

        // 原本的轮廓（保持你的风格）
        const base = document.createElementNS(svgNS, 'path');
        base.setAttribute('d', d);
        base.setAttribute('fill', 'white');
        base.setAttribute('stroke', 'black');
        base.setAttribute('stroke-width', String(strokeW));
        base.setAttribute('stroke-linejoin', 'round');
        base.setAttribute('stroke-linecap', 'round');
        base.setAttribute('transform', `translate(${pad},${pad})`);
        base.classList.add('island-base');

        svg.appendChild(highlight);
        svg.appendChild(base);

        return svg;
      }

      function initFoam(worldEl, worldContentEl, count = 60) {
        // Remove old foams to avoid duplicates
        worldContentEl.querySelectorAll('.foam').forEach((el) => el.remove());

        const contentW = worldContentEl.clientWidth;
        const contentH = worldContentEl.clientHeight;
        const baseArea = 2880 * 1920;
        const densityMultiplier = Math.max(1, Math.round((contentW * contentH) / baseArea));
        const foamCount = count * densityMultiplier;

        for (let i = 0; i < foamCount; i++) {
          const f = document.createElement('div');
          f.className = 'foam';

          // Distribute over the full ocean layout so smaller windows don't compress waves
          const x = Math.random() * contentW;
          const y = Math.random() * contentH;

          f.style.left = `${x}px`;
          f.style.top = `${y}px`;

          // Random animation params => not synced
          f.style.setProperty('--rise', `${6 + Math.random() * 18}px`);
          f.style.setProperty('--dur', `${1.2 + Math.random() * 2.2}s`);
          f.style.setProperty('--delay', `${Math.random() * 3.0}s`);
          f.style.opacity = `${0.45 + Math.random() * 0.55}`;

          // Store for wrap logic
          f._pad = 600;

          worldContentEl.appendChild(f);
        }
      }

      function recycleFoam(worldEl, worldContentEl, offsetX, offsetY, zoom = 1) {
        const W = worldEl.clientWidth;
        const H = worldEl.clientHeight;

        // Visible rect in content coords:
        // screenX = contentX + offsetX  => contentX = screenX - offsetX
        const safeZoom = Math.max(zoom || 1, 0.0001);
        const vx0 = -offsetX / safeZoom;
        const vy0 = -offsetY / safeZoom;
        const vx1 = vx0 + W / safeZoom;
        const vy1 = vy0 + H / safeZoom;

        // how far outside viewport before we recycle
        const PAD = 600;

        const foams = worldContentEl.querySelectorAll('.foam');
        foams.forEach((f) => {
          let x = parseFloat(f.style.left) || 0;
          let y = parseFloat(f.style.top) || 0;

          // If too far left/right, wrap around
          if (x < vx0 - PAD) x = vx1 + Math.random() * PAD;
          else if (x > vx1 + PAD) x = vx0 - Math.random() * PAD;

          // If too far up/down, wrap around
          if (y < vy0 - PAD) y = vy1 + Math.random() * PAD;
          else if (y > vy1 + PAD) y = vy0 - Math.random() * PAD;

          f.style.left = `${x}px`;
          f.style.top = `${y}px`;
        });
      }

      function enableWorldPanning() {
        if (worldPanningEnabled) return;
        worldPanningEnabled = true;

        const world = document.getElementById('world');
        const content = document.getElementById('worldContent');
        const foamHost = content;

        let offsetX = 0,
          offsetY = 0;
        let dragging = false;
        let startX = 0,
          startY = 0;
        let startOffsetX = 0,
          startOffsetY = 0;

        function getClampedOffset(nextX, nextY) {
          const contentWidth = (content.offsetWidth || world.clientWidth) * worldContentZoom;
          const contentHeight = (content.offsetHeight || world.clientHeight) * worldContentZoom;
          const minOffsetX = Math.min(0, world.clientWidth - contentWidth);
          const minOffsetY = Math.min(0, world.clientHeight - contentHeight);

          return {
            x: Math.min(0, Math.max(minOffsetX, nextX)),
            y: Math.min(0, Math.max(minOffsetY, nextY)),
          };
        }

        function setTransform() {
          content.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${worldContentZoom})`;

          recycleFoam(world, content, offsetX, offsetY, worldContentZoom);
          updateIslandInfoCardPosition?.();
        }

        world.addEventListener('pointerdown', (e) => {
          if (isCanvasZoomGestureActive()) return;
          // 右键不拖
          if (e.button === 2) return;

          // 如果你希望“点到岛屿也能拖”，就不做下面这个判断
          // 如果你希望“点岛屿是选择，不拖”，就保留这个判断：
          // if (e.target.closest("svg")) return;

          dragging = true;
          world.classList.add('dragging');

          startX = e.clientX;
          startY = e.clientY;
          startOffsetX = offsetX;
          startOffsetY = offsetY;

          world.setPointerCapture(e.pointerId);
          e.preventDefault();
        });

        world.addEventListener('pointermove', (e) => {
          if (isCanvasZoomGestureActive()) {
            dragging = false;
            world.classList.remove('dragging');
            return;
          }
          if (!dragging) return;
          const dx = e.clientX - startX;
          const dy = e.clientY - startY;
          const clamped = getClampedOffset(startOffsetX + dx, startOffsetY + dy);
          offsetX = clamped.x;
          offsetY = clamped.y;
          setTransform();
        });

        function endDrag(e) {
          dragging = false;
          world.classList.remove('dragging');
          try {
            world.releasePointerCapture(e.pointerId);
          } catch {}
        }

        world.addEventListener('pointerup', endDrag);
        world.addEventListener('pointercancel', endDrag);

        // 防止右键菜单影响体验（可选）
        world.addEventListener('contextmenu', (e) => e.preventDefault());

        setTransform();

        worldPanController = {
          getOffset: () => ({ x: offsetX, y: offsetY }),
          getZoom: () => worldContentZoom,
          setOffset: (x, y) => {
            const clamped = getClampedOffset(x, y);
            offsetX = clamped.x;
            offsetY = clamped.y;
            setTransform();
          },
          refresh: () => {
            const clamped = getClampedOffset(offsetX, offsetY);
            offsetX = clamped.x;
            offsetY = clamped.y;
            setTransform();
          },
        };

        return worldPanController;
      }

      function renderIslandInfoCard(islandId) {
        const card = ensureIslandInfoCard();
        if (!card) return;
        const cleanId = String(islandId || '').trim();
        const info = ISLAND_INFO[cleanId];
        if (!info) {
          hideIslandInfoCard();
          return;
        }
        const bodyText = currentLang === 'zh' ? info.zh : info.en;
        card.innerHTML = '';
        const titleEl = document.createElement('div');
        titleEl.className = 'title';
        titleEl.textContent = cleanId;

      function updateIslandInfoCardPosition() {
        const card = islandInfoCard;
        if (!card || card.style.display === 'none') return;
        if (!selectedIsland) return;
        const world = document.getElementById('world');
        if (!world) return;

        const worldRect = world.getBoundingClientRect();
        const islandRect = selectedIsland.getBoundingClientRect();

        // Measure card
        card.style.left = '-9999px';
        card.style.top = '-9999px';
        card.style.display = 'block';
        const cardRect = card.getBoundingClientRect();

        const gap = 14;
        const islandCenterX = islandRect.left - worldRect.left + islandRect.width / 2;
        const belowTop = islandRect.bottom - worldRect.top + gap;
        const aboveTop = islandRect.top - worldRect.top - gap - cardRect.height;
        const top =
          belowTop + cardRect.height <= worldRect.height - 8
            ? belowTop
            : clamp(aboveTop, 8, Math.max(8, worldRect.height - cardRect.height - 8));

        const finalLeft = clamp(
          islandCenterX - cardRect.width / 2,
          8,
          Math.max(8, worldRect.width - cardRect.width - 8),
        );
        card.style.left = `${finalLeft}px`;
        card.style.top = `${top}px`;
      }

          if (e.buttons !== 1) return; // 仅左键按住时
          const moved = Math.hypot(e.clientX - downX, e.clientY - downY);
          if (moved > CLICK_TOLERANCE) didDrag = true;
        });

        world.addEventListener('pointerup', async (e) => {
          if (e.button !== 0) return;
          if (isTutorialWorldIslandSelectionLocked?.()) return;

          // ✅ 如果是拖拽结束：不做任何选中/取消操作（保留当前选中）
          if (didDrag) return;

          const upIsland = islandUnderPointer(e);

          // 点到空白：取消选中（并隐藏 Chat）
          if (!upIsland) {
            deselectIsland();
            return;
          }

          // 必须按下和抬起在同一个岛上才算“点击岛屿”
          if (!downIsland || upIsland !== downIsland) return;

          // 再点一次同一个：取消
          if (selectedIsland === upIsland) {
            deselectIsland();
            return;
          }

          // 切换选中
          if (selectedIsland) selectedIsland.classList.remove('selected');
          selectedIsland = upIsland;
          selectedIsland.classList.add('selected');

          renderIslandInfoCard(selectedIsland.dataset.islandId || '');
          updateIslandInfoCardPosition();
          emitTutorialEvent?.('world_island_selected');

          showChatTabForIsland(selectedIsland.dataset.islandId || 'Chat');
          // showTab(4); // 可选：自动切到 Chat

          await switchRoom(roomIdFromIslandId(selectedIsland.dataset.islandId));
        });

        // ✅ 关键：移除/不要再用 “click 点空白取消选中”
        // 因为拖拽也可能触发 click，导致误取消
        // （上面 pointerup 已经处理了点空白取消）
      }

      function showChatTabForIsland(islandId) {
        const chatHeader = document.getElementById('tab-header4');
        chatHeader.textContent = islandId; // tab 显示岛屿名字
        chatHeader.style.display = 'block'; // 显示 Chat tab
        updateChatQuestionPrompt(roomIdFromIslandId(islandId));
      }

      function hideChatTab() {
        const chatHeader = document.getElementById('tab-header4');
        chatHeader.style.display = 'none';
        chatHeader.textContent = I18N[currentLang]?.chat || 'Chat'; // 可选：恢复默认字样
      }

      function roomIdFromIslandId(id) {
        return String(id)
          .trim()
          .replace(/[\/#\.\$\[\]]/g, '_');
      }

      function islandIdFromRoomId(roomId) {
        const cleanRoomId = String(roomId || '').trim();
        const match = worldData?.islands?.find(
          (island) => roomIdFromIslandId(island.id) === cleanRoomId,
        );
        return match?.id || '';
      }

      function clearChatUI() {
        const canvas = chatCanvas();
        if (!canvas) return;

        resetPendingSnapState();
        activeSymbol = null;
        activeEmoji = null;
        clickOnlySymbol = null;
        clickOnlyEmoji = null;

        for (const symbol of symbolById.values()) {
          removeChatSymbolElement(symbol);
        }
        for (const emoji of emojiById.values()) {
          removeChatEmojiElement(emoji);
        }

        symbolById = new Map();
        emojiById = new Map();
        roomObjDataById = new Map();

        // remove only chat objects, keep marquee box and other overlays
        canvas
          .querySelectorAll(
            '.symbol-label, .symbol, .dot, .typing-effect, .removable, .progress-ring',
          )
          .forEach((el) => el.remove());
      }

      async function switchRoom(roomId) {
        saveChatViewportState();
        currentRoomId = roomId;
        const presenceIslandId = selectedIsland?.dataset?.islandId || islandIdFromRoomId(roomId);
        if (presenceIslandId) updateWorldPresence(presenceIslandId);
        updateChatQuestionPrompt(roomId);
        if (roomObjsUnsubscribe) {
          roomObjsUnsubscribe();
          roomObjsUnsubscribe = null;
        }
        clearChatUI();
        loadObj();
        return;
        saveChatViewportState();
        currentRoomId = roomId;
        clearChatUI(); // 你自己实现：把当前聊天室渲染出来的 emoji/symbol/dot 清掉
        await loadObj(); // 从 rooms/{roomId}/objs 重新加载
        if (tabHeadersActivated[4]) {
          requestAnimationFrame(() => restoreChatViewportState());
        }
      }
    </script>
  </body>
</html>
