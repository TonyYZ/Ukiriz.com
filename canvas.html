      function updateChatMiniMap() {
        const box = document.getElementById('chatMinimap');
        const canvas = document.getElementById('chatMinimapCanvas');
        const viewport = document.getElementById('chatMinimapViewport');
        const tab = tab4 || document.getElementById('tab4');
        const surface = chatCanvas();
        if (!box || !canvas || !viewport || !tab || !surface) return;
        ensureChatAnchorLayer();

        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        const zoom = getCanvasZoom(surface) || 1;
        const width = canvas.width;
        const height = canvas.height;
        const inset = 8;
        const items = getChatMiniMapItems();
        const contentLeft = tab.scrollLeft / zoom;
        const contentTop = tab.scrollTop / zoom;
        const contentRight = contentLeft + tab.clientWidth / zoom;
        const contentBottom = contentTop + tab.clientHeight / zoom;

        let minX = contentLeft;
        let minY = contentTop;
        let maxX = contentRight;
        let maxY = contentBottom;

        for (const el of items) {
          const left = parseFloat(el.style.left) || 0;
          const top = parseFloat(el.style.top) || 0;
          const rect = el.getBoundingClientRect();
          const itemW = (rect.width || el.offsetWidth || 18) / zoom;
          const itemH = (rect.height || el.offsetHeight || 18) / zoom;
          minX = Math.min(minX, left);
          minY = Math.min(minY, top);
          maxX = Math.max(maxX, left + itemW);
          maxY = Math.max(maxY, top + itemH);
        }

        const pad = 180;
        minX = Math.max(0, minX - pad);
        minY = Math.max(0, minY - pad);
        const worldMaxX = Math.max(surface.scrollWidth / zoom, contentRight);
        const worldMaxY = Math.max(surface.scrollHeight / zoom, contentBottom);
        maxX = Math.min(worldMaxX, maxX + pad);
        maxY = Math.min(worldMaxY, maxY + pad);

        const worldW = Math.max(tab.clientWidth / zoom, maxX - minX, 1);
        const worldH = Math.max(tab.clientHeight / zoom, maxY - minY, 1);
        const scale = Math.min((width - inset * 2) / worldW, (height - inset * 2) / worldH);
        const offsetX = (width - worldW * scale) / 2;
        const offsetY = (height - worldH * scale) / 2;

        chatMiniMapTransform = { minX, minY, scale, offsetX, offsetY };

        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#edf7fb';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = 'rgba(0, 176, 240, 0.08)';
        ctx.fillRect(offsetX, offsetY, worldW * scale, worldH * scale);

        for (const el of items) {
          const left = parseFloat(el.style.left) || 0;
          const top = parseFloat(el.style.top) || 0;
          const rect = el.getBoundingClientRect();
          const itemW = Math.max(4, ((rect.width || el.offsetWidth || 18) / zoom) * scale);
          const itemH = Math.max(4, ((rect.height || el.offsetHeight || 18) / zoom) * scale);
          const x = offsetX + (left - minX) * scale;
          const y = offsetY + (top - minY) * scale;

          const isSelected =
            el.classList.contains('framed') || el.classList.contains('active') || el.selected;
          ctx.fillStyle = el.classList.contains('symbol')
            ? isSelected
              ? '#00b0f0'
              : '#30343f'
            : isSelected
              ? '#00b0f0'
              : '#8a8f9d';
          ctx.fillRect(x, y, itemW, itemH);
        }

        const viewX = offsetX + (contentLeft - minX) * scale;
        const viewY = offsetY + (contentTop - minY) * scale;
        const viewW = (tab.clientWidth / zoom) * scale;
        const viewH = (tab.clientHeight / zoom) * scale;
        viewport.style.left = `${viewX}px`;
        viewport.style.top = `${viewY}px`;
        viewport.style.width = `${Math.max(10, viewW)}px`;
        viewport.style.height = `${Math.max(10, viewH)}px`;
      }

      function jumpChatViewportFromMiniMap(clientX, clientY) {
        const canvas = document.getElementById('chatMinimapCanvas');
        const tab = tab4 || document.getElementById('tab4');
        const surface = chatCanvas();
        if (!canvas || !tab || !surface || !chatMiniMapTransform) return;
        const zoom = getCanvasZoom(surface) || 1;

        const rect = canvas.getBoundingClientRect();
        const localX = clientX - rect.left;
        const localY = clientY - rect.top;
        const { minX, minY, scale, offsetX, offsetY } = chatMiniMapTransform;
        if (!scale) return;

        const worldX = minX + (localX - offsetX) / scale;
        const worldY = minY + (localY - offsetY) / scale;
        const maxLeft = Math.max(0, tab.scrollWidth - tab.clientWidth);
        const maxTop = Math.max(0, tab.scrollHeight - tab.clientHeight);
        const nextLeft = Math.max(0, Math.min(maxLeft, worldX * zoom - tab.clientWidth / 2));
        const nextTop = Math.max(0, Math.min(maxTop, worldY * zoom - tab.clientHeight / 2));

        tab.scrollLeft = nextLeft;
        tab.scrollTop = nextTop;
        saveChatViewportState();
        scheduleChatMiniMapUpdate();

      function getDensestChatViewportCenter(tab, items) {
        if (!items.length) return null;

        const viewportW = tab.clientWidth || 800;
        const viewportH = tab.clientHeight || 600;
        const halfW = viewportW / 2;
        const halfH = viewportH / 2;

        const centers = items.map((el) => {
          const left = parseFloat(el.style.left) || 0;
          const top = parseFloat(el.style.top) || 0;
          const width = el.offsetWidth || 0;
          const height = el.offsetHeight || 0;
          return {
            x: left + width / 2,
            y: top + height / 2,
          };
        });

        let best = null;

        for (const pivot of centers) {
          const cluster = centers.filter(
            (pt) => Math.abs(pt.x - pivot.x) <= halfW && Math.abs(pt.y - pivot.y) <= halfH,
          );

          const avgX = cluster.reduce((sum, pt) => sum + pt.x, 0) / cluster.length;
          const avgY = cluster.reduce((sum, pt) => sum + pt.y, 0) / cluster.length;

          if (
            !best ||
            cluster.length > best.count ||
            (cluster.length === best.count &&
              Math.hypot(avgX - pivot.x, avgY - pivot.y) < best.scatter)
          ) {
            best = {
              count: cluster.length,
              x: avgX,
              y: avgY,
              scatter: Math.hypot(avgX - pivot.x, avgY - pivot.y),
            };
          }
        }

        return best ? { x: best.x, y: best.y } : null;
      }

      function hash32(uid) {
        // FNV-1a 32-bit hash (stable, decent distribution)
        let h = 0x811c9dc5;
        for (let i = 0; i < uid.length; i++) {
          h ^= uid.charCodeAt(i);
          h = Math.imul(h, 0x01000193);
        }
        return h >>> 0; // unsigned
      }

      function generateColor(uid) {
        const h = hash32(uid);

        // Use a stable "index" from hash (0..65535)
        const idx = h & 0xffff;

        // Golden angle spread
        const GOLDEN_ANGLE = 137.50776405003785;
        const hue = (idx * GOLDEN_ANGLE) % 360;

        // Optional: vary sat/light a bit to further separate close hues
        const sat = 62 + ((h >>> 16) % 18); // 62..79
        const light = 48 + ((h >>> 24) % 18); // 48..65

        return `hsl(${hue.toFixed(0)}, ${sat}%, ${light}%)`;
      }

          if (now - lastSeenMs > WORLD_PRESENCE_STALE_MS) return;

      function renderWorldPresence(entries = []) {
        const content = document.getElementById('worldContent');
        if (!content) return;
        currentWorldPresenceEntries = entries;
        content.querySelectorAll('.island-presence-lines').forEach((el) => el.remove());
        if (!worldRendered) return;

        const byIsland = new Map();
        entries.forEach((entry) => {
          if (!byIsland.has(entry.islandId)) byIsland.set(entry.islandId, []);
          byIsland.get(entry.islandId).push(entry);
        });

        byIsland.forEach((users, islandId) => {
          const island = Array.from(content.querySelectorAll('svg.island')).find(
            (el) => el.dataset.islandId === islandId,
          );
          if (!island) return;
          const marker = document.createElement('div');
          marker.className = 'island-presence-lines';

          const islandLeft = parseFloat(island.style.left) || 0;
          const islandTop = parseFloat(island.style.top) || 0;
          const islandWidth = parseFloat(island.getAttribute('width')) || island.offsetWidth || 0;
          const islandHeight =
            parseFloat(island.getAttribute('height')) || island.offsetHeight || 0;
          const islandData = worldData?.islands?.find((item) => item.id === islandId);
          const blocks = Array.isArray(islandData?.blocks) ? islandData.blocks : [];
          const minBlockX = blocks.length ? Math.min(...blocks.map((block) => block.x)) : 0;
          const minBlockY = blocks.length ? Math.min(...blocks.map((block) => block.y)) : 0;
          const blockSize = 20;
          const pad = 5;

          marker.style.left = `${islandLeft}px`;
          marker.style.top = `${islandTop}px`;
          marker.style.width = `${islandWidth}px`;
          marker.style.height = `${islandHeight}px`;

          users
            .slice()
            .sort((a, b) => a.uid.localeCompare(b.uid))
            .slice(0, 24)
            .forEach((user) => {
              const seed = hash32(`${islandId}:${user.uid}`);
              const block = blocks.length > 0 ? blocks[seed % blocks.length] : { x: 0, y: 0 };
              const jitterX = (((seed >>> 8) % 900) / 900 - 0.5) * 9;
              const jitterY = (((seed >>> 18) % 900) / 900 - 0.5) * 7;
              const x = blocks.length
                ? (block.x - minBlockX + 0.5) * blockSize + pad + jitterX
                : islandWidth / 2 + jitterX;
              const y = blocks.length
                ? (block.y - minBlockY + 0.72) * blockSize + pad + jitterY
                : islandHeight / 2 + jitterY;

              const person = document.createElement('span');
              person.className = 'island-presence-person';
              person.style.left = `${clamp(x, 8, Math.max(8, islandWidth - 8))}px`;

        const isFullySelected = grpArray.every((s) => selectedSymbols.has(s));

      function trackSymbolOp(ids, promise) {
        const trackedIds = (ids || []).filter(Boolean);
        for (const id of trackedIds) {
          if (!pendingOpsBySymbolId.has(id)) {
            pendingOpsBySymbolId.set(id, new Set());
          }
          pendingOpsBySymbolId.get(id).add(promise);
        }

        promise.finally(() => {
          for (const id of trackedIds) {
            const set = pendingOpsBySymbolId.get(id);
            if (!set) continue;
            set.delete(promise);
            if (set.size === 0) pendingOpsBySymbolId.delete(id);
          }
        });

        return promise;
      }

      async function waitForPendingSymbolOps(ids) {
        const ops = [];
        for (const id of ids || []) {
          const set = pendingOpsBySymbolId.get(id);
          if (!set) continue;
          ops.push(...set);
        }
        if (ops.length) {
          await Promise.allSettled(ops);
        }

      function removeChatSymbolElement(symbol) {
        if (!symbol) return;

        if (activeSymbol === symbol) activeSymbol = null;
        if (clickOnlySymbol === symbol) clickOnlySymbol = null;

        // Keep expression-group bookkeeping consistent.
        if (symbol._expressionGroupId) {
          const grp = expressionGroups.get(symbol._expressionGroupId);
          if (grp) {
            grp.delete(symbol);
            if (grp.size === 0) expressionGroups.delete(symbol._expressionGroupId);
          }
          symbol._expressionGroupId = null;
        }

        selectedSymbols.delete(symbol);
        symbol.selected = false;
        symbol.classList.remove('framed');

        if (symbol.dot) {
          symbol.dot.remove();
          symbol.dot = null;
        }

        currentGraph.removeSymbol(symbol);
        symbol.remove();
        scheduleChatMiniMapUpdate?.();

      function adoptExistingChatSymbol(existing, symbol) {
        if (!existing || existing === symbol) return;

        const existingSelected = selectedSymbols.has(existing);
        const existingWasActive = activeSymbol === existing;
        const existingWasClickOnly = clickOnlySymbol === existing;

        if (existing.dot && !symbol.dot) {
          symbol.dot = existing.dot;
          symbol.dot.parent = symbol;
        } else if (existing.dot) {
          existing.dot.remove();
        }

        removeChatSymbolElement(existing);

        if (existingSelected) {
          symbol.selected = true;
          symbol.classList.add('framed');
          selectedSymbols.add(symbol);
        }
        if (existingWasActive) {
          activeSymbol = symbol;
        }
        if (existingWasClickOnly) {
          clickOnlySymbol = symbol;
        }
      }

      function adoptExistingChatEmoji(existing, emoji) {

        const existingSelected = selectedEmojis.has(existing);
        const existingWasActive = activeEmoji === existing;
        const existingWasClickOnly = clickOnlyEmoji === existing;

        removeChatEmojiElement(existing);

        if (existingSelected) {

          emoji.classList.add('active');
          selectedEmojis.add(emoji);

        if (existingWasActive) {

              const aConns = currentGraph.getSymbolConnections(a);

              if (!aConns || !bConns) continue;

              if (!aConns[lk.mySide].some(([nbr, s]) => nbr === b && s === lk.otherSide)) {
                aConns[lk.mySide].push([b, lk.otherSide]);
              }
              if (!bConns[lk.otherSide].some(([nbr, s]) => nbr === a && s === lk.mySide)) {
                bConns[lk.otherSide].push([a, lk.mySide]);
              }
            }
          }
        }

      async function applyRoomSnapshot(querySnapshot, roomId) {
        if (roomId !== currentRoomId) return;

        for (const change of querySnapshot.docChanges()) {
          const docId = change.doc.id;
          const data = change.doc.data();

          if (change.type === 'removed') {
            const prev = roomObjDataById.get(docId);
            roomObjDataById.delete(docId);

            if ((prev?.type || data?.type) === 'annoLink') {
              const lk = annoLinkById.get(docId);
              if (lk?.fromEmojiId) annoChildToParent.delete(lk.fromEmojiId);
              annoLinkById.delete(docId);
              scheduleAnnotationLinksUpdate?.();
              continue;
            }

            if ((prev?.type || data?.type) === 'symbol') {
              removeChatSymbolElement(symbolById.get(docId));
              symbolById.delete(docId);
            } else {
              removeChatEmojiElement(emojiById.get(docId));
              emojiById.delete(docId);
            }
            continue;
          }

          const existingSymbol = symbolById.get(docId);
          if (
            data.type === 'symbol' &&
            existingSymbol &&
            shouldSuppressRemoteVisualUpdate(existingSymbol, data.ownerUid || '')
          ) {
            const prev = roomObjDataById.get(docId) || {};
            roomObjDataById.set(docId, {
              ...data,
              links: prev.links ?? data.links ?? [],
            });
          } else {
            roomObjDataById.set(docId, data);
          }

          if (data.type === 'emoji') {
            await upsertChatEmojiFromDoc(docId, data);
          } else if (data.type === 'symbol') {
            await upsertChatSymbolFromDoc(docId, data);
          } else if (data.type === 'annoLink') {
            upsertAnnotationLinkLocal(docId, data.content || {});
          }
        }

        if (!hasLocalChatDragInProgress()) {
          rebuildChatSymbolLinks();
        }

        scheduleChatMiniMapUpdate();

        if (pendingChatViewportRestoreRoomId === roomId) {
          pendingChatViewportRestoreRoomId = null;
          if (tabHeadersActivated[4]) {
            requestAnimationFrame(() => restoreChatViewportState());
          }
        }

      async function deleteChatSelectionBatch(roomId, symbolIds, emojiIds) {
        const symbolSet = new Set((symbolIds || []).filter(Boolean));
        const emojiSet = new Set((emojiIds || []).filter(Boolean));
        if (!symbolSet.size && !emojiSet.size) return;

        pendingDeleteCommits += 1;
        try {
          const batch = writeBatch(db);
          const processedLinkRemovals = new Set();

          for (const symbolId of symbolSet) {
            const links = await getSymbolLinksForDelete(symbolId, roomId);
            for (const lk of links) {
              const otherId = lk?.otherId;
              if (!otherId || symbolSet.has(otherId)) continue;

              const key = `${otherId}|${lk.otherSide}|${symbolId}|${lk.mySide}`;
              if (processedLinkRemovals.has(key)) continue;
              processedLinkRemovals.add(key);

              batch.update(objDocRef(otherId, roomId), {
                links: arrayRemove({
                  otherId: symbolId,
                  mySide: lk.otherSide,
                  otherSide: lk.mySide,
                }),
              });
            }
            batch.delete(objDocRef(symbolId, roomId));
          }

          for (const emojiId of emojiSet) {
            batch.delete(objDocRef(emojiId, roomId));
          }

          await batch.commit();
        } finally {
          pendingDeleteCommits = Math.max(0, pendingDeleteCommits - 1);
        }
      }

      class PatternGraph {
        constructor() {
          this.nodes = []; // [{elemIdTrue,isDynamic,angle}]
          this.adj = []; // adj[i][side] = [[j, jSide], ...]
        }

        addNode(info) {
          const idx = this.nodes.length;
          this.nodes.push(info);
          this.adj.push([[], [], [], [], [], []]);
          return idx;
        }

        addEdge(i, side, j, jSide) {
          this.adj[i][side].push([j, jSide]);
        }

        size() {
          return this.nodes.length;
        }
      }

      function serializePatternGraph(pattern) {
        if (!pattern) return null;

        // pattern can be a PatternGraph instance or a plain object with same shape
        const nodes = Array.isArray(pattern.nodes)
          ? pattern.nodes.map((n) => ({
              elemIdTrue: n.elemIdTrue ?? null,
              isDynamic: !!n.isDynamic,
              angle: n.angle ?? 0,
              relLeft: n.relLeft ?? null,
              relTop: n.relTop ?? null,
            }))
          : [];

        const edges = [];

        // pattern.adj[i][side] = [[j, jSide], ...]
        const adj = Array.isArray(pattern.adj) ? pattern.adj : [];
        for (let i = 0; i < adj.length; i++) {
          const sides = Array.isArray(adj[i]) ? adj[i] : [];
          for (let side = 0; side < sides.length; side++) {
            const list = Array.isArray(sides[side]) ? sides[side] : [];
            for (const pair of list) {
              if (!Array.isArray(pair) || pair.length < 2) continue;
              const [j, jSide] = pair;

              edges.push({
                from: i,
                fromSide: side,
                to: j,
                toSide: jSide,
              });
            }
          }
        }

        return { nodes, edges };
      }

      function deserializePatternGraph(raw) {
        if (!raw || !Array.isArray(raw.nodes)) return null;

        const pg = new PatternGraph();

        for (const n of raw.nodes) {
          pg.addNode({
            elemIdTrue: n.elemIdTrue,
            isDynamic: !!n.isDynamic,
            angle: n.angle ?? 0,
            relLeft: n.relLeft ?? null,
            relTop: n.relTop ?? null,
          });
        }

        if (Array.isArray(raw.edges)) {
          for (const e of raw.edges) {
            if (
              typeof e?.from !== 'number' ||
              typeof e?.fromSide !== 'number' ||
              typeof e?.to !== 'number' ||
              typeof e?.toSide !== 'number'
            )
              continue;

            // Optional bounds check
            if (e.from < 0 || e.from >= pg.nodes.length) continue;
            if (e.to < 0 || e.to >= pg.nodes.length) continue;
            if (e.fromSide < 0 || e.fromSide > 5) continue;
            if (e.toSide < 0 || e.toSide > 5) continue;

            pg.addEdge(e.from, e.fromSide, e.to, e.toSide);
          }
        }

        return pg;
      }

      function serializeSelectionLayout(layout) {
        if (!layout || !Array.isArray(layout.nodes)) return null;

        return {
          nodes: layout.nodes.map((n) => ({
            elemId: n.elemId ?? null,
            elemIdTrue: n.elemIdTrue ?? null,
            angle: n.angle ?? 0,
            isDynamic: !!n.isDynamic,
            color: n.color ?? null,
            left: n.left ?? 0,
            top: n.top ?? 0,
          })),
          links: Array.isArray(layout.links)
            ? layout.links.map((l) => ({
                from: l.from,
                fromSide: l.fromSide,
                to: l.to,
                toSide: l.toSide,
              }))
            : [],
        };
      }

      function deserializeSelectionLayout(raw) {
        if (!raw || !Array.isArray(raw.nodes)) return null;

        return {
          nodes: raw.nodes.map((n) => ({
            elemId: n.elemId ?? n.elemIdTrue ?? null,
            elemIdTrue: n.elemIdTrue ?? n.elemId ?? null,
            angle: n.angle ?? 0,
            isDynamic: !!n.isDynamic,
            color: n.color ?? null,
            left: n.left ?? 0,
            top: n.top ?? 0,
          })),
          links: Array.isArray(raw.links)
            ? raw.links
                .filter(
                  (l) =>
                    typeof l?.from === 'number' &&
                    typeof l?.fromSide === 'number' &&
                    typeof l?.to === 'number' &&
                    typeof l?.toSide === 'number',
                )
                .map((l) => ({
                  from: l.from,
                  fromSide: l.fromSide,
                  to: l.to,
                  toSide: l.toSide,
                }))
            : [],
        };
      }

      class SymbolGraph {
        constructor() {
          this.map = new Map(); // Maps symbol to its adjacency list
        }

        addSymbol(symbol, connections) {
          this.map.set(symbol, connections); // connections = [[], [], (n, j), [], [], []]
        }

        getSymbolConnections(symbol) {
          return this.map.get(symbol) || null; // Return connections or null if not found
        }

        getSymbols() {
          return Array.from(this.map.keys()); // Return all symbols in the graph
        }

        hasSymbol(symbol) {
          return this.map.has(symbol);
        }

        // ✅ 删除节点 + 清理所有引用它的边
        removeSymbol(symbol) {
          if (!this.map.has(symbol)) return;

          // 1) 先从所有其他节点的邻接表中移除指向 symbol 的边
          for (const [node, conns] of this.map.entries()) {
            if (node === symbol) continue;
            for (let side = 0; side < 6; side++) {
              const arr = conns[side];
              if (!Array.isArray(arr) || arr.length === 0) continue;

              // 每个元素形如 [neighbor, neighborSide]
              conns[side] = arr.filter(([nbr, _nbrSide]) => nbr !== symbol);
            }
            this.map.set(node, conns);
          }

          // 2) 再删除 symbol 自己
          this.map.delete(symbol);

        pruneDetachedSymbols() {
          for (const sym of this.map.keys()) {
            if (!sym || !sym.isConnected) {
              this.removeSymbol(sym);
            }
          }
        }

        doesMatch(storedGraph, currSymbol, matchedSymbols) {
          if (matchedSymbols.size === storedGraph.map.size) return true; // Full match found

          for (let [storedSymbol] of storedGraph.map.entries()) {
            if (matchedSymbols.has(storedSymbol)) continue; // Already matched

            if (this.isSymbolMatch(currSymbol, storedSymbol)) {
              console.log(`Matching: ${currSymbol.elemIdTrue} ↔ ${storedSymbol.elemIdTrue}`);
              matchedSymbols.set(storedSymbol, currSymbol);

              let isValid = true;

              // Check all six sides
              for (let i = 0; i < 6; i++) {
                let storedNeighbors = storedGraph.map.get(storedSymbol)[i] || [];
                let currNeighbors = this.map.get(currSymbol)?.[i] || [];

                if (storedNeighbors.length > currNeighbors.length) {
                  console.log(
                    'Stored neighbor:' + storedNeighbors + ' Current neighbor:' + currNeighbors,
                  );
                  console.log(`Mismatch at side ${i}: Not enough neighbors`);
                  isValid = false;
                  break;

                let foundAll = true;
                for (let [storedNeighbor, storedSide] of storedNeighbors) {
                  let foundMatch = false;

                  for (let [currNeighbor, currSide] of currNeighbors) {
                    if (
                      currSide === storedSide &&
                      this.isSymbolMatch(currNeighbor, storedNeighbor)

                      if (
                        matchedSymbols.has(currNeighbor) ||

            storedSymbol &&

      function snapshotSelectionAsPattern(fullGraph, selectedSymbols) {
        const g = new PatternGraph();
        const indexOf = new Map(); // DOM symbol -> node index
        let minLeft = Infinity;
        let minTop = Infinity;

        for (const sym of selectedSymbols) {
          minLeft = Math.min(minLeft, parseFloat(sym.style.left) || 0);
          minTop = Math.min(minTop, parseFloat(sym.style.top) || 0);
        }

        // 1) 节点
        for (const sym of selectedSymbols) {
          indexOf.set(
            sym,
            g.addNode({
              elemIdTrue: sym.elemIdTrue,
              isDynamic: !!sym.isDynamic,
              angle: sym.angle,
              relLeft: (parseFloat(sym.style.left) || 0) - minLeft,
              relTop: (parseFloat(sym.style.top) || 0) - minTop,
            }),
          );
        }

        // 2) 边（只保留选中内部的边）
        for (const sym of selectedSymbols) {
          const i = indexOf.get(sym);
          const conns = fullGraph.getSymbolConnections(sym);
          if (!conns) continue;

          for (let side = 0; side < 6; side++) {
            for (const [nbr, nbrSide] of conns[side]) {
              if (!selectedSymbols.has(nbr)) continue;
              const j = indexOf.get(nbr);
              g.addEdge(i, side, j, nbrSide);
            }
          }
        }

        return g;

      function snapshotSelectionAsLayout(fullGraph, selectedSymbols) {
        const orderedSymbols = Array.from(selectedSymbols);
        const indexOf = new Map(orderedSymbols.map((symbol, index) => [symbol, index]));
        const links = [];

        orderedSymbols.forEach((symbol, from) => {

          for (let fromSide = 0; fromSide < conns.length; fromSide++) {
            for (const [neighbor, toSide] of conns[fromSide]) {
              const to = indexOf.get(neighbor);
              if (to == null || from >= to) continue;
              links.push({ from, fromSide, to, toSide });

        return {

          matches.push(m);

          // consume matched symbols so we can find another disjoint instance
          for (const s of m) remaining.delete(s);

          if (remaining.size === 0) break;

      function getConnectedSymbolComponents(symbols, graph) {
        const symbolSet = symbols instanceof Set ? symbols : new Set(symbols);
        const components = [];
        const visited = new Set();

        for (const start of symbolSet) {
          if (visited.has(start)) continue;

          const component = new Set();
          const stack = [start];
          visited.add(start);

          while (stack.length > 0) {
            const symbol = stack.pop();
            component.add(symbol);

            const conns = graph.getSymbolConnections(symbol) || [[], [], [], [], [], []];
            for (const side of conns) {
              for (const [neighbor] of side) {
                if (!symbolSet.has(neighbor) || visited.has(neighbor)) continue;
                visited.add(neighbor);
                stack.push(neighbor);
              }
            }
          }

          components.push(component);
        }

        return components;

        const n = sel.length;
        const m = pattern.nodes.length;

        const indexOf = new Map(sel.map((s, i) => [s, i]));
        const selAdj = sel.map(() => [[], [], [], [], [], []]);

        for (let i = 0; i < n; i++) {
          const conns = currentGraph.getSymbolConnections(sel[i]) || [[], [], [], [], [], []];
          for (let side = 0; side < 6; side++) {
            for (const [nbr, nbrSide] of conns[side]) {
              if (!indexOf.has(nbr)) continue;
              selAdj[i][side].push([indexOf.get(nbr), nbrSide]);
            }
          }
        }

        const usedSel = new Array(n).fill(false);
        const mapPtoS = new Array(m).fill(-1); // pattern node -> selected index

        function nodeMatch(si, pi) {
          const s = sel[si];
          const p = pattern.nodes[pi];
          return (
            s &&
            s.elemIdTrue === p.elemIdTrue &&
            !!s.isDynamic === !!p.isDynamic &&
            s.angle === p.angle

        function backtrack(pi) {
          if (pi === m) return true;

          for (let si = 0; si < n; si++) {
            if (usedSel[si]) continue;
            if (!nodeMatch(si, pi)) continue;

            // 尝试把 pattern pi 映射到 selected si
            mapPtoS[pi] = si;
            usedSel[si] = true;

            // 校验：pattern pi 已经指向的邻居（那些已被映射的）必须在 selAdj 里存在
            let ok = true;
            for (let side = 0; side < 6 && ok; side++) {

                if (!arr.some(([nbrIndex, nbrSide]) => nbrIndex === sj && nbrSide === pjSide)) {

            if (ok && backtrack(pi + 1)) return true;

          }

        // 返回匹配到的 DOM symbols 集合
        const matched = new Set();
        for (let pi = 0; pi < m; pi++) matched.add(sel[mapPtoS[pi]]);
        return matched;

            symbol.innerHTML = symbolData[1];
          }
        } else if (symbol.elemId === 6) {
          if (symbol.angle === 90) {
            symbol.elemId = 3;
            symbol.innerHTML = symbolData[3];
          }
          if (symbol.angle === 270) {
            symbol.elemId = 3;
            symbol.innerHTML = symbolData[3];
          }
        }

        symbol.style.transform = `rotate(${symbol.angle}deg)`;
        dyeColor(symbol, symbol.color);
      }

      async function persistSymbolVisualState(symbol, includePosition = false) {
        if (!symbol?.dataset?.id) return;

        const patch = {
          'content.angle': symbol.angle,
          'content.elemId': symbol.elemId,
        };

        if (includePosition) {
          patch.x = parseFloat(symbol.style.left);
          patch.y = parseFloat(symbol.style.top);
        }

        if (symbol.isDynamic && symbol.dot) {
          updateDotPositionLocal(symbol.dot);
          patch['content.dotX'] = parseFloat(symbol.dot.style.left);
          patch['content.dotY'] = parseFloat(symbol.dot.style.top);
        }

        await updateSymbolState(symbol.dataset.id, patch);
      }

      function snapshotSymbolConnections(symbol) {
        return (currentGraph.getSymbolConnections(symbol) || []).map((arr) => arr.slice());
      }

      async function syncSymbolLinksRemote(symbol, previousSnapshot) {
        const aId = symbol?.dataset?.id;
        if (!aId) return;

        const oldKeys = new Set();
        const newKeys = new Set();

        for (let side = 0; side < (previousSnapshot || []).length; side++) {
          for (const [nbr, nbrSide] of previousSnapshot[side] || []) {
            const bId = nbr?.dataset?.id;
            if (!bId) continue;
            oldKeys.add(`${side}|${bId}|${nbrSide}`);
          }
        }

        const currentSnapshot = snapshotSymbolConnections(symbol);
        for (let side = 0; side < currentSnapshot.length; side++) {
          for (const [nbr, nbrSide] of currentSnapshot[side] || []) {
            const bId = nbr?.dataset?.id;
            if (!bId) continue;
            newKeys.add(`${side}|${bId}|${nbrSide}`);
          }
        }

        for (const key of oldKeys) {
          if (newKeys.has(key)) continue;
          const [side, bId, nbrSide] = key.split('|');
          await removeLink(aId, Number(side), bId, Number(nbrSide));
        }

        for (const key of newKeys) {
          if (oldKeys.has(key)) continue;
          const [side, bId, nbrSide] = key.split('|');
          await persistLink(aId, Number(side), bId, Number(nbrSide));
        }
      }

      async function trySnapAndCommitSymbol(symbol, inChat = false) {
        resetPendingSnapState();
        checkConnections(symbol);

        let snapped = false;
        const linksToCommit = pendingSnapLinks.filter((link) => link.active === symbol);
        if (linksToCommit.length > 0) {
          for (const link of linksToCommit) {
            if (violatesConflicts(link.target, link.targetSide)) continue;
            commitLink(link.active, link.activeSide, link.target, link.targetSide);
            snapped = true;

            if (inChat) {
              const aId = link.active.dataset?.id;
              const bId = link.target.dataset?.id;
              if (aId && bId) {
                await persistLink(aId, link.activeSide, bId, link.targetSide);
              }
            }
          }
        } else if (readyActive === symbol && readyTarget) {
          if (!violatesConflicts(readyTarget, readyTargetSide)) {
            commitLink(readyActive, readyActiveSide, readyTarget, readyTargetSide);
            snapped = true;

            if (inChat) {
              const aId = readyActive.dataset?.id;
              const bId = readyTarget.dataset?.id;
              if (aId && bId) {
                await persistLink(aId, readyActiveSide, bId, readyTargetSide);
              }
            }
          }
        }

        resetPendingSnapState();
        return snapped;
      }

      function isConnectionAlignedByPlacement(a, aSide, b, bSide, tolerance = 4) {
        if (!a || !b) return false;

        const aLeft = parseFloat(a.style.left) || 0;
        const aTop = parseFloat(a.style.top) || 0;
        const bLeft = parseFloat(b.style.left) || 0;
        const bTop = parseFloat(b.style.top) || 0;

        if (getDir(a) === getDir(b)) {
          if (getDir(a) === 0) {
            if (aSide === Side.PAR_BOT && bSide === Side.PAR_TOP) {
              return (
                Math.abs(aLeft - bLeft) <= tolerance &&
                Math.abs(aTop - (bTop - (symbolHeight - 7) * symbolScale)) <= tolerance
              );
            }
            if (aSide === Side.PAR_TOP && bSide === Side.PAR_BOT) {
              return (
                Math.abs(aLeft - bLeft) <= tolerance &&
                Math.abs(aTop - (bTop + (symbolHeight - 4) * symbolScale)) <= tolerance
              );
            }
          } else {
            if (aSide === Side.PAR_BOT && bSide === Side.PAR_TOP) {
              return (
                Math.abs(aLeft - (bLeft - (symbolHeight - 7) * symbolScale)) <= tolerance &&
                Math.abs(aTop - bTop) <= tolerance
              );
            }
            if (aSide === Side.PAR_TOP && bSide === Side.PAR_BOT) {
              return (
                Math.abs(aLeft - (bLeft + (symbolHeight - 4) * symbolScale)) <= tolerance &&
                Math.abs(aTop - bTop) <= tolerance
              );
            }
          }
        }

        const aJ = getAbsJunctions(a)?.[aSide];
        const bJ = getAbsJunctions(b)?.[bSide];
        if (!aJ || !bJ) return false;
        return getDist(aJ.x, aJ.y, bJ.x, bJ.y) <= tolerance;
      }

      function pruneInvalidConnectionsForSymbol(symbol, tolerance = 4) {
        const conns = currentGraph.getSymbolConnections(symbol);
        if (!conns) return;

        for (let side = 0; side < conns.length; side++) {
          const lst = conns[side] || [];
          for (let i = lst.length - 1; i >= 0; i--) {
            const [nbr, nbrSide] = lst[i];
            if (isConnectionAlignedByPlacement(symbol, side, nbr, nbrSide, tolerance)) continue;

            lst.splice(i, 1);
            const back = currentGraph.getSymbolConnections(nbr)?.[nbrSide] || [];
            currentGraph.getSymbolConnections(nbr)[nbrSide] = back.filter(
              ([x, s]) => !(x === symbol && s === side),
            );
          }
        }
      }

      async function rotateConnectedSelection(symbols, addAngle, inChat = false) {
        const group = Array.from(symbols);
        if (group.length === 0) return;

        const groupSet = new Set(group);
        const centers = group.map((symbol) => ({
          symbol,
          x: (parseFloat(symbol.style.left) || 0) + (symbolWidth * symbolScale) / 2,
          y: (parseFloat(symbol.style.top) || 0) + (symbolHeight * symbolScale) / 2,
        }));

        const pivotX = centers.reduce((sum, item) => sum + item.x, 0) / centers.length;
        const pivotY = centers.reduce((sum, item) => sum + item.y, 0) / centers.length;

        for (const symbol of group) {
          cutConnectionsOutside(symbol, groupSet);
        }

        for (const { symbol, x, y } of centers) {
          const dx = x - pivotX;
          const dy = y - pivotY;
          const nextCenterX = pivotX - dy;
          const nextCenterY = pivotY + dx;

          symbol.style.left = `${nextCenterX - (symbolWidth * symbolScale) / 2}px`;
          symbol.style.top = `${nextCenterY - (symbolHeight * symbolScale) / 2}px`;
          applySymbolRotationLocal(symbol, addAngle);

          if (symbol.isDynamic && symbol.dot) {
            updateDotPositionLocal(symbol.dot);
          }
        }

        let snapped = false;
        groupDragActive = true;
        dragGroupSet = groupSet;
        pendingSnapDelta = null;
        resetPendingSnapState();

        for (const symbol of group) {
          checkConnections(symbol);
          if (pendingSnapDelta) break;
        }

        if (pendingSnapDelta) {
          applyDeltaToGroup(pendingSnapDelta.dx, pendingSnapDelta.dy);
          snapped = true;

          if (readyActive && readyTarget) {
            commitLink(readyActive, readyActiveSide, readyTarget, readyTargetSide);
            if (inChat) {
              const aId = readyActive.dataset?.id;
              const bId = readyTarget.dataset?.id;
              if (aId && bId) {
                await persistLink(aId, readyActiveSide, bId, readyTargetSide);
              }
            }
          }
        }

        groupDragActive = false;
        dragGroupSet = null;
        pendingSnapDelta = null;
        resetPendingSnapState();

        if (inChat) {
          for (const symbol of group) {
            await persistSymbolVisualState(symbol, true);
          }
        }

        return snapped;
      }

      async function updateDotPositionLocal(dot) {
        const symbol = dot.parent;

        const canvas = getCanvasForElem(symbol);
        if (!canvas) return;
        const zoom = getCanvasZoom(canvas) || 1;

        const canvasRect = canvas.getBoundingClientRect();
        const rect = symbol.getBoundingClientRect();

        // 把视口坐标 -> canvas 局部坐标
        const symLeft = (rect.left - canvasRect.left) / zoom;
        const symTop = (rect.top - canvasRect.top) / zoom;
        const symRight = (rect.right - canvasRect.left) / zoom;
        const symBottom = (rect.bottom - canvasRect.top) / zoom;

        let x, y;

        switch (symbol.angle) {
          case 0:
            x = symLeft + (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 5;
            y = symTop + dotOffsetYData[symbol.elemId] * symbolScale - 12;
            break;
          case 90:
            x = symRight - dotOffsetYData[symbol.elemId] * symbolScale;
            y = symTop + (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 10;
            break;
          case 180:
            x = symRight - (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 5;
            y = symBottom - dotOffsetYData[symbol.elemId] * symbolScale - 7;
            break;
          case 270:
            x = symLeft + dotOffsetYData[symbol.elemId] * symbolScale - 10;
            y = symBottom - (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 7;
            break;
        }

        dot.style.left = `${x}px`;
        dot.style.top = `${y}px`;
      }

      function countConnectedComponentsInSelection(selectedSymbols, graph) {
        const sel = selectedSymbols instanceof Set ? selectedSymbols : new Set(selectedSymbols);
        if (sel.size === 0) return 0;

        const visited = new Set();
        let components = 0;

        for (const start of sel) {
          if (visited.has(start)) continue;

          components++;
          // BFS
          const queue = [start];
          visited.add(start);

          while (queue.length) {
            const node = queue.pop();
            const conns = graph.getSymbolConnections(node);
            if (!conns) continue;

            for (let side = 0; side < 6; side++) {
              const neighbors = conns[side] || [];
              for (const [nbr, _nbrSide] of neighbors) {
                if (!sel.has(nbr)) continue; // searching scope is limited to the selected symbols
                if (visited.has(nbr)) continue;
                visited.add(nbr);
                queue.push(nbr);
              }
            }
          }
        }

        return components;
      }

      function isSelectionConnected(selectedSymbols, graph) {
        return countConnectedComponentsInSelection(selectedSymbols, graph) <= 1;
      }

      function inferExpressionLang(word, why) {
        const text = `${word || ''} ${why || ''}`;
        if (/[\u3400-\u9fff]/.test(text)) return 'zh';
        if (/[A-Za-z]/.test(text)) return 'en';
        return '';
      }

      function getExpressionSourceLang(exprLang, word, why) {
        const inferred = inferExpressionLang(word, why);
        if (inferred) return inferred;
        return exprLang === 'en' || exprLang === 'zh' ? exprLang : '';
      }

      function shouldOfferExpressionTranslation(sourceLang) {
        return !!sourceLang && sourceLang !== currentLang;
      }

      const translationCache = new Map();
      const TRANSLATION_CACHE_STORAGE_KEY = 'ukiriz.translationCache.v1';

      function loadTranslationCache() {
        try {
          const raw = localStorage.getItem(TRANSLATION_CACHE_STORAGE_KEY);
          if (!raw) return;
          const entries = JSON.parse(raw);
          if (!Array.isArray(entries)) return;
          for (const [key, value] of entries) {
            if (value && typeof value === 'object') translationCache.set(key, value);
          }
        } catch (e) {
          console.warn('loadTranslationCache failed:', e);
        }
      }

      function saveTranslationCache() {
        try {
          const resolved = Array.from(translationCache.entries()).filter(
            ([, value]) => value && typeof value.then !== 'function',
          );
          localStorage.setItem(TRANSLATION_CACHE_STORAGE_KEY, JSON.stringify(resolved.slice(-80)));
        } catch (e) {
          console.warn('saveTranslationCache failed:', e);
        }
      }

      loadTranslationCache();

      function getTranslationCacheKey({ word = '', why = '', sourceLang = '', targetLang = '' }) {
        return JSON.stringify({ word, why, sourceLang, targetLang });
      }

      function getResolvedCachedTranslation(args) {
        const cached = translationCache.get(getTranslationCacheKey(args));
        return cached && typeof cached.then !== 'function' ? cached : null;
      }

      async function requestCardTranslation({ word, why, sourceLang, targetLang }) {
        const key = getTranslationCacheKey({ word, why, sourceLang, targetLang });
        if (translationCache.has(key)) return translationCache.get(key);

        const promise = (async () => {
          const response = await fetch('https://divinatory-conlang.zhouyt-tony2018.workers.dev/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              type: 'translate',
              uid: currentUser?.uid || null,
              word,
              why,
              sourceLang,
              targetLang,
            }),
          });

          const data = await response.json();
          if (typeof data.used === 'number' && typeof data.limit === 'number') {
            updateQuotaBadge(data.used, data.limit, data.paidBalance);
          }
          if (!data.ok) throw new Error(data.message || data.error || 'Translation failed');

          const translated =
            typeof data.result === 'string' ? { explanation: data.result } : data.result || {};
          return {
            word: String(translated.word || word || '').trim(),
            explanation: String(translated.explanation || why || '').trim(),
          };
        })();

        translationCache.set(key, promise);
        try {
          const result = await promise;
          translationCache.set(key, result);
          saveTranslationCache();

      function updateSpawnedExpressionMetaCardsPosition() {
        const canvas = chatCanvas();
        if (!canvas) return;
        const isInspecting = !!window.eyeButton2?.isActivated;
        if (!isInspecting) return;

        // Keep layout stable: position each card to the right of its own expression bounds.
        const occupied = [];
        for (const [gid, card] of spawnedExpressionMetaCardEls.entries()) {
          if (!card || !card.isConnected) {
            spawnedExpressionMetaCardEls.delete(gid);
            continue;
          }

          const grp = expressionGroups.get(gid);
          if (!grp || grp.size < 1) {
            card.remove();
            spawnedExpressionMetaCardEls.delete(gid);
            continue;
          }

          // Only show when the group is fully selected.
          let all = true;
          for (const sym of grp) {
            if (!selectedSymbols.has(sym)) {
              all = false;
              break;
            }
          }
          if (!all) {
            card.style.display = 'none';
            continue;
          }
          card.style.display = 'block';

          let rightMost = -Infinity;
          let topMost = Infinity;
          for (const s of grp) {
            const r = getSymbolRectOnCanvas(s);
            if (r.right > rightMost) rightMost = r.right;
            if (r.top < topMost) topMost = r.top;
          }

          const gap = 14;
          let x = rightMost + gap;
          let y = topMost - 6;
          card.style.left = `${x}px`;
          card.style.top = `${y}px`;

          // Avoid card-on-card overlap in the right margin.
          for (let tries = 0; tries < 12; tries++) {
            const box = {
              left: x,
              top: y,
              right: x + (card.offsetWidth || 0),
              bottom: y + (card.offsetHeight || 0),
            };
            const overlaps = occupied.some((o) => boxesOverlap(box, o, 10));
            if (!overlaps) {
              occupied.push(box);
              break;
            }
            y = y + (card.offsetHeight || 0) + 10;
            card.style.top = `${y}px`;
          }
        }
      }

      function getWheelCenter(el) {
        const r = el.getBoundingClientRect();
        return {

          y: r.top + r.height / 2,

          .filter(Boolean)
          .sort();
        const rootSymbolId = ids[0] || null;
        if (!rootSymbolId) return;

        // Optional chain target: an already-selected annotation bubble attached to this root
        const selectedAnnotation = Array.from(selectedEmojis).find(
          (e) =>
            e?.dataset?.isAnnotation === 'true' && e?.dataset?.annoRootSymbolId === rootSymbolId,
        );

        const annotation = await createEmoji(
          userInput,
          null,
          null,
          null,
          { isAnnotation: true, annoRootSymbolId: rootSymbolId, annoSymbolIds: ids },
          {
            preserveSymbolSelection: true,
            // Creating a new annotation always deselects previously selected annotation bubbles.
            preserveEmojiSelection: false,
            autoSelect: true,
          },
        );

        if (selectedAnnotation) {
          await createAnnotationLink2(annotation, selectedAnnotation);

          const a = getElementCenterInChatCanvas(selectedAnnotation);
          if (a) {
            annotation.x = a.x + 48;
            annotation.y = a.y - 12;
            annotation.style.left = `${annotation.x}px`;
            annotation.style.top = `${annotation.y}px`;
          }
        } else {
          // Root annotation: place it near the selected component center
          const centers = Array.from(selectedSymbols)
            .map((s) => getElementCenterInChatCanvas(s))
            .filter(Boolean);
          if (centers.length) {
            const cx = centers.reduce((sum, p) => sum + p.x, 0) / centers.length;
            const cy = centers.reduce((sum, p) => sum + p.y, 0) / centers.length;
            annotation.x = cx + 40;
            annotation.y = cy - 10;
            annotation.style.left = `${annotation.x}px`;
            annotation.style.top = `${annotation.y}px`;
          }
        }

        // Only reveal annotations for the current inspected component
        showAnnotationsForSelection();
        scheduleChatMiniMapUpdate?.();
        emitTutorialEvent?.('annotation_created');
      }

      function getAnnotationAnchorTarget() {
        // Return a representative symbol from the selected group (prefer one with a saved ID)
        for (const sym of selectedSymbols) {
          if (sym.dataset?.id) return sym;
        }
        return selectedSymbols.values().next().value ?? null;
      }

      async function createAnnotationLink(fromAnnotation, toAnnotation) {
        // Store emoji-to-emoji annotation chain link in Firestore
        const fromId =
          fromAnnotation.dataset?.id ||
          (await fromAnnotation._pendingIdPromise?.catch(() => null));
        const toId =
          toAnnotation.dataset?.id || (await toAnnotation._pendingIdPromise?.catch(() => null));
        if (!fromId || !toId) return;
        await saveObj('annoLink', { fromEmojiId: fromId, toEmojiId: toId }, 0, 0);
      }

      async function createAnnotationLink2(fromAnnotation, toAnnotation) {
        const fromId =
          fromAnnotation.dataset?.id ||
          (await fromAnnotation._pendingIdPromise?.catch(() => null));
        const toId =
          toAnnotation.dataset?.id || (await toAnnotation._pendingIdPromise?.catch(() => null));
        if (!fromId || !toId) return;
        const docId = await saveObj('annoLink', { fromEmojiId: fromId, toEmojiId: toId }, 0, 0);
        upsertAnnotationLinkLocal(docId, { fromEmojiId: fromId, toEmojiId: toId });
      }

      function showAnnotationsForSelection() {
        let rootSymbolId = null;
        if (selectedSymbols.size > 0 && isSelectionConnected(selectedSymbols, currentGraph)) {
          const ids = Array.from(selectedSymbols)
            .map((s) => s?.dataset?.id)
            .filter(Boolean)
            .sort();
          rootSymbolId = ids.length ? ids[0] : null;
        }

        // If nothing is currently selected but inspection mode is still on,
        // keep showing annotations for the last-inspected component.
        if (!rootSymbolId && eyeButton2?.isActivated && lastInspectionRootSymbolId) {
          rootSymbolId = lastInspectionRootSymbolId;
        }

        lastInspectionRootSymbolId = rootSymbolId;

        document.querySelectorAll('.annotation-bubble').forEach((el) => {
          const match = rootSymbolId && el.dataset?.annoRootSymbolId === rootSymbolId;
          if (match) {
            el.classList.add('annotation-visible');
            ensureAnnotationTranslationButton(el);
          } else {
            el.classList.remove('annotation-visible');
          }
        });

        scheduleAnnotationLinksUpdate?.();
      }

      function hideAllAnnotations() {
        document.querySelectorAll('.annotation-bubble.annotation-visible').forEach((el) => {
          el.classList.remove('annotation-visible');
        });
        lastInspectionRootSymbolId = null;
        scheduleAnnotationLinksUpdate?.();
      }

      function isSymbolInInspectedComponent(symbol) {
        try {
          if (!symbol) return false;
          if (!eyeButton2?.isActivated) return false;
          const rootId = lastInspectionRootSymbolId;
          if (!rootId) return false;
          const root = symbolById.get(rootId);
          if (!root) return false;
          if (root === symbol) return true;

          const visited = new Set([root]);
          const q = [root];
          while (q.length) {
            const cur = q.shift();
            const conns = currentGraph.getSymbolConnections(cur) || [];
            for (const sideList of conns) {
              for (const [nbr] of sideList || []) {
                if (!nbr || visited.has(nbr)) continue;
                if (nbr === symbol) return true;
                visited.add(nbr);
                q.push(nbr);
              }
            }
          }
          return false;
        } catch (e) {
          console.warn('isSymbolInInspectedComponent failed', e);
          return false;
        }
      }

      function findLibraryEntry(word) {
        const normalized = String(word || '').trim();
        if (!normalized) return null;
        if (library.has(normalized)) return { word: normalized, entry: library.get(normalized) };

        const lowered = normalized.toLowerCase();
        for (const [storedWord, entry] of library.entries()) {
          if (String(storedWord).toLowerCase() === lowered) {
            return { word: storedWord, entry };
          }
        }

        return null;
      }

      function getSymbolBoxSizeForAngle(angle) {
        if (angle === 90 || angle === 270) {
          return {
            width: symbolHeight * symbolScale,
            height: symbolWidth * symbolScale,
          };
        }

        return {
          width: symbolWidth * symbolScale,
          height: symbolHeight * symbolScale,
        };
      }

      function getLocalJunctionsForNode(nodeInfo) {
        const relJunctions = getRelJunctions({ elemId: nodeInfo.elemId });
        const { width, height } = getSymbolBoxSizeForAngle(nodeInfo.angle);
        let localJunctions;

        if (nodeInfo.angle === 0) {
          localJunctions = [
            { x: relJunctions[0].x * symbolScale, y: relJunctions[0].y * symbolScale },
            { x: relJunctions[1].x * symbolScale, y: relJunctions[1].y * symbolScale },
            { x: relJunctions[2].x * symbolScale, y: relJunctions[2].y * symbolScale },
            { x: relJunctions[3].x * symbolScale, y: relJunctions[3].y * symbolScale },
          ];
        }
        if (nodeInfo.angle === 180) {
          localJunctions = [
            {
              x: width - relJunctions[1].x * symbolScale,
              y: height - relJunctions[1].y * symbolScale - calInvY,
            },
            {
              x: width - relJunctions[0].x * symbolScale,
              y: height - relJunctions[0].y * symbolScale - calInvY,
            },
            {
              x: width - relJunctions[3].x * symbolScale,
              y: height - relJunctions[3].y * symbolScale,
            },
            {
              x: width - relJunctions[2].x * symbolScale,
              y: height - relJunctions[2].y * symbolScale,
            },
          ];
        }
        if (nodeInfo.angle === 90) {
          localJunctions = [
            { x: width - relJunctions[0].y * symbolScale, y: relJunctions[0].x * symbolScale },
            { x: width - relJunctions[1].y * symbolScale, y: relJunctions[1].x * symbolScale },
            { x: width - relJunctions[3].y * symbolScale, y: relJunctions[3].x * symbolScale },
            { x: width - relJunctions[2].y * symbolScale, y: relJunctions[2].x * symbolScale },
          ];
        }
        if (nodeInfo.angle === 270) {
          localJunctions = [
            {
              x: relJunctions[1].y * symbolScale + calInvY,
              y: height - relJunctions[1].x * symbolScale,
            },
            {
              x: relJunctions[0].y * symbolScale + calInvY,
              y: height - relJunctions[0].x * symbolScale,
            },
            { x: relJunctions[2].y * symbolScale, y: height - relJunctions[2].x * symbolScale },
            { x: relJunctions[3].y * symbolScale, y: height - relJunctions[3].x * symbolScale },
          ];
        }

        if (nodeInfo.elemId === 2 && localJunctions) {
          if (nodeInfo.angle === 0) {
            localJunctions[2].x += calCan1;
            localJunctions[3].x += calCan1;
          }
          if (nodeInfo.angle === 270) {
            localJunctions[2].y -= calCan1;
            localJunctions[3].y -= calCan1;
          }
          if (nodeInfo.angle === 90) {
            localJunctions[2].y -= calCan2;
            localJunctions[3].y -= calCan2;
          }
          if (nodeInfo.angle === 180) {
            localJunctions[2].x += calCan2;
            localJunctions[3].x += calCan2;
          }
        }

        return localJunctions;
      }

      function getPatternNodeDir(nodeInfo) {
        return nodeInfo.angle === 0 || nodeInfo.angle === 180 ? 0 : 1;
      }

      function getPatternSpawnOrigin() {
        const canvas = chatCanvas();
        const container = tab4 || canvas;
        return {
          left:
            (container?.scrollLeft || 0) + Math.max(80, (container?.clientWidth || 800) * 0.32),
          top: (container?.scrollTop || 0) + Math.max(80, (container?.clientHeight || 600) * 0.28),
        };
      }

      function getSymbolRectOnCanvas(symbol) {
        const left = parseFloat(symbol.style.left) || 0;
        const top = parseFloat(symbol.style.top) || 0;
        const fallback = getSymbolBoxSizeForAngle(symbol.angle ?? 0);
        const width = symbol.offsetWidth || fallback.width || 0;
        const height = symbol.offsetHeight || fallback.height || 0;
        return {
          left,
          top,
          right: left + width,
          bottom: top + height,
        };
      }

      function rectsOverlap(a, b, padding = 18) {
        return (
          a.left < b.right + padding &&
          a.right > b.left - padding &&
          a.top < b.bottom + padding &&
          a.bottom > b.top - padding
        );
      }

      function findNonOverlappingShift(placedSymbols, occupiedRects) {
        if (!placedSymbols.length || !occupiedRects.length) return { dx: 0, dy: 0, found: true };

        const placedRects = placedSymbols.map((s) => getSymbolRectOnCanvas(s));
        const isFree = (dx, dy) =>
          !placedRects.some((rect) =>
            occupiedRects.some((occ) =>
              rectsOverlap(
                {
                  left: rect.left + dx,
                  top: rect.top + dy,
                  right: rect.right + dx,
                  bottom: rect.bottom + dy,
                },
                occ,
              ),
            ),
          );

        if (isFree(0, 0)) return { dx: 0, dy: 0, found: true };

        const step = 140;
        const maxRing = 18;

        for (let ring = 1; ring <= maxRing; ring++) {
          for (let ix = -ring; ix <= ring; ix++) {
            for (let iy = -ring; iy <= ring; iy++) {
              if (Math.max(Math.abs(ix), Math.abs(iy)) !== ring) continue;
              const dx = ix * step;
              const dy = iy * step;
              if (isFree(dx, dy)) return { dx, dy, found: true };
            }
          }
        }

        return { dx: 0, dy: 0, found: false };
      }

      function shiftSpawnedSymbols(placedSymbols, dx, dy) {
        if ((!dx && !dy) || !placedSymbols.length) return;
        for (const symbol of placedSymbols) {
          const left = parseFloat(symbol.style.left) || 0;
          const top = parseFloat(symbol.style.top) || 0;
          symbol.style.left = `${left + dx}px`;
          symbol.style.top = `${top + dy}px`;
          if (symbol.isDynamic && symbol.dot) {
            updateDotPositionLocal(symbol.dot);
          }
        }
      }

      async function persistDynamicDotsForSymbols(symbols) {
        const tasks = [];
        for (const symbol of symbols || []) {
          if (!symbol?.isDynamic || !symbol.dot) continue;
          tasks.push(
            (async () => {
              if (!symbol.dataset?.id && symbol._pendingIdPromise) {
                await symbol._pendingIdPromise;
              }
              if (!symbol.dataset?.id) return;
              await persistDotPosition(symbol.dot);
            })(),
          );
        }
        if (tasks.length) {
          await Promise.all(tasks);
        }
      }

      function getRectBounds(rects) {
        if (!rects.length) return null;
        return rects.reduce(
          (acc, r) => ({
            left: Math.min(acc.left, r.left),
            top: Math.min(acc.top, r.top),
            right: Math.max(acc.right, r.right),
            bottom: Math.max(acc.bottom, r.bottom),
          }),
          { left: Infinity, top: Infinity, right: -Infinity, bottom: -Infinity },
        );
      }

      function collectPatternLinks(pattern) {
        const links = [];
        const seen = new Set();

        for (let from = 0; from < pattern.nodes.length; from++) {
          for (let fromSide = 0; fromSide < 6; fromSide++) {
            for (const [to, toSide] of pattern.adj[from][fromSide] || []) {
              const key = `${from}|${fromSide}|${to}|${toSide}`;
              const reverseKey = `${to}|${toSide}|${from}|${fromSide}`;
              if (seen.has(key) || seen.has(reverseKey)) continue;
              seen.add(key);
              links.push({ from, fromSide, to, toSide });
            }
          }
        }

        return links;
      }

      function enableDynamicDotForSpawnedSymbol(symbol) {
        // Poka-yoke: when spawning a library expression, we want the whole expression to
        // appear "atomically" (no per-symbol pauses). Persist dot positions later in one batch.
        symbol.isDynamic = true;
        const dot = document.createElement('div');
        dot.innerHTML = dotData;
        dot.classList.add('dot');
        dot.parent = symbol;
        symbol.dot = dot;
        updateDotPositionLocal(dot);
        appendToChatCanvas(dot);
      }

      function alignSpawnedSymbols(
        anchorSymbol,
        anchorNodeInfo,
        anchorSide,
        nextSymbol,
        nextNodeInfo,
        nextSide,
      ) {
        const anchorLeft = parseFloat(anchorSymbol.style.left) || 0;
        const anchorTop = parseFloat(anchorSymbol.style.top) || 0;

        if (
          anchorSide >= 4 &&
          nextSide >= 4 &&
          getPatternNodeDir(anchorNodeInfo) === getPatternNodeDir(nextNodeInfo)
        ) {
          if (getPatternNodeDir(anchorNodeInfo) === 0) {
            nextSymbol.style.left = `${anchorLeft}px`;
            nextSymbol.style.top = `${
              anchorTop +
              (anchorSide === Side.PAR_TOP && nextSide === Side.PAR_BOT
                ? -(symbolHeight - 7) * symbolScale
                : (symbolHeight - 4) * symbolScale)
            }px`;
            return;
          }

          nextSymbol.style.left = `${
            anchorLeft +
            (anchorSide === Side.PAR_TOP && nextSide === Side.PAR_BOT
              ? -(symbolHeight - 7) * symbolScale
              : (symbolHeight - 4) * symbolScale)
          }px`;
          nextSymbol.style.top = `${anchorTop}px`;
          return;
        }

        const anchorJunctions = getAbsJunctions(anchorSymbol);
        const nextJunctions = getAbsJunctions(nextSymbol);
        const anchorPoint = anchorJunctions?.[anchorSide];
        const nextPoint = nextJunctions?.[nextSide];
        if (!anchorPoint || !nextPoint) return;

        const left = parseFloat(nextSymbol.style.left) || 0;
        const top = parseFloat(nextSymbol.style.top) || 0;
        nextSymbol.style.left = `${left + anchorPoint.x - nextPoint.x}px`;
        nextSymbol.style.top = `${top + anchorPoint.y - nextPoint.y}px`;

        if (nextSymbol.dot) {
          updateDotPositionLocal(nextSymbol.dot);
        }
      }

      async function spawnPatternOnChatCanvas(word) {
        const found = findLibraryEntry(word);
        if (!found) {
          showFeedback?.(`No saved symbol expression found for "${word}".`, true);
          return;
        }

        const pattern = found.entry?.[1];
        const layout = found.entry?.[2] || null;
        if (!pattern?.nodes?.length) {
          showFeedback?.(`"${found.word}" does not have a saved symbol expression yet.`, true);
          return;
        }

        const sourceNodes =
          layout?.nodes?.length === pattern.nodes.length ? layout.nodes : pattern.nodes;
        const sourceLinks = layout?.links?.length ? layout.links : collectPatternLinks(pattern);
        const placed = new Array(sourceNodes.length);
        const occupiedRects = Array.from(chatCanvas()?.querySelectorAll('.symbol') || []).map(
          (s) => getSymbolRectOnCanvas(s),
        );
        const origin = getPatternSpawnOrigin();
        const hasSavedLayout = pattern.nodes.every(
          (node) => Number.isFinite(node?.relLeft) && Number.isFinite(node?.relTop),
        );

        clearAllSymbolSelection();
        clearAllEmojiSelection();

        if (layout?.nodes?.length === pattern.nodes.length) {
          const minLeft = Math.min(...layout.nodes.map((node) => node.left ?? 0));
          const minTop = Math.min(...layout.nodes.map((node) => node.top ?? 0));

          for (let i = 0; i < layout.nodes.length; i++) {
            const node = layout.nodes[i];
            placed[i] = createSymbolCopy(
              null,
              null,
              node.elemId ?? node.elemIdTrue,
              node.elemIdTrue,
              origin.left + ((node.left ?? 0) - minLeft),
              origin.top + ((node.top ?? 0) - minTop),
              node.color ?? null,
              node.angle ?? 0,
            );

            if (node.isDynamic) {
              enableDynamicDotForSpawnedSymbol(placed[i]);
            }
          }
        } else if (hasSavedLayout) {
          for (let i = 0; i < pattern.nodes.length; i++) {
            const node = pattern.nodes[i];
            placed[i] = createSymbolCopy(
              null,
              null,
              node.elemIdTrue,
              node.elemIdTrue,
              origin.left + node.relLeft,
              origin.top + node.relTop,
              null,
              node.angle ?? 0,
            );

            if (node.isDynamic) {
              enableDynamicDotForSpawnedSymbol(placed[i]);
            }
          }
        } else {
          const rootInfo = {
            elemId: pattern.nodes[0].elemIdTrue,
            elemIdTrue: pattern.nodes[0].elemIdTrue,
            angle: pattern.nodes[0].angle ?? 0,
            isDynamic: !!pattern.nodes[0].isDynamic,
          };

          placed[0] = createSymbolCopy(
            null,
            null,
            rootInfo.elemId,
            rootInfo.elemIdTrue,
            origin.left,
            origin.top,
            null,
            rootInfo.angle,
          );

          if (rootInfo.isDynamic) {
            enableDynamicDotForSpawnedSymbol(placed[0]);
          }

          const queue = [0];
          const seenNodes = new Set([0]);

          while (queue.length > 0) {
            const currentIndex = queue.shift();
            const currentSymbol = placed[currentIndex];
            const currentInfo = {
              elemId: pattern.nodes[currentIndex].elemIdTrue,
              elemIdTrue: pattern.nodes[currentIndex].elemIdTrue,
              angle: pattern.nodes[currentIndex].angle ?? 0,
              isDynamic: !!pattern.nodes[currentIndex].isDynamic,
            };

            for (let currentSide = 0; currentSide < 6; currentSide++) {
              for (const [neighborIndex, neighborSide] of pattern.adj[currentIndex][currentSide] ||
                []) {
                if (placed[neighborIndex]) continue;

                const neighborInfo = {
                  elemId: pattern.nodes[neighborIndex].elemIdTrue,
                  elemIdTrue: pattern.nodes[neighborIndex].elemIdTrue,
                  angle: pattern.nodes[neighborIndex].angle ?? 0,
                  isDynamic: !!pattern.nodes[neighborIndex].isDynamic,
                };

                placed[neighborIndex] = createSymbolCopy(
                  null,
                  null,
                  neighborInfo.elemId,
                  neighborInfo.elemIdTrue,
                  origin.left + 40,
                  origin.top + 40,
                  null,
                  neighborInfo.angle,
                );

                if (neighborInfo.isDynamic) {
                  enableDynamicDotForSpawnedSymbol(placed[neighborIndex]);
                }

                alignSpawnedSymbols(
                  currentSymbol,
                  currentInfo,
                  currentSide,
                  placed[neighborIndex],
                  neighborInfo,
                  neighborSide,
                );

                if (!seenNodes.has(neighborIndex)) {
                  seenNodes.add(neighborIndex);
                  queue.push(neighborIndex);
                }
              }
            }
          }

          for (let i = 0; i < sourceNodes.length; i++) {
            if (placed[i]) continue;
            const fallbackInfo = sourceNodes[i];
            placed[i] = createSymbolCopy(
              null,
              null,
              fallbackInfo.elemId ?? fallbackInfo.elemIdTrue,
              fallbackInfo.elemIdTrue,
              origin.left + i * 35,
              origin.top + i * 35,
              fallbackInfo.color ?? null,
              fallbackInfo.angle,
            );

            if (fallbackInfo.isDynamic) {
              enableDynamicDotForSpawnedSymbol(placed[i]);
            }
          }
        }

        const placedSymbols = placed.filter(Boolean);
        let shift = findNonOverlappingShift(placedSymbols, occupiedRects);
        if (!shift.found && occupiedRects.length && placedSymbols.length) {
          const occupiedBounds = getRectBounds(occupiedRects);
          const placedBounds = getRectBounds(placedSymbols.map((s) => getSymbolRectOnCanvas(s)));
          if (occupiedBounds && placedBounds) {
            const gap = 220;
            shift = {
              dx: occupiedBounds.right + gap - placedBounds.left,
              dy: occupiedBounds.top - placedBounds.top,
              found: true,
            };
          }
        }
        shiftSpawnedSymbols(placedSymbols, shift.dx, shift.dy);

        // Guard against stale realtime echoes while we finalize spawned-group placement.
        placedSymbols.forEach((symbol) => markLocalSymbolMutation(symbol, 2500));

        // Apply links locally immediately so the expression behaves like normal symbols
        // right away (magnetism, long-press component selection, etc).
        for (const link of sourceLinks) {
          const fromSymbol = placed[link.from];
          const toSymbol = placed[link.to];
          if (!fromSymbol || !toSymbol) continue;

          commitLink(fromSymbol, link.fromSide, toSymbol, link.toSide);
        }

        // Tag symbols as an expression group and select them with a single bounding box
        const groupId = `eg_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        const groupSet = new Set(placedSymbols);
        expressionGroups.set(groupId, groupSet);
        for (const sym of placedSymbols) {
          sym._expressionGroupId = groupId;
          sym.selected = true;
          selectedSymbols.add(sym);
          // No individual 'framed' class — group frame handles the outline
        }

        // Render the group frame immediately (poka-yoke: prevents "half-spawned" dragging breaking the group).
        updateExpressionGroupFrame(
          placedSymbols,
          tabHeadersActivated[4] ? chatCanvas() : craftCanvas(),
        );

        // Persist everything asynchronously (do not block UI / avoid symbol-by-symbol pauses).
        (async () => {
          try {
            // Ensure all symbol docs exist before writing links/meta.
            await Promise.all(
              placedSymbols.map(async (sym) => {
                if (!sym?.dataset?.id && sym?._pendingIdPromise) await sym._pendingIdPromise;
              }),
            );

            // Persist links (in parallel).
            const linkTasks = [];
            for (const link of sourceLinks) {
              const fromSymbol = placed[link.from];
              const toSymbol = placed[link.to];
              if (!fromSymbol || !toSymbol) continue;
              const fromId = fromSymbol.dataset?.id;
              const toId = toSymbol.dataset?.id;
              if (!fromId || !toId) continue;
              linkTasks.push(persistLink(fromId, link.fromSide, toId, link.toSide));
            }
            if (linkTasks.length) await Promise.all(linkTasks);

            // Persist final positions after any non-overlap shift.
            if (shift.dx || shift.dy) {
              await Promise.all(
                placedSymbols.map(async (symbol) => {
                  const id = symbol.dataset?.id;
                  if (!id) return;
                  const x = parseFloat(symbol.style.left) || 0;
                  const y = parseFloat(symbol.style.top) || 0;
                  await updateObjPosition(id, x, y);
                }),
              );
            }

            // Persist dynamic dots after all layout adjustments.
            await persistDynamicDotsForSymbols(placedSymbols);

            // Persist spawned-expression grouping + meta for all users (survives refresh).
            // We store the author word + why text on every symbol doc for simplicity.
            const nodeId = found.entry?.[0] || null;
            const libNode = nodeId && typeof nodes?.get === 'function' ? nodes.get(nodeId) : null;
            const rawTitle = String(libNode?.title || '');
            const why = rawTitle.includes('. ') ? rawTitle.split(/\. (.+)/)[1] || '' : rawTitle;
            const exprLang = getExpressionSourceLang(
              String(libNode?.lang || ''),
              libNode?.word || found.word || '',
              why,
            );
            const payload = {
              exprGroupId: groupId,
              exprWord: String(libNode?.word || found.word || ''),
              exprWhy: String(why || ''),
              exprLang,
              exprNodeId: nodeId ? String(nodeId) : '',
              exprAuthorUid: currentUser?.uid || '',
            };

            await Promise.all(
              placedSymbols.map(async (sym) => {
                const id = sym.dataset?.id;
                if (!id) return;
                await updateDoc(objDocRef(id), payload);
                // keep local element datasets in sync immediately
                sym.dataset.exprWord = payload.exprWord;
                sym.dataset.exprWhy = payload.exprWhy;
                sym.dataset.exprLang = payload.exprLang;
                sym.dataset.exprNodeId = payload.exprNodeId;
                sym.dataset.exprAuthorUid = payload.exprAuthorUid;
              }),
            );
          } catch (e) {

      function floatLabel(label) {
        const maxDistance = 20; // Maximum distance from the original position
        const originX = 0,
          originY = 0; // Store original position
        let x = 0,
          y = 0;

        setInterval(() => {
          if (label._inspectionLabelDragging) return;
          let xDelta = getRandomFloat(-2, 2);
          let yDelta = getRandomFloat(-2, 2);

          // Calculate new position
          let newX = x + xDelta;
          let newY = y + yDelta;

          // Check if the new position is within the allowed distance
          let distance = Math.sqrt(newX ** 2 + newY ** 2);
          if (distance <= maxDistance) {
            x = newX;
            y = newY;
            label.style.transform = `translate(${x}px, ${y}px)`;
          }
        }, 100);

      function attachInspectionLabelDrag(label, anchorSymbol) {
        if (!label || !anchorSymbol) return;
        label.dataset.inspectionLabel = 'true';
        label.anchorSymbol = anchorSymbol;

        label.addEventListener('mousedown', (e) => {
