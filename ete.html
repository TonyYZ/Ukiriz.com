<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ete · The automated scribe for Ítí</title>
    <style>
      @font-face {
        font-family: 'Uriti';
        src: url('./Uriti.otf?v=20260717-134520') format('opentype');
        font-display: swap;
      }

      @font-face {
        font-family: 'Nuaiti';
        src: url('./Nuaiti.otf') format('opentype');
        font-display: swap;
      }

      @font-face {
        font-family: 'UkirizWenKai';
        src: url('./fonts/LXGWWenKai-Regular.woff2') format('woff2');
        font-display: swap;
      }

      @font-face {
        font-family: 'UkirizSarasaUiSC';
        src: url('./fonts/SarasaUiSC-Regular.woff2') format('woff2');
        font-display: swap;
      }

      :root {
        color-scheme: light;
        --mono: Consolas, 'Courier New', 'UkirizSarasaUiSC', ui-monospace, monospace;
        --ink: #302b20;
        --muted: #776c55;
        --studio: #f4ecd0;
        --paper: #fff2b8;
        --paper-deep: #ead98a;
        --line: rgba(75, 62, 35, 0.18);
        --rule: rgba(65, 85, 100, 0.1);
        --margin-rule: rgba(192, 86, 67, 0.42);
        --accent: #c98b22;
        --accent-deep: #8f5e0d;
        --accent-soft: rgba(201, 139, 34, 0.16);
      }

      * { box-sizing: border-box; }

      html, body { width: 100%; height: 100%; margin: 0; }

      body {
        overflow: hidden;
        color: var(--ink);
        background: var(--studio);
        font-family: var(--mono);
      }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        width: 100%;
        height: 100dvh;
        background: var(--studio);
      }

      .editor,
      .drawer {
        position: relative;
        min-width: 0;
        min-height: 0;
      }

      .editor {
        display: flex;
        flex-direction: column;
        z-index: 1;
        overflow: hidden;
        background: var(--paper);
        border-right: 4px solid var(--accent);
        box-shadow: 12px 0 30px rgba(27, 41, 51, 0.08);
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 80px;
        padding: 13px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(248, 239, 207, 0.96);
        box-shadow: 0 5px 18px rgba(28, 40, 49, 0.055);
      }

      .brand { margin-right: auto; min-width: 0; }
      .brand h1 {
        margin: 0;
        font: 600 25px/1 'UkirizWenKai', Georgia, serif;
        letter-spacing: .035em;
      }
      .brand h1::before {
        content: '';
        display: inline-block;
        width: 10px;
        height: 20px;
        margin-right: 10px;
        vertical-align: -3px;
        background: var(--accent);
        clip-path: polygon(50% 0, 100% 68%, 50% 100%, 0 68%);
      }
      .brand p {
        margin: 7px 0 0 20px;
        color: var(--accent-deep);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: .17em;
        text-transform: uppercase;
      }

      .font-switch {
        display: inline-flex;
        flex: 0 0 auto;
        padding: 3px;
        border: 1px solid rgba(201, 139, 34, 0.44);
        border-radius: 4px;
        background: rgba(255,255,255,.84);
        box-shadow: 0 2px 7px rgba(27, 42, 52, 0.06);
      }

      .font-switch input { position: absolute; opacity: 0; pointer-events: none; }
      .font-switch label {
        padding: 7px 11px;
        border-radius: 2px;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
      }
      .font-switch input:checked + label { color: #fff; background: var(--accent); }
      .font-switch input:focus-visible + label { outline: 2px solid var(--accent-deep); outline-offset: 2px; }

      textarea {
        display: block;
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        resize: none;
        padding: clamp(34px, 4vw, 58px) clamp(26px, 4vw, 58px) clamp(48px, 5vw, 72px) clamp(54px, 6vw, 88px);
        border: 0;
        outline: 0;
        color: var(--ink);
        background:
          linear-gradient(90deg,
            transparent 0,
            transparent clamp(38px, 5vw, 70px),
            var(--margin-rule) clamp(38px, 5vw, 70px),
            var(--margin-rule) calc(clamp(38px, 5vw, 70px) + 1px),
            transparent calc(clamp(38px, 5vw, 70px) + 1px)),
          repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent calc(1.55em - 1px),
            var(--rule) calc(1.55em - 1px),
            var(--rule) 1.55em
          ),
          linear-gradient(120deg, var(--paper), #f7e4a2);
        font-family: 'Uriti', serif;
        font-size: clamp(26px, 3.1vw, 47px);
        line-height: 1.55;
        letter-spacing: .025em;
        caret-color: var(--accent);
        box-shadow: inset -18px 0 32px rgba(68, 55, 31, 0.035);
      }
      textarea.font-nuaiti { font-family: 'Nuaiti', serif; }
      textarea::placeholder { color: #9b998f; opacity: 1; }
      textarea::selection { color: var(--ink); background: rgba(201, 139, 34, 0.26); }

      .editor-footer {
        display: flex;
        align-items: center;
        min-height: 44px;
        padding: 8px 22px;
        border-top: 1px solid var(--line);
        background: var(--studio);
        color: var(--muted);
        font-size: 11px;
        letter-spacing: .04em;
      }
      .status { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .status:not(.error)::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        margin-right: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
        vertical-align: 1px;
      }
      .status.error { color: #9d3c31; }
      .count { margin-left: auto; padding-left: 12px; white-space: nowrap; }

      .drawer {
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        background:
          linear-gradient(to right, rgba(0, 0, 0, 0.055) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.055) 1px, transparent 1px),
          linear-gradient(to right, rgba(201, 139, 34, 0.11) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(201, 139, 34, 0.11) 1px, transparent 1px),
          var(--studio);
        background-size: 40px 40px, 40px 40px, 200px 200px, 200px 200px;
      }

      .drawer::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow:
          inset 14px 0 28px rgba(30, 42, 51, 0.045),
          inset 0 80px 90px rgba(255,255,255,.2);
      }

      .drawer-head {
        position: absolute;
        z-index: 2;
        top: 16px;
        left: 18px;
        right: 18px;
        display: flex;
        align-items: center;
        pointer-events: none;
      }
      .drawer-title {
        padding: 8px 11px;
        border: 1px solid var(--accent);
        border-radius: 4px;
        color: #fff;
        background: var(--accent);
        box-shadow: 0 3px 9px rgba(0, 128, 175, .18);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: .11em;
        text-transform: uppercase;
      }
      .actions { display: flex; gap: 7px; margin-left: auto; pointer-events: auto; }
      button {
        min-height: 32px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 4px;
        color: var(--ink);
        background: rgba(255,255,255,.88);
        backdrop-filter: blur(8px);
        cursor: pointer;
        font: 12px/1 var(--mono);
        font-size: 12px;
        box-shadow: 0 2px 7px rgba(27, 42, 52, 0.07);
      }
      button:hover { color: var(--accent-deep); border-color: var(--accent); background: #fff; }
      button:focus-visible { outline: 2px solid var(--accent-deep); outline-offset: 2px; }

      #drawing {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #artwork {
        fill: none;
        stroke: var(--ink);
        stroke-width: 2.6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      #artwork .gate { stroke: var(--accent-deep); stroke-width: 1.5; opacity: .72; }
      #artwork .node-dot { fill: var(--ink); stroke: none; }
      #artwork .turtle-cursor { fill: var(--ink); stroke: none; }

      @media (max-width: 760px) {
        body { overflow: auto; }
        .app { grid-template-columns: 1fr; grid-template-rows: minmax(52dvh, 1fr) minmax(48dvh, 1fr); height: auto; min-height: 100dvh; }
        .editor { border-right: 0; border-bottom: 4px solid var(--accent); }
        .toolbar { min-height: 66px; padding: 10px 12px; gap: 8px; }
        .brand p { display: none; }
        .font-switch label { padding: 7px 9px; }
        textarea {
          min-height: 38dvh;
          padding: 28px 22px 40px 48px;
          font-size: clamp(25px, 8vw, 38px);
        }
        .drawer { min-height: 48dvh; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="editor" aria-labelledby="editor-title">
        <header class="toolbar">
          <div class="brand">
            <h1 id="editor-title">Ete</h1>
            <p>The automated scribe for Ítí</p>
          </div>
          <button type="button" id="random-text" title="Replace the editor with a generated V2 passage">Random text</button>
          <div class="font-switch" role="radiogroup" aria-label="Writing font">
            <input type="radio" id="uriti" name="font" value="uriti" checked />
            <label for="uriti">Uriti</label>
            <input type="radio" id="nuaiti" name="font" value="nuaiti" />
            <label for="nuaiti">Nuaiti</label>
          </div>
        </header>
        <textarea id="source" lang="art-x-iti" spellcheck="false" autocomplete="off" aria-label="Ítí text" placeholder="Type Ítí here…">çrağ rám. Zacan. Can zág. Gğaman.</textarea>
        <footer class="editor-footer">
          <span class="status" id="status" role="status">Ready</span>
          <span class="count" id="count">0 elements</span>
        </footer>
      </section>

      <section class="drawer" aria-label="Ítí drawing">
        <div class="drawer-head">
          <span class="drawer-title">Live drawing</span>
          <div class="actions">
            <button type="button" id="fit">Fit</button>
            <button type="button" id="download">Save SVG</button>
          </div>
        </div>
        <svg id="drawing" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Generated Ítí drawing">
          <g id="viewport"><g id="artwork"></g></g>
        </svg>
      </section>
    </main>

    <script>
      (() => {
        'use strict';

        const NS = 'http://www.w3.org/2000/svg';
        const source = document.querySelector('#source');
        const status = document.querySelector('#status');
        const count = document.querySelector('#count');
        const svg = document.querySelector('#drawing');
        const drawerPanel = document.querySelector('.drawer');
        const viewport = document.querySelector('#viewport');
        const artwork = document.querySelector('#artwork');
        const consonants = new Set(Array.from('çşzspbtdmnfvlrcghğyw-|'));
        const vowelBase = Object.fromEntries([
          ['aáàā','a'], ['eéèē','e'], ['iíìī','i'],
          ['oóòō','o'], ['uúùū','u'], ['ơớờ','ơ'],
        ].flatMap(([chars, base]) => Array.from(chars, char => [char, base])));
        const accents = new Set(Array.from('áéíóúớ'));
        const compounds = { 'ẻ':'áé', 'ț':'óé', 'ȟ':'áóé', 'ỉ':'éí', 'ȍ':'óí', 'ỏ':'áó', 'ủ':'óú', 'ứ':'éú', 'ĩ':'ei', 'ị':'oi', 'ẹ':'oe', 'ẽ':'ae', 'ȡ':'aoe', 'õ':'ao', 'ư':'eu', 'ũ':'ou' };

        class ParseError extends Error {}

        function normalize(text) {
          return Array.from(text.toLowerCase().replaceAll('Ƞ', 'ȡ').replaceAll('Ȍ', 'ȍ').replaceAll('Ț', 'ț').replaceAll('Ȟ', 'ȟ'))
            .map(char => compounds[char] || char).join('');
        }

        function splitSentenceRecords(text) {
          const normalized = normalize(text).replace(/\([^)]*\)/g, '');
          const separator = / {4,}|-\s+|[,.!?;:\n]+/g; const records = [];
          let start = 0; let match;
          while ((match = separator.exec(normalized))) {
            const part = normalized.slice(start, match.index).trim();
            if (part && !/^\d+$/.test(part)) records.push({ text:part, hasPeriod:match[0].includes('.') });
            start = separator.lastIndex;
          }
          const part = normalized.slice(start).trim();
          if (part && !/^\d+$/.test(part)) records.push({ text:part, hasPeriod:false });
          return records;
        }

        class Parser {
          constructor(text, sentence, gates, sources) {
            this.text = text.replace(/\s/g, ''); this.pos = 0; this.sentence = sentence;
            this.number = 0; this.gates = gates; this.sources = sources; this.orientation = 0;
            this.componentContinuesBranch = false;
            this.omittedFuseauOpenings = [];
            this.omittedFuseauClosings = [];
          }
          peek() { return this.text[this.pos] || ''; }
          base(char = this.peek()) { return vowelBase[char] || char; }
          fail(message) { throw new ParseError(`${message} at character ${this.pos + 1}`); }
          take(expected) { const c = this.peek(); if (!c) this.fail('Unexpected end of input'); if (expected && c !== expected) this.fail(`Expected ${expected}`); this.pos++; return c; }
          takeVowel(expected) { const c = this.peek(); if (this.base(c) !== expected) this.fail(`Expected ${expected}`); this.pos++; if (accents.has(c)) this.orientation++; }
          takeOptionalVowel(expected) {
            if (this.base() !== expected) return false;
            this.takeVowel(expected);
            return true;
          }
          atSeriesBoundary(stops) {
            return this.pos >= this.text.length || stops.has(this.base());
          }
          parse() { const root = this.series(new Set()); if (this.pos !== this.text.length) this.fail('Unexpected input'); return root; }
          series(stops) {
            let children = [];
            let simpleLeftStart = 0;
            const appendComponent = component => {
              if (children.length) {
                const previous = children.at(-1);
                if (this.hasOmittedClosing(previous) && component.type !== 'parallel') {
                  this.fail('A fuseau followed by a non-fuseau element must retain its final o');
                }
                if (this.hasOmittedOpening(component) && previous.type !== 'parallel') {
                  this.fail('A fuseau preceded by a non-fuseau element must retain its first e');
                }
              }
              children.push(component);
            };
            while (this.pos < this.text.length) {
              if (this.peek() === "'" && stops.has("'") && children.length) break;
              if (stops.has(this.base()) && this.peek() !== "'") break;
              if (this.peek() === "'") {
                if (!this.componentContinuesBranch) simpleLeftStart = children.length;
                appendComponent(this.quoted());
                this.componentContinuesBranch = false;
              } else if (this.base() === 'e') {
                simpleLeftStart = children.length;
                const explicitSimple = this.tryExplicitSimpleFuseau(stops);
                appendComponent(explicitSimple || this.complex(stops));
                this.componentContinuesBranch = false;
              }
              else if (this.base() === 'ơ') {
                if (!children.length) this.fail('ơ needs a branch before it');
                this.takeVowel('ơ'); const right = this.simpleRightBranch(stops);
                if (!right.children.length) this.fail('ơ needs a branch after it');
                const prefix = children.slice(0, simpleLeftStart);
                const left = { type:'series', children:children.slice(simpleLeftStart) };
                const simple = { type:'parallel', branches:[left, right] };
                const closingOmitted = !this.takeOptionalVowel('o');
                this.recordFuseauBoundaries(simple, true, closingOmitted);
                if (prefix.length && prefix.at(-1).type !== 'parallel') {
                  this.fail('A fuseau preceded by a non-fuseau element must retain its first e');
                }
                children = [...prefix, simple];
                simpleLeftStart = prefix.length;
                this.componentContinuesBranch = false;
              } else {
                const implicit = stops.has('o') ? null : this.tryImplicitComplex(stops);
                if (implicit) {
                  simpleLeftStart = children.length;
                  appendComponent(implicit);
                  this.componentContinuesBranch = false;
                  continue;
                }
                const element = this.element(children.length > 0);
                if (element) {
                  if (!this.componentContinuesBranch) simpleLeftStart = children.length;
                  appendComponent(element);
                  this.componentContinuesBranch = false;
                }
              }
            }
            return { type:'series', children };
          }
          hasOmittedOpening(node) {
            return node?.type === 'parallel' && this.omittedFuseauOpenings.includes(node);
          }
          hasOmittedClosing(node) {
            return node?.type === 'parallel' && this.omittedFuseauClosings.includes(node);
          }
          recordFuseauBoundaries(node, openingOmitted, closingOmitted) {
            if (openingOmitted) this.omittedFuseauOpenings.push(node);
            if (closingOmitted) this.omittedFuseauClosings.push(node);
            return node;
          }
          simpleRightBranch(outerStops) {
            if (this.peek() === "'") return { type:'series', children:[this.quoted()] };
            if (this.base() === 'e') return { type:'series', children:[this.complex(outerStops)] };
            const implicit = outerStops.has('o') ? null : this.tryImplicitComplex(outerStops);
            if (implicit) return { type:'series', children:[implicit] };
            return this.compactBranch();
          }
          tryExplicitSimpleFuseau(outerStops) {
            const snapshot = this.snapshot();
            try {
              this.takeVowel('e');
              const left = this.series(new Set(['ơ']));
              if (!left.children.length || this.peek() !== 'ơ') {
                this.fail('Explicit simple fuseau needs ơ between its branches');
              }
              this.takeVowel('ơ');
              const right = this.simpleRightBranch(new Set(['o', ...outerStops]));
              if (!right.children.length) this.fail('Explicit simple fuseau needs a right branch');
              const closingOmitted = !this.takeOptionalVowel('o');
              return this.recordFuseauBoundaries(
                { type:'parallel', branches:[left, right] }, false, closingOmitted
              );
            } catch (error) {
              if (!(error instanceof ParseError)) throw error;
              this.restore(snapshot);
              return null;
            }
          }
          snapshot() {
            return {
              pos:this.pos, number:this.number, orientation:this.orientation,
              continues:this.componentContinuesBranch, gateCount:this.gates.length,
              sources:this.sources.map(source => ({ id:source.id, remaining:source.remaining })),
              openingCount:this.omittedFuseauOpenings.length,
              closingCount:this.omittedFuseauClosings.length,
            };
          }
          restore(snapshot) {
            this.pos = snapshot.pos; this.number = snapshot.number; this.orientation = snapshot.orientation;
            this.componentContinuesBranch = snapshot.continues;
            this.gates.length = snapshot.gateCount;
            this.sources.splice(0, this.sources.length, ...snapshot.sources.map(source => ({ ...source })));
            this.omittedFuseauOpenings.length = snapshot.openingCount;
            this.omittedFuseauClosings.length = snapshot.closingCount;
          }
          branchAtom(secondBranch = false) {
            if (this.peek() === "'") return this.quoted();
            const element = this.element(false, secondBranch);
            if (element === null && this.peek() === "'") return this.quoted();
            if (element === null) this.fail('Expected a fuseau branch element');
            return element;
          }
          compactBranch(secondBranch = false) {
            const children = [this.branchAtom(secondBranch)];
            while (this.pos < this.text.length) {
              const continuationSnapshot = this.snapshot();
              let candidate;
              try { candidate = this.branchAtom(); }
              catch (error) {
                if (!(error instanceof ParseError)) throw error;
                this.restore(continuationSnapshot);
                break;
              }
              if (!this.componentContinuesBranch) {
                this.restore(continuationSnapshot);
                break;
              }
              children.push(candidate);
            }
            return { type:'series', children };
          }
          finishCompactComplex(branches, outerStops, requireFinalO = false) {
            if (this.base() !== 'o') {
              if (requireFinalO) this.fail('A nested fuseau must end with o');
              return { branches, closingOmitted:true };
            }
            while (this.base() === 'o') {
              const separatorSnapshot = this.snapshot();
              this.takeVowel('o');
              if (this.pos >= this.text.length || outerStops.has(this.base())) {
                return { branches, closingOmitted:false };
              }
              let candidate;
              try { candidate = this.compactBranch(); }
              catch (error) {
                if (!(error instanceof ParseError)) throw error;
                this.restore(separatorSnapshot);
                this.takeVowel('o');
                return { branches, closingOmitted:false };
              }
              if (this.base() !== 'o') {
                this.restore(separatorSnapshot);
                this.takeVowel('o');
                return { branches, closingOmitted:false };
              }
              branches.push(candidate);
            }
            return { branches, closingOmitted:true };
          }
          tryImplicitComplex(outerStops) {
            const snapshot = this.snapshot();
            try {
              const first = this.compactBranch();
              const firstChangedGates = this.gates.length !== snapshot.gateCount
                || this.sources.length !== snapshot.sources.length
                || this.sources.some((source, index) => source.id !== snapshot.sources[index]?.id
                  || source.remaining !== snapshot.sources[index]?.remaining);

              if (this.base() === 'e' && !firstChangedGates) {
                const explicitSnapshot = this.snapshot();
                let explicitSuffixIsFuseau = false;
                try {
                  this.complex(outerStops);
                  explicitSuffixIsFuseau = true;
                } catch (error) {
                  if (!(error instanceof ParseError)) throw error;
                }
                this.restore(explicitSnapshot);
                if (explicitSuffixIsFuseau) {
                  this.restore(snapshot);
                  return null;
                }

                const branches = [first];
                while (this.base() === 'e') {
                  this.takeVowel('e'); const middle = this.series(new Set(['o']));
                  if (!middle.children.length) this.fail('Empty middle fuseau branch');
                  this.takeVowel('o'); branches.push(middle);
                  if (this.base() !== 'e') break;
                }
                const penultimate = this.series(new Set(['o']));
                if (!penultimate.children.length) this.fail('Complex fuseau needs its penultimate branch');
                this.takeVowel('o');
                const finalSnapshot = this.snapshot();
                let final = this.series(new Set(['o', ...outerStops]));
                let closingOmitted;
                if (final.children.length && this.base() === 'o') {
                  this.takeVowel('o');
                  closingOmitted = false;
                } else if (final.children.length
                    && (this.pos >= this.text.length || outerStops.has(this.base()))) {
                  closingOmitted = true;
                } else {
                  this.restore(finalSnapshot);
                  final = this.compactBranch();
                  closingOmitted = true;
                }
                branches.push(penultimate, final);
                return this.recordFuseauBoundaries(
                  { type:'parallel', branches }, true, closingOmitted
                );
              }

              const second = this.compactBranch(true);
              if (this.base() !== 'o') this.fail('Compact fuseau needs o after its second branch');
              this.takeVowel('o'); const third = this.compactBranch();
              const finished = this.finishCompactComplex([first, second, third], outerStops);
              return this.recordFuseauBoundaries(
                { type:'parallel', branches:finished.branches }, true, finished.closingOmitted
              );
            } catch (error) {
              if (!(error instanceof ParseError)) throw error;

            });

            let alter = 1;
            components.forEach((component, index) => {
              const same = component.type === 'element' && component.orientation === direction;
              if (same) {
                const measured = perpendicularMeasure(component, direction);
                if (measured > offMax && alter !== -1 && (alter !== 1 || sameCombo && index >= lastSame)) offMax = measured;
                if (drawIndex === 0 && measured > offMaxBack && alter === -1
                  && (index < firstDifferent || firstDifferent === -1) && !'|-'.includes(component.char)) {
                  offMaxBack = measured;
                }
                if ('şç'.includes(component.char)) {
                  offMax = Math.max(offMax, UNIT / SCALE);
                  if (drawIndex === 0) offMaxBack = Math.max(offMaxBack, UNIT / SCALE);
                }
              } else {
                currentWidth += offMax; offMax = 0;
                currentWidth += perpendicularMeasure(component, direction);
              }
              alter *= -1;
            });
            currentWidth += offMax;
            if (drawIndex === 0) widths.push(offMaxBack, currentWidth);
            else widths.push(currentWidth);
          });
          return widths.slice(0, ordered.length);
        }

        function renderNode(node, turtle, state, boundaryStart = false, boundaryEnd = false) {
          if (node.type === 'element') {
            const start = { x:turtle.x, y:turtle.y };
            const saved = turtle.clone(); const periodCircle = boundaryEnd && 'şç'.includes(node.char);
            let group;
            for (let attempt = 0; attempt < 2; attempt++) {
              group = make('g', { 'data-node':node.id }, artwork); drawingLayer = group;
              drawElement(turtle, node, state.normalDir, state.alter, boundaryStart || periodCircle, boundaryEnd);
              drawingLayer = artwork;
              const box = group.getBBox();
              const collision = occupied.some(other => {
                const width = Math.min(box.x + box.width, other.x + other.width) - Math.max(box.x, other.x);
                const height = Math.min(box.y + box.height, other.y + other.height) - Math.max(box.y, other.y);
                return width > 3 && height > 3;
              });
              if (!collision || attempt === 1) {
                occupied.push({ x:box.x + 1, y:box.y + 1, width:Math.max(0, box.width - 2), height:Math.max(0, box.height - 2) });
                break;
              }
              group.remove(); anchors.delete(node.id);
              turtle.x = saved.x; turtle.y = saved.y; turtle.heading = saved.heading; turtle.down = saved.down;
              state.normalDir = 1 - state.normalDir;
            }
            state.alter *= -1; state.direction = node.orientation;
            return { start, end:{x:turtle.x,y:turtle.y} };
          }
          if (node.type === 'series') {
            let result = { start:{x:turtle.x,y:turtle.y}, end:{x:turtle.x,y:turtle.y} };
            node.children.forEach((child, index) => {
              result = renderNode(child, turtle, state, boundaryStart || index > 0, boundaryEnd || index < node.children.length - 1);
            });
            return result;
          }

          // ItiDrawer chooses its fuseau stem by projected length and draws
          // remaining branches on alternating sides of that stem.
          const direction = state.direction;
          const ordered = node.branches.map((branch, index) => ({
            branch, index, length:projectedLength(branch, direction), width:projectedWidth(branch, direction),
          })).sort((a, b) => b.length - a.length || a.index - b.index);
          const origin = { x:turtle.x, y:turtle.y };
          const stem = ordered[0]; const widths = allocateFuseauWidths(ordered, direction);
          let side = 1; let stemEnd = origin;

          ordered.forEach((entry, drawIndex) => {
            const branchSide = side;
            turtle.penup(); turtle.goto(origin.x, origin.y); calibrate(turtle, direction, state.normalDir);
            if (drawIndex) {
              let lastStep = 0;
              for (let index = drawIndex % 2; index <= drawIndex; index += 2) lastStep += widths[index] || 0;
              turtle.right(90 * branchSide); turtle.forward(lastStep);
              turtle.left(90 * branchSide); turtle.forward(Math.max(0, (stem.length - entry.length) / 2));
            }
            turtle.pendown();
            const branchState = { ...state, alter:branchSide, normalDir:state.normalDir };
            renderNode(entry.branch, turtle, branchState, true, true);
            if (!drawIndex) stemEnd = { x:turtle.x, y:turtle.y };
            side *= -1;
          });
          turtle.penup(); turtle.goto(stemEnd.x, stemEnd.y); calibrate(turtle, direction, state.normalDir); turtle.pendown();
          state.alter *= -1;
          return { start:origin, end:stemEnd };
        }

        function gatePath(start, end) {
          const dx = end.x - start.x, dy = end.y - start.y;
          const distance = Math.hypot(dx, dy); if (!distance) return '';
          let nx = -dy / distance, ny = dx / distance;
          if (ny < 0 || Math.abs(ny) < .05 && nx < 0) { nx *= -1; ny *= -1; }
          const lift = Math.max(UNIT / SCALE * 2, Math.min(UNIT * 2, distance * .18));
          const c1 = { x:start.x + dx * .28 + nx * lift, y:start.y + dy * .28 + ny * lift };
          const c2 = { x:start.x + dx * .72 + nx * lift, y:start.y + dy * .72 + ny * lift };
          const steps = Math.max(24, Math.floor(distance / 3)); let path = `M${start.x} ${start.y}`;
          for (let step = 1; step <= steps; step++) {
            const ratio = step / steps, inv = 1 - ratio;
            let x = inv ** 3 * start.x + 3 * inv ** 2 * ratio * c1.x + 3 * inv * ratio ** 2 * c2.x + ratio ** 3 * end.x;
            let y = inv ** 3 * start.y + 3 * inv ** 2 * ratio * c1.y + 3 * inv * ratio ** 2 * c2.y + ratio ** 3 * end.y;
            if (step < steps) {
              const wave = (UNIT / SCALE / 4) * Math.sin(Math.PI * ratio) * Math.sin(2 * Math.PI * distance * ratio / (UNIT / SCALE * 2.5));
              x += nx * wave; y += ny * wave;
            }
            path += `L${x} ${y}`;
          }
          return path;
        }

        function drawTurtleCursor(turtle) {
          const forward = turtle.vector(1); const side = turtle.vector(1, turtle.heading + 90);
          const tip = { x:turtle.x + forward.x * 10, y:turtle.y + forward.y * 10 };
          const back = { x:turtle.x - forward.x * 8, y:turtle.y - forward.y * 8 };
          const points = [
            `${tip.x},${tip.y}`,
            `${back.x + side.x * 6},${back.y + side.y * 6}`,
            `${back.x - side.x * 6},${back.y - side.y * 6}`,
          ].join(' ');
          make('polygon', { points, class:'turtle-cursor', 'aria-hidden':'true' }, artwork);
        }

        let viewBox = { x:0, y:0, w:100, h:100 };
        function fitDrawing() {
          if (!artwork.childNodes.length) return;
          const box = artwork.getBBox(); const pad = 54;
          viewBox = { x:box.x-pad, y:box.y-pad, w:Math.max(100,box.width+pad*2), h:Math.max(100,box.height+pad*2) };
          svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        }

        function draw() {
          artwork.replaceChildren(); anchors.clear(); status.classList.remove('error');
          occupied.length = 0; drawingLayer = artwork;
          try {
            const documentTree = parse(source.value);
            const turtle = new SvgTurtle(0, 0, 180);
            const drawingState = { direction:0, normalDir:0, alter:1 };
            documentTree.sentences.forEach((sentence, index) => {
              const hasPeriod = documentTree.periods[index];
              renderNode(sentence, turtle, drawingState, false, hasPeriod);
              if (hasPeriod) turtle.dot(UNIT / SCALE / 2);
              if (index < documentTree.sentences.length - 1) {
                turtle.penup(); turtle.forward(UNIT / SCALE); turtle.pendown();
              }
            });
            const elements = anchors.size;
            documentTree.gates.forEach(gate => {
              const a = anchors.get(gate.source), b = anchors.get(gate.target); if (!a || !b) return;
              make('path', { class:'gate', d:gatePath(a, b) });
            });
            if (elements) drawTurtleCursor(turtle);
            status.textContent = elements ? 'Live' : 'Ready';
            count.textContent = `${elements} element${elements === 1 ? '' : 's'}`;
            requestAnimationFrame(fitDrawing);
          } catch (error) {
            status.textContent = error.message; status.classList.add('error');
            count.textContent = `${anchors.size} elements`;
            if (artwork.childNodes.length) requestAnimationFrame(fitDrawing);
          }
        }

        const typedCompounds = new Map([
          ['ae', 'ẽ'], ['ao', 'õ'], ['ei', 'ĩ'], ['oi', 'ị'], ['oe', 'ẹ'], ['eo', 'ơ'], ['eu', 'ư'], ['ou', 'ũ'],
          ['aoe', 'ȡ'], ['õe', 'ȡ'], ['áé', 'ẻ'], ['óé', 'ț'], ['áóé', 'ȟ'], ['ỏé', 'ȟ'], ['éí', 'ỉ'], ['óí', 'ȍ'],
          ['áó', 'ỏ'], ['óú', 'ủ'], ['éú', 'ứ'],
        ]);
        // Keyboard spellings for the replacement symbols in the V2 inventory.
        // Plain h is already the dynamic h symbol and needs no composition.
        const dottedConsonants = new Map([
          ['s', 'ş'], ['c', 'ç'], ['g', 'ğ'],
        ]);
        const accentKeys = {
          '`': new Map([
            ['a','á'], ['e','é'], ['i','í'], ['o','ó'], ['ơ','ớ'], ['u','ú'],
            ['ẽ','ẻ'], ['ị','ȍ'], ['ẹ','ț'], ['ȡ','ȟ'], ['õ','ỏ'], ['ư','ứ'], ['ũ','ủ'], ['ĩ','ỉ'],
          ]),
          '-': new Map([['a','à'], ['e','è'], ['i','ì'], ['o','ò'], ['ơ','ờ'], ['u','ù']]),
          '=': new Map([['a','ā'], ['e','ē'], ['i','ī'], ['o','ō'], ['u','ū']]),
        };

        function composeAtCaret() {
          if (source.selectionStart !== source.selectionEnd) return false;
          const caret = source.selectionStart; const before = source.value.slice(0, caret);
          if (before.length >= 2 && before.at(-1).toLowerCase() === 'h') {
            const dotted = dottedConsonants.get(before.at(-2).toLowerCase());
            if (dotted) {
              source.setRangeText(dotted, caret - 2, caret, 'end');
              return true;
            }
          }
          const matches = [...typedCompounds.entries()].sort((a, b) => b[0].length - a[0].length);
          for (const [sequence, compound] of matches) {
            if (!before.endsWith(sequence)) continue;
            source.setRangeText(compound, caret - sequence.length, caret, 'end');
            return true;
          }
          return false;
        }

        let timer;
        function scheduleDraw() { clearTimeout(timer); timer = setTimeout(draw, 90); }
        source.addEventListener('input', event => {
          if (!event.isComposing) {
            while (composeAtCaret()) { /* fold the longest compound suffix */ }
          }
          scheduleDraw();
        });
        source.addEventListener('keydown', event => {
          if (event.isComposing || event.ctrlKey || event.metaKey || event.altKey || !accentKeys[event.key]) return;
          if (source.selectionStart !== source.selectionEnd || source.selectionStart === 0) return;
          const caret = source.selectionStart; const previous = source.value.slice(caret - 1, caret);
          const accented = accentKeys[event.key].get(previous); if (!accented) return;
          event.preventDefault(); source.setRangeText(accented, caret - 1, caret, 'end');
          while (composeAtCaret()) { /* accented sequences can also collapse */ }
          scheduleDraw();
        });
        document.querySelectorAll('input[name="font"]').forEach(input => input.addEventListener('change', event => {
          source.classList.toggle('font-nuaiti', event.target.value === 'nuaiti'); source.focus();
        }));
        document.querySelector('#random-text').addEventListener('click', () => {
          source.value = generateRandomText();
          source.setSelectionRange(source.value.length, source.value.length);
          draw();
          source.focus();
        });
        document.querySelector('#fit').addEventListener('click', fitDrawing);
        document.querySelector('#download').addEventListener('click', () => {
          const clone = svg.cloneNode(true); clone.setAttribute('xmlns', NS);
          const blob = new Blob([new XMLSerializer().serializeToString(clone)], { type:'image/svg+xml' });
          const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = 'ete-drawing.svg'; link.click();
          setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        });

        let pan = null;
        svg.addEventListener('pointerdown', event => {
          if (event.pointerType === 'mouse' && event.button !== 0) return;
          if (event.cancelable) event.preventDefault();
          pan = { clientX:event.clientX, clientY:event.clientY, viewX:viewBox.x, viewY:viewBox.y };
          svg.setPointerCapture(event.pointerId);
        }, { passive:false });
        svg.addEventListener('pointermove', event => {
          if (!pan) return;
          if (event.cancelable) event.preventDefault();
          const scaleX = viewBox.w / svg.clientWidth, scaleY = viewBox.h / svg.clientHeight;
          viewBox.x = pan.viewX - (event.clientX-pan.clientX) * scaleX;
          viewBox.y = pan.viewY - (event.clientY-pan.clientY) * scaleY;
          svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        }, { passive:false });
        const endPan = () => { pan = null; };
        svg.addEventListener('pointerup', endPan);
        svg.addEventListener('pointercancel', endPan);
        svg.addEventListener('lostpointercapture', endPan);
        // iOS fallback: a drag anywhere in the drawing panel belongs to the
        // drawing surface, never to the page's vertical scroller.
        drawerPanel.addEventListener('touchmove', event => {
          if (event.cancelable) event.preventDefault();
        }, { passive:false });
        svg.addEventListener('wheel', event => {
          event.preventDefault(); const factor = event.deltaY > 0 ? 1.12 : .89; const rect = svg.getBoundingClientRect();
          const px = viewBox.x + (event.clientX-rect.left)/rect.width*viewBox.w; const py = viewBox.y + (event.clientY-rect.top)/rect.height*viewBox.h;
          viewBox.x = px - (px-viewBox.x)*factor; viewBox.y = py - (py-viewBox.y)*factor; viewBox.w *= factor; viewBox.h *= factor;
          svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        }, { passive:false });

        draw();
      })();
    </script>
  </body>
</html>
