<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divinatory Canvas</title>
    <style>
      :root {
        --mono-en: Consolas, 'Courier New', ui-monospace, SFMono-Regular, Menlo, Monaco;
        --mono-zh:
          'Sarasa Mono SC', 'Source Han Mono SC', 'Noto Sans Mono CJK SC', 'PingFang SC',
          'Microsoft YaHei', monospace;
      }

      body {
        margin: 0;
        overflow: hidden;
        background-color: #f4f4f9;
        /* background-color: #262626; */
        /* background-color: #eef7f2; */
        /* background-color: #f9f1db; */
        font-family: var(--mono-en);
        display: flex;
        height: 100vh; /* Full viewport height */
      }

      body.lang-zh {
        font-family: var(--mono-en), var(--mono-zh);
      }

      .symbol {
        position: absolute;
        width: 117px; /* Full width = 156 */
        height: 50.25px; /* Full height = 67 */
        cursor: grab;
        user-select: none;
        z-index: 3;
        pointer-events: auto;
      }
      .symbol img {
        width: 100%;
        height: 100%;
      }

      .dot {
        position: absolute;
        width: 5px; /* Full width = 156 */
        height: 5px; /* Full height = 67 */
        cursor: grab;
        user-select: none;
      }

      /* Highlight connections */
      .framed {
        outline: 2px solid #00b0f0;
      }

      /* Basic styles for the button */
      .button {
        position: fixed; /* Enables top and left positioning */
        background-size: contain; /* Ensure the image covers the entire button */
        background-repeat: no-repeat;
        background-position: center;
        border: none;
        border-radius: 5px; /* Optional: Makes the button rounded */
        cursor: pointer;
        opacity: 1;
        transition: opacity 0.2s;
        z-index: 1;
      }

      /* Add hover effect */
      .button:hover {
        opacity: 0.5;
      }

      .logo {
        position: fixed;
        top: 30px;
        right: 10px;
        width: 250px;
        height: auto;
        margin-bottom: 0; /* fixed 元素不需要这个 */
      }

      .wheel {
        position: fixed;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        cursor: pointer;
        z-index: 1;
      }

      /* Tab styles */
      .tab {
        color: white;
        text-align: center;
        line-height: 100px;
        font-size: 40px;
        font-family: inherit; /* Set font to match labels */
        width: 280px;
        height: 100px; /* Make taller for rectangular shape */
        padding: 0; /* No extra padding */
        cursor: pointer;
        margin: 0px 0; /* Spacing between buttons */
        border-radius: 0; /* Remove rounded corners */
        transition:
          background-color 1s ease-in-out,
          opacity 1s ease-in-out;
        opacity: 0.5; /* Start at a slightly faded state */
      }

      .tab:hover {
        background-color: rgba(255, 255, 255, 0.4);
        transition: background-color 0.3s;
      }

      .tab-active {
        background-color: rgba(255, 255, 255, 0.6);
        opacity: 1; /* Fully visible */
      }

      :root {
        --sidebar-w: 280px;
      }

      /* Vertical bar styles */
      .vertical-bar {
        position: fixed;
        top: 0;
        right: 0;
        width: var(--sidebar-w);
        height: 100%;
        background-color: #00b0f0; /* Blue background */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 200px;
        z-index: 99999;
      }

      /* Content container */
      .content {
        margin-left: auto; /* Push content to the left of the vertical bar */
        margin-right: var(--sidebar-w); /* Leave space for the vertical bar */
        flex: 1;
        padding: 20px;
        overflow: hidden;
        height: 100vh;
        box-sizing: border-box;
      }

      /* Content sections */
      .tab-content {
        display: none; /* Hide all content by default */
        height: 100%;
      }

      .tab-content.active {
        display: block; /* Show active tab content */
      }

      #tab2 {
        position: relative;
        width: calc(100% + 20px);
        height: calc(100% + 40px);
        margin: -20px -20px -20px 0;
        overflow: hidden;
        box-sizing: border-box;
      }

      #tab0 {
        width: calc(100% + 20px);
        height: calc(100% + 40px);
        margin: -20px -20px -20px 0;
        overflow-y: auto;
        overflow-x: hidden;
        box-sizing: border-box;
      }

      #craftCanvas {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #chatCanvas {
        position: relative;
        width: 24000px;
        height: 24000px;
        min-width: 24000px;
        min-height: 24000px;
        background: #f4f4f9;
      }

      #tab4 {
        position: relative;
        width: calc(100% + 40px);
        height: calc(100% + 40px);
        margin: -20px -20px 0 -20px;
        overflow: scroll;
        background: #f4f4f9;
        min-width: 0;
        box-sizing: border-box;
      }

      #chatControls {
        position: sticky;
        left: 0;
        bottom: 0;
        width: 0;
        height: 0;
        z-index: 20;
        pointer-events: none;
      }

      #chatControls > * {
        pointer-events: auto;
      }

      .marquee-box {
        position: absolute;
        background: transparent;
        pointer-events: none;
        z-index: 99999;
        outline: 10px dashed #00b0f0;
      }

      #top-right-ui {
        position: fixed;
        top: 55px; /* 你想要的 */
        right: calc(var(--sidebar-w) + 30px);
        display: flex;
        align-items: center;
        gap: 25px;
        z-index: 1000000;
      }

      /* language toggle pill (matches badge style) */
      .lang-toggle {
        display: inline-flex;
        align-items: center;
        z-index: 100000;
      }

      .lang-circle {
        display: none;
      }

      .lang-menu {
        position: static;
        background: white;
        border: 2px solid #ccc;
        border-radius: 999px;
        padding: 6px;
        display: inline-flex;
        gap: 6px;
        white-space: nowrap;
        z-index: 1000002;
      }

      .lang-item {
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: transparent;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
      }
      .lang-item:hover {
        background: rgba(0, 0, 0, 0.06);
      }
      .lang-item.active {
        background: rgba(0, 0, 0, 0.1);
      }

      #quota-badge {
        z-index: 1000000; /* ✅ 盖在内容上，但低于/高于栏都行 */
        padding: 6px 10px;
        border-radius: 5px;
        border: 1px solid #000;
        background: rgba(255, 255, 255, 0.9);
        font-size: 16px;
        font-family: inherit;
        pointer-events: auto; /* 可选：不挡点击 */
      }

      #quota-badge * {
        pointer-events: auto;
      }

      /* Color palette styles */
      .palette {
        position: fixed;
        display: flex;
        justify-content: center;
        margin: 20px auto;
        gap: 10px;
      }

      .color {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #ccc;
      }

      .color:hover {
        border: 2px solid black;
      }

      .progress-ring {
        position: absolute;
        width: 50px; /* Ensure this matches the SVG width */
        height: 50px; /* Ensure this matches the SVG height */
        transform: rotate(-90deg);
        visibility: hidden;
      }

      .progress-ring circle {
        fill: none;
        stroke: transparent;
        stroke-width: 5;
        stroke-dasharray: 157; /* Full circle length */
        stroke-dashoffset: 157; /* Start fully hidden */
        transition:
          stroke-dashoffset 0s,
          stroke 0s;
      }

      /* Style for the label */
      .symbol-label {
        position: absolute;
        background: white;
        border: 1px solid black;
        padding: 4px 8px;
        border-radius: 5px;
        font-size: 16px;
        font-family: inherit; /* Set font to match labels */
        cursor: pointer;
        z-index: 1000004;
        pointer-events: auto;
        user-select: none;
        -webkit-user-select: none;
      }

      .symbol-label.active {
        border-width: 3px; /* Thicker border when clicked */
      }

      .symbol-label.user-created-label {
        background: #fff1bf;
        border-color: #c78a00;
        box-shadow: 0 0 0 2px rgba(199, 138, 0, 0.18);
      }

      /* Style for the input box */
      .label-input {
        position: absolute;
        width: 200px;
        border: 1px solid black;
        padding: 5px;
        font-size: 16px;
        font-family: inherit; /* Set font to match labels */
        border-radius: 5px;
        z-index: 5;
      }

      /* Auto-resizing textarea */
      .label-textarea {
        position: absolute;
        width: 200px;
        min-height: 40px;
        max-width: 200px;
        border: 1px solid black;
        padding: 5px;
        font-size: 16px;
        font-family: inherit;
        border-radius: 5px;
        resize: none;
        overflow: hidden;
        z-index: 5;
      }

      /* Style the submit button */
      .submit-button {
        position: absolute;
        background-color: white; /* Green */
        color: black;
        border: 1px solid black;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        width: 27px;
        height: 27px;
        line-height: 27px;
        text-align: center;
        z-index: 5;
      }

      /* Hover effect */
      .submit-button:hover {
        opacity: 0.5;
      }

      .typing-effect p {
        position: absolute;
        font-size: 16px;
        font-family: inherit;
        display: inline-block;
        white-space: pre-line;
        line-height: 1.5; /* Adjusts spacing for smooth movement */
        overflow: hidden;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      #message-input {
        position: absolute;
        bottom: 110px;
        left: 400px;
        padding: 10px;
        width: 400px;
        font-size: 24px; /* Larger font size */
        background-color: transparent; /* Transparent background */
        border: none; /* No border */
        color: black; /* Text color */
      }

      /* Style the placeholder text (prompt) */
      #message-input::placeholder {
        font-style: italic; /* Italicize the placeholder text */
        color: gray; /* Gray color for the placeholder */
      }

      #chat-question {
        position: absolute;
        left: 850px;
        bottom: 80px;
        width: 420px;
        min-height: 0;
        padding: 10px 14px;
        border: 2px solid rgba(0, 0, 0, 0.24);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        color: black;
        font-size: 20px;
        line-height: 1.35;
        box-sizing: border-box;
        z-index: 21;
        pointer-events: none;
      }

      #chat-question-label {
        font-weight: 700;
        margin-right: 8px;
      }

      #chat-question-text {
        white-space: normal;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      #symbol-message-input {
        position: absolute;
        bottom: 58px;
        left: 400px;
        padding: 10px;
        width: 400px;
        font-size: 24px;
        background-color: transparent;
        border: none;
        color: black;
      }

      #symbol-message-input::placeholder {
        font-style: italic;
        color: gray;
      }

      #cursor {
        display: inline-block;
        margin-left: 1px;
        animation: blink 0.8s infinite;
        font-weight: bold;
        animation: blink 0.8s infinite;
      }

      .image-container {
        display: flex;
        justify-content: center;
      }
      .image-container img {
        width: 10%; /* 50% of the parent container */
        height: auto; /* Maintain aspect ratio */
      }

      .image-row {
        display: flex; /* Align images in a row */
        justify-content: center; /* Center images horizontally */
        align-items: center; /* Align images vertically */
        gap: 10px; /* Space between images */
      }

      .image-row img {
        width: 20%; /* Set a uniform width */
        height: auto; /* Set a uniform height */
        object-fit: cover; /* Crop images to fit without stretching */
      }

      #network {
        width: 82vw;
        height: 100vh;
        border: none;
        background: transparent;
        box-shadow: none;
      }

      #libraryTreeView {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        display: none;
        overflow-x: auto;
        overflow-y: scroll;
        background: transparent;
        box-sizing: border-box;
      }

      #libraryTreeSurface {
        position: relative;
        min-width: 100%;
        min-height: 100%;
      }

      #libraryTreeSvg {
        position: absolute;
        inset: 0;
        overflow: visible;
        pointer-events: none;
      }

      .library-tree-card {
        position: absolute;
        min-width: 180px;
        min-height: 74px;
        padding: 12px 14px;
        border: 3px solid black;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.96);
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        text-align: left;
      }

      .library-tree-card.basic {
        background: rgba(255, 255, 255, 0.84);
      }

      .library-tree-card-image {
        width: 42px;
        height: 42px;
        flex: 0 0 auto;
        object-fit: contain;
        box-sizing: border-box;
      }

      .library-tree-card-text {
        min-width: 0;
        flex: 1 1 auto;
      }

      .library-tree-card-word {
        font-size: 16px;
        line-height: 1.2;
        word-break: break-word;
        max-width: 100%;
        font-weight: 700;
      }

      .library-tree-card-definition {
        margin-top: 4px;
        font-size: 13px;
        line-height: 1.25;
        word-break: break-word;
        max-width: 100%;
      }

      /* World: solid ocean color, no background animation */
      #world {
        position: relative;
        width: calc(100vw - var(--sidebar-w));
        height: calc(100vh + 39px);
        margin: -20px;
        background: #00b0f050; /* solid */
        overflow: hidden;
        cursor: grab;
      }

      .foam {
        position: absolute;
        width: 22px;
        height: 10px;
        pointer-events: none;
        image-rendering: pixelated;

        /* 3 bumps wave */
        background:
                /* bump 1 */
          linear-gradient(#fff 0 0) 0px 6px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 2px 4px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 4px 2px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 6px 4px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 8px 6px / 2px 2px no-repeat,
          /* bump 2 */ linear-gradient(#fff 0 0) 8px 6px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 10px 4px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 12px 2px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 14px 4px / 2px 2px no-repeat,
          linear-gradient(#fff 0 0) 16px 6px / 2px 2px no-repeat;

        animation: foamBob var(--dur, 1.6s) steps(6) infinite;
        animation-delay: var(--delay, 0s);
        opacity: var(--alpha, 0.85);
      }

      @keyframes foamBob {
        0% {
          transform: translateY(0px);
          opacity: 0;
        }
        15% {
          opacity: var(--alpha, 0.85);
        }
        50% {
          transform: translateY(calc(-1 * var(--rise, 10px)));
          opacity: 1;
        }
        85% {
          opacity: var(--alpha, 0.85);
        }
        100% {
          transform: translateY(0px);
          opacity: 0;
        }
      }

      #world.dragging {
        cursor: grabbing;
      }

      #worldContent {
        position: absolute;
        left: 0;
        top: 0;
        transform: translate(0px, 0px);
        will-change: transform;
      }

      .world-boundary {
        position: absolute;
        inset: 0;
        border: 3px solid rgba(0, 0, 0, 0.28);
        pointer-events: none;
      }

      .island {
        position: absolute;
      }

      .island-block {
        position: absolute;
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 6px;
      }

      .island-highlight {
        display: none;
      }
      .island.selected .island-highlight {
        display: block;
      }

      #tab-header4 {
        display: none;
      }

      .no-text-select,
      .no-text-select * {
        user-select: none !important;
      }

      .vis-tooltip {
        font-family:
          Consolas,
          'DejaVu Sans Mono',
          'Noto Sans Mono',
          'Liberation Mono',
          'Courier New',
          /* CJK monospace fallback later */ 'Sarasa Mono SC',
          'Source Han Mono SC',
          'Noto Sans Mono CJK SC',
          monospace !important;
      }
    </style>
    <script
      type="text/javascript"
      src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"
    ></script>
  </head>
  <body>
    <div id="top-right-ui">
      <div id="lang-toggle" class="lang-toggle">
        <button id="lang-btn" class="lang-circle" title="Language">🌐</button>
        <div id="lang-menu" class="lang-menu">
          <button id="lang-en" class="lang-item">EN</button>
          <button id="lang-zh" class="lang-item">中文</button>
        </div>
      </div>
      <div id="quota-badge" class="quota-badge">Credits spent: --/--</div>
    </div>

    <div class="vertical-bar">
      <img src="./icons/iti.svg" alt="Logo" class="logo" id="logo" />
      <div class="tab" id="tab-header0" onclick="showTab(0)">Home</div>
      <div class="tab" id="tab-header1" onclick="showTab(1)">Craft</div>
      <div class="tab" id="tab-header2" onclick="showTab(2)">Library</div>
      <div class="tab" id="tab-header3" onclick="showTab(3)">World</div>
      <div class="tab" id="tab-header4" onclick="showTab(4)">Chat</div>
    </div>

    <div class="content">
      <div class="tab-content" id="tab0">
        <div id="home-content"></div>
      </div>

      <div class="tab-content" id="tab1">
        <div id="craftCanvas"></div>

        <div id="craftControls">
          <!-- Color palette -->

          <div class="palette" id="palette">
            <div class="color" style="background-color: #5cb3cc"></div>
            <div class="color" style="background-color: #d00000"></div>
            <div class="color" style="background-color: #d6a01d"></div>
            <div class="color" style="background-color: white"></div>
            <div class="color" style="background-color: black"></div>
          </div>
        </div>
        <p></p>
      </div>
      <div class="tab-content" id="tab2">
        <div id="network"></div>
      </div>
      <div class="tab-content" id="tab3">
        <div id="world">
          <div id="worldContent"></div>
        </div>
      </div>
      <div class="tab-content" id="tab4">
        <div id="chatCanvas"></div>
        <div id="chatControls">
          <!-- Input box at the bottom of the page -->
          <input
            type="text"
            id="message-input"
            placeholder="Type a message to turn into emoji..."
            maxlength="32"
          />
          <input
            type="text"
            id="symbol-message-input"
            placeholder="Type a message to turn into symbol..."
            maxlength="32"
          />
        </div>
        <p></p>
      </div>
    </div>

    <script type="module">
      // --- i18n dictionary (minimal starter) ---
      const I18N = {
        en: {
          homeHTML: `
          <h1 style="text-align: center">Divinatory Conlang on Canvas</h1>
          <br>
          <p>
          Welcome!<br />
          Ever wondered how divination works?<br />
          Fortune tellers interpret meaning in random patterns. Every corner in the world from Tarot cards to teacup dregs can be an oracle.
          Maybe there is a divine spirit hidden behind it. Maybe they simply know how to tell a
          story from what they see.
          </p>

          <p>
          I want to use this website to explore the logic behind divination. It is a symbolic
          experiment-game that lets you become a "fortune teller" - really, someone who uses
          abstract symbols to probe the meaning of life.<br />
          I am not going to hand you a complete symbolic language. Instead, I want to help you
          build one for yourself from scratch, step by step, almost like building with blocks.
          At the same time, you will also train and strengthen your own intuition.
          </p>

          <p>
          The linguistic "atoms" you can work with, the basic symbols, are given by me. But the
          "molecules," the ways they combine, are entirely up to you.<br />
          These basic symbols were originally inspired by the Yijing trigrams, though they have
          already transformed a lot during development and now have a more independent identity.
          </p>

          <div
          style="
              max-width: 680px;
              margin: 18px auto 22px auto;
              padding: 14px 16px;
              background: white;
              border: 1px solid black;
              border-radius: 10px;
              box-shadow: 0 4px 0 rgba(0, 0, 0, 0.08);
              font-family: inherit;
          "
          >
          <div style="text-align: center; font-size: 18px; margin-bottom: 10px">
              <b>TL;DR - How to start</b>
          </div>

          <div style="font-size: 14px; line-height: 1.5">
              <div style="margin-bottom: 8px">
              <b>1) Build a word:</b> Go to <b>Craft</b>, press the <b>symbol wheel</b> to create a
              symbol, and drag it onto the canvas. Symbols can magnetically snap together.
              </div>
              <div style="margin-bottom: 8px">
              <b>2) Select + Insight:</b> <b>Click and hold</b> any symbol to select the
              <b>connected component</b> it belongs to, then press <b>Insight</b> (the eye) to get
              prompts about its meaning.
              </div>
              <div style="margin-bottom: 10px">
              <b>3) Define + save:</b> Enter what the symbol cluster means and your reasoning.
              If it passes, it will appear in the <b>Library</b>.
              </div>
              <div style="margin-bottom: 10px">
              <b>4) World + chat:</b> Go into <b>World</b>, choose any island, and switch to the tab of its name. Now you can talk using the words you created.
              </div>
              <div style="text-align:center; padding-top:8px; border-top:1px dashed rgba(0,0,0,0.35);">
              Starter challenge: try making <b>sky</b>, <b>rain</b>, <b>flower</b>, and <b>world</b>.
              </div>
          </div>
          </div>

          <p><b>How do the symbols combine?</b> There are two ways:</p>

          <div class="image-row">
              <img
              class="i18n-img"
              data-src-en="./icons/sp.png"
              data-src-zh="./icons/sp-zh.png"
              src="./icons/sp.png"
              alt="Symbol combinations"
              />
          </div>

          <p>
          <b>Series</b> represents <b>contiguous spatial relationships</b>: above, below, left,
          right, inside, outside, near, covering, and so on.
          </p>

          <p style="text-align: center">
          <b>Examples</b><br />
          (1) A traffic light = three lights lined up in a row.<br />
          (2) A granary = a roof placed on top of a pile of grain.
          </p>

          <p>
          <b>Parallel</b> represents a <b>composite concept</b>: multiple qualities or meanings
          layered into the same space.
          </p>

          <p style="text-align: center">
          <b>Examples</b><br />
          (1) A white rock = "white" + "hard".<br />
          (2) A bullet = "small" + "advancing/striking forward".

      function getDensestChatViewportCenter(tab, items) {
        if (!items.length) return null;

        const viewportW = tab.clientWidth || 800;
        const viewportH = tab.clientHeight || 600;
        const halfW = viewportW / 2;
        const halfH = viewportH / 2;

        const centers = items.map((el) => {
          const left = parseFloat(el.style.left) || 0;
          const top = parseFloat(el.style.top) || 0;
          const width = el.offsetWidth || 0;
          const height = el.offsetHeight || 0;
          return {
            x: left + width / 2,
            y: top + height / 2,
          };
        });

        let best = null;

        for (const pivot of centers) {
          const cluster = centers.filter(
            (pt) => Math.abs(pt.x - pivot.x) <= halfW && Math.abs(pt.y - pivot.y) <= halfH,
          );

          const avgX = cluster.reduce((sum, pt) => sum + pt.x, 0) / cluster.length;
          const avgY = cluster.reduce((sum, pt) => sum + pt.y, 0) / cluster.length;

          if (
            !best ||
            cluster.length > best.count ||
            (cluster.length === best.count &&
              Math.hypot(avgX - pivot.x, avgY - pivot.y) < best.scatter)
          ) {
            best = {
              count: cluster.length,
              x: avgX,
              y: avgY,
              scatter: Math.hypot(avgX - pivot.x, avgY - pivot.y),
            };
          }
        }

        return best ? { x: best.x, y: best.y } : null;
      }

      function hash32(uid) {
        // FNV-1a 32-bit hash (stable, decent distribution)
        let h = 0x811c9dc5;
        for (let i = 0; i < uid.length; i++) {
          h ^= uid.charCodeAt(i);
          h = Math.imul(h, 0x01000193);
        }
        return h >>> 0; // unsigned
      }

      function generateColor(uid) {
        const h = hash32(uid);

        // Use a stable "index" from hash (0..65535)
        const idx = h & 0xffff;

        // Golden angle spread
        const GOLDEN_ANGLE = 137.50776405003785;
        const hue = (idx * GOLDEN_ANGLE) % 360;

        // Optional: vary sat/light a bit to further separate close hues
        const sat = 62 + ((h >>> 16) % 18); // 62..79
        const light = 48 + ((h >>> 24) % 18); // 48..65

        return `hsl(${hue.toFixed(0)}, ${sat}%, ${light}%)`;
      }

      class PatternGraph {
        constructor() {
          this.nodes = []; // [{elemIdTrue,isDynamic,angle}]
          this.adj = []; // adj[i][side] = [[j, jSide], ...]
        }

        addNode(info) {
          const idx = this.nodes.length;
          this.nodes.push(info);
          this.adj.push([[], [], [], [], [], []]);
          return idx;
        }

        addEdge(i, side, j, jSide) {
          this.adj[i][side].push([j, jSide]);
        }

        size() {
          return this.nodes.length;
        }
      }

      function serializePatternGraph(pattern) {
        if (!pattern) return null;

        // pattern can be a PatternGraph instance or a plain object with same shape
        const nodes = Array.isArray(pattern.nodes)
          ? pattern.nodes.map((n) => ({
              elemIdTrue: n.elemIdTrue ?? null,
              isDynamic: !!n.isDynamic,
              angle: n.angle ?? 0,
              relLeft: n.relLeft ?? null,
              relTop: n.relTop ?? null,
            }))
          : [];

        const edges = [];

        // pattern.adj[i][side] = [[j, jSide], ...]
        const adj = Array.isArray(pattern.adj) ? pattern.adj : [];
        for (let i = 0; i < adj.length; i++) {
          const sides = Array.isArray(adj[i]) ? adj[i] : [];
          for (let side = 0; side < sides.length; side++) {
            const list = Array.isArray(sides[side]) ? sides[side] : [];
            for (const pair of list) {
              if (!Array.isArray(pair) || pair.length < 2) continue;
              const [j, jSide] = pair;

              edges.push({
                from: i,
                fromSide: side,
                to: j,
                toSide: jSide,
              });
            }
          }
        }

        return { nodes, edges };
      }

      function deserializePatternGraph(raw) {
        if (!raw || !Array.isArray(raw.nodes)) return null;

        const pg = new PatternGraph();

        for (const n of raw.nodes) {
          pg.addNode({
            elemIdTrue: n.elemIdTrue,
            isDynamic: !!n.isDynamic,
            angle: n.angle ?? 0,
            relLeft: n.relLeft ?? null,
            relTop: n.relTop ?? null,
          });
        }

        if (Array.isArray(raw.edges)) {
          for (const e of raw.edges) {
            if (
              typeof e?.from !== 'number' ||
              typeof e?.fromSide !== 'number' ||
              typeof e?.to !== 'number' ||
              typeof e?.toSide !== 'number'
            )
              continue;

            // Optional bounds check
            if (e.from < 0 || e.from >= pg.nodes.length) continue;
            if (e.to < 0 || e.to >= pg.nodes.length) continue;
            if (e.fromSide < 0 || e.fromSide > 5) continue;
            if (e.toSide < 0 || e.toSide > 5) continue;

            pg.addEdge(e.from, e.fromSide, e.to, e.toSide);
          }
        }

        return pg;
      }

        if (!layout || !Array.isArray(layout.nodes)) return null;

        return {

      function deserializeSelectionLayout(raw) {
        if (!raw || !Array.isArray(raw.nodes)) return null;

        return {
          nodes: raw.nodes.map((n) => ({
            elemId: n.elemId ?? n.elemIdTrue ?? null,

                }))

      class SymbolGraph {
        constructor() {
          this.map = new Map(); // Maps symbol to its adjacency list
        }

        addSymbol(symbol, connections) {
          this.map.set(symbol, connections); // connections = [[], [], (n, j), [], [], []]
        }

        getSymbolConnections(symbol) {
          return this.map.get(symbol) || null; // Return connections or null if not found
        }

        getSymbols() {
          return Array.from(this.map.keys()); // Return all symbols in the graph
        }

        hasSymbol(symbol) {
          return this.map.has(symbol);
        }

        // ✅ 删除节点 + 清理所有引用它的边
        removeSymbol(symbol) {
          if (!this.map.has(symbol)) return;

          // 1) 先从所有其他节点的邻接表中移除指向 symbol 的边
          for (const [node, conns] of this.map.entries()) {
            if (node === symbol) continue;
            for (let side = 0; side < 6; side++) {
              const arr = conns[side];
              if (!Array.isArray(arr) || arr.length === 0) continue;

              // 每个元素形如 [neighbor, neighborSide]
              conns[side] = arr.filter(([nbr, _nbrSide]) => nbr !== symbol);
            }
            this.map.set(node, conns);
          }

          // 2) 再删除 symbol 自己
          this.map.delete(symbol);
        }

        // ✅ 可选：批量清理已不在 DOM 中的节点（防御性）
        pruneDetachedSymbols() {
          for (const sym of this.map.keys()) {
            if (!sym || !sym.isConnected) {
              this.removeSymbol(sym);
            }
          }
        }

        doesMatch(storedGraph, currSymbol, matchedSymbols) {
          if (matchedSymbols.size === storedGraph.map.size) return true; // Full match found

          for (let [storedSymbol] of storedGraph.map.entries()) {
            if (matchedSymbols.has(storedSymbol)) continue; // Already matched

            if (this.isSymbolMatch(currSymbol, storedSymbol)) {
              console.log(`Matching: ${currSymbol.elemIdTrue} ↔ ${storedSymbol.elemIdTrue}`);
              matchedSymbols.set(storedSymbol, currSymbol);

              let isValid = true;

              // Check all six sides
              for (let i = 0; i < 6; i++) {
                let storedNeighbors = storedGraph.map.get(storedSymbol)[i] || [];
                let currNeighbors = this.map.get(currSymbol)?.[i] || [];

                if (storedNeighbors.length > currNeighbors.length) {
                  console.log(
                    'Stored neighbor:' + storedNeighbors + ' Current neighbor:' + currNeighbors,
                  );
                  console.log(`Mismatch at side ${i}: Not enough neighbors`);
                  isValid = false;
                  break;
                }

                let foundAll = true;
                for (let [storedNeighbor, storedSide] of storedNeighbors) {
                  let foundMatch = false;

                  for (let [currNeighbor, currSide] of currNeighbors) {
                    if (
                      currSide === storedSide &&
                      this.isSymbolMatch(currNeighbor, storedNeighbor)
                    ) {
                      if (
                        matchedSymbols.has(currNeighbor) ||
                        this.doesMatch(storedGraph, currNeighbor, matchedSymbols)
                      ) {
                        foundMatch = true;
                        break;
                      }
                    }
                  }

                  if (!foundMatch) {
                    console.log(`Neighbor mismatch: ${storedNeighbor.elemIdTrue} not found`);
                    foundAll = false;
                    break;
                  }
                }

                if (!foundAll) {
                  isValid = false;
                  break;
                }
              }

              if (isValid) return true;
              matchedSymbols.delete(storedSymbol); // Backtrack
            }
          }
          return false;
        }

        isSymbolMatch(currSymbol, storedSymbol) {
          return (
            currSymbol &&
            storedSymbol &&
            currSymbol.elemIdTrue === storedSymbol.elemIdTrue &&
            currSymbol.isDynamic === storedSymbol.isDynamic &&
            currSymbol.angle === storedSymbol.angle
          );
        }
      }

      function snapshotSelectionAsPattern(fullGraph, selectedSymbols) {
        const g = new PatternGraph();
        const indexOf = new Map(); // DOM symbol -> node index
        let minLeft = Infinity;
        let minTop = Infinity;

        for (const sym of selectedSymbols) {
          minLeft = Math.min(minLeft, parseFloat(sym.style.left) || 0);
          minTop = Math.min(minTop, parseFloat(sym.style.top) || 0);
        }

        // 1) 节点
        for (const sym of selectedSymbols) {
          indexOf.set(
            sym,
            g.addNode({
              elemIdTrue: sym.elemIdTrue,
              isDynamic: !!sym.isDynamic,
              angle: sym.angle,
              relLeft: (parseFloat(sym.style.left) || 0) - minLeft,
              relTop: (parseFloat(sym.style.top) || 0) - minTop,
            }),
          );
        }

        // 2) 边（只保留选中内部的边）
        for (const sym of selectedSymbols) {
          const i = indexOf.get(sym);
          const conns = fullGraph.getSymbolConnections(sym);
          if (!conns) continue;

          for (let side = 0; side < 6; side++) {
            for (const [nbr, nbrSide] of conns[side]) {
              if (!selectedSymbols.has(nbr)) continue;
              const j = indexOf.get(nbr);
              g.addEdge(i, side, j, nbrSide);
            }
          }
        }

        return g;
      }

      function snapshotSelectionAsLayout(fullGraph, selectedSymbols) {
        const orderedSymbols = Array.from(selectedSymbols);
        const indexOf = new Map(orderedSymbols.map((symbol, index) => [symbol, index]));
        const links = [];

        orderedSymbols.forEach((symbol, from) => {
          const conns = fullGraph.getSymbolConnections(symbol) || [[], [], [], [], [], []];
          for (let fromSide = 0; fromSide < conns.length; fromSide++) {
            for (const [neighbor, toSide] of conns[fromSide]) {
              const to = indexOf.get(neighbor);
              if (to == null || from >= to) continue;
              links.push({ from, fromSide, to, toSide });
            }
          }
        });

        return {
          nodes: orderedSymbols.map((symbol) => ({
            elemId: symbol.elemId,
            elemIdTrue: symbol.elemIdTrue,
            angle: symbol.angle ?? 0,
            isDynamic: !!symbol.isDynamic,
            color: symbol.color ?? null,
            left: parseFloat(symbol.style.left) || 0,
            top: parseFloat(symbol.style.top) || 0,
          })),
          links,
        };
      }

      function matchAllPatternsOnSelection(selectedSymbols, pattern) {
        const remaining = new Set(selectedSymbols);
        const matches = [];

        while (true) {
          const m = matchPatternOnSelection(remaining, pattern);
          if (!m) break;

          matches.push(m);

          // consume matched symbols so we can find another disjoint instance
          for (const s of m) remaining.delete(s);

          // safety: prevent infinite loop if something weird happens
          if (remaining.size === 0) break;
        }

        return matches; // array of Set<symbol>, possibly []
      }

      function getConnectedSymbolComponents(symbols, graph) {
        const symbolSet = symbols instanceof Set ? symbols : new Set(symbols);
        const components = [];
        const visited = new Set();

        for (const start of symbolSet) {
          if (visited.has(start)) continue;

          const component = new Set();
          const stack = [start];
          visited.add(start);

          while (stack.length > 0) {
            const symbol = stack.pop();
            component.add(symbol);

            const conns = graph.getSymbolConnections(symbol) || [[], [], [], [], [], []];
            for (const side of conns) {
              for (const [neighbor] of side) {
                if (!symbolSet.has(neighbor) || visited.has(neighbor)) continue;
                visited.add(neighbor);
                stack.push(neighbor);
              }
            }
          }

          components.push(component);
        }

        return components;
      }

      function matchPatternOnSelection(selectedSymbols, pattern) {
        // 把 selectedSymbols 变成数组，方便用 index 表示
        const sel = [...selectedSymbols];
        const n = sel.length;
        const m = pattern.nodes.length;
        if (m === 0 || n < m) return null;

        // 建一个快速邻接查询：selAdj[i][side] = [[j, jSide], ...]（只在选中内部）
        const indexOf = new Map(sel.map((s, i) => [s, i]));
        const selAdj = sel.map(() => [[], [], [], [], [], []]);

        for (let i = 0; i < n; i++) {
          const conns = currentGraph.getSymbolConnections(sel[i]) || [[], [], [], [], [], []];
          for (let side = 0; side < 6; side++) {
            for (const [nbr, nbrSide] of conns[side]) {
              if (!indexOf.has(nbr)) continue;
              selAdj[i][side].push([indexOf.get(nbr), nbrSide]);
            }
          }
        }

        const usedSel = new Array(n).fill(false);
        const mapPtoS = new Array(m).fill(-1); // pattern node -> selected index

        function nodeMatch(si, pi) {
          const s = sel[si];
          const p = pattern.nodes[pi];
          return (
            s &&
            s.elemIdTrue === p.elemIdTrue &&
            !!s.isDynamic === !!p.isDynamic &&
            s.angle === p.angle
          );
        }

        function backtrack(pi) {
          if (pi === m) return true;

          for (let si = 0; si < n; si++) {
            if (usedSel[si]) continue;
            if (!nodeMatch(si, pi)) continue;

            // 尝试把 pattern pi 映射到 selected si
            mapPtoS[pi] = si;
            usedSel[si] = true;

            // 校验：pattern pi 已经指向的邻居（那些已被映射的）必须在 selAdj 里存在
            let ok = true;
            for (let side = 0; side < 6 && ok; side++) {
              for (const [pj, pjSide] of pattern.adj[pi][side]) {
                const sj = mapPtoS[pj];
                if (sj === -1) continue; // 还没映射到具体 symbol，先不检查

                // 要求 si 的 side 上存在 (sj, pjSide)
                const arr = selAdj[si][side];
                if (!arr.some(([nbrIndex, nbrSide]) => nbrIndex === sj && nbrSide === pjSide)) {
                  ok = false;
                  break;
                }
              }
            }

            if (ok && backtrack(pi + 1)) return true;

            // 回溯
            usedSel[si] = false;
            mapPtoS[pi] = -1;
          }
          return false;
        }

        if (!backtrack(0)) return null;

        // 返回匹配到的 DOM symbols 集合
        const matched = new Set();
        for (let pi = 0; pi < m; pi++) matched.add(sel[mapPtoS[pi]]);
        return matched;
      }

      async function persistSymbolVisualState(symbol, includePosition = false) {

          updateDotPositionLocal(symbol.dot);

          patch['content.dotY'] = parseFloat(symbol.dot.style.top);

      async function syncSymbolLinksRemote(symbol, previousSnapshot) {
        const aId = symbol?.dataset?.id;
        if (!aId) return;

        const oldKeys = new Set();
        const newKeys = new Set();

        for (let side = 0; side < (previousSnapshot || []).length; side++) {
          for (const [nbr, nbrSide] of previousSnapshot[side] || []) {
            const bId = nbr?.dataset?.id;
            if (!bId) continue;
            oldKeys.add(`${side}|${bId}|${nbrSide}`);
          }
        }

        const currentSnapshot = snapshotSymbolConnections(symbol);
        for (let side = 0; side < currentSnapshot.length; side++) {
          for (const [nbr, nbrSide] of currentSnapshot[side] || []) {
            const bId = nbr?.dataset?.id;
            if (!bId) continue;
            newKeys.add(`${side}|${bId}|${nbrSide}`);
          }
        }

        for (const key of oldKeys) {
          if (newKeys.has(key)) continue;
          const [side, bId, nbrSide] = key.split('|');
          await removeLink(aId, Number(side), bId, Number(nbrSide));
        }

        for (const key of newKeys) {
          if (oldKeys.has(key)) continue;
          const [side, bId, nbrSide] = key.split('|');
          await persistLink(aId, Number(side), bId, Number(nbrSide));
        }
      }

      function isConnectionAlignedByPlacement(a, aSide, b, bSide, tolerance = 4) {
        if (!a || !b) return false;

        const aLeft = parseFloat(a.style.left) || 0;
        const aTop = parseFloat(a.style.top) || 0;
        const bLeft = parseFloat(b.style.left) || 0;
        const bTop = parseFloat(b.style.top) || 0;

        if (getDir(a) === getDir(b)) {
          if (getDir(a) === 0) {
            if (aSide === Side.PAR_BOT && bSide === Side.PAR_TOP) {
              return (
                Math.abs(aLeft - bLeft) <= tolerance &&
                Math.abs(aTop - (bTop - (symbolHeight - 7) * symbolScale)) <= tolerance
              );
            }
            if (aSide === Side.PAR_TOP && bSide === Side.PAR_BOT) {
              return (
                Math.abs(aLeft - bLeft) <= tolerance &&
                Math.abs(aTop - (bTop + (symbolHeight - 4) * symbolScale)) <= tolerance
              );
            }
          } else {
            if (aSide === Side.PAR_BOT && bSide === Side.PAR_TOP) {
              return (
                Math.abs(aLeft - (bLeft - (symbolHeight - 7) * symbolScale)) <= tolerance &&
                Math.abs(aTop - bTop) <= tolerance
              );
            }
            if (aSide === Side.PAR_TOP && bSide === Side.PAR_BOT) {
              return (
                Math.abs(aLeft - (bLeft + (symbolHeight - 4) * symbolScale)) <= tolerance &&
                Math.abs(aTop - bTop) <= tolerance
              );
            }
          }
        }

        const aJ = getAbsJunctions(a)?.[aSide];
        const bJ = getAbsJunctions(b)?.[bSide];
        if (!aJ || !bJ) return false;
        return getDist(aJ.x, aJ.y, bJ.x, bJ.y) <= tolerance;
      }

      function pruneInvalidConnectionsForSymbol(symbol, tolerance = 4) {
        const conns = currentGraph.getSymbolConnections(symbol);
        if (!conns) return;

        for (let side = 0; side < conns.length; side++) {
          const lst = conns[side] || [];
          for (let i = lst.length - 1; i >= 0; i--) {
            const [nbr, nbrSide] = lst[i];
            if (isConnectionAlignedByPlacement(symbol, side, nbr, nbrSide, tolerance)) continue;

            lst.splice(i, 1);
            const back = currentGraph.getSymbolConnections(nbr)?.[nbrSide] || [];
            currentGraph.getSymbolConnections(nbr)[nbrSide] = back.filter(
              ([x, s]) => !(x === symbol && s === side),
            );
          }
        }
      }

      async function rotateConnectedSelection(symbols, addAngle, inChat = false) {
        const group = Array.from(symbols);
        if (group.length === 0) return;

        const groupSet = new Set(group);
        const centers = group.map((symbol) => ({
          symbol,
          x: (parseFloat(symbol.style.left) || 0) + (symbolWidth * symbolScale) / 2,
          y: (parseFloat(symbol.style.top) || 0) + (symbolHeight * symbolScale) / 2,
        }));

        const pivotX = centers.reduce((sum, item) => sum + item.x, 0) / centers.length;
        const pivotY = centers.reduce((sum, item) => sum + item.y, 0) / centers.length;

        for (const symbol of group) {
          cutConnectionsOutside(symbol, groupSet);
        }

        for (const { symbol, x, y } of centers) {
          const dx = x - pivotX;
          const dy = y - pivotY;
          const nextCenterX = pivotX - dy;
          const nextCenterY = pivotY + dx;

          symbol.style.left = `${nextCenterX - (symbolWidth * symbolScale) / 2}px`;
          symbol.style.top = `${nextCenterY - (symbolHeight * symbolScale) / 2}px`;
          applySymbolRotationLocal(symbol, addAngle);

          if (symbol.isDynamic && symbol.dot) {
            updateDotPositionLocal(symbol.dot);

        let snapped = false;
        groupDragActive = true;
        dragGroupSet = groupSet;
        pendingSnapDelta = null;
        resetPendingSnapState();

        for (const symbol of group) {
          checkConnections(symbol);

        if (pendingSnapDelta) {

        return snapped;

      async function updateDotPositionLocal(dot) {
        const symbol = dot.parent;

        const canvas = getCanvasForElem(symbol);
        if (!canvas) return;

        const canvasRect = canvas.getBoundingClientRect();
        const rect = symbol.getBoundingClientRect();

        // 把视口坐标 -> canvas 局部坐标
        const symLeft = rect.left - canvasRect.left;
        const symTop = rect.top - canvasRect.top;
        const symRight = rect.right - canvasRect.left;
        const symBottom = rect.bottom - canvasRect.top;

        let x, y;

        switch (symbol.angle) {
          case 0:
            x = symLeft + (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 5;
            y = symTop + dotOffsetYData[symbol.elemId] * symbolScale - 12;
            break;
          case 90:
            x = symRight - dotOffsetYData[symbol.elemId] * symbolScale;
            y = symTop + (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 10;
            break;
          case 180:
            x = symRight - (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 5;
            y = symBottom - dotOffsetYData[symbol.elemId] * symbolScale - 7;
            break;
          case 270:
            x = symLeft + dotOffsetYData[symbol.elemId] * symbolScale - 10;
            y = symBottom - (symbolWidth / 2 + dotOffsetXData[symbol.elemId]) * symbolScale - 7;
            break;
        }

        dot.style.left = `${x}px`;
        dot.style.top = `${y}px`;
      }

      async function persistDotPosition(dot) {

        if (!tabHeadersActivated[4]) return;

        const id = symbol.dataset?.id;
        if (!id) return;

        await updateDoc(objDocRef(id), {

      function countConnectedComponentsInSelection(selectedSymbols, graph) {
        const sel = selectedSymbols instanceof Set ? selectedSymbols : new Set(selectedSymbols);
        if (sel.size === 0) return 0;

        const visited = new Set();
        let components = 0;

        for (const start of sel) {
          if (visited.has(start)) continue;

          components++;
          // BFS
          const queue = [start];
          visited.add(start);

          while (queue.length) {
            const node = queue.pop();
            const conns = graph.getSymbolConnections(node);
            if (!conns) continue;

            for (let side = 0; side < 6; side++) {
              const neighbors = conns[side] || [];
              for (const [nbr, _nbrSide] of neighbors) {
                if (!sel.has(nbr)) continue; // searching scope is limited to the selected symbols
                if (visited.has(nbr)) continue;
                visited.add(nbr);
                queue.push(nbr);
              }
            }
          }
        }

        return components;

      function findLibraryEntry(word) {
        const normalized = String(word || '').trim();
        if (!normalized) return null;
        if (library.has(normalized)) return { word: normalized, entry: library.get(normalized) };

        const lowered = normalized.toLowerCase();
        for (const [storedWord, entry] of library.entries()) {
          if (String(storedWord).toLowerCase() === lowered) {
            return { word: storedWord, entry };
          }
        }

        return null;
      }

      function getSymbolBoxSizeForAngle(angle) {
        if (angle === 90 || angle === 270) {
          return {
            width: symbolHeight * symbolScale,
            height: symbolWidth * symbolScale,
          };
        }

        return {
          width: symbolWidth * symbolScale,
          height: symbolHeight * symbolScale,
        };
      }

      function getLocalJunctionsForNode(nodeInfo) {
        const relJunctions = getRelJunctions({ elemId: nodeInfo.elemId });
        const { width, height } = getSymbolBoxSizeForAngle(nodeInfo.angle);
        let localJunctions;

        if (nodeInfo.angle === 0) {
          localJunctions = [
            { x: relJunctions[0].x * symbolScale, y: relJunctions[0].y * symbolScale },
            { x: relJunctions[1].x * symbolScale, y: relJunctions[1].y * symbolScale },
            { x: relJunctions[2].x * symbolScale, y: relJunctions[2].y * symbolScale },
            { x: relJunctions[3].x * symbolScale, y: relJunctions[3].y * symbolScale },
          ];
        }
        if (nodeInfo.angle === 180) {
          localJunctions = [
            {
              x: width - relJunctions[1].x * symbolScale,
              y: height - relJunctions[1].y * symbolScale - calInvY,
            },
            {
              x: width - relJunctions[0].x * symbolScale,
              y: height - relJunctions[0].y * symbolScale - calInvY,
            },
            {
              x: width - relJunctions[3].x * symbolScale,
              y: height - relJunctions[3].y * symbolScale,
            },
            {
              x: width - relJunctions[2].x * symbolScale,
              y: height - relJunctions[2].y * symbolScale,
            },
          ];
        }
        if (nodeInfo.angle === 90) {
          localJunctions = [
            { x: width - relJunctions[0].y * symbolScale, y: relJunctions[0].x * symbolScale },
            { x: width - relJunctions[1].y * symbolScale, y: relJunctions[1].x * symbolScale },
            { x: width - relJunctions[3].y * symbolScale, y: relJunctions[3].x * symbolScale },
            { x: width - relJunctions[2].y * symbolScale, y: relJunctions[2].x * symbolScale },
          ];
        }
        if (nodeInfo.angle === 270) {
          localJunctions = [
            {
              x: relJunctions[1].y * symbolScale + calInvY,
              y: height - relJunctions[1].x * symbolScale,
            },
            {
              x: relJunctions[0].y * symbolScale + calInvY,
              y: height - relJunctions[0].x * symbolScale,
            },
            { x: relJunctions[2].y * symbolScale, y: height - relJunctions[2].x * symbolScale },
            { x: relJunctions[3].y * symbolScale, y: height - relJunctions[3].x * symbolScale },
          ];
        }

        if (nodeInfo.elemId === 2 && localJunctions) {
          if (nodeInfo.angle === 0) {
            localJunctions[2].x += calCan1;
            localJunctions[3].x += calCan1;
          }
          if (nodeInfo.angle === 270) {
            localJunctions[2].y -= calCan1;
            localJunctions[3].y -= calCan1;
          }
          if (nodeInfo.angle === 90) {
            localJunctions[2].y -= calCan2;
            localJunctions[3].y -= calCan2;
          }
          if (nodeInfo.angle === 180) {
            localJunctions[2].x += calCan2;
            localJunctions[3].x += calCan2;
          }
        }

        return localJunctions;
      }

      function getPatternNodeDir(nodeInfo) {
        return nodeInfo.angle === 0 || nodeInfo.angle === 180 ? 0 : 1;
      }

      function getPatternSpawnOrigin() {
        const canvas = chatCanvas();
        const container = tab4 || canvas;
        return {
          left: (canvas?.scrollLeft || 0) + Math.max(80, (container?.clientWidth || 800) * 0.32),
          top: (canvas?.scrollTop || 0) + Math.max(80, (container?.clientHeight || 600) * 0.28),
        };
      }

      function collectPatternLinks(pattern) {
        const links = [];
        const seen = new Set();

        for (let from = 0; from < pattern.nodes.length; from++) {
          for (let fromSide = 0; fromSide < 6; fromSide++) {
            for (const [to, toSide] of pattern.adj[from][fromSide] || []) {
              const key = `${from}|${fromSide}|${to}|${toSide}`;
              const reverseKey = `${to}|${toSide}|${from}|${fromSide}`;
              if (seen.has(key) || seen.has(reverseKey)) continue;
              seen.add(key);
              links.push({ from, fromSide, to, toSide });
            }
          }
        }

        return links;
      }

      function alignSpawnedSymbols(
        anchorSymbol,
        anchorNodeInfo,
        anchorSide,
        nextSymbol,
        nextNodeInfo,
        nextSide,
      ) {
        const anchorLeft = parseFloat(anchorSymbol.style.left) || 0;
        const anchorTop = parseFloat(anchorSymbol.style.top) || 0;

        if (
          anchorSide >= 4 &&
          nextSide >= 4 &&
          getPatternNodeDir(anchorNodeInfo) === getPatternNodeDir(nextNodeInfo)
        ) {
          if (getPatternNodeDir(anchorNodeInfo) === 0) {
            nextSymbol.style.left = `${anchorLeft}px`;
            nextSymbol.style.top = `${
              anchorTop +
              (anchorSide === Side.PAR_TOP && nextSide === Side.PAR_BOT
                ? -(symbolHeight - 7) * symbolScale
                : (symbolHeight - 4) * symbolScale)
            }px`;
            return;
          }

          nextSymbol.style.left = `${
            anchorLeft +
            (anchorSide === Side.PAR_TOP && nextSide === Side.PAR_BOT
              ? -(symbolHeight - 7) * symbolScale
              : (symbolHeight - 4) * symbolScale)
          }px`;
          nextSymbol.style.top = `${anchorTop}px`;
          return;
        }

        const anchorJunctions = getAbsJunctions(anchorSymbol);
        const nextJunctions = getAbsJunctions(nextSymbol);
        const anchorPoint = anchorJunctions?.[anchorSide];
        const nextPoint = nextJunctions?.[nextSide];
        if (!anchorPoint || !nextPoint) return;

        const left = parseFloat(nextSymbol.style.left) || 0;
        const top = parseFloat(nextSymbol.style.top) || 0;
        nextSymbol.style.left = `${left + anchorPoint.x - nextPoint.x}px`;
        nextSymbol.style.top = `${top + anchorPoint.y - nextPoint.y}px`;

        if (nextSymbol.dot) {
          updateDotPositionLocal(nextSymbol.dot);
        }
      }

      async function spawnPatternOnChatCanvas(word) {
        const found = findLibraryEntry(word);
        if (!found) {
          showFeedback?.(`No saved symbol expression found for "${word}".`, true);
          return;
        }

        const pattern = found.entry?.[1];
        const layout = found.entry?.[2] || null;
        if (!pattern?.nodes?.length) {
          showFeedback?.(`"${found.word}" does not have a saved symbol expression yet.`, true);
          return;
        }

        const sourceNodes =
          layout?.nodes?.length === pattern.nodes.length ? layout.nodes : pattern.nodes;
        const sourceLinks = layout?.links?.length ? layout.links : collectPatternLinks(pattern);
        const placed = new Array(sourceNodes.length);
        const origin = getPatternSpawnOrigin();
        const hasSavedLayout = pattern.nodes.every(
          (node) => Number.isFinite(node?.relLeft) && Number.isFinite(node?.relTop),
        );

        clearAllSymbolSelection();
        clearAllEmojiSelection();

        if (layout?.nodes?.length === pattern.nodes.length) {
          const minLeft = Math.min(...layout.nodes.map((node) => node.left ?? 0));
          const minTop = Math.min(...layout.nodes.map((node) => node.top ?? 0));

          for (let i = 0; i < layout.nodes.length; i++) {
            const node = layout.nodes[i];
            placed[i] = await createSymbolCopy(
              null,
              null,
              node.elemId ?? node.elemIdTrue,
              node.elemIdTrue,
              origin.left + ((node.left ?? 0) - minLeft),
              origin.top + ((node.top ?? 0) - minTop),
              node.color ?? null,
              node.angle ?? 0,
            );

            if (node.isDynamic) {
              await enableDynamicDotForSpawnedSymbol(placed[i]);
            }
          }
        } else if (hasSavedLayout) {
          for (let i = 0; i < pattern.nodes.length; i++) {
            const node = pattern.nodes[i];
            placed[i] = await createSymbolCopy(
              null,
              null,
              node.elemIdTrue,
              node.elemIdTrue,
              origin.left + node.relLeft,
              origin.top + node.relTop,
              null,
              node.angle ?? 0,
            );

            if (node.isDynamic) {
              await enableDynamicDotForSpawnedSymbol(placed[i]);
            }
          }
        } else {
          const rootInfo = {
            elemId: pattern.nodes[0].elemIdTrue,
            elemIdTrue: pattern.nodes[0].elemIdTrue,
            angle: pattern.nodes[0].angle ?? 0,
            isDynamic: !!pattern.nodes[0].isDynamic,
          };

          placed[0] = await createSymbolCopy(
            null,
            null,
            rootInfo.elemId,
            rootInfo.elemIdTrue,
            origin.left,
            origin.top,
            null,
            rootInfo.angle,
          );

          if (rootInfo.isDynamic) {
            await enableDynamicDotForSpawnedSymbol(placed[0]);
          }

          const queue = [0];
          const seenNodes = new Set([0]);

          while (queue.length > 0) {
            const currentIndex = queue.shift();
            const currentSymbol = placed[currentIndex];
            const currentInfo = {
              elemId: pattern.nodes[currentIndex].elemIdTrue,
              elemIdTrue: pattern.nodes[currentIndex].elemIdTrue,
              angle: pattern.nodes[currentIndex].angle ?? 0,
              isDynamic: !!pattern.nodes[currentIndex].isDynamic,
            };

            for (let currentSide = 0; currentSide < 6; currentSide++) {
              for (const [neighborIndex, neighborSide] of pattern.adj[currentIndex][currentSide] ||
                []) {
                if (placed[neighborIndex]) continue;

                const neighborInfo = {
                  elemId: pattern.nodes[neighborIndex].elemIdTrue,
                  elemIdTrue: pattern.nodes[neighborIndex].elemIdTrue,
                  angle: pattern.nodes[neighborIndex].angle ?? 0,
                  isDynamic: !!pattern.nodes[neighborIndex].isDynamic,
                };

                placed[neighborIndex] = await createSymbolCopy(
                  null,
                  null,
                  neighborInfo.elemId,
                  neighborInfo.elemIdTrue,
                  origin.left + 40,
                  origin.top + 40,
                  null,
                  neighborInfo.angle,
                );

                if (neighborInfo.isDynamic) {
                  await enableDynamicDotForSpawnedSymbol(placed[neighborIndex]);
                }

                alignSpawnedSymbols(
                  currentSymbol,
                  currentInfo,
                  currentSide,
                  placed[neighborIndex],
                  neighborInfo,
                  neighborSide,
                );

                if (!seenNodes.has(neighborIndex)) {
                  seenNodes.add(neighborIndex);
                  queue.push(neighborIndex);
                }
              }
            }
          }

          for (let i = 0; i < sourceNodes.length; i++) {
            if (placed[i]) continue;
            const fallbackInfo = sourceNodes[i];
            placed[i] = await createSymbolCopy(
              null,
              null,
              fallbackInfo.elemId ?? fallbackInfo.elemIdTrue,
              fallbackInfo.elemIdTrue,
              origin.left + i * 35,
              origin.top + i * 35,
              fallbackInfo.color ?? null,
              fallbackInfo.angle,
            );

            if (fallbackInfo.isDynamic) {
              await enableDynamicDotForSpawnedSymbol(placed[i]);
            }
          }
        }

        for (const link of sourceLinks) {
          const fromSymbol = placed[link.from];
          const toSymbol = placed[link.to];
          if (!fromSymbol || !toSymbol) continue;

          commitLink(fromSymbol, link.fromSide, toSymbol, link.toSide);

          if (fromSymbol._pendingIdPromise) await fromSymbol._pendingIdPromise;
          if (toSymbol._pendingIdPromise) await toSymbol._pendingIdPromise;

          const fromId = fromSymbol.dataset?.id;
          const toId = toSymbol.dataset?.id;
          if (fromId && toId) {
            await persistLink(fromId, link.fromSide, toId, link.toSide);
          }
        }

        placed.forEach((symbol) => {
          symbol.selected = true;
          symbol.classList.add('framed');
          selectedSymbols.add(symbol);
        });

        activeSymbol = null;
      }

      async function handleSymbolMessage() {
        const messageBox = document.getElementById('symbol-message-input');
        const userInput = messageBox.value.trim();

        if (userInput === '') return;

      document.getElementById('message-input').addEventListener('keydown', function (event) {

      function floatLabel(label) {
        const maxDistance = 20; // Maximum distance from the original position
        const originX = 0,
          originY = 0; // Store original position
        let x = 0,
          y = 0;

        setInterval(() => {
          let xDelta = getRandomFloat(-2, 2);
          let yDelta = getRandomFloat(-2, 2);

          // Calculate new position
          let newX = x + xDelta;
          let newY = y + yDelta;

          // Check if the new position is within the allowed distance
          let distance = Math.sqrt(newX ** 2 + newY ** 2);
          if (distance <= maxDistance) {
            x = newX;
            y = newY;
            label.style.transform = `translate(${x}px, ${y}px)`;
          }
        }, 100);
      }

      function boxesOverlap(a, b, padding = 12) {
        return !(
          a.right + padding <= b.left ||
          a.left >= b.right + padding ||
          a.bottom + padding <= b.top ||
          a.top >= b.bottom + padding
        );
      }

      function clampLabelPosition(x, y, label, canvas) {
        const maxX = Math.max(0, canvas.clientWidth - label.offsetWidth);
        const maxY = Math.max(0, canvas.clientHeight - label.offsetHeight);

        return {
          x: Math.min(Math.max(0, x), maxX),
          y: Math.min(Math.max(0, y), maxY),
        };
      }

      function getLabelBox(x, y, label) {
        return {
          left: x,
          top: y,
          right: x + label.offsetWidth,
          bottom: y + label.offsetHeight,
        };
      }

      function collectOccupiedLabelBoxes(canvas, pendingBoxes = []) {
        const occupied = [];
        canvas.querySelectorAll('.symbol-label').forEach((existingLabel) => {
          const left = parseFloat(existingLabel.style.left);
          const top = parseFloat(existingLabel.style.top);
          if (!Number.isFinite(left) || !Number.isFinite(top)) return;

          occupied.push(getLabelBox(left, top, existingLabel));
        });

        pendingBoxes.forEach((box) => occupied.push(box));
        return occupied;
      }

      function findScatteredLabelPosition(label, anchorX, anchorY, canvas, pendingBoxes = []) {
        const occupiedBoxes = collectOccupiedLabelBoxes(canvas, pendingBoxes);
        const candidates = [];
        const baseAngle = getRandomFloat(0, Math.PI * 2);
        const angleStep = Math.PI / 6;
        const radii = [30, 44, 58, 74, 92, 112, 136];

        for (const radius of radii) {
          for (let i = 0; i < 12; i++) {
            const angle = baseAngle + i * angleStep + getRandomFloat(-0.12, 0.12);
            const radialJitter = getRandomFloat(-6, 6);
            const tangentJitter = getRandomFloat(-10, 10);
            const distance = radius + radialJitter;
            const x =
              anchorX +
              Math.cos(angle) * distance -
              label.offsetWidth / 2 +
              Math.cos(angle + Math.PI / 2) * tangentJitter;
            const y =
              anchorY +
              Math.sin(angle) * distance -
              label.offsetHeight / 2 +
              Math.sin(angle + Math.PI / 2) * tangentJitter;

            candidates.push({ x, y });
          }
        }

        let bestCandidate = null;
        let bestOverlapCount = Infinity;
        let bestDistance = Infinity;

        for (const candidate of candidates) {
          const clamped = clampLabelPosition(candidate.x, candidate.y, label, canvas);
          const box = getLabelBox(clamped.x, clamped.y, label);
          const overlapCount = occupiedBoxes.filter((occupied) =>
            boxesOverlap(box, occupied),
          ).length;
          const distance = Math.hypot(clamped.x - anchorX, clamped.y - anchorY);

          if (overlapCount === 0) return clamped;

          if (
            overlapCount < bestOverlapCount ||
            (overlapCount === bestOverlapCount && distance < bestDistance)
          ) {
            bestCandidate = clamped;
            bestOverlapCount = overlapCount;
            bestDistance = distance;
          }
        }

        return bestCandidate || clampLabelPosition(anchorX, anchorY, label, canvas);
      }

      function buildDragGroupSet(draggedEl) {
        const isSelected = selectedSymbols.has(draggedEl) || selectedEmojis.has(draggedEl);

        if (!isSelected) return new Set([draggedEl]);

        // ✅ 并集：所有被选中的符号 + emoji
        const group = new Set();
        selectedSymbols.forEach((s) => group.add(s));
        selectedEmojis.forEach((em) => group.add(em));

        // 如果你不想把“空集合”拖成空，兜底：
        if (group.size === 0) group.add(draggedEl);
        return group;
      }

      async function createEmoji(emojiResponse, emojiX = null, emojiY = null, emojiId = null) {
        const emoji = document.createElement('div');
        emoji.classList.add('symbol-label');
        // Position the label near the symbol
        if (emojiX) {
          emoji.x = emojiX;
          emoji.y = emojiY;
        } else {
          emoji.x = getRandomFloat(window.innerWidth / 5, (window.innerWidth * 4) / 5);
          emoji.y = getRandomFloat(window.innerHeight / 5, (window.innerHeight * 4) / 5);
        }

        emoji.style.left = `${emoji.x}px`;
        emoji.style.top = `${emoji.y}px`;
        emoji.selected = false;

        // Add pressing event listener to the emoji
        emoji.addEventListener('mousedown', (e) => {
          const totalSelected = selectedSymbols.size + selectedEmojis.size;
          const inSelection = selectedEmojis.has(emoji);
          const wantsGroupDrag = inSelection && totalSelected > 1;

          // record click-vs-drag
          emoji._downClientX = e.clientX;
          emoji._downClientY = e.clientY;
          emoji._dragged = false;
          emoji._downWasSelected = selectedEmojis.has(emoji);
          emoji._downWasInMulti = wantsGroupDrag;
          emoji._downTotalSelected = selectedSymbols.size + selectedEmojis.size;

          // UI off
          if (eyeButton.isActivated) {
            eyeButton.isActivated = false;
            eyeButton.style.backgroundImage = "url('./icons/eye_black.png')";
            removeLabelInputs();
          }
          if (eyeButton2.isActivated) {
            eyeButton2.isActivated = false;
            eyeButton2.style.backgroundImage = "url('./icons/eye_black.png')";
            removeLabelInputs();
          }

          // Selection on mousedown:
          // If not selected, make it the only selection.
          if (!inSelection) {
            clearAllSymbolSelection();
            clearAllEmojiSelection();
            emoji.selected = true;
            emoji.classList.add('active');
            selectedEmojis.add(emoji);
          }

          // dragging is owner-only (selection still allowed)
          if (!canEditElement(emoji)) {
            emoji.style.cursor = 'not-allowed';
            clickOnlyEmoji = emoji;
            return;
          }

          emoji.style.cursor = 'grabbing';

          const canvas = getCanvasForElem(emoji);
          const { x: localX, y: localY } = clientToLocal(canvas, e.clientX, e.clientY);

          if (wantsGroupDrag) {
            dragLeader = emoji;
            dragGroup = new Map();

            dragSnapLock = null;
            pendingSnapDelta = null;
            resetPendingSnapState();
            dragGroupStarted = false;
            dragGroupSet = null;

            const groupSet = buildDragGroupSet(dragLeader);
            for (const el of groupSet) {
              if (!canEditElement(el)) continue; // can't drag others' items

              const l = parseFloat(el.style.left) || 0;
              const t = parseFloat(el.style.top) || 0;
              const dx = l - localX;
              const dy = t - localY;
              dragGroup.set(el, { dx, dy, dx0: dx, dy0: dy });
            }

            activeEmoji = emoji; // leader remains active
          } else {
            dragLeader = null;
            dragGroup = null;

            activeEmoji = emoji;

            const left = parseFloat(emoji.style.left) || 0;
            const top = parseFloat(emoji.style.top) || 0;
            emoji.offsetX = localX - left;
            emoji.offsetY = localY - top;
          }
        });

        appendToChatCanvas(emoji);
        emoji.textContent = emojiResponse; // Default text
        floatLabel(emoji);

        if (emojiId !== null) {
          emoji.dataset.id = emojiId;
          emojiById.set(emojiId, emoji);
        } else {
          const clientNonce = tabHeadersActivated[4] ? makeClientNonce('emoji') : null;
          if (clientNonce) {
            emoji.dataset.clientNonce = clientNonce;
            pendingLocalChatEmojisByNonce.set(clientNonce, emoji);
          }
          // after you created the DOM element `symbol`
          emoji.dataset.id = ''; // not ready yet
          emoji._pendingIdPromise = (async () => {
            const docId = await saveObj(
              'emoji',
              emojiResponse,
              emoji.x,
              emoji.y,
              clientNonce ? { clientNonce } : {},
            );
            const existing = emojiById.get(docId);
            if (existing && existing !== emoji) {
              adoptExistingChatEmoji(existing, emoji);
            }
            emoji.dataset.id = docId;
            emojiById.set(docId, emoji);
            if (clientNonce) pendingLocalChatEmojisByNonce.delete(clientNonce);
            return docId;
          })();
        }

        return emoji;
      }
