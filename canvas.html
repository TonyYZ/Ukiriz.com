      function startLongPress(left, top, width, height, symbol = null, node = null) {
        longPressStartedAt = performance.now();
        longPressFired = false;

        ring = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        // Append the circle to the SVG
        ring.appendChild(circle);
        if (tabHeadersActivated[1]) appendToCraftCanvas(ring);
        if (tabHeadersActivated[4]) appendToChatCanvas(ring);

        const symbolCenterX = left + width / 2;
        const symbolCenterY = top + height / 2;

        // Create the SVG element with the desired attributes

        ring.style.left = symbolCenterX - 25;
        ring.style.top = symbolCenterY - 25;
        ring.setAttribute('class', 'progress-ring');
        ring.setAttribute('width', '50');
        ring.setAttribute('height', '50');
        ring.setAttribute('viewBox', `${symbolCenterX - 27} ${symbolCenterY - 27} 54 54`);

        // Create the circle element

        circle.setAttribute('cx', symbolCenterX.toString());
        circle.setAttribute('cy', symbolCenterY.toString());

        if (symbol === null) {
          circle.setAttribute('r', width.toString());
        } else {
          circle.setAttribute('r', '25');
        }
        circle.setAttribute('stroke-width', '5');

        ring.style.visibility = 'visible';

        circle.style.stroke = '#00B0F0';
        progress = 0;
        circle.style.strokeDashoffset = 157; // Reset
        interval = setInterval(() => {
          progress += 1;
          const offset = 157 * (1 - progress / totalSteps); // More precise calculation
          circle.style.strokeDashoffset = offset;

          if (progress >= totalSteps) {
            clearInterval(interval);
            longPressFired = true;
            if (symbol === null) {
              triggerLongPressNode(node);
            } else {
              triggerLongPress(symbol);
            }
          }
        }, 10);
      }

      function endLongPress(force = false) {
        if (!force && performance.now() - longPressStartedAt < 80) return;

        if (ring !== null && circle !== null) {
          clearInterval(interval);
          ring.style.visibility = 'hidden';
          circle.style.strokeDashoffset = 157;
          circle.style.stroke = 'transparent';
          ring = null;
          circle = null;
        }
      }

      function triggerLongPress(symbol, representatives = null) {
        if (circle !== null) {
          circle.style.stroke = '#FFC000';
        }
        moleculeString = '';

        clearAllSymbolSelection();
        dragGroup = null;
        dragLeader = null;

        let results = getMolecule(symbol, new Set([]), (representatives = representatives));
        selectedSymbols.clear();
        results.visited.forEach((s) => selectedSymbols.add(s));
        if (results.leftStr !== '') moleculeString += results.leftStr + ' - ';
        moleculeString += results.centerStrs.join(' & ');
        if (results.rightStr !== '') moleculeString += ' - ' + results.rightStr;
        console.log(
          `resultssss left ${results.leftStr} center ${results.centerStrs} right ${results.rightStr}`,
        );

        selectedSymbols.forEach((selectedSymbol) => {
          selectedSymbol.selected = true;
          selectedSymbol.classList.add('framed');
        });
        console.log(`molecule ${moleculeString}`);

        // Tutorial: advance after the user successfully long-pressed a connected component in craft.
        try {
          if (getCanvasForElem(symbol) === craftCanvas()) emitTutorialEvent?.('craft_longpress');
        } catch {}
      }

      const Side = {
        START: 0, // start
        END: 1, // end
        MID_TOP: 2, // top / left middle
        MID_BOT: 3, // bottom / right middle
        PAR_TOP: 4, // top parallel
        PAR_BOT: 5, // bottom parallel
      };

      const SINGLE_OCCUPANCY = new Set([Side.MID_TOP, Side.MID_BOT, Side.PAR_TOP, Side.PAR_BOT]);

      const MULTI_OCCUPANCY = new Set([Side.START, Side.END]);

      // Create a new copy of the symbol being clicked
      function createSymbolCopy(
        mouseX,
        mouseY,
        elemId = null,
        elemIdTrue = null,
        symbolX = null,
        symbolY = null,
        symbolColor = null,
        symbolAngle = null,
        symbolId = null,
      ) {
        const spawnCanvas =
          symbolX !== null ? chatCanvas() : tabHeadersActivated[4] ? chatCanvas() : craftCanvas();
        const { x, y } = clientToLocal(spawnCanvas, mouseX, mouseY);
        let offsetX = (symbolWidth * symbolScale) / 2;
        let offsetY = (symbolHeight * symbolScale) / 2;

        // Create the copy
        const symbol = document.createElement('div');
        symbol.ondragstart = (e) => e.preventDefault();
        symbol.selected = false;
        symbol.moving = false;
        symbol.angle = symbolAngle ? symbolAngle : 0;
        symbol.isDynamic = false;
        symbol.classList.add('symbol');
        symbol.elemId = elemId;

        elemIdTrue = elemIdTrue ? elemIdTrue : elemId;
        symbol.elemIdTrue = elemIdTrue;
        symbol.innerHTML = symbolData[symbol.elemId];

        if (symbolX === null) symbol.accId = acc; // newly created

        if (symbolX !== null) {
          symbol.style.left = `${symbolX}px`;
          symbol.style.top = `${symbolY}px`;
        } else {
          symbol.style.left = `${x - offsetX}px`;
          symbol.style.top = `${y - offsetY}px`;
        }
        if (symbolColor !== null) {
          // loaded in the chat interface
          dyeColor(symbol, symbolColor);
        } else if (tabHeadersActivated[4]) {
          // newly created in the chat interface
          symbolColor = cachedUserColor || generateColor(currentUser?.uid || 'guest');
          dyeColor(symbol, symbolColor);
          assignUserColor()
            .then(async (resolvedColor) => {
              if (!symbol.isConnected) return;
              if (symbol.dataset?.ownerUid && symbol.dataset.ownerUid !== currentUser?.uid) return;
              if (resolvedColor && resolvedColor !== symbol.color) {
                dyeColor(symbol, resolvedColor);
              }
              if (resolvedColor) {
                const id =
                  symbol.dataset?.id || (await symbol._pendingIdPromise?.catch(() => null));
                if (id) {
                  await updateSymbolColor(id, resolvedColor);
                }
              }
            })
            .catch(console.error);
        } // otherwise, newly created in the craft interface

        if (symbolAngle !== null) {
          symbol.style.transform = `rotate(${symbolAngle}deg)`;
        }
        symbol.dot = null;

        // Add pressing event listener to the symbol
        symbol.addEventListener('mousedown', (e) => {
          if (e.button !== 0) return;
          const additiveSelect = !!(e.shiftKey || e.ctrlKey || e.metaKey);
          symbol._downAdditive = additiveSelect;
          // If this symbol is part of a spawned expression group, select the entire group,
          // but still allow dragging + magnetic snapping like ordinary multi-selection.
          if (symbol._expressionGroupId) {
            const grpArray = getExpressionGroupMembers(symbol._expressionGroupId);
            if (grpArray && grpArray.length > 1) {
              e.stopPropagation();
              symbol._downExpressionGroupId = symbol._expressionGroupId;
              // "Group is selected" means: all its symbols are selected (even if other groups are also selected).
              const groupWasSelectedBefore = grpArray.every((s) => selectedSymbols.has(s));
              symbol._groupWasPreselectedOnDown = groupWasSelectedBefore;

              const isInspecting = eyeButton.isActivated || eyeButton2.isActivated;
              const hasOnlyAnnotations =
                selectedEmojis.size > 0 &&
                Array.from(selectedEmojis).every((e) => e.dataset?.isAnnotation === 'true');

              // Ensure the group is the current symbol selection.
              if (!groupWasSelectedBefore) {
                if (isInspecting && !additiveSelect) {
                  removeLabelInputs();
                  if (getCanvasForElem(symbol) === chatCanvas()) {
                    hideAllAnnotations();
                  }
                }
                if (!additiveSelect) {
                  clearAllSymbolSelection();
                  if (!(isInspecting && hasOnlyAnnotations)) {
                    clearAllEmojiSelection();
                  }
                }
                for (const sym of grpArray) {
                  sym.selected = true;
                  sym.classList.add('framed');
                  selectedSymbols.add(sym);
                }
              }
              const cv = getCanvasForElem(symbol);
              updateExpressionGroupFramesFromSelection(cv);
              if (!groupWasSelectedBefore && isInspecting && !additiveSelect) {
                refreshInspectionModeForCanvas(cv);
              }
              // Do NOT return: continue into normal drag logic below.
            }
          }

          const totalSelected = selectedSymbols.size + selectedEmojis.size;
          const inSelection = selectedSymbols.has(symbol);
          const wantsGroupDrag = inSelection && totalSelected > 1;

          // record click-vs-drag
          symbol._downClientX = e.clientX;
          symbol._downClientY = e.clientY;
          symbol._dragged = false;
          symbol._downWasSelected = selectedSymbols.has(symbol);
          symbol._downWasInMulti = wantsGroupDrag; // remember state at down time
          symbol._downTotalSelected = selectedSymbols.size + selectedEmojis.size;
          // If we just selected a group on mousedown, treat this as a normal select (no toggle-off on mouseup).
          if (symbol._downExpressionGroupId && symbol._groupWasPreselectedOnDown === false) {
            symbol._downWasSelected = false;
            symbol._downWasInMulti = false;
          }

          // Keep craft inspection mode active while dragging, so the input boxes can
          // stay visible and follow the inspected selection.
          const surface = getCanvasForElem(symbol);

          // In chat inspection mode, clicking a different connected component should exit inspection mode.
          // ✅ Selection on mousedown:
          // If it was not selected, make it the only selection (single-select).
          // If it was already selected, keep selection as-is for now (toggle happens on mouseup if no drag).
          // Exception: in inspection mode, keep annotation bubble selection alongside symbol.
          if (!inSelection) {
            const isInspecting = eyeButton.isActivated || eyeButton2.isActivated;
            if (isInspecting && !additiveSelect) {
              removeLabelInputs();
              if (surface === chatCanvas()) {
                hideAllAnnotations();
              }
            }
            if (!additiveSelect) {
              clearAllSymbolSelection();
            }
            const hasOnlyAnnotations =
              selectedEmojis.size > 0 &&
              Array.from(selectedEmojis).every((e) => e.dataset?.isAnnotation === 'true');
            if (!(isInspecting && hasOnlyAnnotations) && !additiveSelect) {
              clearAllEmojiSelection();
            }
            symbol.selected = true;
            symbol.classList.add('framed');
            selectedSymbols.add(symbol);
            updateExpressionGroupFramesFromSelection(surface);
            if (isInspecting && !additiveSelect) {
              refreshInspectionModeForCanvas(surface);
            }
          }

          // long press ok
          startLongPress(
            parseFloat(symbol.style.left),
            parseFloat(symbol.style.top),
            symbolWidth * symbolScale,
            symbolHeight * symbolScale,
            symbol,
          );

          // owner-only drag
          if (!canEditElement(symbol)) {
            symbol.style.cursor = 'not-allowed';
            // allow click-to-toggle selection for others
            clickOnlySymbol = symbol;
            return; // no dragging
          }

          const selectedAnnotations = Array.from(selectedEmojis).filter(
            (em) => em?.dataset?.isAnnotation === 'true',
          );
          if (selectedAnnotations.length > 0) {
            clearAllEmojiSelection();
          }

          symbol.style.cursor = 'grabbing';
          symbol.moving = false;
          setSymbolDragUiPassThrough(true);

          const canvas = getCanvasForElem(symbol);
          const { x: localX, y: localY } = clientToLocal(canvas, e.clientX, e.clientY);

          if (wantsGroupDrag) {
            dragLeader = symbol;
            dragGroup = new Map();

            dragSnapLock = null;
            pendingSnapDelta = null;
            resetPendingSnapState();
            dragGroupStarted = false;
            dragGroupSet = null;
            dragGroupIncludesUnselected = false;

            const groupSet = buildDragGroupSet(dragLeader);
            if (canvas === chatCanvas()) {
              dragGroupIncludesUnselected =
                addAnnotationSubtreesForDraggedSymbols(groupSet) || dragGroupIncludesUnselected;
            }
            for (const el of groupSet) {
              if (!canEditElement(el)) continue; // can't drag others' items

              const left = parseFloat(el.style.left) || 0;
              const top = parseFloat(el.style.top) || 0;

      // Find all the symbols that are connected to one symbol
      function getMolecule(currentSymbol, visited, representatives = null, graph = currentGraph) {
        visited.add(currentSymbol);

        console.log(`visit`);

      function getMoleculeChar(symbol) {

      // Check for snapping connections
      function checkConnections(active) {

                  snapToSymbol(

      // Get the offset for the symbol when connected to another symbol (side 0 = left, 1 = right)

      function getAbsJunctions(symbol) {

        const renderScale = getRenderedSymbolScale(symbol);
        const baseScale = renderScale / Math.max(symbolScale, 0.0001);

      // Snap active symbol to target
      function snapToSymbol(
        active,
        target,

      ) {

        const isOther = (nbr) => nbr !== active && !(dragGroupSet && dragGroupSet.has(nbr));

        const zoom = getCanvasZoom(canvas) || 1;
        const clientDist = getDist(activeX, activeY, targetX, targetY);

        const snapDistance = isCoarseMobile

      // Add an event listener for clicks on the document

      /* Library */

      function computeLibraryTreeLevels() {
        const nodeIds = nodes.getIds();
        const nodeSet = new Set(nodeIds);
        const parentsById = new Map();
        const childrenById = new Map();
        const indegree = new Map();

        for (const id of nodeIds) {
          parentsById.set(id, []);
          childrenById.set(id, []);
          indegree.set(id, 0);
        }

        for (const edge of edges.get()) {
          if (!nodeSet.has(edge.from) || !nodeSet.has(edge.to)) continue;
          parentsById.get(edge.to).push(edge.from);
          childrenById.get(edge.from).push(edge.to);
          indegree.set(edge.to, (indegree.get(edge.to) || 0) + 1);
        }

        const queue = [];
        const levelById = new Map();
        for (const id of nodeIds) {
          if ((indegree.get(id) || 0) === 0) {
            queue.push(id);
            levelById.set(id, 0);
          }
        }

        while (queue.length) {
          const current = queue.shift();
          const currentLevel = levelById.get(current) || 0;
          for (const child of childrenById.get(current) || []) {
            levelById.set(child, Math.max(levelById.get(child) || 0, currentLevel + 1));
            indegree.set(child, (indegree.get(child) || 0) - 1);
            if ((indegree.get(child) || 0) === 0) queue.push(child);
          }
        }

        for (const id of nodeIds) {
          if (!levelById.has(id)) {
            const parents = parentsById.get(id) || [];
            const inferred = parents.length
              ? Math.max(...parents.map((p) => levelById.get(p) || 0)) + 1
              : 0;
            levelById.set(id, inferred);
          }
        }

        return { levelById, parentsById };
      }

      function getLibraryTreeCardContent(node) {
        const word = node.word || node.title || '(unnamed)';
        let definition = '';
        if (node.word && node.title && node.title !== word) {
          const titleText = String(node.title).trim();
          const prefix = `${String(node.word).trim()}.`;
          definition = titleText.startsWith(prefix)
            ? titleText.slice(prefix.length).trim()
            : titleText;
        }
        return { word, definition };
      }

      function computeLibraryNetworkArrangePositions() {
        const allNodes = nodes.get();
        if (!allNodes.length) return [];

        const { levelById, parentsById } = computeLibraryTreeLevels();
        const nodeById = new Map(allNodes.map((node) => [node.id, node]));
        const adjacency = new Map(allNodes.map((node) => [node.id, new Set()]));
        for (const edge of edges.get()) {
          if (!adjacency.has(edge.from) || !adjacency.has(edge.to)) continue;
          adjacency.get(edge.from).add(edge.to);
          adjacency.get(edge.to).add(edge.from);
        }

        const visited = new Set();
        const components = [];
        for (const node of allNodes) {
          if (visited.has(node.id)) continue;
          const queue = [node.id];
          visited.add(node.id);
          const componentIds = [];
          while (queue.length) {
            const currentId = queue.shift();
            componentIds.push(currentId);
            for (const neighborId of adjacency.get(currentId) || []) {
              if (visited.has(neighborId)) continue;
              visited.add(neighborId);
              queue.push(neighborId);
            }
          }
          components.push(componentIds);
        }

        const componentLayouts = components.map((componentIds) => {
          const columns = new Map();
          const componentNodes = componentIds.map((id) => nodeById.get(id)).filter(Boolean);
          for (const node of componentNodes) {
            const level = levelById.get(node.id) || 0;
            if (!columns.has(level)) columns.set(level, []);
            columns.get(level).push(node);
          }

          const sortedLevels = [...columns.keys()].sort((a, b) => a - b);
          const orderById = new Map();
          let changed = true;
          let safety = 0;

          for (const level of sortedLevels) {
            columns
              .get(level)
              .sort((a, b) => (a.word || a.title || a.id).localeCompare(b.word || b.title || b.id))
              .forEach((node, index) => orderById.set(node.id, index));
          }

          while (changed && safety < 8) {
            changed = false;
            safety += 1;
            for (const level of sortedLevels.slice(1)) {
              const colNodes = columns.get(level);
              const before = colNodes.map((n) => n.id).join('|');
              colNodes.sort((a, b) => {
                const aParents = (parentsById.get(a.id) || []).filter((id) =>
                  componentIds.includes(id),
                );
                const bParents = (parentsById.get(b.id) || []).filter((id) =>
                  componentIds.includes(id),
                );
                const aCenter = aParents.length
                  ? aParents.reduce((sum, id) => sum + (orderById.get(id) || 0), 0) /
                    aParents.length
                  : orderById.get(a.id) || 0;
                const bCenter = bParents.length
                  ? bParents.reduce((sum, id) => sum + (orderById.get(id) || 0), 0) /
                    bParents.length
                  : orderById.get(b.id) || 0;
                if (aCenter !== bCenter) return aCenter - bCenter;
                return (a.word || a.title || a.id).localeCompare(b.word || b.title || b.id);
              });
              colNodes.forEach((node, index) => orderById.set(node.id, index));
              if (before !== colNodes.map((n) => n.id).join('|')) changed = true;
            }
          }

          const colGap = 165;
          const rowGap = 84;
          const relative = [];

          for (const [levelIndex, level] of sortedLevels.entries()) {
            const colNodes = columns.get(level);
            const totalHeight = Math.max(0, (colNodes.length - 1) * rowGap);
            const startY = -totalHeight / 2;
            colNodes.forEach((node, index) => {
              const x = levelIndex * colGap;
              const y = startY + index * rowGap;
              relative.push({ id: node.id, x, y });
            });
          }

          const minX = Math.min(...relative.map((n) => n.x));
          const maxX = Math.max(...relative.map((n) => n.x));
          const minY = Math.min(...relative.map((n) => n.y));
          const maxY = Math.max(...relative.map((n) => n.y));
          const padX = 70;
          const padY = 55;

          return {
            nodes: relative,
            width: maxX - minX + padX * 2,
            height: maxY - minY + padY * 2,
            rootLevel: Math.min(...sortedLevels, 0),
          };
        });

        componentLayouts.sort((a, b) => {
          const areaA = a.width * a.height;
          const areaB = b.width * b.height;
          return areaB - areaA;
        });

        const blockCols = Math.max(1, Math.ceil(Math.sqrt(componentLayouts.length)));
        const blockGapX = 0;
        const blockGapY = 0;
        const columnWidths = new Array(blockCols).fill(0);
        const rowHeights = [];

        componentLayouts.forEach((layout, index) => {
          const col = index % blockCols;
          const row = Math.floor(index / blockCols);
          columnWidths[col] = Math.max(columnWidths[col], layout.width);
          rowHeights[row] = Math.max(rowHeights[row] || 0, layout.height);
        });

        const columnOffsets = [];
        let runningX = 0;
        for (let i = 0; i < columnWidths.length; i++) {
          columnOffsets[i] = runningX;
          runningX += columnWidths[i] + blockGapX;
        }

        const rowOffsets = [];
        let runningY = 0;
        for (let i = 0; i < rowHeights.length; i++) {
          rowOffsets[i] = runningY;
          runningY += rowHeights[i] + blockGapY;
        }

        const updates = [];
        componentLayouts.forEach((layout, index) => {
          const col = index % blockCols;
          const row = Math.floor(index / blockCols);
          const baseX = columnOffsets[col];
          const baseY = rowOffsets[row];
          for (const node of layout.nodes) {
            updates.push({
              id: node.id,
              x: baseX + node.x,
              y: baseY + node.y,
            });
          }
        });

        if (!updates.length) return updates;

        const minX = Math.min(...updates.map((u) => u.x));
        const maxX = Math.max(...updates.map((u) => u.x));
        const minY = Math.min(...updates.map((u) => u.y));
        const maxY = Math.max(...updates.map((u) => u.y));
        const offsetX = (minX + maxX) / 2;
        const offsetY = (minY + maxY) / 2;
        for (const update of updates) {
          update.x -= offsetX;
          update.y -= offsetY;
        }

        return updates;
      }

      function estimateLibraryTreeCardSize(node) {
        const { word, definition } = getLibraryTreeCardContent(node);
        const longest = Math.max(word.length, definition.length || 0);
        const width = clamp(200 + Math.max(0, longest - 14) * 5.5, 200, 420);
        const usableTextWidth = Math.max(120, width - 86);
        const charsPerLine = Math.max(14, Math.floor(usableTextWidth / 7.2));
        const definitionLines = definition
          ? Math.max(1, Math.ceil(definition.length / charsPerLine))
          : 0;
        const height = 70 + Math.max(0, definitionLines - 1) * 17;
        return { width, height };
      }

      function getLibraryTreeCrossLayerRoute(fromId, toId, y1, y2, preferredSide = '') {
        const levelById = libraryTreeRenderState?.levelById;
        const positions = libraryTreeRenderState?.positions;
        const sizes = libraryTreeRenderState?.sizes;
        if (!levelById || !positions || !sizes) return null;

        const fromLevel = levelById.get(String(fromId));
        const toLevel = levelById.get(String(toId));
        if (!Number.isFinite(fromLevel) || !Number.isFinite(toLevel)) return null;
        if (Math.abs(toLevel - fromLevel) <= 1) return null;

        const minLevel = Math.min(fromLevel, toLevel);
        const maxLevel = Math.max(fromLevel, toLevel);
        const bandPadding = 56;
        const routeClearance = 62;
        const blockers = [];

        positions.forEach((pos, id) => {
          const sid = String(id);
          if (sid === String(fromId) || sid === String(toId)) return;
          const level = levelById.get(sid);
          if (!Number.isFinite(level) || level <= minLevel || level >= maxLevel) return;
          const size = sizes.get(id);
          if (!size) return;
          const top = pos.y;
          const bottom = pos.y + size.height;
          if (bottom < Math.min(y1, y2) - bandPadding || top > Math.max(y1, y2) + bandPadding) {
            return;
          }
          blockers.push({ top, bottom });
        });

        if (!blockers.length) return null;

        const surfaceHeight = libraryTreeSurface?.clientHeight || 0;
        const topRoute = clamp(
          Math.min(...blockers.map((blocker) => blocker.top)) - routeClearance,
          18,
          Math.max(18, surfaceHeight - 18),
        );
        const bottomRoute = clamp(
          Math.max(...blockers.map((blocker) => blocker.bottom)) + routeClearance,
          18,
          Math.max(18, surfaceHeight - 18),
        );
        const topCost = Math.abs(y1 - topRoute) + Math.abs(y2 - topRoute);
        const bottomCost = Math.abs(y1 - bottomRoute) + Math.abs(y2 - bottomRoute);
        const hysteresis = 90;
        if (preferredSide === 'top' && topCost <= bottomCost + hysteresis) {
          return { y: topRoute, side: 'top' };
        }
        if (preferredSide === 'bottom' && bottomCost <= topCost + hysteresis) {
          return { y: bottomRoute, side: 'bottom' };
        }
        return topCost <= bottomCost
          ? { y: topRoute, side: 'top' }
          : { y: bottomRoute, side: 'bottom' };
      }

      function updateLibraryTreeEdgePath(path, fromPos, fromSize, toPos, toSize, fromId, toId) {
        if (!path || !fromPos || !fromSize || !toPos || !toSize) return;
        const x1 = fromPos.x + fromSize.width;
        const y1 = fromPos.y + fromSize.height / 2;
        const x2 = toPos.x;
        const y2 = toPos.y + toSize.height / 2;
        const route = getLibraryTreeCrossLayerRoute(
          fromId,
          toId,
          y1,
          y2,
          path.dataset.routeSide || '',
        );
        if (route != null) {
          const span = Math.max(80, x2 - x1);
          const curve = Math.min(72, Math.max(32, span * 0.2));
          const previousVisualRouteY = Number(path.dataset.visualRouteY);
          let smoothedRouteY = Number.isFinite(previousVisualRouteY)
            ? previousVisualRouteY + (route.y - previousVisualRouteY) * 0.24
            : route.y;
          if (route.side === 'top') {
            smoothedRouteY = Math.min(smoothedRouteY, route.y);
          } else if (route.side === 'bottom') {
            smoothedRouteY = Math.max(smoothedRouteY, route.y);
          }
          const midX = x1 + span / 2;
          const firstCtrlX = Math.min(x1 + curve, midX - 24);
          const secondCtrlX = Math.max(x2 - curve, midX + 24);
          path.dataset.routeSide = route.side;
          path.dataset.visualRouteY = String(smoothedRouteY);
          path.setAttribute(
            'd',
            `M ${x1} ${y1} C ${firstCtrlX} ${y1}, ${firstCtrlX} ${smoothedRouteY}, ${midX} ${smoothedRouteY} C ${secondCtrlX} ${smoothedRouteY}, ${secondCtrlX} ${y2}, ${x2} ${y2}`,
          );
          return;
        }
        delete path.dataset.routeSide;
        delete path.dataset.visualRouteY;
        const midX = x1 + Math.max(28, (x2 - x1) / 2);
        path.setAttribute('d', `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`);
      }

      function getLibraryTreeCardDomPosition(nodeId) {
        const card = libraryTreeSurface?.querySelector(
          `.library-tree-card[data-node-id="${String(nodeId)}"]`,
        );
        if (!card) return null;
        // Use logical (pre-zoom) coordinates so lines and saved positions stay stable under CSS zoom.
        const cardX = parseFloat(card.style.left) || 0;
        const cardY = parseFloat(card.style.top) || 0;
        const w =
          parseFloat(card.style.width) || parseFloat(card.style.minWidth) || card.offsetWidth || 0;
        const h =
          parseFloat(card.style.minHeight) ||
          parseFloat(card.style.height) ||
          card.offsetHeight ||
          0;
        return {
          card,
          x: cardX,
          y: cardY,
          width: w,
          height: h,
        };
      }

      function refreshLibraryTreeEdgesFromDom() {
        if (!libraryTreeSvg || !libraryTreeSurface) return;
        libraryTreeSvg.querySelectorAll('path[data-from][data-to]').forEach((path) => {
          const fromId = path.dataset.from;
          const toId = path.dataset.to;
          const fromPos = getLibraryTreeCardDomPosition(fromId);
          const toPos = getLibraryTreeCardDomPosition(toId);
          const fromNode = nodes.get(fromId);
          const toNode = nodes.get(toId);
          if (!fromPos || !toPos || !fromNode || !toNode) return;
          updateLibraryTreeEdgePath(
            path,
            fromPos,
            { width: fromPos.width, height: fromPos.height },
            toPos,
            { width: toPos.width, height: toPos.height },
            fromId,
            toId,
          );
        });
      }

        if (libraryTreeMarqueeBox) return libraryTreeMarqueeBox;
        libraryTreeMarqueeBox = document.createElement('div');
        libraryTreeMarqueeBox.className = 'marquee-box';
        libraryTreeMarqueeBox.style.position = 'fixed';
        libraryTreeMarqueeBox.style.pointerEvents = 'none';
        libraryTreeMarqueeBox.style.display = 'none';
        libraryTreeMarqueeBox.style.zIndex = '99990';
        document.body.appendChild(libraryTreeMarqueeBox);
        return libraryTreeMarqueeBox;
      }

      function showLibraryTreeMarqueeBox(x1, y1, x2, y2) {
        const box = ensureLibraryTreeMarqueeBox();
        const left = Math.min(x1, x2);
        const top = Math.min(y1, y2);
        const right = Math.max(x1, x2);
        const bottom = Math.max(y1, y2);
        box.style.left = `${left}px`;
        box.style.top = `${top}px`;
        box.style.width = `${Math.max(0, right - left)}px`;
        box.style.height = `${Math.max(0, bottom - top)}px`;
        box.style.display = 'block';
      }

      function hideLibraryTreeMarqueeBox() {
        if (libraryTreeMarqueeBox) libraryTreeMarqueeBox.style.display = 'none';
      }

      function selectLibraryTreeCardsInClientRect(x1, y1, x2, y2, additive = false) {
        if (!libraryTreeSurface) return;
        const left = Math.min(x1, x2);
        const top = Math.min(y1, y2);
        const right = Math.max(x1, x2);
        const bottom = Math.max(y1, y2);
        const ids = additive ? new Set(selectedLibraryTreeNodeIds) : new Set();
        libraryTreeSurface.querySelectorAll('.library-tree-card').forEach((card) => {
          const rect = card.getBoundingClientRect();
          const intersects =
            rect.right >= left && rect.left <= right && rect.bottom >= top && rect.top <= bottom;
          if (intersects && card.dataset.nodeId) ids.add(String(card.dataset.nodeId));
        });
        setSelectedLibraryTreeNodes([...ids]);
      }

      function isLibraryTreeAdditiveSelectEvent(e) {
        return !!(
          e.shiftKey ||
          e.ctrlKey ||
          e.metaKey ||
          e.getModifierState?.('Shift') ||
          e.getModifierState?.('Control') ||
          e.getModifierState?.('Meta')
        );
      }

      function toggleLibraryTreeNodeSelection(nodeId) {
        const id = String(nodeId);
        const ids = new Set(selectedLibraryTreeNodeIds);
        if (ids.has(id)) ids.delete(id);
        else ids.add(id);
        setSelectedLibraryTreeNodes([...ids]);
      }

      function layoutLibraryTreeColumnDuringDrag(level, draggedId, draggedY) {
        if (!libraryTreeSurface || !libraryTreeDragState?.baseEntries?.length) return;

        const entries = [...libraryTreeDragState.baseEntries].sort((a, b) => a.baseY - b.baseY);
        const dragged = entries.find((entry) => entry.id === draggedId);
        if (!dragged) return;

        dragged.card.style.left = `${dragged.x}px`;
        dragged.card.style.top = `${draggedY}px`;

        const draggedIndex = entries.findIndex((entry) => entry.id === draggedId);
        const movingDown = draggedY >= dragged.baseY;
        const travel = dragged.size.height + LIBRARY_TREE_ROW_GAP;
        const edgePadding = LIBRARY_TREE_EDGE_INSERT_PADDING;
        const easeOut = (v) => 1 - Math.pow(1 - v, 3);
        const shiftedY = new Map();
        const draggedBottom = draggedY + dragged.size.height;
        const topThresholds = entries.map(
          (entry) => entry.baseY + entry.size.height - edgePadding,
        );
        const bottomThresholds = entries.map((entry) => entry.baseY + edgePadding);

        if (movingDown) {
          for (let i = draggedIndex + 1; i < entries.length; i++) {
            const entry = entries[i];
            const threshold = bottomThresholds[i];
            const nextThreshold =
              i + 1 < entries.length ? bottomThresholds[i + 1] : threshold + travel;
            const progress = clamp(
              (draggedBottom - threshold) / Math.max(1, nextThreshold - threshold),
              0,
              1,
            );
            if (progress > 0) {
              shiftedY.set(entry.id, entry.baseY - easeOut(progress) * travel);
            }
          }
        } else {
          for (let i = draggedIndex - 1; i >= 0; i--) {
            const entry = entries[i];
            const threshold = topThresholds[i];
            const nextThreshold = i - 1 >= 0 ? topThresholds[i - 1] : threshold - travel;
            const progress = clamp(
              (threshold - draggedY) / Math.max(1, threshold - nextThreshold),
              0,
              1,
            );
            if (progress > 0) {
              shiftedY.set(entry.id, entry.baseY + easeOut(progress) * travel);
            }
          }
        }

        for (const entry of entries) {
          if (entry.id === draggedId) continue;
          entry.card.style.top = `${shiftedY.get(entry.id) ?? entry.baseY}px`;
          entry.card.style.left = `${entry.x}px`;
        }

        const cardsAfterLayout = entries.map((entry) => ({
          card: entry.card,
          size: entry.size,
          top: parseFloat(entry.card.style.top) || 0,
        }));
        const minTop = Math.min(...cardsAfterLayout.map((entry) => entry.top));
        const maxBottom = Math.max(
          ...cardsAfterLayout.map((entry) => entry.top + entry.size.height),
        );
        let shiftY = 0;
        if (minTop < 0) shiftY = -minTop;
        else if (maxBottom > libraryTreeSurface.clientHeight) {
          shiftY = libraryTreeSurface.clientHeight - maxBottom;
        }

        if (shiftY) {
          for (const entry of entries) {
            const nextTop = (parseFloat(entry.card.style.top) || 0) + shiftY;
            entry.card.style.top = `${nextTop}px`;
          }
        }
      }

      function layoutLibraryTreeMultiColumnDuringDrag(dy, snapSelectedToTargets = false) {
        if (!libraryTreeSurface || !libraryTreeDragState?.columnGroups?.length) return;

        for (const group of libraryTreeDragState.columnGroups) {
          const selectedIds = new Set(group.selected.map((entry) => entry.id));
          const selectedByBaseOrder = [...group.selected].sort((a, b) => a.baseY - b.baseY);
          const selectedBlockTop = Math.min(
            ...selectedByBaseOrder.map((entry) => entry.startY + dy),
          );
          let selectedY = selectedBlockTop;
          const selectedEntries = selectedByBaseOrder.map((entry) => {
            const packed = {
              ...entry,
              y: selectedY,
            };
            selectedY += entry.size.height + LIBRARY_TREE_ROW_GAP;
            return packed;
          });
          const unselectedEntries = group.entries
            .filter((entry) => !selectedIds.has(entry.id))
            .sort((a, b) => a.baseY - b.baseY);

          if (!selectedEntries.length) continue;

          const selectedTop = Math.min(...selectedEntries.map((entry) => entry.y));
          const selectedBottom = Math.max(
            ...selectedEntries.map((entry) => entry.y + entry.size.height),
          );
          const selectedCenter = (selectedTop + selectedBottom) / 2;
          let insertIndex = unselectedEntries.findIndex(
            (entry) => selectedCenter < entry.baseY + entry.size.height / 2,
          );
          if (insertIndex < 0) insertIndex = unselectedEntries.length;

          const ordered = [
            ...unselectedEntries.slice(0, insertIndex),
            ...selectedByBaseOrder,
            ...unselectedEntries.slice(insertIndex),
          ];

          let currentY = Math.min(...group.entries.map((entry) => entry.baseY));
          const targetY = new Map();
          for (const entry of ordered) {
            targetY.set(entry.id, currentY);
            currentY += entry.size.height + LIBRARY_TREE_ROW_GAP;
          }

          for (const entry of group.entries) {
            entry.card.style.left = `${entry.x}px`;
            if (selectedIds.has(entry.id)) {
              entry.card.classList.remove('displaced');
              const selectedEntry = selectedEntries.find((item) => item.id === entry.id);
              const nextY = snapSelectedToTargets
                ? targetY.get(entry.id)
                : (selectedEntry?.y ?? entry.startY + dy);
              entry.card.style.top = `${nextY ?? entry.startY + dy}px`;
            } else {
              entry.card.classList.add('displaced');
              entry.card.style.top = `${targetY.get(entry.id) ?? entry.baseY}px`;
            }
          }
        }
      }

      function animateLibraryTreeColumnToPackedPositions(dragState) {
        if (!libraryTreeSurface || !dragState?.baseEntries?.length) return Promise.resolve([]);

        const entries = dragState.baseEntries
          .map((entry) => {
            const pos = getLibraryTreeCardDomPosition(entry.id);
            return pos
              ? {
                  id: String(entry.id),
                  card: entry.card,
                  x: entry.x,
                  y: pos.y,
                  baseY: entry.baseY,
                  size: entry.size,
                }
              : null;
          })
          .filter(Boolean)
          .sort((a, b) => a.baseY - b.baseY);

        if (!entries.length) return Promise.resolve([]);

        const dragged = entries.find((entry) => entry.id === String(dragState.nodeId));
        if (!dragged) return Promise.resolve([]);

        const others = entries.filter((entry) => entry.id !== dragged.id);
        const movingDown = dragged.y >= dragged.baseY;
        const draggedTop = dragged.y;
        const draggedBottom = dragged.y + dragged.size.height;
        let insertIndex = others.findIndex((entry) =>
          movingDown
            ? draggedBottom < entry.baseY + LIBRARY_TREE_EDGE_INSERT_PADDING
            : draggedTop < entry.baseY + entry.size.height - LIBRARY_TREE_EDGE_INSERT_PADDING,
        );
        if (insertIndex < 0) insertIndex = others.length;

        const ordered = [...others.slice(0, insertIndex), dragged, ...others.slice(insertIndex)];

        const targets = [];
        let currentY = Math.min(...entries.map((entry) => entry.baseY));
        ordered.forEach((entry) => {
          targets.push({ id: entry.id, card: entry.card, x: entry.x, y: currentY });
          currentY += entry.size.height + LIBRARY_TREE_ROW_GAP;
        });

        return new Promise((resolve) => {
          const starts = targets.map((entry) => {
            const live = getLibraryTreeCardDomPosition(entry.id);
            return {
              ...entry,
              startY: live ? live.y : entry.y,
            };
          });
          const duration = 320;
          const ease = (t) => 1 - Math.pow(1 - t, 3);
          const startTime = performance.now();

          const step = (now) => {
            const rawT = Math.min(1, (now - startTime) / duration);
            const t = ease(rawT);
            starts.forEach((entry) => {
              const nextY = entry.startY + (entry.y - entry.startY) * t;
              entry.card.style.left = `${entry.x}px`;
              entry.card.style.top = `${nextY}px`;
            });
            refreshLibraryTreeEdgesFromDom();

            if (rawT < 1) {
              requestAnimationFrame(step);
              return;
            }

            const packed = starts.map((entry) => ({
              id: entry.id,
              _treeY: entry.y,
            }));
            resolve(packed);
          };

          requestAnimationFrame(step);
        });
      }

      function startLibraryTreeCardDrag(card, nodeId, positions, sizes, pointerId, clientY) {
        const startPos = positions.get(nodeId);
        const size = sizes.get(nodeId);
        if (!startPos || !size) return false;

        const stringNodeId = String(nodeId);
        const draggingExistingSelection =
          selectedLibraryTreeNodeIds.has(stringNodeId) && selectedLibraryTreeNodeIds.size > 1;
        if (draggingExistingSelection) {
          const entries = [...selectedLibraryTreeNodeIds]
            .map((id) => {
              const pos = getLibraryTreeCardDomPosition(id);
              const s = libraryTreeRenderState?.sizes?.get(id);
              const level = libraryTreeRenderState?.levelById?.get(String(id));
              return pos && s
                ? {
                    id: String(id),
                    card: pos.card,
                    startY: pos.y,
                    baseY: pos.y,
                    x: pos.x,
                    size: s,
                    level: String(level ?? pos.card.dataset.level ?? ''),
                  }
                : null;
            })
            .filter(Boolean);
          if (entries.length > 1) {
            const selectedLevels = new Set(entries.map((entry) => entry.level));
            const columnGroups = [...selectedLevels]
              .map((level) => {
                const columnIds = libraryTreeRenderState?.columns?.get(String(level)) || [];
                const columnEntries = columnIds
                  .map((id) => {
                    const pos = getLibraryTreeCardDomPosition(id);
                    const s = libraryTreeRenderState?.sizes?.get(id);
                    return pos && s
                      ? {
                          id: String(id),
                          card: pos.card,
                          x: pos.x,
                          startY: pos.y,
                          baseY: pos.y,
                          size: s,
                        }
                      : null;
                  })
                  .filter(Boolean);
                return {
                  level: String(level),
                  entries: columnEntries,
                  selected: columnEntries.filter((entry) =>
                    selectedLibraryTreeNodeIds.has(entry.id),
                  ),
                };
              })
              .filter((group) => group.selected.length);
            libraryTreeDragState = {
              mode: 'multi',
              nodeId: stringNodeId,
              card,
              startClientY: clientY,
              entries,
              columnGroups,
              moved: false,
            };
            entries.forEach((entry) => entry.card.classList.add('dragging'));
            columnGroups.forEach((group) => {
              group.entries.forEach((entry) => {
                if (!selectedLibraryTreeNodeIds.has(entry.id))
                  entry.card.classList.add('displaced');
              });
            });
            card.setPointerCapture?.(pointerId);
            startLibraryTreeEdgeFollow();
            return true;
          }
        }

        setSelectedLibraryTreeNodes([nodeId]);
        const baseEntries = (libraryTreeRenderState?.columns?.get(card.dataset.level || '') || [])
          .map((id) => {
            const pos = getLibraryTreeCardDomPosition(id);
            const s = libraryTreeRenderState?.sizes?.get(id);
            return pos && s
              ? { id: String(id), card: pos.card, x: pos.x, y: pos.y, baseY: pos.y, size: s }
              : null;
          })
          .filter(Boolean);
        libraryTreeDragState = {
          mode: 'single',
          nodeId,
          card,
          level: card.dataset.level || '',
          startClientY: clientY,
          startY: startPos.y,
          x: startPos.x,
          size,
          moved: false,
          baseEntries,
        };
        card.classList.add('dragging');
        card.setPointerCapture?.(pointerId);
        startLibraryTreeEdgeFollow();
        return true;
      }

      function attachLibraryTreeCardDrag(card, nodeId, positions, sizes) {
        card.addEventListener('pointerdown', (e) => {
          if (e.button !== 0) return;
          hideLibraryTreeContextMenu();
          e.preventDefault();
          e.stopPropagation();
          if (isLibraryTreeAdditiveSelectEvent(e)) {
            toggleLibraryTreeNodeSelection(nodeId);
            return;
          }
          startLibraryTreeCardDrag(card, nodeId, positions, sizes, e.pointerId, e.clientY);
        });
        card.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          setSelectedLibraryTreeNodes([nodeId]);
          showLibraryTreeContextMenu(e.clientX, e.clientY, card, nodeId);
        });
      }

      function renderLibraryTreeView() {
        if (!libraryTreeSurface || !libraryTreeSvg) return;

        libraryTreeSurface.querySelectorAll('.library-tree-card').forEach((el) => el.remove());
        libraryTreeSvg.innerHTML = '';

        const allNodes = nodes.get();
        if (!allNodes.length) {
          libraryTreeSurface.style.width = '100%';
          libraryTreeSurface.style.height = '100%';
          return;
        }

        const { levelById, parentsById } = computeLibraryTreeLevels();
        const columns = new Map();
        for (const node of allNodes) {
          const level = levelById.get(node.id) || 0;
          if (!columns.has(level)) columns.set(level, []);
          columns.get(level).push(node);
        }

        const sortedLevels = [...columns.keys()].sort((a, b) => a - b);
        for (const level of sortedLevels) {
          columns.get(level).sort((a, b) => {
            const aTreeY = Number.isFinite(a._treeY) ? a._treeY : null;
            const bTreeY = Number.isFinite(b._treeY) ? b._treeY : null;
            if (aTreeY != null || bTreeY != null) {
              if (aTreeY == null) return 1;
              if (bTreeY == null) return -1;
              if (aTreeY !== bTreeY) return aTreeY - bTreeY;
            }
            const aParents = (parentsById.get(a.id) || [])
              .map((id) => nodes.get(id)?.word || '')
              .join('|');
            const bParents = (parentsById.get(b.id) || [])
              .map((id) => nodes.get(id)?.word || '')
              .join('|');
            return (
              (a.word || a.title || a.id).localeCompare(b.word || b.title || b.id) ||
              aParents.localeCompare(bParents)
            );
          });
        }

        const positions = new Map();
        const sizes = new Map();
        let maxBottom = 0;
        let maxRight = 0;

        for (const node of allNodes) {
          sizes.set(node.id, estimateLibraryTreeCardSize(node));
        }

        const startX = 90;
        const startY = 120;
        const rowGap = LIBRARY_TREE_ROW_GAP;
        const columnGap = 80;
        let currentX = startX;

        const treeColumns = new Map();

        for (const level of sortedLevels) {
          const colNodes = columns.get(level);
          treeColumns.set(
            String(level),
            colNodes.map((node) => String(node.id)),
          );
          const columnWidth = Math.max(...colNodes.map((node) => sizes.get(node.id).width));
          let currentY = startY;
          colNodes.forEach((node) => {
            const size = sizes.get(node.id);
            positions.set(node.id, {
              x: currentX,
              y: currentY,
            });
            currentY += size.height + rowGap;
            maxBottom = Math.max(maxBottom, currentY - rowGap);
            maxRight = Math.max(maxRight, currentX + size.width);
          });
          currentX += columnWidth + columnGap;
        }

        const surfaceWidth = Math.max(900, maxRight + startX);
        const surfaceHeight = Math.max(700, maxBottom + startY);
        libraryTreeSurface.style.width = `${surfaceWidth}px`;
        libraryTreeSurface.style.height = `${surfaceHeight}px`;
        libraryTreeSvg.setAttribute('width', surfaceWidth);
        libraryTreeSvg.setAttribute('height', surfaceHeight);
        libraryTreeSvg.setAttribute('viewBox', `0 0 ${surfaceWidth} ${surfaceHeight}`);
        libraryTreeRenderState = {
          positions,
          sizes,
          columns: treeColumns,
          levelById: new Map([...levelById.entries()].map(([id, level]) => [String(id), level])),
        };

        for (const edge of edges.get()) {
          const fromPos = positions.get(edge.from);
          const toPos = positions.get(edge.to);
          if (!fromPos || !toPos) continue;
          const fromSize = sizes.get(edge.from);
          const toSize = sizes.get(edge.to);
          if (!fromSize || !toSize) continue;

          const x1 = fromPos.x + fromSize.width;
          const y1 = fromPos.y + fromSize.height / 2;
          const x2 = toPos.x;
          const y2 = toPos.y + toSize.height / 2;
          const midX = x1 + Math.max(28, (x2 - x1) / 2);
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.dataset.from = String(edge.from);
          path.dataset.to = String(edge.to);
          updateLibraryTreeEdgePath(path, fromPos, fromSize, toPos, toSize, edge.from, edge.to);
          path.setAttribute('stroke', 'black');
          path.setAttribute('stroke-width', '3');
          path.setAttribute('fill', 'none');
          libraryTreeSvg.appendChild(path);
        }

        for (const node of allNodes) {
          const pos = positions.get(node.id);
          if (!pos) continue;
          const size = sizes.get(node.id);
          const { word, definition } = getLibraryTreeCardContent(node);

          const card = document.createElement('div');
          card.className = 'library-tree-card';
          if (basicNodeIds.has(node.id)) card.classList.add('basic');
          if (selectedLibraryTreeNodeIds.has(String(node.id))) card.classList.add('selected');
          card.style.left = `${pos.x}px`;
          card.style.top = `${pos.y}px`;
          card.style.width = `${size.width}px`;
          card.style.minHeight = `${size.height}px`;
          card.dataset.nodeId = String(node.id);
          card.dataset.level = String(levelById.get(node.id) || 0);

          const img = document.createElement('img');
          img.className = 'library-tree-card-image';
          img.src = node.image;
          img.alt = node.word || node.title || '';

          const textWrap = document.createElement('div');
          textWrap.className = 'library-tree-card-text';

          const label = document.createElement('div');
          label.className = 'library-tree-card-word';
          label.textContent = word;

          textWrap.appendChild(label);
          if (definition) {
            const definitionEl = document.createElement('div');
            definitionEl.className = 'library-tree-card-definition';
            definitionEl.textContent = definition;
            textWrap.appendChild(definitionEl);
          }

          card.appendChild(img);
          card.appendChild(textWrap);
          libraryTreeSurface.appendChild(card);
          attachLibraryTreeCardDrag(card, node.id, positions, sizes);
        }
      }

      function organizeLibraryNetwork() {
        if (libraryViewMode === 'tree') {
          renderLibraryTreeView();
          if (libraryTreeView) {
            libraryTreeView.scrollTo({ top: 0, left: 0, behavior: 'smooth' });
          }
          return;
        }

        if (!network) return;
        const updates = computeLibraryNetworkArrangePositions();
        if (updates.length) {
          nodes.update(updates);
        }
        network.setOptions(options);
        network.redraw();
        network.stabilize(120);
        network.fit({
          animation: {
            duration: 600,
            easingFunction: 'easeInOutQuad',
          },
        });
        scheduleSaveLibraryGraph();
      }

      document.addEventListener('pointermove', (e) => {
        if (!libraryTreeDragState || !libraryTreeSurface || !libraryTreeSvg) return;

        if (libraryTreeDragState.mode === 'multi') {
          const { startClientY, entries } = libraryTreeDragState;
          const zoom = Math.max(libraryContentZoom || 1, 0.0001);
          const rawDy = e.clientY - startClientY;
          let dy = rawDy / zoom;
          if (Math.abs(rawDy) > 2) libraryTreeDragState.moved = true;

          const surfaceH = libraryTreeSurface.offsetHeight || libraryTreeSurface.clientHeight || 0;
          if (entries?.length) {
            const minAllowed = Math.max(...entries.map((entry) => -entry.startY));
            const maxAllowed = Math.min(
              ...entries.map((entry) => surfaceH - entry.size.height - entry.startY),
            );
            dy = clamp(dy, minAllowed, maxAllowed);
          }

          libraryTreeDragState.lastDy = dy;
          layoutLibraryTreeMultiColumnDuringDrag(dy);
          refreshLibraryTreeEdgesFromDom();
          return;
        }

        const { nodeId, card, level, startClientY, startY, x, size } = libraryTreeDragState;
        const zoom = Math.max(libraryContentZoom || 1, 0.0001);
        const rawDy = e.clientY - startClientY;
        const dy = rawDy / zoom;
        if (Math.abs(rawDy) > 2) libraryTreeDragState.moved = true;
        const surfaceH = libraryTreeSurface.offsetHeight || libraryTreeSurface.clientHeight || 0;
        const maxY = Math.max(0, surfaceH - size.height);
        const nextY = clamp(startY + dy, 0, maxY);

        card.style.left = `${x}px`;
        layoutLibraryTreeColumnDuringDrag(level, String(nodeId), nextY);
        refreshLibraryTreeEdgesFromDom();
      });

      document.addEventListener('pointerup', async (e) => {
        if (!libraryTreeDragState) return;
        if (libraryTreeDragState.mode === 'multi') {
          const { card, entries, columnGroups } = libraryTreeDragState;
          layoutLibraryTreeMultiColumnDuringDrag(libraryTreeDragState.lastDy || 0, true);
          refreshLibraryTreeEdgesFromDom();
          entries?.forEach((entry) => entry.card.classList.remove('dragging'));
          columnGroups?.forEach((group) => {
            group.entries?.forEach((entry) => entry.card.classList.remove('displaced'));
          });
          card?.releasePointerCapture?.(e.pointerId);
          stopLibraryTreeEdgeFollow();
          const updateEntries = columnGroups?.length
            ? [
                ...new Map(
                  columnGroups.flatMap((group) => group.entries).map((entry) => [entry.id, entry]),
                ).values(),
              ]
            : entries || [];
          const updates = updateEntries
            .map((entry) => {
              const pos = getLibraryTreeCardDomPosition(entry.id);
              return pos ? { id: entry.id, _treeY: pos.y } : null;
            })
            .filter(Boolean);
          libraryTreeDragState = null;
          if (updates.length) nodes.update(updates);
          renderLibraryTreeView();
          scheduleSaveLibraryGraph();
          return;
        }

        const { nodeId, card, level } = libraryTreeDragState;
        card.classList.remove('dragging');
        card.releasePointerCapture?.(e.pointerId);
        stopLibraryTreeEdgeFollow();
        let updates = [];
        if (libraryTreeDragState.moved) {
          startLibraryTreeEdgeFollow();
          updates = await animateLibraryTreeColumnToPackedPositions(libraryTreeDragState);
          stopLibraryTreeEdgeFollow();
        } else {
          const columnIds = libraryTreeRenderState?.columns?.get(level) || [String(nodeId)];
          updates = columnIds
            .map((id) => {
              const pos = getLibraryTreeCardDomPosition(id);
              return pos ? { id, _treeY: pos.y } : null;
            })
            .filter(Boolean);
        }
        libraryTreeDragState = null;
        if (updates.length) nodes.update(updates);
        renderLibraryTreeView();
        scheduleSaveLibraryGraph();
      });

      async function loadLibraryGraphForUser() {

        if (!snap.exists()) return;

        const { nodes: savedNodes = [], edges: savedEdges = [], view = null } = snap.data();

        // 1) add nodes if absent in dataset, otherwise update word/title/pos
        for (const sn of savedNodes) {
          // If the node already exists in the dataset, update it; otherwise add it.
          const exists = nodes.get(sn.id);

          // Deserialize pattern safely (supports old records without pattern)
          const parsedPattern = sn.pattern ? deserializePatternGraph(sn.pattern) : null;
          const parsedLayout = sn.layout ? deserializeSelectionLayout(sn.layout) : null;

          if (!exists) {
            // Synthesized nodes need svg to rebuild the image

            const existingBaseIndex = exists._baseIndex;
            nodes.update({

              lang: sn.lang || exists.lang || '',

              ...(sn.treeY != null ? { _treeY: sn.treeY } : {}),
              ...(sn.svg ? { _svg: sn.svg } : {}),
              // only overwrite pattern if saved data actually has one
              ...(sn.pattern !== undefined ? { pattern: parsedPattern } : {}),
              ...(sn.layout !== undefined ? { layout: parsedLayout } : {}),
            });

        // 2) add edges

      function capitalizeFirstLetter(val) {

      function scaleSVG(svgString, targetSize = 40) {
        // Parse SVG string
        let parser = new DOMParser();
        let doc = parser.parseFromString(svgString, 'image/svg+xml');
        let svg = doc.documentElement;

        let viewBox = svg.getAttribute('viewBox');
        let width = parseFloat(svg.getAttribute('width'));
        let height = parseFloat(svg.getAttribute('height'));

        if (viewBox) {
          let [x, y, w, h] = viewBox.split(' ').map(parseFloat);
          width = w;
          height = h;
        }

        if (!width || !height) return svgString; // Fallback: return original SVG

        // Calculate scale factor
        let scale = (targetSize * 0.6) / Math.max(width, height);

        // Calculate translation to center the scaled content
        let translateX = (targetSize - width * scale) / 2;
        let translateY = (targetSize - height * scale) / 2;

        // Apply transform
        let transform = `translate(${translateX}, ${translateY}) scale(${scale})`;

        // Wrap everything inside a group <g> element to apply transformations
        let group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        group.setAttribute('transform', transform);
        while (svg.firstChild) {
          group.appendChild(svg.firstChild);
        }
        svg.innerHTML = ''; // Clear original SVG
        svg.appendChild(group);

        // Set viewBox to match the target circle size
        svg.setAttribute('width', targetSize);
        svg.setAttribute('height', targetSize);
        svg.setAttribute('viewBox', `0 0 ${targetSize} ${targetSize}`);

        return new XMLSerializer().serializeToString(svg);
      }

      // Synthesize a node from its components and connect the component nodes to the synthesized node
      async function synthNode(components, word, justification, foundIds, elimBasic, pattern) {
        let leftMost = 2 * document.documentElement.scrollWidth;
        let rightMost = -document.documentElement.scrollWidth;
        let topMost = 2 * document.documentElement.scrollHeight;
        let bottomMost = -document.documentElement.scrollHeight;
        let rect;
        let svgString = '';
        components.forEach((symbol) => {
          rect = symbol.getBoundingClientRect();
          if (rect.left < leftMost) leftMost = rect.left;
          if (rect.right > rightMost) rightMost = rect.right;
          if (rect.top < topMost) topMost = rect.top;
          if (rect.bottom > bottomMost) bottomMost = rect.bottom;

          if (symbol.dot != null) {
            rect = symbol.dot.getBoundingClientRect();
            if (rect.left < leftMost) leftMost = rect.left;
            if (rect.right > rightMost) rightMost = rect.right;
            if (rect.top < topMost) topMost = rect.top;
            if (rect.bottom > bottomMost) bottomMost = rect.bottom;
          }
        });
        console.log(`left ${leftMost} right ${rightMost} top ${topMost} bottom ${bottomMost}`);
        const ratio = 49.92 / (symbolWidth * symbolScale);

        components.forEach((symbol) => {
          rect = symbol.getBoundingClientRect();
          let transX;
          let transY;
          switch (symbol.angle) {
            case 0:
              transX = rect.left;
              transY = rect.top;
              break;
            case 90:
              transX = rect.right;
              transY = rect.top;
              break;
            case 180:
              transX = rect.right;
              transY = rect.bottom;
              break;
            case 270:
              transX = rect.left;
              transY = rect.bottom;
              break;
          }
          svgString +=
            `<g transform="translate(` +
            ((transX - leftMost) * ratio).toString() +
            `, ` +
            ((transY - topMost) * ratio).toString() +
            `) rotate(` +
            symbol.angle.toString() +
            `)">` +
            symbol.querySelector('svg').innerHTML +
            `</g>\n`;

          if (symbol.dot != null) {
            console.log('added dot!');
            rect = symbol.dot.getBoundingClientRect();
            svgString +=
              `<g transform="translate(` +
              ((rect.left - leftMost) * ratio).toString() +
              `, ` +
              ((rect.top - topMost) * ratio).toString() +
              `)">` +
              dotDataMini +
              `</g>\n`;
          }
        });

        const widthStr = ((rightMost - leftMost) * ratio).toString();
        const heightStr = ((bottomMost - topMost) * ratio).toString();
        svgString =
          `<svg width="` +
          widthStr +
          `" height="` +
          heightStr +
          `" viewBox="0 0 ` +
          widthStr +
          ` ` +
          heightStr +
          `" xmlns="http://www.w3.org/2000/svg">\n` +
          svgString +
          `</svg>`;

        let id = await generateUniqueId(svgString);
        let hasDuplicate = false;
        nodes.forEach((node) => {
          if (node['id'] === id) {
            hasDuplicate = true;
          }
        });

        if (!hasDuplicate) {
          const serializedPattern = serializePatternGraph(pattern);
          const serializedLayout = serializeSelectionLayout(
            snapshotSelectionAsLayout(currentGraph, components),
          );
          let newNode = {
            id: id,
            shape: 'circularImage',
            image: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(scaleSVG(svgString)),
            word: word,
            title: capitalizeFirstLetter(word) + '. ' + capitalizeFirstLetter(justification),
            lang: currentLang,
            _svg: svgString,
            pattern: serializedPattern,
            layout: serializedLayout,
          };

          nodes.add(newNode); // Add node to dataset
          for (const symbol of components) {
            if (!elimBasic.has(symbol))
              addEdge(await generateUniqueId(symbolData[symbol.elemIdTrue]), id);
          }
          for (const foundId of foundIds) {
            addEdge(foundId, id);
          }
        }

        scheduleSaveLibraryGraph();
        return id;
      }

      let saveTimer = null;

      function addEdge(sourceId, targetId) {
        // Get all existing edges
        const existingEdges = edges.get();

        // Check if the edge already exists between the two nodes, in either direction
        const edgeExists = existingEdges.some((edge) => {

            (edge.from === sourceId && edge.to === targetId) ||

      async function generateUniqueId(svgString) {
        // Ensure consistent encoding
        const normalized = String(svgString || '').trim(); // Trim to avoid whitespace inconsistencies
        const encoder = new TextEncoder();
        const data = encoder.encode(normalized);

        // Compute SHA-256 hash
        const subtle = globalThis.crypto?.subtle || globalThis.crypto?.webcrypto?.subtle;
        if (!subtle?.digest) {
          let h1 = 0x811c9dc5;
          let h2 = 0x01000193;
          for (let i = 0; i < normalized.length; i++) {
            const c = normalized.charCodeAt(i);
            h1 ^= c;
            h1 = Math.imul(h1, 0x01000193);
            h2 ^= c + i;
            h2 = Math.imul(h2, 0x85ebca6b);
          }
          const fallback = `${(h1 >>> 0).toString(36)}${(h2 >>> 0).toString(36)}`;
          return `svg-${fallback.substring(0, 16)}`;
        }

        const hashBuffer = await subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));

        // Convert hash to a base64 string (URL-safe)
        return (
          'svg-' +
          btoa(String.fromCharCode(...hashArray))
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=+$/, '') // Remove padding
            .substring(0, 16)
        ); // Trim for shorter ID
      }

        worldData.islands.forEach((islandData) => {
          const islandSVG = createIslandSVG(islandData);

          islandSVG.style.top = oceanPadY + islandData.y * layoutH + 'px';
