<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ítí Isles</title>
    <style>
      @font-face {
        font-family: 'UkirizWenKai';
        src:
          url('./fonts/LXGWWenKai-Regular.woff2') format('woff2'),
          local('LXGW WenKai'),
          local('LXGW WenKai SC'),
          local('LXGW WenKai Screen'),
          local('LXGW WenKai GB Screen'),
          local('LXGW WenKai Lite'),
          local('霞鹜文楷'),
          local('霞鹜文楷 GB'),
          local('霞鹜文楷屏幕阅读版');
        font-display: swap;
      }

      @font-face {
        font-family: 'UkirizSarasaUiSC';
        src:
          url('./fonts/SarasaUiSC-Regular.woff2') format('woff2'),
          local('Sarasa UI SC'),
          local('Sarasa Gothic SC'),
          local('Sarasa Gothic CL'),
          local('Sarasa Gothic');
        font-display: swap;
      }

      @font-face {
        font-family: 'UkirizSourceHanSerif';
        src:
          url('./fonts/SourceHanSerifSC-VF.woff2') format('woff2'),
          local('Source Han Serif'),
          local('Source Han Serif SC'),
          local('Source Han Serif CN'),
          local('Noto Serif CJK SC'),
          local('思源宋体'),
          local('思源宋体 CN'),
          local('思源宋体 SC');
        font-display: swap;
      }

      :root {
        --mono-en: Consolas, 'Courier New', ui-monospace, SFMono-Regular, Menlo, Monaco;
        --mono-zh:
          'UkirizSarasaUiSC', 'Sarasa UI SC', 'Sarasa Gothic SC', 'Noto Sans CJK SC',
          'PingFang SC', 'Microsoft YaHei', sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
        background-color: #f4f4f9;
        /* background-color: #262626; */
        /* background-color: #eef7f2; */
        /* background-color: #f9f1db; */
        font-family: var(--mono-en);
        display: flex;
        height: 100vh; /* Full viewport height */
        touch-action: manipulation;
      }

      body.lang-zh {
        font-family: var(--mono-en), var(--mono-zh);
      }

      .symbol {
        position: absolute;
        width: 117px; /* Full width = 156 */
        height: 50.25px; /* Full height = 67 */
        cursor: grab;
        user-select: none;
        touch-action: none;
        z-index: 3;
        pointer-events: auto;
      }
      .symbol img {
        width: 100%;
        height: 100%;
      }

      .dot {
        position: absolute;
        width: 5px; /* Full width = 156 */
        height: 5px; /* Full height = 67 */
        cursor: grab;
        user-select: none;
        touch-action: none;
        z-index: 6;
      }

      /* Highlight connections */
      .framed {
        outline: 2px solid #00b0f0;
      }

      /* Basic styles for the button */
      .button {
        position: fixed; /* Enables top and left positioning */
        background-size: contain; /* Ensure the image covers the entire button */
        background-repeat: no-repeat;
        background-position: center;
        border: none;
        border-radius: 5px; /* Optional: Makes the button rounded */
        cursor: pointer;
        opacity: 1;
        transition: opacity 0.2s;
        z-index: 1;
      }

      /* Add hover effect */
      .button:hover {
        opacity: 0.5;
      }

      body.symbol-drag-ui-pass-through .button,
      body.symbol-drag-ui-pass-through .submit-button,
      body.symbol-drag-ui-pass-through .wheel,
      body.symbol-drag-ui-pass-through #lang-toggle,
      body.symbol-drag-ui-pass-through .lang-menu {
        pointer-events: none !important;
      }

      .logo {
        position: fixed;
        top: 30px;
        right: 10px;
        width: 250px;
        height: auto;
        margin-bottom: 0; /* fixed 元素不需要这个 */
      }

      .wheel {
        position: fixed;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        cursor: pointer;
        touch-action: none;
        z-index: 30;
      }

      /* Tab styles */
      .tab {
        color: white;
        text-align: center;
        line-height: 100px;
        font-size: 40px;
        font-family: inherit; /* Set font to match labels */
        width: 280px;
        height: 100px; /* Make taller for rectangular shape */
        padding: 0; /* No extra padding */
        cursor: pointer;
        margin: 0px 0; /* Spacing between buttons */
        border-radius: 0; /* Remove rounded corners */
        transition:
          background-color 1s ease-in-out,
          opacity 1s ease-in-out;
        opacity: 0.5; /* Start at a slightly faded state */
      }

      .tab:hover {
        background-color: rgba(255, 255, 255, 0.4);
        transition: background-color 0.3s;
      }

      .tab-active {
        background-color: rgba(255, 255, 255, 0.6);
        opacity: 1; /* Fully visible */
      }

      :root {
        --sidebar-w: 280px;
      }

      /* Vertical bar styles */
      .vertical-bar {
        position: fixed;
        top: 0;
        right: 0;
        width: var(--sidebar-w);
        height: 100%;
        background-color: #00b0f0; /* Blue background */
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 200px;
        z-index: 99999;
      }

      /* Content container */
      .content {
        margin-left: auto; /* Push content to the left of the vertical bar */
        margin-right: var(--sidebar-w); /* Leave space for the vertical bar */
        flex: 1;
        padding: 20px;
        overflow: hidden;
        height: 100vh;
        box-sizing: border-box;
      }

      .mobile-only {
        display: none;
      }

      /* Content sections */
      .tab-content {
        display: none; /* Hide all content by default */
        height: 100%;
      }

      .tab-content.active {
        display: block; /* Show active tab content */
      }

      #tab2 {
        position: relative;
        width: calc(100% + 20px);
        height: calc(100% + 40px);
        margin: -20px -20px -20px 0;
        overflow: auto;
        box-sizing: border-box;
      }

      #home-content {
        transform-origin: top left;
      }

      #tab0 {
        width: calc(100% + 20px);
        height: calc(100% + 40px);
        margin: -20px -20px -20px 0;
        overflow-y: auto;
        overflow-x: hidden;
        box-sizing: border-box;
      }

      #craftCanvas {
        position: relative;
        width: calc(100% + var(--craft-extra-x, 0px));
        height: calc(100% + var(--craft-extra-y, 0px));
        min-width: calc(100% + var(--craft-extra-x, 0px));
        min-height: calc(100% + var(--craft-extra-y, 0px));
        background-color: #f4f4f9;
        background-image:
          linear-gradient(to right, rgba(0, 0, 0, 0.065) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.065) 1px, transparent 1px),
          linear-gradient(to right, rgba(0, 0, 0, 0.12) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.12) 1px, transparent 1px);
        background-size:
          80px 80px,
          80px 80px,
          400px 400px,
          400px 400px;
        background-position:
          0 0,
          0 0,
          0 0,
          0 0;
        touch-action: none;
      }

      #tab1 {
        position: relative;
        width: calc(100% + 40px);
        height: calc(100% + 40px);
        margin: -20px -20px -20px -20px;
        overflow: auto;
        --craft-extra-x: 0px;
        --craft-extra-y: 0px;
        --craft-grid-minor-step: 80px;
        --craft-grid-major-step: 400px;
        --craft-grid-minor-stroke: 1px;
        --craft-grid-major-stroke: 1px;
        background: #f4f4f9;
        background-image:
          linear-gradient(
            to right,
            rgba(0, 0, 0, 0.065) var(--craft-grid-minor-stroke),
            transparent var(--craft-grid-minor-stroke)
          ),
          linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.065) var(--craft-grid-minor-stroke),
            transparent var(--craft-grid-minor-stroke)
          ),
          linear-gradient(
            to right,
            rgba(0, 0, 0, 0.12) var(--craft-grid-major-stroke),
            transparent var(--craft-grid-major-stroke)
          ),
          linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.12) var(--craft-grid-major-stroke),
            transparent var(--craft-grid-major-stroke)
          );
        background-size:
          var(--craft-grid-minor-step) var(--craft-grid-minor-step),
          var(--craft-grid-minor-step) var(--craft-grid-minor-step),
          var(--craft-grid-major-step) var(--craft-grid-major-step),
          var(--craft-grid-major-step) var(--craft-grid-major-step);
        background-position:
          0 0,
          0 0,
          0 0,
          0 0;
        min-width: 0;
        box-sizing: border-box;
        touch-action: none;
      }

      #craftControls {
        position: sticky;
        left: 0;
        bottom: 0;
        width: 0;
        height: 0;
        z-index: 0;
        pointer-events: none;
      }

      #craftControls > * {
        pointer-events: auto;
      }

      #chatCanvas {
        position: relative;
        width: 24000px;
        height: 24000px;
        min-width: 24000px;
        min-height: 24000px;
        background-color: #f4f4f9;
        /* Subtle world-space grid for orientation in large chat canvas */
        background-image:
          linear-gradient(to right, rgba(0, 0, 0, 0.065) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.065) 1px, transparent 1px),
          linear-gradient(to right, rgba(0, 0, 0, 0.12) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.12) 1px, transparent 1px);
        background-size:
          80px 80px,
          80px 80px,
          400px 400px,
          400px 400px;
        background-position:
          0 0,
          0 0,
          0 0,
          0 0;
        touch-action: none;
      }

      #tab4 {
        position: relative;
        width: calc(100% + 40px);
        height: calc(100% + 40px);
        margin: -20px -20px 0 -20px;
        overflow: scroll;
        background: #f4f4f9;
        min-width: 0;
        box-sizing: border-box;
        touch-action: none;
      }

      #chatControls {
        position: sticky;
        left: 0;
        bottom: 0;
        width: 0;
        height: 0;
        z-index: 0;
        pointer-events: none;
      }

      #chatControls > * {
        pointer-events: auto;
      }

      #chatAnchorLayer {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
        z-index: 7;
      }

      /* Annotation bubbles – hidden until inspection mode reveals them */
      .symbol-label.annotation-bubble {
        display: none;
        /* Keep the same look as regular bubbles */
        background: white;
        border: 1px solid black;
        border-radius: 5px;
        padding: 4px 8px;
        font-style: normal;
        color: black;
        overflow: visible;
      }
      .symbol-label.annotation-bubble.annotation-visible {
        display: block;
      }

      /* Bounding-box frame(s) for spawned expression groups (multi-select supports multiple) */
      .expression-group-frame {
        position: absolute;
        pointer-events: none;
        outline: 2px solid #00b0f0;
        border-radius: 0;
        outline-offset: 0;
        z-index: 6;
        display: none;
      }

      /* Spawned-expression meta card (word + why) shown in chat inspection mode */
      .spawned-expression-meta {
        z-index: 8; /* above symbols/bubbles, below UI controls */
        max-width: 520px;
      }
      .spawned-expression-meta .library-tree-card-word {
        font-size: 20px;
      }
      .spawned-expression-meta .library-tree-card-definition {
        font-size: 14px;
        line-height: 1.3;
      }
      .spawned-expression-translate {
        position: absolute;
        left: 0;
        bottom: -19px;
        display: block;
        width: max-content;
        margin: 0;
        padding: 3px 0;
        border: 0;
        background: transparent;
        color: rgba(0, 0, 0, 0.58);
        font: inherit;
        font-size: 11px;
        line-height: 1.2;
        cursor: pointer;
        pointer-events: auto;
        touch-action: manipulation;
      }
      .spawned-expression-meta > .spawned-expression-translate {
        left: 2px;
      }
      .spawned-expression-translate:hover {
        color: #111;
        text-decoration: underline;
      }
      .spawned-expression-translate:disabled {
        cursor: default;
        opacity: 0.65;
      }

      #chatMinimap {
        position: fixed;
        right: calc(var(--sidebar-w) + 44px);
        bottom: 24px;
        width: 210px;
        height: 148px;
        margin: 0;
        border: 2px solid rgba(0, 0, 0, 0.32);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
        z-index: 24;
        overflow: hidden;
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
      }

      #chatMinimapCanvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      #chatMinimapViewport {
        position: absolute;
        border: 2px solid #00b0f0;
        background: rgba(0, 176, 240, 0.12);
        border-radius: 6px;
        box-sizing: border-box;
        pointer-events: none;
      }

      .marquee-box {
        position: absolute;
        background: transparent;
        pointer-events: none;
        z-index: 4; /* above symbols, below inspection frames/cards */
        outline: 10px dashed #00b0f0;
      }

      #top-right-ui {
        position: fixed;
        top: 55px; /* 你想要的 */
        right: calc(var(--sidebar-w) + 30px);
        display: flex;
        align-items: center;
        gap: 25px;
        z-index: 1000000;
      }

      /* language toggle pill (matches badge style) */
      .lang-toggle {
        display: inline-flex;
        align-items: center;
        z-index: 100000;
      }

      .lang-circle {
        display: none;
      }

      .lang-menu {
        position: static;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #000;
        border-radius: 999px;
        padding: 6px;
        display: inline-flex;
        gap: 6px;
        white-space: nowrap;
        z-index: 1000002;
      }

      .lang-item {
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: transparent;
        border-radius: 999px;
        padding: 6px 10px;
        cursor: pointer;
        font-family: inherit;
        font-size: 13px;
      }
      .lang-item:hover {
        background: rgba(0, 0, 0, 0.06);
      }
      .lang-item.active {
        background: rgba(0, 0, 0, 0.1);
      }

      #quota-badge {
        z-index: 1000000; /* ✅ 盖在内容上，但低于/高于栏都行 */
        padding: 6px 10px;
        border-radius: 5px;
        border: 1px solid #000;
        background: rgba(255, 255, 255, 0.9);
        font-size: 14px;
        font-family: inherit;
        pointer-events: auto; /* 可选：不挡点击 */
      }

      #quota-badge * {
        pointer-events: auto;
      }
      #quota-badge .quota-daily {
        font-size: 14px;
      }
      #quota-badge .quota-copy {
        font-size: 12px;
      }

      /* Color palette styles */
      .palette {
        position: fixed;
        display: flex;
        justify-content: center;
        margin: 20px auto;
        gap: 10px;
      }

      .color {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid #ccc;
      }

      .color:hover {
        border: 2px solid black;
      }

      .progress-ring {
        position: absolute;
        width: 50px; /* Ensure this matches the SVG width */
        height: 50px; /* Ensure this matches the SVG height */
        transform: rotate(-90deg);
        visibility: hidden;
      }

      .progress-ring circle {
        fill: none;
        stroke: transparent;
        stroke-width: 5;
        stroke-dasharray: 157; /* Full circle length */
        stroke-dashoffset: 157; /* Start fully hidden */
        transition:
          stroke-dashoffset 0s,
          stroke 0s;
      }

      /* Style for the label */
      .symbol-label {
        position: absolute;
        background: white;
        border: 1px solid black;
        padding: 4px 8px;
        border-radius: 5px;
        font-size: 16px;
        font-family: inherit; /* Set font to match labels */
        cursor: pointer;
        z-index: 8;
        pointer-events: auto;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      .symbol-label.active {
        border-width: 3px; /* Thicker border when clicked */
        z-index: 9;
      }

      .symbol-label.user-created-label {
        background: #fff1bf;
        border-color: #c78a00;
        box-shadow: 0 0 0 2px rgba(199, 138, 0, 0.18);
      }

      /* Style for the input box */
      .label-input {
        position: absolute;
        width: 200px;
        border: 1px solid black;
        padding: 5px;
        font-size: 16px;
        font-family: inherit; /* Set font to match labels */
        border-radius: 5px;
        z-index: 18;
        pointer-events: auto;
      }

      /* Auto-resizing textarea */
      .label-textarea {
        position: absolute;
        width: 200px;
        min-height: 40px;
        max-width: 200px;
        border: 1px solid black;
        padding: 5px;
        font-size: 16px;
        font-family: inherit;
        border-radius: 5px;
        resize: none;
        overflow: hidden;
        z-index: 18;
        pointer-events: auto;
      }

      .label-input.tutorial-readonly,
      .label-textarea.tutorial-readonly,
      .submit-button.tutorial-readonly {
        background-color: white;
        color: black;
        opacity: 1;
      }

      /* Style the submit button */
      .submit-button {
        position: absolute;
        background-color: white; /* Green */
        color: black;
        border: 1px solid black;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
        width: 27px;
        height: 27px;
        line-height: 27px;
        text-align: center;
        z-index: 19;
        pointer-events: auto;
      }

      /* Hover effect */
      .submit-button:hover {
        opacity: 0.5;
      }

      .typing-effect p {
        position: absolute;
        font-size: 16px;
        font-family: inherit;
        display: inline-block;
        white-space: pre-line;
        line-height: 1.5; /* Adjusts spacing for smooth movement */
        overflow: hidden;
      }

      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      #message-input {
        position: absolute;
        bottom: 58px;
        left: 350px;
        padding: 10px;
        width: 400px;
        font-size: 24px; /* Larger font size */
        background-color: transparent; /* Transparent background */
        border: none; /* No border */
        color: black; /* Text color */
      }

      /* Style the placeholder text (prompt) */
      #message-input::placeholder {
        font-style: italic; /* Italicize the placeholder text */
        color: gray; /* Gray color for the placeholder */
      }

      #chat-question {
        position: absolute;
        left: 800px;
        bottom: 80px;
        width: 420px;
        min-height: 0;
        padding: 10px 14px;
        border: 2px solid rgba(0, 0, 0, 0.24);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        color: black;
        font-size: 20px;
        line-height: 1.35;
        box-sizing: border-box;
        z-index: 21;
        pointer-events: none;
      }

      #chat-question-label {
        font-weight: 700;
        margin-right: 8px;
      }

      #chat-question-text {
        white-space: normal;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

      #symbol-message-input {
        position: absolute;
        bottom: 110px;
        left: 350px;
        padding: 10px;
        width: 400px;
        font-size: 24px;
        background-color: transparent;
        border: none;
        color: black;
      }

      #symbol-message-input::placeholder {
        font-style: italic;
        color: gray;
      }

      #cursor {
        display: inline-block;
        margin-left: 1px;
        animation: blink 0.8s infinite;
        font-weight: bold;
        animation: blink 0.8s infinite;
      }

      .image-container {
        display: flex;
        justify-content: center;
      }
      .image-container img {
        width: 10%; /* 50% of the parent container */
        height: auto; /* Maintain aspect ratio */
      }

      .image-row {
        display: flex; /* Align images in a row */
        justify-content: center; /* Center images horizontally */
        align-items: center; /* Align images vertically */
        gap: 10px; /* Space between images */
      }

      .image-row img {
        width: 20%; /* Set a uniform width */
        height: auto; /* Set a uniform height */
        object-fit: cover; /* Crop images to fit without stretching */
      }

      #network {
        width: 82vw;
        height: 100vh;
        border: none;
        background: transparent;
        box-shadow: none;
        transform-origin: top left;
      }

      #libraryTreeView {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        display: none;
        overflow-x: auto;
        overflow-y: scroll;
        background: transparent;
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
        transform-origin: top left;
      }

      #libraryTreeSurface {
        position: relative;
        min-width: 100%;
        min-height: 100%;
        user-select: none;
        -webkit-user-select: none;
      }

      #libraryTreeSvg {
        position: absolute;
        inset: 0;
        overflow: visible;
        pointer-events: none;
      }

      .library-tree-card {
        position: absolute;
        min-width: 180px;
        min-height: 74px;
        padding: 12px 14px;
        border: 3px solid black;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.96);
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 12px;
        text-align: left;
        cursor: grab;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      .library-tree-card.displaced {
        transition:
          top 120ms ease-out,
          left 120ms ease-out;
      }
      .library-tree-card.dragging {
        cursor: grabbing;
        z-index: 2;
        transition: none;
      }
      .library-tree-card.selected {
        box-shadow: inset 0 0 0 2px #000;
        border-color: #000;
      }

      .library-tree-card.basic {
        background: rgba(255, 255, 255, 0.84);
      }

      .library-tree-card-image {
        width: 42px;
        height: 42px;
        flex: 0 0 auto;
        object-fit: contain;
        box-sizing: border-box;
      }

      .library-tree-card-text {
        min-width: 0;
        flex: 1 1 auto;
      }

      .library-tree-card-word {
        font-size: 16px;
        line-height: 1.2;
        word-break: break-word;
        max-width: 100%;
        font-weight: 700;
      }

      .library-tree-card-definition {
        margin-top: 4px;
        font-size: 13px;
        line-height: 1.25;
        word-break: break-word;

            consumeTutorialEvent(step.advanceOnEvent);
            tutorialCompleteStep(step);
            return;
          }
        }
        if (typeof step.advanceWhen === 'function') {

          (ch) =>
            ({
              '&': '&amp;',
              '<': '&lt;',
              '>': '&gt;',
              '"': '&quot;',
              "'": '&#39;',
            })[ch],
        );

      function resetTutorialDefinitionAttempt() {
        try {
          const canvas = craftCanvas?.();
          if (!canvas) return;
          const componentId =
            tutorialPendingDefinitionButton?.dataset?.definitionComponentId || '';
          const scoped = (selector) =>
            componentId
              ? Array.from(
                  canvas.querySelectorAll(
                    `${selector}[data-definition-component-id="${componentId}"]`,
                  ),
                )
              : Array.from(canvas.querySelectorAll(selector));
          const input = scoped('.label-input')[0] || null;
          const textarea = scoped('.label-textarea')[0] || null;
          scoped('.label-input').forEach((el) => {
            el.value = '';
            el.readOnly = false;
            el.disabled = false;
            el.classList.remove('tutorial-readonly');
            el.focus?.();
          });
          scoped('.label-textarea').forEach((el) => {
            el.value = '';
            el.readOnly = false;
            el.disabled = false;
            el.classList.remove('tutorial-readonly');
            el.style.height = 'auto';
          });
          [...scoped('.typing-effect.removable'), ...scoped('.submit-button.removable')].forEach(
            (el) => {
              const isPrimarySubmit =
                el.classList?.contains('submit-button') &&
                (el.innerHTML || '').includes('✔') &&
                !el.answerHeight;
              const isCancel =
                el.classList?.contains('submit-button') &&
                (el.innerHTML || '').includes('✘') &&
                !el.answerHeight;
              if (isPrimarySubmit || isCancel) return;
              el.remove();
            },
          );
          const baseX = input ? parseFloat(input.style.left) || 0 : null;
          const textY = textarea ? parseFloat(textarea.style.top) || 0 : null;
          if (textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = `${textarea.scrollHeight}px`;
          }
          const buttonY = textY !== null ? textY + 8 + (textarea?.scrollHeight || 40) : null;
          const submit = scoped('.submit-button.removable').find(
            (el) => (el.innerHTML || '').includes('✔') && !el.answerHeight,
          );
          const cancel = scoped('.submit-button.removable').find(
            (el) => (el.innerHTML || '').includes('✘') && !el.answerHeight,
          );
          if (submit && baseX !== null && buttonY !== null) {
            submit.style.left = `${baseX}px`;
            submit.style.top = `${buttonY}px`;
            submit.style.display = '';
            submit.disabled = false;
            submit.classList.remove('tutorial-readonly');
          }
          if (cancel && baseX !== null && buttonY !== null) {
            cancel.style.left = `${baseX + 35}px`;
            cancel.style.top = `${buttonY}px`;
            cancel.style.display = '';
            cancel.disabled = false;
            cancel.classList.remove('tutorial-readonly');
          }
          setTutorialDefinitionInputsEnabled?.(true);
        } catch {}
      }

          if (tutorialCompletedStep?.definitionState !== 'failed') return;
          const canvas = craftCanvas?.();

      function getCraftSymbols() {
        try {
          return Array.from(craftCanvas()?.querySelectorAll?.('.symbol') || []);
        } catch {
          return [];
        }
      }

      function getCraftConnectionKinds() {
        const kinds = { serial: false, parallel: false, any: false };
        try {
          const syms = new Set(getCraftSymbols());
          for (const sym of syms) {
            const conns = currentGraph?.getSymbolConnections?.(sym) || [];
            for (let side = 0; side < conns.length; side++) {
              for (const [nbr, nbrSide] of conns[side] || []) {
                if (!syms.has(nbr)) continue;
                kinds.any = true;
                const isSerial =
                  (side === Side.START && nbrSide === Side.END) ||
                  (side === Side.END && nbrSide === Side.START) ||
                  (side === Side.START && nbrSide === Side.START) ||
                  (side === Side.END && nbrSide === Side.END);
                const isParallel =
                  side === Side.PAR_TOP ||
                  side === Side.PAR_BOT ||
                  nbrSide === Side.PAR_TOP ||
                  nbrSide === Side.PAR_BOT;
                if (isSerial) kinds.serial = true;
                if (isParallel) kinds.parallel = true;
              }
            }
          }
        } catch {}
        return kinds;
      }

      function getTutorialConnectionKind(aSide, bSide) {
        const isSerial =
          (aSide === Side.START && bSide === Side.END) ||
          (aSide === Side.END && bSide === Side.START) ||
          (aSide === Side.START && bSide === Side.START) ||
          (aSide === Side.END && bSide === Side.END);
        const isParallel =
          aSide === Side.PAR_TOP ||
          aSide === Side.PAR_BOT ||
          bSide === Side.PAR_TOP ||
          bSide === Side.PAR_BOT;
        if (isSerial) return 'serial';
        if (isParallel) return 'parallel';
        return '';
      }

      function registerTutorialCraftConnection(aSide, bSide) {
        if (tutorialStepIndex < 0 || tutorialLevel !== 2 || tutorialCompletedStep) return;
        const kind = getTutorialConnectionKind(aSide, bSide);
        if (!kind) return;
        tutorialLevel2SeenConnections = {
          ...tutorialLevel2SeenConnections,
          [kind]: true,
        };
        tutorialMaybeAdvance?.();
      }

      function craftHasSerialConnection() {
        return getCraftConnectionKinds().serial;
      }

      function craftHasParallelConnection() {
        return getCraftConnectionKinds().parallel;
      }

      function craftHasAnyConnection() {
        return getCraftConnectionKinds().any;
      }

      function startTutorial(forceRestart = false, level = tutorialLevel) {
        const els = getTutorialOverlayEls();
        if (!els.root || !els.spotlight || !els.bubble) return;
        if (tutorialStepIndex >= 0 && !forceRestart) return;
        tutorialLevel = Number(level) === 2 ? 2 : Number(level) === 3 ? 3 : 1;
        tutorialLevel2SeenConnections = { serial: false, parallel: false };
        tutorialLevel1ToolClicks = { rotate: false, dot: false };
        tutorialCompletedStep = null;
        tutorialPendingDefinitionButton = null;
        tutorialStepIndex = -1;
        tutorialEvents.clear();
        tutorialStack = [];
        tutorialSnapshots = new Map();
        tutorialStepMetaSnapshots = new Map();
        els.root.classList.add('open');
        els.root.setAttribute('aria-hidden', 'false');
        const c = getTutorialCopy();
        if (els.back) els.back.textContent = c.back;
        if (els.hint) els.hint.textContent = c.hint;
        if (els.restart) els.restart.textContent = c.restartStep;
        if (els.continue) els.continue.textContent = c.continueStep;
        if (els.exit) els.exit.textContent = c.exit;
        tutorialEnterStep(0);
      }

      function stopTutorial() {
        const els = getTutorialOverlayEls();
        tutorialStepIndex = -1;
        tutorialNavigating = false;
        tutorialStack = [];
        tutorialSnapshots = new Map();
        tutorialEvents.clear();
        tutorialCompletedStep = null;
        tutorialPendingDefinitionButton = null;
        setTutorialDefinitionInputsEnabled?.(true);
        if (els.root) {
          els.root.classList.remove('open');
          els.root.setAttribute('aria-hidden', 'true');
        }
      }

      function stepTutorial(delta) {
        const steps = getTutorialStepsSafe();
        if (tutorialStepIndex < 0) return;
        if (delta < 0) {
          tutorialCompletedStep = null;
          tutorialPendingDefinitionButton = null;
          if (tutorialStack.length <= 1) return;
          // Pop current, restore previous snapshot/state.
          tutorialStack.pop();
          const prev = tutorialStack[tutorialStack.length - 1];
          restoreTutorialSnapshot(tutorialSnapshots.get(prev));
          tutorialStepIndex = prev;
          updateTutorialUi();
          return;
        }
        if (delta > 0) {
          tutorialCompletedStep = null;
          tutorialPendingDefinitionButton = null;
          const next = Math.min(tutorialStepIndex + 1, steps.length - 1);
          if (next !== tutorialStepIndex) tutorialEnterStep(next);
          return;
        }
        return;
      }

      function restartTutorialStep() {
        if (tutorialStepIndex < 0) return;
        const step = getTutorialStepsSafe?.()?.[tutorialStepIndex];
        try {
          step?.restart?.();
        } catch (e) {
          console.warn('tutorial step restart hook failed:', e);
        }
        tutorialCompletedStep = null;
        tutorialPendingDefinitionButton = null;
        const meta = tutorialStepMetaSnapshots.get(tutorialStepIndex);
        if (meta?.level2SeenConnections) {
          tutorialLevel2SeenConnections = { ...meta.level2SeenConnections };
        }
        if (meta?.level1ToolClicks) {
          tutorialLevel1ToolClicks = { ...meta.level1ToolClicks };
        }
        if (step?.resetLevel1Tools) {
          tutorialLevel1ToolClicks = { rotate: false, dot: false };
        }
        tutorialEvents.clear();
        tutorialRestartingStep = true;
        try {
          restoreTutorialSnapshot(tutorialSnapshots.get(tutorialStepIndex));
          step?.afterRestart?.();
        } finally {
          tutorialRestartingStep = false;
        }
        updateTutorialUi();
      }

      async function continueTutorialFromCompletion() {
        if (tutorialStepIndex < 0 || !tutorialCompletedStep) return;
        const steps = getTutorialStepsSafe?.() || [];
        const nextIndex = tutorialStepIndex + 1;
        const pendingButton = tutorialPendingDefinitionButton;
        const mustFinalizeDefinition =
          tutorialCompletedStep.definitionState === 'accepted' &&
          pendingButton &&
          pendingButton.isConnected;

        if (mustFinalizeDefinition) {
          tutorialPendingDefinitionButton = null;
          try {
            await pendingButton.onclick?.call(pendingButton, new MouseEvent('click'));
          } catch (e) {
            console.warn('tutorial definition finalize failed:', e);
            tutorialPendingDefinitionButton = pendingButton;
            return;
          }
        }

        tutorialCompletedStep = null;
        if (nextIndex >= steps.length) {
          stopTutorial();
          return;
        }
        tutorialEnterStep(nextIndex);
      }

      function updateTutorialUi() {
        const els = getTutorialOverlayEls();
        if (!els.root || !els.spotlight || !els.bubble) return;
        if (tutorialStepIndex < 0) return;
        const steps = getTutorialStepsSafe();
        const step = steps[tutorialStepIndex];
        if (!step) return;

        if (!tutorialNavigating) {
          const active = document.querySelector('.tab-content.active');
          const activeIndex = active?.id?.startsWith('tab') ? Number(active.id.slice(3)) : null;
          const nav = step.navigate || 'auto';
          if (nav !== 'user' && Number.isFinite(step.tab) && activeIndex !== step.tab) {
            tutorialNavigating = true;
            try {
              window.showTab(step.tab);
            } finally {
              tutorialNavigating = false;
            }
          }
        }

        const isCompleted =
          !!tutorialCompletedStep && tutorialCompletedStep.index === tutorialStepIndex;
        const displayTitle = isCompleted
          ? (tutorialCompletedStep.titleOverride ?? step.completedTitle ?? step.title)
          : step.title;
        const displayBody = isCompleted
          ? (tutorialCompletedStep.bodyOverride ??
            step.completedBody ??
            (() =>
              currentLang === 'zh' ? '很好，这一步已经完成。' : 'Great, this step is complete.'))
          : step.body;

        renderTutorialText(els.title, displayTitle);
        renderTutorialText(els.body, displayBody);
        setTutorialDefinitionInputsEnabled?.(!!step.allowDefinitionInputs);

        const target = isCompleted ? step.completedTarget?.() || step.target?.() : step.target?.();
        const rect = isCompleted
          ? step.completedTargetRect?.() ||
            step.targetRect?.() ||
            target?.getBoundingClientRect?.()
          : step.targetRect?.() || target?.getBoundingClientRect?.();
        const pad = 10;
        const hasRect = rect && rect.width > 0 && rect.height > 0;
        const left = hasRect ? rect.left - pad : window.innerWidth * 0.5 - 60;
        const top = hasRect ? rect.top - pad : window.innerHeight * 0.35 - 40;
        const width = hasRect ? rect.width + pad * 2 : 120;
        const height = hasRect ? rect.height + pad * 2 : 80;

        els.spotlight.style.left = `${clamp(left, 8, window.innerWidth - 8)}px`;
        els.spotlight.style.top = `${clamp(top, 8, window.innerHeight - 8)}px`;
        els.spotlight.style.width = `${Math.max(28, width)}px`;
        els.spotlight.style.height = `${Math.max(28, height)}px`;

        // Place bubble near spotlight
        const bubbleRect = els.bubble.getBoundingClientRect();
        const preferRight = left + width + 14 + bubbleRect.width <= window.innerWidth - 12;
        const bubbleLeft = preferRight
          ? left + width + 14
          : isCompleted
            ? window.innerWidth - bubbleRect.width - 24
            : left;
        const bubbleTop = clamp(
          top + height + 12,
          12,
          window.innerHeight - bubbleRect.height - 12,
        );
        els.bubble.style.left = `${clamp(bubbleLeft, 12, window.innerWidth - bubbleRect.width - 12)}px`;
        els.bubble.style.top = `${bubbleTop}px`;

        if (els.back) els.back.disabled = tutorialStepIndex <= 0;
        if (els.hint) {
          els.hint.style.display = !isCompleted && step.hint ? '' : 'none';
          els.hint.textContent = getTutorialCopy().hint;
        }
        if (els.restart) {
          els.restart.style.display = isCompleted ? '' : 'none';
          els.restart.textContent = getTutorialCopy().restartStep;
        }
        if (els.continue) {
          const isLast = tutorialStepIndex >= steps.length - 1;
          els.continue.style.display =
            isCompleted && !tutorialCompletedStep?.hideContinue ? '' : 'none';
          els.continue.textContent = isLast
            ? getTutorialCopy().finish
            : getTutorialCopy().continueStep;
        }
        if (els.back)
          els.back.style.display = isCompleted && !tutorialCompletedStep?.showBack ? 'none' : '';
        // No "Next" button: tutorial advances only via user operations.

        // Some steps should auto-advance as soon as their condition becomes true (e.g., tab click).
        if (!isCompleted) tutorialMaybeAdvance();
      }

      function getTutorialCraftSelectionRect() {
        try {
          const canvas = craftCanvas();
          if (!canvas) return null;
          const syms = Array.from(selectedSymbols).filter((s) => getCanvasForElem(s) === canvas);
          if (syms.length === 0) return null;

          let minL = Infinity,
            minT = Infinity,
            maxR = -Infinity,
            maxB = -Infinity;
          const addRect = (r) => {
            if (!r || !(r.width > 0 && r.height > 0)) return;
            minL = Math.min(minL, r.left);
            minT = Math.min(minT, r.top);
            maxR = Math.max(maxR, r.right);
            maxB = Math.max(maxB, r.bottom);
          };

          for (const s of syms) {
            addRect(s.getBoundingClientRect?.());
            // Labels are usually children of symbols (showSimpleLabel checks selectedSymbol.querySelector('.symbol-label'))
            s.querySelectorAll?.('.symbol-label, .dot')?.forEach((el) =>
              addRect(el.getBoundingClientRect?.()),
            );
            [
              s.input,
              s.textarea,
              s.submitButton,
              s.cancelButton,
              s.pElement,
              s.doneButton,
            ].forEach((el) => addRect(el?.getBoundingClientRect?.()));
          }

          if (!Number.isFinite(minL) || !Number.isFinite(minT)) return null;
          // Expand because meaning bubbles can scatter around the symbols.
          const expand = Math.min(260, 120 + syms.length * 22);
          const left = minL - expand;
          const top = minT - expand;
          const width = Math.max(1, maxR - minL) + expand * 2;
          const height = Math.max(1, maxB - minT) + expand * 2;
          return { left, top, width, height };
        } catch {
          return null;
        }
      }

      function bindTutorialOverlayOnce() {
        if (tutorialBound) return;
        tutorialBound = true;
        const els = getTutorialOverlayEls();
        if (!els.root) return;
        els.back?.addEventListener('click', () => stepTutorial(-1));
        els.restart?.addEventListener('click', () => restartTutorialStep());
        els.continue?.addEventListener('click', () => continueTutorialFromCompletion());
        els.hint?.addEventListener('click', () => {
          const step = getTutorialStepsSafe?.()?.[tutorialStepIndex];
          const hintText = getTutorialText(step?.hint);
          if (hintText) tutorialShowNudge(hintText, hintText);
        });
        els.exit?.addEventListener('click', () => stopTutorial());
        // During certain steps, prevent selection changes so the spotlight doesn't jump to empty space.
        document.addEventListener(
          'pointerdown',
          (e) => {
            if (tutorialStepIndex < 0) return;
            const step = getTutorialStepsSafe?.()?.[tutorialStepIndex];
            const completed =
              !!tutorialCompletedStep && tutorialCompletedStep.index === tutorialStepIndex;
            const lockCraftInteraction = completed && step?.lockCompletedCraftInteraction;
            const lockCraftControls = lockCraftInteraction || !!step?.lockCraftControls;
            if (!step?.lockCraftSelection && !(completed && step?.lockCompletedCraftSelection)) {
              if (!lockCraftInteraction) return;
            }

            // Allow interacting with tutorial UI. During selection-lock steps, also allow Insight.
            if (e.target?.closest?.('#tutorialBubble')) return;
            if (step?.allowCraftRemoveOnly) {
              if (e.target?.closest?.('#craft-remove-button')) return;
              const inCraftTab = !!e.target?.closest?.('#tab1');
              const onCraftSurface =
                !!e.target?.closest?.('#craftCanvas') ||
                !!e.target?.closest?.('.symbol') ||
                !!e.target?.closest?.('.dot') ||
                !!e.target?.closest?.('.symbol-label') ||
                !!e.target?.closest?.('.wheel') ||
                !!e.target?.closest?.('#palette') ||
                !!e.target?.closest?.('#craftControls');
              if (inCraftTab && onCraftSurface) {
                e.preventDefault();
                e.stopPropagation();
              }
              return;
            }
            if (!lockCraftInteraction && e.target?.closest?.('#craft-eye-button')) return;
            if (!lockCraftControls && e.target?.closest?.('#craftControls .button')) return;
            if (
              e.target?.closest?.('.label-input, .label-textarea, .submit-button, .cancel-button')
            ) {
              return;
            }

            const inCraftTab = !!e.target?.closest?.('#tab1');
            const onCraftCanvas =
              !!e.target?.closest?.('#craftCanvas') ||
              !!e.target?.closest?.('.symbol') ||
              !!e.target?.closest?.('.dot') ||
              !!e.target?.closest?.('.symbol-label') ||
              !!e.target?.closest?.('.wheel') ||
              !!e.target?.closest?.('#palette') ||
              !!e.target?.closest?.('#craftControls');
            if (inCraftTab && onCraftCanvas) {
              e.preventDefault();
              e.stopPropagation();
            }
          },
          true,
        );

        // Tutorial acks: advance when the user interacts with the highlighted region.
        document.addEventListener(
          'pointerdown',
          (e) => {
            if (tutorialStepIndex < 0) return;
            const step = getTutorialStepsSafe?.()?.[tutorialStepIndex];
            const evt = step?.advanceOnEvent;
            if (evt === 'craft_labels_ack') {
              const canvas = craftCanvas();
              if (!canvas) return;
              const inCraft = !!e.target?.closest?.('#tab1');
              if (!inCraft) return;
              const hit =
                !!e.target?.closest?.('.symbol-label') ||
                !!e.target?.closest?.('.symbol') ||
                !!e.target?.closest?.('.dot');
              if (!hit) return;
              emitTutorialEvent('craft_labels_ack');
              return;
            }
            if (evt === 'library_ack') {
              if (!e.target?.closest?.('#tab2')) return;
              emitTutorialEvent('library_ack');
            }
          },
          true,
        );
        window.addEventListener('keydown', (e) => {
          if (tutorialStepIndex < 0) return;
          if (e.key === 'Escape') stopTutorial();
        });
      }

      function getLang() {

      function formatSymbolOrientationTerms(text) {
        if (typeof text !== 'string') return text;
        const horizontal = getLang() === 'zh' ? '水平' : 'horizontal ';
        const vertical = getLang() === 'zh' ? '垂直' : 'vertical ';
        return text.replace(/\b([A-Za-z]+)_(h|v)\b/g, (_, symbol, direction) => {
          return `${direction === 'h' ? horizontal : vertical}${symbol}`;
        });

      function refreshBasicTooltips() {
        try {
          if (!nodes) return;
        } catch {
          return;
        }

        const updates = [];
        for (const id of basicNodeIds) {
          const n = nodes.get(id);
          if (!n) continue;

          updates.push({
            id,
            word: tBasicNodeWord(idx),

      function refreshI18nImages() {
        const lang = currentLang === 'zh' ? 'zh' : 'en';
        document.querySelectorAll('img.i18n-img').forEach((img) => {
          const next = img.getAttribute(`data-src-${lang}`);

      let uiPassthroughRestore = null;

      function restoreUiPassthroughTarget() {
        if (!uiPassthroughRestore) return;
        uiPassthroughRestore();
        uiPassthroughRestore = null;
      }

      function getUnderlyingSymbolAtPoint(clientX, clientY, controlEl) {
        if (!controlEl) return null;
        const prev = controlEl.style.pointerEvents;
        controlEl.style.pointerEvents = 'none';
        const underlying = document.elementFromPoint(clientX, clientY);
        controlEl.style.pointerEvents = prev;
        const symbol = underlying?.closest?.('.symbol, .dot');
        if (!symbol) return null;
        return symbol.classList?.contains('dot') ? symbol.parent || null : symbol;
      }

      document.addEventListener(
        'mousedown',
        (e) => {
          if (e.button !== 0) return;
          const control = e.target.closest(
            '.button, .wheel, .submit-button, #lang-toggle, .lang-menu, .lang-circle, .lang-item',
          );
          if (!control) return;
          const symbol = getUnderlyingSymbolAtPoint(e.clientX, e.clientY, control);
          if (!symbol) return;

          e.preventDefault();
          e.stopPropagation();
          restoreUiPassthroughTarget();

          const prev = control.style.pointerEvents;
          control.style.pointerEvents = 'none';
          uiPassthroughRestore = () => {
            control.style.pointerEvents = prev;
          };

          const forwarded = new MouseEvent('mousedown', {
            bubbles: true,
            cancelable: true,
            clientX: e.clientX,
            clientY: e.clientY,
            button: 0,
            buttons: 1,
            ctrlKey: e.ctrlKey,
            shiftKey: e.shiftKey,
            altKey: e.altKey,
            metaKey: e.metaKey,
            view: window,
          });
          symbol.dispatchEvent(forwarded);
        },
        true,
      );

      window.addEventListener('resize', () => {
        updateChatQuestionPrompt?.();
        scheduleChatMiniMapUpdate?.();
        updateIslandInfoCardPosition?.();
        updateTutorialUi?.();
      });

      document.addEventListener('keydown', async (e) => {
        if (!(e.ctrlKey || e.metaKey)) return;
        if (e.altKey) return;
        if (isEditableTextTarget(e.target)) return;

        const key = e.key.toLowerCase();

        // Hidden feature: generate an emoji bubble in chat via worker without showing a dedicated UI.
        // Ctrl+Shift+E (or Cmd+Shift+E) opens a prompt and posts the resulting emoji bubble.
        if (key === 'e' && e.shiftKey) {
          if (!tabHeadersActivated?.[4]) return;
          e.preventDefault();
          const promptText =
            currentLang === 'zh'
              ? '输入一句话，我会把它转换成 emoji（隐藏功能）:'
              : 'Type a message and I will turn it into emoji (hidden):';
          const text = (window.prompt(promptText, '') || '').trim();
          if (!text) return;
          await handleEmojiMessage(text);
          return;
        }

        if (key === 'c') {
          const clipboard = getSelectedSymbolClipboard();
          if (clipboard.symbols.length === 0) return;

          e.preventDefault();
          copiedSymbolSnapshots = clipboard.symbols;
          copiedSymbolLinks = clipboard.links;
          copiedSymbolGroups = clipboard.groups || [];
          symbolPasteCount = 0;
          return;
        }

        if (key === 'v') {
          if (copiedSymbolSnapshots.length === 0) return;

          e.preventDefault();
          await pasteCopiedSymbols();
        }
      });

      const tabHeaders = [
        document.getElementById('tab-header0'),
        document.getElementById('tab-header1'),
        document.getElementById('tab-header2'),
        document.getElementById('tab-header3'),
        document.getElementById('tab-header4'),
      ];

      let tabHeadersActivated = [false, false, false, false, false];
      let activeTabInterval = null;
      let marqueeChatEnabled = false;
      let marqueeCraftEnabled = false;
      let worldData = null;
      let worldRendered = false;
      let worldPanningEnabled = false;
      let worldSelectionEnabled = false;
      let worldPanController = null;
      let chatViewportBound = false;
      let mobileLibraryInitialZoomApplied = false;

      // Switching between tabs
      window.showTab = function (tabIndex) {
        if (isTutorialTabNavigationBlocked?.(tabIndex)) {
          return;
        }

        if (tabHeadersActivated[4] && tabIndex !== 4) {
          saveChatViewportState();
        }

        // Clear alpha animation
        clearInterval(activeTabInterval);
        tabHeaders.forEach((h) => h.classList.remove('tab-active'));

        // Hide all tab content
        const contents = document.querySelectorAll('.tab-content');
        contents.forEach((content) => content.classList.remove('active'));

        // Show the selected tab content
        const activeContent = document.getElementById(`tab${tabIndex}`);
        activeContent.classList.add('active');

        if (tabIndex === 3) {
          // Load world map
          enableWorldPanning();
          renderWorld();
          enableIslandSelection();
        }

        if (tabIndex === 2) {
          if (isCoarseMobile && !mobileLibraryInitialZoomApplied) {
            libraryContentZoom = Math.min(libraryContentZoom || 1, 0.82);
            mobileLibraryInitialZoomApplied = true;
          }
          requestAnimationFrame(() => {
            refreshLibraryViewport?.();
            requestAnimationFrame(() => refreshLibraryViewport?.());
          });
        }

        if (tabIndex === 1 && !marqueeCraftEnabled) {
          enableMarqueeSelection({
            canvasEl: document.getElementById('craftCanvas'),
            itemSelector: '.symbol',
            ignoreSelector:
              '#palette, .wheel, .button, .label-input, .label-textarea, .submit-button',
            clearSelection: () => {
              clearAllSymbolSelection();
            },
            onSelect: (el) => {
              el.classList.add('framed');
              selectedSymbols.add(el);
              el.selected = true;
            },
            onSelectionApplied: () => {
              refreshCraftInspectionUI();
            },
          });
          marqueeCraftEnabled = true;
        }

        if (tabIndex === 1) {
          requestAnimationFrame(() => {
            applyCraftCanvasPadding(getCanvasZoom(craftCanvas()) || 1);
            updateCraftGridAlignment();
          });
        }

        if (tabIndex === 4 && !marqueeChatEnabled) {
          enableMarqueeSelection({
            canvasEl: document.getElementById('chatCanvas'),
            itemSelector: '.symbol, .symbol-label',
            ignoreSelector: '.wheel, .button, .label-input, .label-textarea, .submit-button',
            clearSelection: () => {
              clearAllSymbolSelection();
              clearAllEmojiSelection();
            },
            onSelect: (el) => {
              if (el.classList.contains('symbol')) {
                el.classList.add('framed');
                selectedSymbols.add(el);
              } else if (el.classList.contains('symbol-label')) {
                el.classList.add('active');
                selectedEmojis.add(el);
              }
              el.selected = true;
            },
          });

          marqueeChatEnabled = true;
        }

        if (!chatViewportBound) {
          document.getElementById('tab4')?.addEventListener('scroll', () => {
            if (!tabHeadersActivated[4]) return;
            saveChatViewportState();
            scheduleChatMiniMapUpdate();
          });
          chatViewportBound = true;
        }

        if (tabIndex === 4) {
          requestAnimationFrame(() => {
            restoreChatViewportState();
            scheduleChatMiniMapUpdate();
          });
        }

        // if have not selected an island, cannot open the chat
        if (tabIndex === 4 && !selectedIsland) {
          updateTutorialUi?.();
          return;
        }

        for (let i = 0; i < 5; i++) {
          if (i === tabIndex) {
            tabHeaders[i].style.opacity = 1;
            tabHeadersActivated[i] = true;
          } else {
            tabHeaders[i].style.opacity = 0.5;
            tabHeadersActivated[i] = false;
          }
        }
        document.body.classList.toggle('home-tab-active', tabIndex === 0);
        updateTutorialUi?.();
        tutorialMaybeAdvance?.();
      };

      // Initialize the first tab as active
      showTab(0);
      const tab0 = document.getElementById('tab0');
      const tab1 = document.getElementById('tab1');
      const tab2 = document.getElementById('tab2');
      const tab3 = document.getElementById('tab3');
      const tab4 = document.getElementById('tab4');
      const chatMiniMap = document.getElementById('chatMinimap');
      const chatMiniMapCanvas = document.getElementById('chatMinimapCanvas');

      const chatCanvas = () => document.getElementById('chatCanvas');
      const chatControls = () => document.getElementById('chatControls');
      const craftCanvas = () => document.getElementById('craftCanvas');
      const craftControls = () => document.getElementById('craftControls');
      bindCanvasContextMenu(chatCanvas());
      bindCanvasContextMenu(craftCanvas());
      const CRAFT_GRID_MINOR = 80;
      const CRAFT_GRID_MAJOR = 400;

      const MIN_CHAT_CANVAS_ZOOM = 0.6;
      const MIN_CRAFT_CANVAS_ZOOM = 1;
      const MAX_CANVAS_ZOOM = 2.4;
      const MIN_VIEW_CONTENT_ZOOM = 0.6;
      const MAX_VIEW_CONTENT_ZOOM = 2.4;
      const CANVAS_ZOOM_STEP = 1.1;
      let craftCanvasZoom = 1;
      let chatCanvasZoom = 1;
      let homeContentZoom = 1;
      let libraryContentZoom = 1;
      let worldContentZoom = 1;
      let mobileWorldInitialZoomApplied = false;
      let canvasZoomGestureUntil = 0;
      let canvasPinchActive = false;

      function isCanvasZoomGestureActive() {
        return canvasPinchActive || performance.now() < canvasZoomGestureUntil;
      }

      function clampCanvasZoom(container, v) {
        const minZoom = container === craftCanvas() ? MIN_CRAFT_CANVAS_ZOOM : MIN_CHAT_CANVAS_ZOOM;
        return Math.max(minZoom, Math.min(MAX_CANVAS_ZOOM, v));
      }

      function getCanvasZoom(container) {
        if (!container) return 1;
        if (container === craftCanvas()) return craftCanvasZoom;
        if (container === chatCanvas()) return chatCanvasZoom;
        return 1;
      }

      function clampViewContentZoom(v) {
        return Math.max(MIN_VIEW_CONTENT_ZOOM, Math.min(MAX_VIEW_CONTENT_ZOOM, v));
      }

      function clampWorldContentZoom(v) {
        const minZoom = isCoarseMobile ? 0.28 : MIN_VIEW_CONTENT_ZOOM;
        return Math.max(minZoom, Math.min(MAX_VIEW_CONTENT_ZOOM, v));
      }

      function getHomeZoomTarget() {
        return document.getElementById('home-content');
      }

      function applyHomeContentZoom(zoom) {
        homeContentZoom = clampViewContentZoom(zoom);
        const home = getHomeZoomTarget();
        if (!home) return;
        home.style.zoom = `${homeContentZoom}`;
      }

      function applyLibraryContentZoom(zoom) {
        libraryContentZoom = clampViewContentZoom(zoom);
        if (libraryViewMode === 'tree') {
          if (libraryTreeView) libraryTreeView.style.zoom = '1';
          if (libraryTreeSurface) libraryTreeSurface.style.zoom = `${libraryContentZoom}`;
          requestAnimationFrame(() => {
            refreshLibraryTreeEdgesFromDom?.();
          });
          return;
        }

        // Network mode: use vis-network's native zoom (CSS zoom breaks pointer math for dragging).
        if (network) {
          try {
            network.moveTo({ scale: libraryContentZoom, animation: false });
          } catch {}
        }
      }

      function refreshLibraryViewport() {
        if (libraryViewMode === 'tree') {
          renderLibraryTreeView?.();
          requestAnimationFrame(() => {
            refreshLibraryTreeEdgesFromDom?.();
          });
          return;
        }

        if (!network || !container) return;
        const width = container.clientWidth || tab2?.clientWidth || window.innerWidth;
        const height =
          container.clientHeight || tab2?.clientHeight || Math.max(240, window.innerHeight - 76);
        container.style.width = `${width}px`;
        container.style.height = `${height}px`;
        try {
          network.setSize(`${width}px`, `${height}px`);
          network.redraw();
          if (isCoarseMobile) {
            applyLibraryContentZoom(libraryContentZoom || 0.82);
            return;
          }
          const ids = nodes?.getIds?.() || [];
          if (ids.length) {
            network.fit({ nodes: ids, animation: false });
          } else {
            network.fit({ animation: false });
          }
        } catch {}
      }

      function applyWorldContentZoom(zoom) {
        worldContentZoom = clampWorldContentZoom(zoom);
        worldPanController?.refresh?.();
      }

      function setCanvasZoom(container, zoom) {
        if (!container) return;
        const z = clampCanvasZoom(container, zoom);
        container.style.zoom = `${z}`;
        if (container === craftCanvas()) {
          craftCanvasZoom = z;
          applyCraftCanvasPadding(z);
        }
        if (container === chatCanvas()) chatCanvasZoom = z;
      }

      function mod(n, m) {
        return ((n % m) + m) % m;
      }

      function applyCraftCanvasPadding(zoom) {
        const container = tab1 || document.getElementById('tab1');
        if (!container) return;
        const extraX = Math.max(0, (zoom - 1) * container.clientWidth);
        const extraY = Math.max(0, (zoom - 1) * container.clientHeight);
        container.style.setProperty('--craft-extra-x', `${extraX}px`);
        container.style.setProperty('--craft-extra-y', `${extraY}px`);
      }

      function updateCraftGridAlignment() {
        const container = tab1 || document.getElementById('tab1');
        const canvas = craftCanvas();
        if (!container || !canvas) return;

        const z = getCanvasZoom(canvas) || 1;
        const minor = CRAFT_GRID_MINOR * z;
        const major = CRAFT_GRID_MAJOR * z;
        const stroke = Math.max(1, z);
        const minorX = -mod(container.scrollLeft, minor);
        const minorY = -mod(container.scrollTop, minor);
        const majorX = -mod(container.scrollLeft, major);
        const majorY = -mod(container.scrollTop, major);

        container.style.setProperty('--craft-grid-minor-step', `${minor}px`);
        container.style.setProperty('--craft-grid-major-step', `${major}px`);
        container.style.setProperty('--craft-grid-minor-stroke', `${stroke}px`);
        container.style.setProperty('--craft-grid-major-stroke', `${stroke}px`);
        container.style.backgroundPosition = `${minorX}px ${minorY}px, ${minorX}px ${minorY}px, ${majorX}px ${majorY}px, ${majorX}px ${majorY}px`;
      }

      function zoomActiveCanvas(deltaY, clientX, clientY) {
        const active = document.querySelector('.tab-content.active');
        if (!active) return;

        const isChat = active.id === 'tab4';
        const isCraft = active.id === 'tab1';
        if (!isChat && !isCraft) return;

        const canvas = isChat ? chatCanvas() : craftCanvas();
        if (!canvas) return;
        canvasZoomGestureUntil = performance.now() + 120;

        const oldZoom = getCanvasZoom(canvas);
        const nextZoom = clampCanvasZoom(
          canvas,
          deltaY < 0 ? oldZoom * CANVAS_ZOOM_STEP : oldZoom / CANVAS_ZOOM_STEP,
        );
        if (Math.abs(nextZoom - oldZoom) < 0.0001) return;

        const container = isChat
          ? tab4 || document.getElementById('tab4')
          : tab1 || document.getElementById('tab1');
        if (!container) {
          setCanvasZoom(canvas, nextZoom);
          return;
        }

        const rect = container.getBoundingClientRect();
        const localX = clientX - rect.left;
        const localY = clientY - rect.top;
        const worldX = (container.scrollLeft + localX) / oldZoom;
        const worldY = (container.scrollTop + localY) / oldZoom;

        setCanvasZoom(canvas, nextZoom);
        const applyScroll = () => {
          container.scrollLeft = Math.max(0, worldX * nextZoom - localX);
          container.scrollTop = Math.max(0, worldY * nextZoom - localY);
          if (isChat) {
            scheduleChatMiniMapUpdate?.();
            saveChatViewportState?.();
          } else {
            updateCraftGridAlignment();
          }
        };
        // Craft starts with no overflow at 100%, so apply after layout to avoid clamping-to-zero.
        requestAnimationFrame(applyScroll);
      }

      function zoomScrollableContent(containerEl, oldZoom, nextZoom, clientX, clientY, applyZoom) {
        if (!containerEl) {
          applyZoom(nextZoom);
          return;
        }
        const rect = containerEl.getBoundingClientRect();
        const localX = clientX - rect.left;
        const localY = clientY - rect.top;
        const worldX = (containerEl.scrollLeft + localX) / oldZoom;
        const worldY = (containerEl.scrollTop + localY) / oldZoom;
        applyZoom(nextZoom);
        requestAnimationFrame(() => {
          containerEl.scrollLeft = Math.max(0, worldX * nextZoom - localX);
          containerEl.scrollTop = Math.max(0, worldY * nextZoom - localY);
        });
      }

      function zoomHomeContent(deltaY, clientX, clientY) {
        const oldZoom = homeContentZoom;
        const nextZoom = clampWorldContentZoom(
          deltaY < 0 ? oldZoom * CANVAS_ZOOM_STEP : oldZoom / CANVAS_ZOOM_STEP,
        );

      function getElementCenterInChatCanvas(el) {

        const rect = el.getBoundingClientRect();
        return {
          x: (rect.left - canvasRect.left) / zoom + rect.width / (2 * zoom),
          y: (rect.top - canvasRect.top) / zoom + rect.height / (2 * zoom),
          w: rect.width / zoom,

      // In chat inspection mode, clicking the empty background should NOT clear the symbol selection.

      function installChatBackgroundExitHandler() {

      function renderAnnotationLinks() {
        const layer = document.getElementById('chatAnchorLayer');
        if (!layer) return;
        // Remove old annotation link SVG elements
        layer
          .querySelectorAll('.anno-link-line, .anno-anchor-line, .anno-link-dot, .anno-anchor-dot')
          .forEach((el) => el.remove());

        function getComponentCenterFromRootSymbolId(rootSymbolId) {
          const root = symbolById.get(rootSymbolId);
          if (!root) return null;

          const stack = [root];
          const visited = new Set([root]);
          let sumX = 0;
          let sumY = 0;
          let count = 0;

          while (stack.length) {
            const sym = stack.pop();
            const c = getElementCenterInChatCanvas(sym);
            if (c) {
              sumX += c.x;
              sumY += c.y;
              count += 1;
            }

            const conns = currentGraph.getSymbolConnections(sym) || [[], [], [], [], [], []];
            for (const side of conns) {
              for (const [nbr] of side) {
                if (!nbr || visited.has(nbr)) continue;
                visited.add(nbr);
                stack.push(nbr);
              }
            }
          }

          if (!count) return null;
          return { x: sumX / count, y: sumY / count };
        }

        function getAnnotationAnchorCenter(emoji) {
          const ids = String(emoji?.dataset?.annoSymbolIds || '')
            .split(',')
            .map((id) => id.trim())
            .filter(Boolean);

          if (ids.length) {
            const centers = ids
              .map((id) => getElementCenterInChatCanvas(symbolById.get(id)))
              .filter(Boolean);
            if (centers.length) {
              return {
                x: centers.reduce((sum, p) => sum + p.x, 0) / centers.length,
                y: centers.reduce((sum, p) => sum + p.y, 0) / centers.length,
              };
            }
          }

          const rootSymbolId = emoji?.dataset?.annoRootSymbolId;
          return rootSymbolId ? getComponentCenterFromRootSymbolId(rootSymbolId) : null;
        }

        for (const link of annoLinkById.values()) {
          const fromEmoji = emojiById.get(link.fromEmojiId);
          const toEmoji = emojiById.get(link.toEmojiId);
          if (!fromEmoji || !toEmoji) continue;
          // Only show if both are visible
          if (
            !fromEmoji.classList.contains('annotation-visible') ||
            !toEmoji.classList.contains('annotation-visible')
          )
            continue;

          const a = getElementCenterInChatCanvas(fromEmoji);
          const b = getElementCenterInChatCanvas(toEmoji);
          if (!a || !b) continue;

          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.classList.add('anno-link-line');
          line.setAttribute('x1', a.x);
          line.setAttribute('y1', a.y);
          line.setAttribute('x2', b.x);
          line.setAttribute('y2', b.y);
          line.setAttribute('stroke', '#000');
          line.setAttribute('stroke-width', '2');
          line.setAttribute('stroke-dasharray', '6 4');
          layer.appendChild(line);

          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.classList.add('anno-link-dot');
          dot.setAttribute('cx', b.x);
          dot.setAttribute('cy', b.y);
          dot.setAttribute('r', '4');
          dot.setAttribute('fill', '#000');
          layer.appendChild(dot);
        }

        // Render anchors from root annotations -> inspected symbol component center
        for (const emoji of emojiById.values()) {
          if (!emoji?.isConnected) continue;
          if (emoji.dataset?.isAnnotation !== 'true') continue;
          if (!emoji.classList.contains('annotation-visible')) continue;

          const emojiId = emoji.dataset?.id;
          if (!emojiId) continue;

          // If this annotation is chained to another annotation, it anchors to that bubble instead.
          if (annoChildToParent.has(emojiId)) continue;

          const from = getElementCenterInChatCanvas(emoji);
          const to = getAnnotationAnchorCenter(emoji);
          if (!from || !to) continue;

          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.classList.add('anno-anchor-line');
          line.setAttribute('x1', from.x);
          line.setAttribute('y1', from.y);
          line.setAttribute('x2', to.x);
          line.setAttribute('y2', to.y);
          line.setAttribute('stroke', '#000');
          line.setAttribute('stroke-width', '2');
          line.setAttribute('stroke-dasharray', '6 4');
          layer.appendChild(line);

          const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          dot.classList.add('anno-anchor-dot');
          dot.setAttribute('cx', to.x);
          dot.setAttribute('cy', to.y);
          dot.setAttribute('r', '4');
          dot.setAttribute('fill', '#000');
          layer.appendChild(dot);
        }
      }

      function upsertAnnotationLinkLocal(docId, content) {

        annoLinkById.set(docId, {

      function updateExpressionGroupFrame(symbols, canvas) {
        if (!symbols || symbols.length === 0) {
          clearExpressionGroupFrame();

        }
        const cv = canvas || chatCanvas() || craftCanvas();
        if (!cv) return;

        const gid = symbols[0]?._expressionGroupId || '__expr_group__';
        let frameEl = expressionGroupFrameEls.get(gid);
        if (!frameEl || !frameEl.isConnected) {
          frameEl = document.createElement('div');
          frameEl.className = 'expression-group-frame';
          frameEl.dataset.exprGroupId = gid;
          cv.appendChild(frameEl);
          expressionGroupFrameEls.set(gid, frameEl);
        }

        let minLeft = Infinity;
        let minTop = Infinity;
        let maxRight = -Infinity;
        let maxBottom = -Infinity;
        for (const sym of symbols) {
          const r = getSymbolRectOnCanvas(sym);
          minLeft = Math.min(minLeft, r.left);
          minTop = Math.min(minTop, r.top);
          maxRight = Math.max(maxRight, r.right);
          maxBottom = Math.max(maxBottom, r.bottom);
        }

        const pad = 0; // keep frame as tight as the normal per-symbol selection outline
        frameEl.style.display = 'block';
        frameEl.style.left = `${minLeft - pad}px`;
        frameEl.style.top = `${minTop - pad}px`;
        frameEl.style.width = `${maxRight - minLeft + pad * 2}px`;
        frameEl.style.height = `${maxBottom - minTop + pad * 2}px`;
      }

      function clearExpressionGroupFrame() {
        for (const [gid, el] of expressionGroupFrameEls.entries()) {
          if (!el || !el.isConnected) {
            expressionGroupFrameEls.delete(gid);

          el.style.display = 'none';

      }

      function updateExpressionGroupFramesFromSelection(canvas) {
        const cv = canvas || chatCanvas() || craftCanvas();
        if (!cv) return;

        const fullySelectedGroupIds = new Set();
        for (const s of selectedSymbols) {
          const gid = s?._expressionGroupId;
          if (!gid) continue;
          const arr = getExpressionGroupMembers(gid);
          if (!arr || arr.length < 2) continue;
          let all = true;
          for (const sym of arr) {
            if (!selectedSymbols.has(sym)) {
              all = false;
              break;
            }
          }
          if (all) fullySelectedGroupIds.add(gid);
        }

        // Hide stale frames
        for (const [gid, el] of expressionGroupFrameEls.entries()) {
          if (!el || !el.isConnected) {
            expressionGroupFrameEls.delete(gid);
            continue;
          }
          if (!fullySelectedGroupIds.has(gid)) {
            el.style.display = 'none';
          }
        }

        // Render frames for fully-selected groups and remove per-symbol frames within them
        for (const gid of fullySelectedGroupIds) {
          const arr = getExpressionGroupMembers(gid);
          if (!arr || arr.length < 2) continue;
          updateExpressionGroupFrame(arr, cv);
          for (const sym of arr) {
            sym.classList.remove('framed');
          }
        }

        // Ensure everything else still has per-symbol frames
        for (const s of selectedSymbols) {
