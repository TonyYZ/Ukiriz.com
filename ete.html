<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ete · The automated scribe for Ítí</title>
    <style>
      @font-face {
        font-family: 'Uriti';
        src:
          url('./Uriti.woff2?v=20260717') format('woff2'),
          url('./Uriti.otf?v=20260717-134520') format('opentype');
        font-style: normal;
        font-weight: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'Nuaiti';
        src:
          url('./Nuaiti.woff2?v=20260717') format('woff2'),
          url('./Nuaiti.otf') format('opentype');
        font-style: normal;
        font-weight: normal;
        font-display: swap;
      }

      @font-face {
        font-family: 'UkirizWenKai';
        src: url('./fonts/LXGWWenKai-Regular.woff2') format('woff2');
        font-display: swap;
      }

      @font-face {
        font-family: 'UkirizSarasaUiSC';
        src: url('./fonts/SarasaUiSC-Regular.woff2') format('woff2');
        font-display: swap;
      }

      :root {
        color-scheme: light;
        --mono: Consolas, 'Courier New', 'UkirizSarasaUiSC', ui-monospace, monospace;
        --ink: #302b20;
        --muted: #776c55;
        --studio: #f4ecd0;
        --paper: #fff2b8;
        --paper-deep: #ead98a;
        --line: rgba(75, 62, 35, 0.18);
        --rule: rgba(65, 85, 100, 0.1);
        --margin-rule: rgba(192, 86, 67, 0.42);
        --accent: #c98b22;
        --accent-deep: #8f5e0d;
        --accent-soft: rgba(201, 139, 34, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        color: var(--ink);
        background: var(--studio);
        font-family: var(--mono);
      }

      .app {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        width: 100%;
        height: 100dvh;
        background: var(--studio);
      }

      .editor,
      .drawer {
        position: relative;
        min-width: 0;
        min-height: 0;
      }

      .editor {
        display: flex;
        flex-direction: column;
        z-index: 1;
        overflow: hidden;
        background: var(--paper);
        border-right: 4px solid var(--accent);
        box-shadow: 12px 0 30px rgba(27, 41, 51, 0.08);
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 80px;
        padding: 13px 22px;
        border-bottom: 1px solid var(--line);
        background: rgba(248, 239, 207, 0.96);
        box-shadow: 0 5px 18px rgba(28, 40, 49, 0.055);
      }

      .brand {
        margin-right: auto;
        min-width: 0;
      }
      .brand h1 {
        margin: 0;
        font:
          600 25px/1 'UkirizWenKai',
          Georgia,
          serif;
        letter-spacing: 0.035em;
      }
      .brand p {
        margin: 7px 0 0;
        color: var(--accent-deep);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.04em;
      }

      .font-switch {
        display: inline-flex;
        flex: 0 0 auto;
        padding: 3px;
        border: 1px solid rgba(201, 139, 34, 0.44);
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 2px 7px rgba(27, 42, 52, 0.06);
      }

      .font-switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .font-switch label {
        padding: 7px 11px;
        border-radius: 2px;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
      }
      .font-switch input:checked + label {
        color: #fff;
        background: var(--accent);
      }
      .font-switch input:focus-visible + label {
        outline: 2px solid var(--accent-deep);
        outline-offset: 2px;
      }

      textarea {
        display: block;
        flex: 1 1 auto;
        width: 100%;
        min-height: 0;
        resize: none;
        padding: clamp(34px, 4vw, 58px) clamp(26px, 4vw, 58px) clamp(48px, 5vw, 72px)
          clamp(54px, 6vw, 88px);
        border: 0;
        outline: 0;
        color: var(--ink);
        background:
          linear-gradient(
            90deg,
            transparent 0,
            transparent clamp(38px, 5vw, 70px),
            var(--margin-rule) clamp(38px, 5vw, 70px),
            var(--margin-rule) calc(clamp(38px, 5vw, 70px) + 1px),
            transparent calc(clamp(38px, 5vw, 70px) + 1px)
          ),
          repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent calc(1.55em - 1px),
            var(--rule) calc(1.55em - 1px),
            var(--rule) 1.55em
          ),
          linear-gradient(120deg, var(--paper), #f7e4a2);
        font-family: 'Uriti', serif;
        font-size: clamp(26px, 3.1vw, 47px);
        line-height: 1.55;
        letter-spacing: 0.025em;
        caret-color: var(--accent);
        box-shadow: inset -18px 0 32px rgba(68, 55, 31, 0.035);
      }
      textarea.font-nuaiti {
        font-family: 'Nuaiti', serif;
      }
      textarea::placeholder {
        color: #9b998f;
        opacity: 1;
      }
      textarea::selection {
        color: var(--ink);
        background: rgba(201, 139, 34, 0.26);
      }

      .editor-footer {
        display: flex;
        align-items: center;
        min-height: 44px;
        padding: 8px 22px;
        border-top: 1px solid var(--line);
        background: var(--studio);
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.04em;
      }
      .status {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .status:not(.error)::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        margin-right: 8px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
        vertical-align: 1px;
      }
      .status.error {
        color: #9d3c31;
      }
      .count {
        margin-left: 12px;
        padding-left: 12px;
        white-space: nowrap;
      }
      .speech-button {
        min-height: 28px;
        margin-left: auto;
        padding: 5px 10px;
        font-size: 11px;
      }
      .drawer {
        overflow: hidden;
        touch-action: none;
        overscroll-behavior: none;
        background:
          linear-gradient(to right, rgba(0, 0, 0, 0.055) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 0, 0, 0.055) 1px, transparent 1px),
          linear-gradient(to right, rgba(201, 139, 34, 0.11) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(201, 139, 34, 0.11) 1px, transparent 1px), var(--studio);
        background-size:
          40px 40px,
          40px 40px,
          200px 200px,
          200px 200px;
      }

      .drawer::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        box-shadow:
          inset 14px 0 28px rgba(30, 42, 51, 0.045),
          inset 0 80px 90px rgba(255, 255, 255, 0.2);
      }

      .drawer-head {
        position: absolute;
        z-index: 2;
        top: 16px;
        left: 18px;
        right: 18px;
        display: flex;
        align-items: center;
        pointer-events: none;
      }
      .drawer-title {
        padding: 8px 11px;
        border: 1px solid var(--accent);
        border-radius: 4px;
        color: #fff;
        background: var(--accent);
        box-shadow: 0 3px 9px rgba(0, 128, 175, 0.18);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.11em;
        text-transform: uppercase;
      }
      .actions {
        display: flex;
        gap: 7px;
        margin-left: auto;
        pointer-events: auto;
      }
      button {
        min-height: 32px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        border-radius: 4px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(8px);
        cursor: pointer;
        font: 12px/1 var(--mono);
        font-size: 12px;
        box-shadow: 0 2px 7px rgba(27, 42, 52, 0.07);
      }
      button:hover {
        color: var(--accent-deep);
        border-color: var(--accent);
        background: #fff;
      }
      button:focus-visible {
        outline: 2px solid var(--accent-deep);
        outline-offset: 2px;
      }
      button[aria-pressed='true'] {
        color: #fff;
        border-color: var(--accent);
        background: var(--accent);
      }

      dialog {
        width: min(680px, calc(100vw - 28px));
        max-height: calc(100dvh - 28px);
        padding: 0;
        overflow: auto;
        border: 1px solid rgba(143, 94, 13, 0.42);
        border-radius: 6px;
        color: var(--ink);
        background: var(--paper);
        box-shadow: 0 18px 54px rgba(48, 43, 32, 0.28);
        font-family: var(--mono);
      }
      dialog::backdrop {
        background: rgba(48, 43, 32, 0.34);
        backdrop-filter: blur(2px);
      }
      .settings-form {
        padding: 22px;
      }
      .settings-head {
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }
      .settings-head h2 {
        margin: 0;
        font:
          600 22px/1.1 'UkirizWenKai',
          Georgia,
          serif;
      }
      .settings-head p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.45;
      }
      .settings-close {
        flex: 0 0 auto;
        min-width: 34px;
        padding: 5px;
        font-size: 18px;
      }
      .settings-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px 18px;
      }
      .setting {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 92px;
        align-items: center;
        gap: 12px;
      }
      .setting label {
        font-size: 12px;
        line-height: 1.35;
      }
      .setting small {
        display: block;
        margin-top: 3px;
        color: var(--muted);
        font-size: 10px;
      }
      .setting input {
        width: 100%;
        min-width: 0;
        padding: 7px 8px;
        border: 1px solid rgba(143, 94, 13, 0.3);
        border-radius: 3px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.7);
        font: 12px/1.2 var(--mono);
      }
      .setting input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }
      .settings-error {
        min-height: 17px;
        margin: 14px 0 0;
        color: #9d3c31;
        font-size: 11px;
      }
      .settings-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 2px;
      }

      #drawing {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #artwork {
        fill: none;
        stroke: var(--ink);
        stroke-width: 2.6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      #artwork .gate {
        stroke: var(--accent-deep);
        stroke-width: 1.5;
        opacity: 0.72;
      }
      #artwork .node-dot {
        fill: var(--ink);
        stroke: none;
      }
      #artwork .turtle-cursor {
        fill: var(--ink);
        stroke: none;
      }

      @media (max-width: 760px) {
        body {
          overflow: auto;
        }
        .app {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(52dvh, 1fr) minmax(48dvh, 1fr);
          height: auto;
          min-height: 100dvh;
        }
        .editor {
          border-right: 0;
          border-bottom: 4px solid var(--accent);
        }
        .toolbar {
          min-height: 66px;
          padding: 10px 12px;
          gap: 8px;
        }
        .brand p {
          display: none;
        }
        .font-switch label {
          padding: 7px 9px;
        }
        textarea {
          min-height: 38dvh;
          padding: 28px 22px 40px 48px;
          font-size: clamp(25px, 8vw, 38px);
        }
        .drawer {
          min-height: 48dvh;
        }
        .settings-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="editor" aria-labelledby="editor-title">
        <header class="toolbar">
          <div class="brand">
            <h1 id="editor-title">Ete</h1>
            <p>The automated scribe for Ítí</p>
          </div>
          <button
            type="button"
            id="random-text"
            title="Replace the editor with a generated V2 passage"
          >
            Random text
          </button>
          <button type="button" id="random-settings" title="Set random text parameters">
            Settings
          </button>
          <div class="font-switch" role="radiogroup" aria-label="Writing font">
            <input type="radio" id="uriti" name="font" value="uriti" checked />
            <label for="uriti">Uriti</label>
            <input type="radio" id="nuaiti" name="font" value="nuaiti" />
            <label for="nuaiti">Nuaiti</label>
          </div>
        </header>
        <textarea
          id="source"
          lang="art-x-iti"
          spellcheck="false"
          autocomplete="off"
          aria-label="Ítí text"
          placeholder="Type Ítí here…"
        >
çrağ rám. Zacan. Can zág. Graman.</textarea
        >
        <footer class="editor-footer">
          <span class="status" id="status" role="status">Ready</span>
          <button
            class="speech-button"
            type="button"
            id="speak-text"
            title="Open the Ítí transcription in IPA Reader"
          >
            Speak
          </button>
          <span class="count" id="count">0 elements</span>
        </footer>
      </section>

      <section class="drawer" aria-label="Ítí drawing">
        <div class="drawer-head">
          <span class="drawer-title">Live drawing</span>
          <div class="actions">
            <button
              type="button"
              id="maze-mode" aria-pressed="true"
              title="Collision avoidance is on; click to use the unadjusted layout"
            >
              Maze
            </button>
            <button type="button" id="fit">Fit</button>
            <button type="button" id="download">Save SVG</button>
          </div>
        </div>
        <svg
          id="drawing"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          aria-label="Generated Ítí drawing"
        >
          <g id="viewport"><g id="artwork"></g></g>
        </svg>
      </section>
    </main>

    <dialog id="random-settings-dialog" aria-labelledby="random-settings-title">
      <form class="settings-form" id="random-settings-form">
        <div class="settings-head">
          <div>
            <h2 id="random-settings-title">Random text settings</h2>
            <p>These values are used the next time you generate a passage.</p>
          </div>
          <button
            class="settings-close"
            type="button"
            id="random-settings-close"
            aria-label="Close settings"
          >
            ×
          </button>
        </div>
        <div class="settings-grid">
          <div class="setting">
            <label for="random-elements">Elements <small>Total drawable elements</small></label>
            <input
              id="random-elements"
              name="elements"
              type="number"
              min="1"
              max="5000"
              step="1"
              value="20"
              required
            />
          </div>
          <div class="setting">
            <label for="random-sentences"
              >Sentences <small>Between 1 and the element count</small></label
            >
            <input
              id="random-sentences"
              name="sentences"
              type="number"
              min="1"
              max="1000"
              step="1"
              value="5"
              required
            />
          </div>
          <div class="setting">
            <label for="random-fuseau-rate"
              >Fuseau rate <small>Probability from 0 to 1</small></label
            >
            <input
              id="random-fuseau-rate"
              name="fuseauRate"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.2"
              required
            />
          </div>
          <div class="setting">
            <label for="random-gate-rate">Gate rate <small>Probability from 0 to 1</small></label>
            <input
              id="random-gate-rate"
              name="gateRate"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.08"
              required
            />
          </div>
          <div class="setting">
            <label for="random-vertical-rate"
              >Vertical rate <small>Probability from 0 to 1</small></label
            >
            <input
              id="random-vertical-rate"
              name="verticalRate"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.5"
              required
            />
          </div>
          <div class="setting">
            <label for="random-nested-rate"
              >Nested fuseau rate <small>Probability from 0 to 1</small></label
            >
            <input
              id="random-nested-rate"
              name="nestedFuseauRate"
              type="number"
              min="0"
              max="1"
              step="0.01"
              value="0.25"
              required
            />
          </div>
          <div class="setting">
            <label for="random-depth">Maximum depth <small>Nested fuseau depth</small></label>
            <input
              id="random-depth"
              name="maxFuseauDepth"
              type="number"
              min="1"
              max="20"
              step="1"
              value="3"
              required
            />
          </div>
          <div class="setting">
            <label for="random-branches"
              >Maximum branches <small>Branches in one fuseau</small></label
            >
            <input
              id="random-branches"
              name="maxBranches"
              type="number"
              min="2"
              max="30"
              step="1"
              value="6"
              required
            />
          </div>
          <div class="setting">
            <label for="random-branch-length"
              >Maximum branch length <small>Elements in one branch</small></label
            >
            <input
              id="random-branch-length"
              name="maxBranchLength"
              type="number"
              min="1"
              max="30"
              step="1"
              value="4"
              required
            />
          </div>
          <div class="setting">
            <label for="random-fanout"
              >Maximum gate fanout <small>Targets from one source</small></label
            >
            <input
              id="random-fanout"
              name="maxGateFanout"
              type="number"
              min="1"
              max="30"
              step="1"
              value="3"
              required
            />
          </div>
          <div class="setting">
            <label for="random-seed">Seed <small>Leave blank for a new passage</small></label>
            <input
              id="random-seed"
              name="seed"
              type="number"
              min="0"
              max="4294967295"
              step="1"
              placeholder="Random"
            />
          </div>
        </div>
        <p class="settings-error" id="random-settings-error" role="alert"></p>
        <div class="settings-actions">
          <button type="button" id="random-settings-cancel">Cancel</button>
          <button type="submit">Use settings</button>
        </div>
      </form>
    </dialog>

    <script src="./ete-speech.js"></script>
    <script>
      (() => {
        'use strict';

        const NS = 'http://www.w3.org/2000/svg';
        const source = document.querySelector('#source');
        const status = document.querySelector('#status');
        const count = document.querySelector('#count');
        const speakButton = document.querySelector('#speak-text');
        const svg = document.querySelector('#drawing');
        const drawerPanel = document.querySelector('.drawer');
        const randomSettingsDialog = document.querySelector('#random-settings-dialog');
        const randomSettingsForm = document.querySelector('#random-settings-form');
        const randomSettingsError = document.querySelector('#random-settings-error');
        const viewport = document.querySelector('#viewport');
        const artwork = document.querySelector('#artwork');
        const consonants = new Set(Array.from('çşzspbtdmnfvlrcghğ'));
        const fuseauBranchMarks = new Set(['y', 'w']);
        const vowelBase = Object.fromEntries(
          [
            ['aáà', 'a'],
            ['eéèē', 'e'],
            ['iíìī', 'i'],
            ['oóòō', 'o'],
            ['uúùū', 'u'],
            ['ơớờ', 'ơ'],
          ].flatMap(([chars, base]) => Array.from(chars, (char) => [char, base])),
        );
        const accents = new Set(Array.from('áéíóúớ'));
        const compounds = {
          ẻ: 'áé',
          ț: 'óé',
          ȟ: 'áóé',
          ỉ: 'éí',
          ȍ: 'óí',
          ỏ: 'áó',
          ủ: 'óú',
          ứ: 'éú',
          ĩ: 'ei',
          ị: 'oi',
          ẹ: 'oe',
          ẽ: 'ae',
          ȡ: 'aoe',
          õ: 'ao',
          ư: 'eu',
          ũ: 'ou',
        };
        const compoundSpellings = new Map([
          ...Object.entries(compounds).map(([compound, expanded]) => [expanded, compound]),
          ['oa', 'õ'],
        ]);
        const compactVowelSequences = Array.from(compoundSpellings.keys()).sort(
          (left, right) => right.length - left.length,
        );

        class ParseError extends Error {}

        function normalize(text) {
          return Array.from(
            text
              .toLowerCase()
              .replaceAll('Ƞ', 'ȡ')
              .replaceAll('Ȍ', 'ȍ')
              .replaceAll('Ț', 'ț')
              .replaceAll('Ȟ', 'ȟ'),
          )
            .map((char) => compounds[char] || char)
            .join('');
        }

        function splitSentenceRecords(text) {
          const normalized = normalize(text).replace(/\([^)]*\)/g, '');
          const separator = / {4,}|-\s+|[,.!?;:\n]+/g;
          const records = [];
          let start = 0;
          let match;
          while ((match = separator.exec(normalized))) {
            const part = normalized.slice(start, match.index).trim();
            if (part && !/^\d+$/.test(part))
              records.push({ text: part, hasPeriod: match[0].includes('.') });
            start = separator.lastIndex;
          }
          const part = normalized.slice(start).trim();
          if (part && !/^\d+$/.test(part)) records.push({ text: part, hasPeriod: false });
          return records;
        }

        class Parser {
          constructor(text, sentence, gates, sources) {
            this.text = text
              .replace(/\s/g, '')
              .replace(/[aà](?=[eéèēoóòōơớờ])/gu, '');
            this.pos = 0;
            this.sentence = sentence;
            this.number = 0;
            this.gates = gates;
            this.sources = sources;
            this.orientation = 0;
            this.componentContinuesBranch = false;
            this.omittedFuseauOpenings = [];

            const following = index + 1 < node.children.length ? node.children[index + 1] : null;
            const mayOmitOpening = previous === null || previous.type === 'parallel';
            const mayOmitClosing = following === null || following.type === 'parallel';
            let text = serializeParallel(
              child,
              markers,
              insideBranch,
              !insideBranch && mayOmitOpening,
              !insideBranch && mayOmitClosing,

            return text;

          return insideBranch ? rendered.join('') : spaceFuseauBoundaries(node.children, rendered);

        function spaceFuseauBoundaries(children, rendered) {
          const segments = [];
          let current = '';

          children.forEach((child, index) => {
            let text = rendered[index];
            if (child.type !== 'parallel') {
              current += text;
              return;
            }

            const previousIsPlain = index > 0 && children[index - 1].type !== 'parallel';
            const followingIsPlain =
              index + 1 < children.length && children[index + 1].type !== 'parallel';

            if (previousIsPlain) {
              if (!text.startsWith('e')) {
                throw new Error('A fuseau after a plain segment must begin with e');
              }
              current += 'e';
              segments.push(current);
              current = '';
              text = text.slice(1);

            if (followingIsPlain) {
              if (!text.endsWith('o')) {
                throw new Error('A fuseau before a plain segment must end with o');
              }
              current += text.slice(0, -1);
              segments.push(current);
              current = 'o';

          if (current) segments.push(current);
          return segments.join(' ');

        function serializeCompactSeries(
          node,
          markers,
          secondBranch = false,
          firstOrientationVowel = null,

          const rendered = [];
          node.children.forEach((child, index) => {
            let text;
            if (child.type === 'element') {

                child,
                markers,
                index > 0,
                index === 0 && firstOrientationVowel !== null
                  ? firstOrientationVowel

                child.type === 'parallel'

              if (rendered.length) text = `a${text}`;

        function serializeParallel(

          omitOpening = false,
          omitClosing = false,

            const rightFirst = node.branches[1].children[0];
            const marker = rightFirst.type === 'element' && rightFirst.orientation ? 'ớ' : 'ơ';
            const rightIsMark =
              node.branches[1].children.length === 1 &&
              rightFirst.type === 'element' &&
              fuseauBranchMarks.has(rightFirst.char);
            const leftStartsNested = node.branches[0].children[0]?.type === 'parallel';
            const rightEndsNested = node.branches[1].children.at(-1)?.type === 'parallel';
            const opening = omitOpening && !leftStartsNested ? '' : 'e';
            const closing = omitClosing && !rightIsMark && !rightEndsNested ? '' : 'o';

          if (node.branches.length === 3) {

              first.length === 1 &&
              first[0].type === 'element' &&
              fuseauBranchMarks.has(first[0].char)

              branch.children.every((child) => child.type === 'element'),

            const opening = omitOpening && !framed && safelyCompact ? '' : 'e';
            const final = node.branches.at(-1).children;
            const finalIsMark =
              final.length === 1 &&
              final[0].type === 'element' &&
              fuseauBranchMarks.has(final[0].char);

              omitClosing && !framed && safelyCompact && !finalIsMark ? '' : 'o';

            .slice(1, -2)
            .map((branch) => `e${branch}o`)

        function serializeNode(node, markers) {

          if (node.type === 'series') return serializeSeries(node, markers);

        function capitalizeFirstLetter(text) {

        function readRandomSettings() {

          const options = {};

          if (options.sentences > options.elements) {

        function chooseFuseauDirection(node, currentDirection) {
          let eligible = 0;
          let matching = 0;
          node.branches.forEach((branch) => {
            const first = branch.type === 'series' ? branch.children[0] : branch;
            // DrawerV2 excludes branches beginning with a nested fuseau from
            // the direction vote because they cannot provide the outer stem.
            if (!first || first.type !== 'element') return;
            eligible++;
            if (first.orientation === currentDirection) matching++;
          });
          return eligible && matching < eligible / 2 ? 1 - currentDirection : currentDirection;
        }

        function fuseauElementNormalDir(
          elementOrientation,
          fuseauDirection,
          side,
          parentNormalDir,
        ) {
          const mirror =
            (elementOrientation === 1 && fuseauDirection === 0 && side === -1) ||
            (elementOrientation === 0 && fuseauDirection === 1 && side === 1)
              ? -1
              : 1;
          const parentMirror = parentNormalDir ? -1 : 1;
          return mirror * parentMirror === -1 ? 1 : 0;

        function chooseFuseauStemIndex(node, direction, measuredLengths = null) {
          let chosenIndex = -1;
          let chosenLength = -Infinity;
          node.branches.forEach((branch, index) => {

            // They may sit beside the stem, but can never provide the stem.
            if (isChevronBranch(branch)) return;
            const length =
              measuredLengths === null
                ? projectedLength(branch, direction)
                : measuredLengths[index];
            if (length > chosenLength) {
              chosenIndex = index;
              chosenLength = length;

          return chosenIndex;

        function mazeNormalDirections(node, state) {

        // SVG-backed turtle. Its commands mirror the subset used by

            this.y = ny;

            this.y = y;

            turtle.left(180);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.right(90 * alter);
            turtle.forward(UNIT / SCALE);
            turtle.pendown();
            turtle.right(90 * alter);
            turtle.forward(UNIT / SCALE);
            turtle.left(180);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.right(90 * alter);
            turtle.pendown();

            turtle.pendown();
            turtle.right(90 * alter);
            turtle.forward(UNIT / SCALE);
            turtle.left(180);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.right(90 * alter);
            turtle.pendown();

            turtle.forward(UNIT / SCALE);
            turtle.left(90 * alter);
            turtle.pendown();

            turtle.left(90 * alter);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.right(90 * alter);
            turtle.forward(UNIT / SCALE);
            turtle.pendown();

            turtle.circle(UNIT / SCALE);
            if (alter === 1) turtle.right(180);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.pendown();

            turtle.left(180);
            turtle.penup();
            turtle.forward(UNIT / 2);
            turtle.left(90 * alter);
            turtle.forward(UNIT / SCALE);
            turtle.pendown();
            turtle.left(180);
            turtle.forward(UNIT / SCALE);
            turtle.right(90 * alter);

            turtle.forward(UNIT / SCALE);
            turtle.left(180);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.right(90 * alter);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.pendown();

            turtle.right(90 * alter);
            turtle.penup();
            turtle.forward(UNIT / SCALE);
            turtle.right(90 * alter);
            turtle.forward(UNIT / SCALE);
            turtle.left(180);
            turtle.pendown();
            turtle.forward(UNIT * (0.5 + 0.5 / SCALE));

            turtle.goto(arms[1].x, arms[1].y);
            turtle.penup();
            turtle.goto(end.x, end.y);
            turtle.pendown();

          const forward = turtle.vector(1);
          const right = turtle.vector(1, turtle.heading - 90 * alter);
          const pos = calcPos(char);
          const dist = calcDist(char);
          const gate = {

            turtle.pendown();
            turtle.dot(UNIT / SCALE / 2);
            turtle.penup();
            turtle.right(180);
            turtle.forward(dist);
            turtle.right(90 * alter);
            turtle.forward(pos);
            turtle.pendown();

        function projectedLength(node, direction) {

              0,

        function projectedWidth(node, direction) {

          // V2 allocWidth does not impose a UNIT-sized minimum on a branch.
          // A branch aligned with the fuseau stem starts at the exact equal
          // interval, UNIT / SCALE (10 with the canonical 50/5 settings).
          if (node.type === 'series')
            return Math.max(0, ...node.children.map((child) => projectedWidth(child, direction)));
          return node.branches.reduce((sum, branch) => sum + projectedWidth(branch, direction), 0);

        function allocateFuseauWidths(ordered, direction) {

                  alter !== -1 &&

                  measured > offMaxBack &&

              boundaryEnd,
              state.fuseauContext || null,
            );
            drawingLayer = parent;
            if (componentBoxes) {
              const box = group.getBBox();
              componentBoxes.push({
                x: box.x + 1,
                y: box.y + 1,
                width: Math.max(0, box.width - 2),
                height: Math.max(0, box.height - 2),
              });
            }
            state.alter *= -1;
            state.direction = node.orientation;
            return { start, end: { x: turtle.x, y: turtle.y } };
          }
          if (node.type === 'series') {
            let result = {
              start: { x: turtle.x, y: turtle.y },
              end: { x: turtle.x, y: turtle.y },
            };
            node.children.forEach((child, index) => {
              result = renderNode(
                child,
                turtle,
                state,
                boundaryStart || index > 0,
                boundaryEnd || index < node.children.length - 1,
                componentBoxes,
              );
            });
            return result;
          }

          // DrawerV2 votes on the outer direction before measuring branches.
          // The longest eligible branch in that direction becomes the stem.
          // y/w chevrons are side-only, even if they occur first or tie for
          // greatest length. Remaining branches retain the ordinary
          // length/source ordering and alternate sides.
          const direction = chooseFuseauDirection(node, state.direction);
          const measured = node.branches.map((branch, index) => ({
            branch,
            index,
            length: projectedLength(branch, direction),
            width: projectedWidth(branch, direction),
          }));
          const stemIndex = chooseFuseauStemIndex(
            node,
            direction,
            measured.map((entry) => entry.length),
          );
          if (stemIndex < 0) {
            throw new ParseError('A fuseau needs at least one non-chevron branch for its stem');
          }
          const stem = measured[stemIndex];
          const ordered = [
            stem,
            ...measured
              .filter((entry) => entry.index !== stemIndex)
              .sort((a, b) => b.length - a.length || a.index - b.index),
          ];
          const origin = { x: turtle.x, y: turtle.y };
          const widths = allocateFuseauWidths(ordered, direction);
          let side = 1;
          let stemEnd = origin;

          ordered.forEach((entry, drawIndex) => {
            const branchSide = side;
            turtle.penup();
            turtle.goto(origin.x, origin.y);
            calibrate(turtle, direction, state.normalDir);
            if (drawIndex) {
              let lastStep = 0;
              for (let index = drawIndex % 2; index <= drawIndex; index += 2)
                lastStep += widths[index] || 0;
              turtle.right(90 * branchSide);
              turtle.forward(lastStep);
              turtle.left(90 * branchSide);
              turtle.forward(Math.max(0, (stem.length - entry.length) / 2));
            }
            turtle.pendown();
            const branchState = {
              ...state,
              direction,
              alter: branchSide,
              normalDir: state.normalDir,
              fuseauContext: {
                direction,
                side: branchSide,
                parentNormalDir: state.normalDir,
              },
            };
            renderNode(entry.branch, turtle, branchState, true, true, componentBoxes);
            if (!drawIndex) stemEnd = { x: turtle.x, y: turtle.y };
            side *= -1;
          });
          turtle.penup();
          turtle.goto(stemEnd.x, stemEnd.y);
          calibrate(turtle, direction, state.normalDir);
          turtle.pendown();
          state.direction = direction;
          state.alter *= -1;
          return { start: origin, end: stemEnd };
        }

        function boxesOverlap(first, second, threshold = 3) {
          const width =
            Math.min(first.x + first.width, second.x + second.width) - Math.max(first.x, second.x);
          const height =
            Math.min(first.y + first.height, second.y + second.height) -
            Math.max(first.y, second.y);
          return width > threshold && height > threshold;
        }

        function collisionCount(boxes) {
          return boxes.reduce(
            (count, box) => count + occupied.filter((other) => boxesOverlap(box, other)).length,
            0,
          );
        }

        function captureRenderState(turtle, state) {
          return {
            turtle: { x: turtle.x, y: turtle.y, heading: turtle.heading, down: turtle.down },
            state: { ...state },
            artworkCount: artwork.childNodes.length,
            anchors: new Map(anchors),
          };
        }

        function restoreRenderState(snapshot, turtle, state) {
          while (artwork.childNodes.length > snapshot.artworkCount) artwork.lastChild.remove();
          Object.assign(turtle, snapshot.turtle);
          Object.keys(state).forEach((key) => delete state[key]);
          Object.assign(state, snapshot.state);
          anchors.clear();
          snapshot.anchors.forEach((value, key) => anchors.set(key, value));
          drawingLayer = artwork;
        }

        function runMazeCandidate(
          node,
          turtle,
          state,
          boundaryStart,
          boundaryEnd,
          spacingStep,
          normalDir,
        ) {
          if (spacingStep) turtle.forward((UNIT / 2) * spacingStep);
          state.normalDir = normalDir;
          const boxes = [];
          const result = renderNode(node, turtle, state, boundaryStart, boundaryEnd, boxes);
          return {
            boxes,
            result,
            collisions: collisionCount(boxes),
            distance: Math.hypot(turtle.x, turtle.y),
          };
        }

        function renderMazeComponent(node, turtle, state, boundaryStart, boundaryEnd) {
          const snapshot = captureRenderState(turtle, state);
          let chosen = null;
          let fallback = null;
          const directions = mazeNormalDirections(node, snapshot.state);

          for (let spacingStep = 0; spacingStep < MAZE_CHANCES; spacingStep++) {
            const valid = [];
            for (const normalDir of directions) {
              restoreRenderState(snapshot, turtle, state);
              const candidate = runMazeCandidate(
                node,
                turtle,
                state,
                boundaryStart,
                boundaryEnd,
                spacingStep,
                normalDir,
              );
              const route = { spacingStep, normalDir, ...candidate };
              if (
                !fallback ||
                route.collisions < fallback.collisions ||
                (route.collisions === fallback.collisions && route.distance < fallback.distance)
              ) {
                fallback = route;
              }
              if (!route.collisions) valid.push(route);
            }
            if (valid.length) {
              chosen = valid.sort((a, b) => a.distance - b.distance)[0];
              break;
            }
          }

          chosen ||= fallback;
          restoreRenderState(snapshot, turtle, state);
          const committed = runMazeCandidate(
            node,
            turtle,
            state,
            boundaryStart,
            boundaryEnd,
            chosen?.spacingStep || 0,
            chosen?.normalDir ?? snapshot.state.normalDir,
          );
          occupied.push(...committed.boxes);
          return committed.result;
        }

        function renderMazeSeries(
          node,
          turtle,
          state,
          boundaryStart = false,
          boundaryEnd = false,
        ) {
          let result = { start: { x: turtle.x, y: turtle.y }, end: { x: turtle.x, y: turtle.y } };
          node.children.forEach((child, index) => {
            result = renderMazeComponent(
              child,
              turtle,
              state,
              boundaryStart || index > 0,
              boundaryEnd || index < node.children.length - 1,
            );
          });
          return result;
        }

        function gateCurve(start, end, lift) {
          const dx = end.x - start.x,
            dy = end.y - start.y;
          const distance = Math.hypot(dx, dy);
          if (!distance) return { path: '', points: [] };
          let nx = -dy / distance,
            ny = dx / distance;
          if (ny < 0 || (Math.abs(ny) < 0.05 && nx < 0)) {
            nx *= -1;
            ny *= -1;
          }
          const c1 = { x: start.x + dx * 0.28 + nx * lift, y: start.y + dy * 0.28 + ny * lift };
          const c2 = { x: start.x + dx * 0.72 + nx * lift, y: start.y + dy * 0.72 + ny * lift };
          const steps = Math.max(24, Math.floor(distance / 3));
          let path = `M${start.x} ${start.y}`;
          const points = [start];
          for (let step = 1; step <= steps; step++) {
            const ratio = step / steps,
              inv = 1 - ratio;
            let x =
              inv ** 3 * start.x +
              3 * inv ** 2 * ratio * c1.x +
              3 * inv * ratio ** 2 * c2.x +
              ratio ** 3 * end.x;
            let y =
              inv ** 3 * start.y +
              3 * inv ** 2 * ratio * c1.y +
              3 * inv * ratio ** 2 * c2.y +
              ratio ** 3 * end.y;
            if (step < steps) {
              const wave =
                (UNIT / SCALE / 4) *
                Math.sin(Math.PI * ratio) *
                Math.sin((2 * Math.PI * distance * ratio) / ((UNIT / SCALE) * 2.5));
              x += nx * wave;
              y += ny * wave;
            }
            path += `L${x} ${y}`;
            points.push({ x, y });
          }
          return { path, points };
        }

        function gateCurveCollides(points) {
          const margin = Math.max(2, Math.floor(points.length / 14));
          for (let index = margin; index < points.length - margin - 1; index++) {
            const first = points[index],
              second = points[index + 1],
              pad = Math.max(0.5, UNIT / SCALE / 12);
            const bounds = {
              x: Math.min(first.x, second.x) - pad,
              y: Math.min(first.y, second.y) - pad,
              width: Math.abs(second.x - first.x) + pad * 2,
              height: Math.abs(second.y - first.y) + pad * 2,
            };
            if (occupied.some((box) => boxesOverlap(bounds, box, 0))) return true;
          }
          return false;
        }

        function gatePath(start, end) {
          const distance = Math.hypot(end.x - start.x, end.y - start.y);
          const baseLift = Math.max((UNIT / SCALE) * 2, Math.min(UNIT * 2, distance * 0.18));
          let curve = gateCurve(start, end, baseLift);
          if (!mazeMode) return curve.path;
          for (let attempt = 0; attempt < 24 && gateCurveCollides(curve.points); attempt++) {
            curve = gateCurve(start, end, baseLift + ((attempt + 1) * UNIT) / SCALE);
          }
          return curve.path;
        }

        function drawTurtleCursor(turtle) {
          const forward = turtle.vector(1);
          const side = turtle.vector(1, turtle.heading + 90);
          const tip = { x: turtle.x + forward.x * 10, y: turtle.y + forward.y * 10 };
          const back = { x: turtle.x - forward.x * 8, y: turtle.y - forward.y * 8 };
          const points = [
            `${tip.x},${tip.y}`,
            `${back.x + side.x * 6},${back.y + side.y * 6}`,
            `${back.x - side.x * 6},${back.y - side.y * 6}`,
          ].join(' ');
          make('polygon', { points, class: 'turtle-cursor', 'aria-hidden': 'true' }, artwork);
        }

        let viewBox = { x: 0, y: 0, w: 100, h: 100 };
        function fitDrawing() {
          if (!artwork.childNodes.length) return;
          const box = artwork.getBBox();
          const pad = 54;
          viewBox = {
            x: box.x - pad,
            y: box.y - pad,
            w: Math.max(100, box.width + pad * 2),
            h: Math.max(100, box.height + pad * 2),
          };
          svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
        }

        function draw() {
          artwork.replaceChildren();
          anchors.clear();
          status.classList.remove('error');
          occupied.length = 0;
          drawingLayer = artwork;
          try {
            const documentTree = parse(source.value);
            const turtle = new SvgTurtle(0, 0, 180);
            const drawingState = { direction: 0, normalDir: 0, alter: 1 };
            documentTree.sentences.forEach((sentence, index) => {
              const hasPeriod = documentTree.periods[index];
              if (mazeMode) renderMazeSeries(sentence, turtle, drawingState, false, hasPeriod);
              else renderNode(sentence, turtle, drawingState, false, hasPeriod);
              if (hasPeriod) turtle.dot(UNIT / SCALE / 2);
              if (index < documentTree.sentences.length - 1) {
                turtle.penup();
                turtle.forward(UNIT / SCALE);
                turtle.pendown();
              }
            });
            const elements = anchors.size;
            documentTree.gates.forEach((gate) => {
              const a = anchors.get(gate.source),
                b = anchors.get(gate.target);
              if (!a || !b) return;
              make('path', { class: 'gate', d: gatePath(a, b) });
            });
            if (elements) drawTurtleCursor(turtle);
            status.textContent = elements ? 'Live' : 'Ready';
            count.textContent = `${elements} element${elements === 1 ? '' : 's'}`;
            requestAnimationFrame(fitDrawing);
          } catch (error) {
            status.textContent = error.message;
            status.classList.add('error');
            count.textContent = `${anchors.size} elements`;
            if (artwork.childNodes.length) requestAnimationFrame(fitDrawing);
          }
        }

        const typedCompounds = new Map([
          ['ae', 'ẽ'],
          ['ao', 'õ'],
          ['ei', 'ĩ'],
          ['oi', 'ị'],
          ['oe', 'ẹ'],
          ['eo', 'ơ'],
          ['eu', 'ư'],
          ['ou', 'ũ'],
          ['aoe', 'ȡ'],
          ['õe', 'ȡ'],
          ['áé', 'ẻ'],
          ['óé', 'ț'],
          ['áóé', 'ȟ'],
          ['ỏé', 'ȟ'],
          ['éí', 'ỉ'],
          ['óí', 'ȍ'],
          ['áó', 'ỏ'],
          ['óú', 'ủ'],
          ['éú', 'ứ'],
        ]);
        // Keyboard spellings for the replacement symbols in the V2 inventory.
        // Plain h is already the dynamic h symbol and needs no composition.
        const dottedConsonants = new Map([
          ['s', 'ş'],
          ['c', 'ç'],
          ['g', 'ğ'],
        ]);
        const accentKeys = {
          '`': new Map([
            ['a', 'á'],
            ['e', 'é'],
            ['i', 'í'],
            ['o', 'ó'],
            ['ơ', 'ớ'],
            ['u', 'ú'],
            ['ẽ', 'ẻ'],
            ['ị', 'ȍ'],
            ['ẹ', 'ț'],
            ['ȡ', 'ȟ'],
            ['õ', 'ỏ'],
            ['ư', 'ứ'],
            ['ũ', 'ủ'],
            ['ĩ', 'ỉ'],
          ]),
          '-': new Map([
            ['a', 'à'],
            ['e', 'è'],
            ['i', 'ì'],
            ['o', 'ò'],
            ['ơ', 'ờ'],
            ['u', 'ù'],
          ]),
          '=': new Map([
            ['a', 'ā'],
            ['e', 'ē'],
            ['i', 'ī'],
            ['o', 'ō'],
            ['u', 'ū'],
          ]),
        };

        function composeAtCaret() {
          if (source.selectionStart !== source.selectionEnd) return false;
          const caret = source.selectionStart;
          const before = source.value.slice(0, caret);
          if (before.length >= 2 && before.at(-1).toLowerCase() === 'h') {
            const dotted = dottedConsonants.get(before.at(-2).toLowerCase());
            if (dotted) {
              source.setRangeText(dotted, caret - 2, caret, 'end');
              return true;
            }
          }
          const matches = [...typedCompounds.entries()].sort((a, b) => b[0].length - a[0].length);
          for (const [sequence, compound] of matches) {
            if (!before.endsWith(sequence)) continue;
            source.setRangeText(compound, caret - sequence.length, caret, 'end');
            return true;
          }
          return false;
        }

        let timer;
        function scheduleDraw() {
          clearTimeout(timer);
          timer = setTimeout(draw, 90);
        }

        speakButton.addEventListener('click', () => {
          try {
            EteSpeech.openReader(source.value);
            status.classList.remove('error');
            status.textContent = 'Opened IPA Reader';
          } catch (error) {
            status.textContent = error.message;
            status.classList.add('error');
          }
        });

        source.addEventListener('input', (event) => {
          if (!event.isComposing) {
            while (composeAtCaret()) {
              /* fold the longest compound suffix */
            }
          }
          scheduleDraw();
        });
        source.addEventListener('keydown', (event) => {
          if (
            event.isComposing ||
            event.ctrlKey ||
            event.metaKey ||
            event.altKey ||
            !accentKeys[event.key]
          )
            return;
          if (source.selectionStart !== source.selectionEnd || source.selectionStart === 0) return;
          const caret = source.selectionStart;
          const previous = source.value.slice(caret - 1, caret);
          const accented = accentKeys[event.key].get(previous);
          if (!accented) return;
          event.preventDefault();
          source.setRangeText(accented, caret - 1, caret, 'end');
          while (composeAtCaret()) {
            /* accented sequences can also collapse */
          }
          scheduleDraw();
        });
        document.querySelectorAll('input[name="font"]').forEach((input) =>
          input.addEventListener('change', (event) => {
            source.classList.toggle('font-nuaiti', event.target.value === 'nuaiti');
            source.focus();
          }),
        );
        document.querySelector('#random-text').addEventListener('click', () => {
          const settings = readRandomSettings();
          if (!settings) {
            randomSettingsDialog.showModal();
            return;
          }
          source.value = generateRandomText(settings.seed, settings.options);
          source.setSelectionRange(source.value.length, source.value.length);
          draw();
          source.focus();
        });
        document.querySelector('#random-settings').addEventListener('click', () => {
          randomSettingsError.textContent = '';
          randomSettingsDialog.showModal();
        });
        document
          .querySelector('#random-settings-close')
          .addEventListener('click', () => randomSettingsDialog.close());
        document
          .querySelector('#random-settings-cancel')
          .addEventListener('click', () => randomSettingsDialog.close());
        randomSettingsForm.addEventListener('submit', (event) => {
          event.preventDefault();
          if (readRandomSettings()) randomSettingsDialog.close();
        });
        document.querySelector('#maze-mode').addEventListener('click', (event) => {
          mazeMode = !mazeMode;
          event.currentTarget.setAttribute('aria-pressed', String(mazeMode));
          draw();
        });
        document.querySelector('#fit').addEventListener('click', fitDrawing);
        document.querySelector('#download').addEventListener('click', () => {
          const clone = svg.cloneNode(true);
          clone.setAttribute('xmlns', NS);
          clone.setAttribute('width', Math.max(1, Math.round(svg.clientWidth)));
          clone.setAttribute('height', Math.max(1, Math.round(svg.clientHeight)));
          clone.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);

          const palette = getComputedStyle(document.documentElement);
          const ink = palette.getPropertyValue('--ink').trim() || '#302b20';
          const gate = palette.getPropertyValue('--accent-deep').trim() || '#8f5e0d';

          const defs = document.createElementNS(NS, 'defs');
          const style = document.createElementNS(NS, 'style');
          style.textContent = `
            #artwork { fill: none; stroke: ${ink}; stroke-width: 2.6;
              stroke-linecap: round; stroke-linejoin: round; }
            #artwork .gate { fill: none; stroke: ${gate}; stroke-width: 1.5; opacity: .72; }
            #artwork .node-dot, #artwork .turtle-cursor { fill: ${ink}; stroke: none; }
          `;
          defs.append(style);
          clone.prepend(defs);

          const blob = new Blob([new XMLSerializer().serializeToString(clone)], {
            type: 'image/svg+xml',
          });
          const link = document.createElement('a');
          link.href = URL.createObjectURL(blob);
          link.download = 'ete-drawing.svg';
          link.click();
          setTimeout(() => URL.revokeObjectURL(link.href), 1000);
        });

        let pan = null;
        svg.addEventListener(
          'pointerdown',
          (event) => {
            if (event.pointerType === 'mouse' && event.button !== 0) return;
            if (event.cancelable) event.preventDefault();
            pan = {
              clientX: event.clientX,
              clientY: event.clientY,
              viewX: viewBox.x,
              viewY: viewBox.y,
            };
            svg.setPointerCapture(event.pointerId);
          },
          { passive: false },
        );
        svg.addEventListener(
          'pointermove',
          (event) => {
            if (!pan) return;
            if (event.cancelable) event.preventDefault();
            const scaleX = viewBox.w / svg.clientWidth,
              scaleY = viewBox.h / svg.clientHeight;
            viewBox.x = pan.viewX - (event.clientX - pan.clientX) * scaleX;
            viewBox.y = pan.viewY - (event.clientY - pan.clientY) * scaleY;
            svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
          },
          { passive: false },
        );
        const endPan = () => {
          pan = null;
        };
        svg.addEventListener('pointerup', endPan);
        svg.addEventListener('pointercancel', endPan);
        svg.addEventListener('lostpointercapture', endPan);
        // iOS fallback: a drag anywhere in the drawing panel belongs to the
        // drawing surface, never to the page's vertical scroller.
        drawerPanel.addEventListener(
          'touchmove',
          (event) => {
            if (event.cancelable) event.preventDefault();
          },
          { passive: false },
        );
        svg.addEventListener(
          'wheel',
          (event) => {
            event.preventDefault();
            const factor = event.deltaY > 0 ? 1.12 : 0.89;
            const rect = svg.getBoundingClientRect();
            const px = viewBox.x + ((event.clientX - rect.left) / rect.width) * viewBox.w;
            const py = viewBox.y + ((event.clientY - rect.top) / rect.height) * viewBox.h;
            viewBox.x = px - (px - viewBox.x) * factor;
            viewBox.y = py - (py - viewBox.y) * factor;
            viewBox.w *= factor;
            viewBox.h *= factor;
            svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);
          },
          { passive: false },
        );

        draw();
      })();
    </script>
  </body>
</html>
